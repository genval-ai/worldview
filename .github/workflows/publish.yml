name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install kanonak CLI
        run: npm install -g @kanonak-protocol/cli

      # ---------------------------------------------------------------
      # 1. Validate every .kan.yml in the publisher tree.
      # Any validation failure halts the publish; we never publish
      # broken packages.
      # ---------------------------------------------------------------
      - name: Validate packages
        run: |
          set -e
          for pkg in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            echo "Validating $pkg"
            kanonak validate "$pkg"
          done

      # ---------------------------------------------------------------
      # 2. For each WorldviewSnapshot-bearing package, render an HTML
      # snapshot via the snapshot-to-html transformation. Output goes
      # to _site/<package-name>@<version>/snapshot.html. The package
      # detection is heuristic - we match any file named example-*
      # (sample worldviews) or worldview@* (production worldviews if
      # any are eventually added) and skip the ontology / transformation
      # files themselves.
      # ---------------------------------------------------------------
      - name: Render WorldviewSnapshots
        run: |
          set -e
          mkdir -p _site
          for pkg_file in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            base=$(basename "$pkg_file" .kan.yml)
            # Skip ontology / transformation / non-snapshot packages
            case "$base" in
              core@*|finance@*|snapshot-to-html@*) continue ;;
            esac
            # Only render packages that contain a WorldviewSnapshot.
            # Quick grep test before invoking the transformation.
            if ! grep -q "type: wv\.WorldviewSnapshot\|type: worldview\.genval\.ai/core/WorldviewSnapshot" "$pkg_file"; then
              echo "Skipping $base (no WorldviewSnapshot)"
              continue
            fi
            # Extract package URI - filename is "<name>@<version>"
            pkg_uri="worldview.genval.ai/${base}"
            out_dir="_site/${base}"
            echo "Rendering $pkg_uri -> $out_dir"
            kanonak transform run \
              worldview.genval.ai/snapshot-to-html/snapshot-to-html-transformation \
              --scope "$pkg_uri" \
              --format html \
              --out "$out_dir/"
          done

      # ---------------------------------------------------------------
      # 3. Stage the publisher manifest + index.txt + a placeholder
      # landing page so the static site doubles as the Kanonak Protocol
      # publisher origin (https://worldview.genval.ai/).
      #
      # The packages themselves are mirrored under their canonical paths
      # (https://worldview.genval.ai/<package>/<version>.kan.yml) so any
      # consumer can `import worldview.genval.ai/core@^1.0.0` and have
      # it resolve over HTTPS.
      # ---------------------------------------------------------------
      - name: Stage publisher manifest + package mirror
        run: |
          set -e
          mkdir -p _site/.well-known
          cp .well-known/kanonak.json _site/.well-known/kanonak.json
          cp index.txt _site/index.txt
          # Mirror each package file at its canonical path.
          for pkg_file in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            base=$(basename "$pkg_file" .kan.yml)
            # Filename is "<name>@<version>"; canonical path is
            # https://worldview.genval.ai/<name>/<version>.kan.yml
            name="${base%@*}"
            version="${base#*@}"
            mkdir -p "_site/${name}"
            cp "$pkg_file" "_site/${name}/${version}.kan.yml"
          done

      # ---------------------------------------------------------------
      # 4. A minimal placeholder landing page. The proper aggregate
      # landing page that lists every snapshot, and the timeline-view
      # that visualizes how the worldview changes over time, are both
      # blocked on the kanonak-protocol aggregate-transformation
      # feature (filed as a separate issue). When that ships, this
      # placeholder is replaced by transformation-generated output.
      # ---------------------------------------------------------------
      - name: Write placeholder landing page
        run: |
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <title>worldview.genval.ai</title>
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <style>
          body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:780px;margin:64px auto;padding:0 24px;color:#111;line-height:1.55;background:#fafafa}
          h1{font-weight:300;font-size:42px;letter-spacing:-0.02em}
          h2{font-size:14px;letter-spacing:0.15em;text-transform:uppercase;color:#666;margin-top:48px}
          a{color:#0070f3}
          code{background:#eef;padding:1px 6px;border-radius:3px;font-size:0.9em}
          ul{padding-left:20px}
          li{margin:4px 0}
          .note{background:#fff8dc;border:1px solid #f0e0a0;padding:12px 16px;border-radius:6px;font-size:14px;color:#665500}
          </style>
          </head>
          <body>
          <h1>worldview.genval.ai</h1>
          <p>A public Kanonak Protocol publisher providing an ontology and tooling for falsifiable, evidence-backed worldview snapshots.</p>
          <h2>Packages</h2>
          <ul>
            <li><code>worldview.genval.ai/core@1.0.0</code> &mdash; abstract vocabulary (Snapshot/Thesis/Evidence base, Condition DSL, status / strength enums)</li>
            <li><code>worldview.genval.ai/finance@1.0.0</code> &mdash; finance-specific Evidence subclasses, Security class, named-instance vocabularies</li>
            <li><code>worldview.genval.ai/snapshot-to-html@1.0.0</code> &mdash; renders any WorldviewSnapshot to a single-page HTML report</li>
          </ul>
          <h2>Sample Snapshots</h2>
          <p>Worldview snapshots authored against the public ontology. Click to see the rendered report.</p>
          <ul id="samples"></ul>
          <h2>Spec / source</h2>
          <ul>
            <li><a href="https://github.com/genval-ai/worldview">github.com/genval-ai/worldview</a> &mdash; source repo</li>
            <li><a href="index.txt">index.txt</a> &mdash; Kanonak Protocol package index</li>
            <li><a href=".well-known/kanonak.json">.well-known/kanonak.json</a> &mdash; publisher manifest</li>
          </ul>
          <p class="note">A proper landing page that aggregates every snapshot version and a timeline view showing how the worldview changes over time are both blocked on a Kanonak Protocol feature for aggregate-over-set transformations. See the source repo for current status.</p>
          <script>
          // Sample-snapshot detection via index.txt (lists every package).
          // Filter to "example-*" entries; turn each into a link to its rendered HTML.
          (async () => {
            const r = await fetch('index.txt');
            const lines = (await r.text()).split('\n').filter(Boolean);
            const samples = lines.filter(l => l.startsWith('example-'));
            const ul = document.getElementById('samples');
            if (samples.length === 0) {
              ul.innerHTML = '<li><em>None yet.</em></li>';
              return;
            }
            samples.forEach(s => {
              // s is "example-name/1.0.0"; the rendered HTML lives at "<name>@<version>/snapshot.html"
              const [name, version] = s.split('/');
              const li = document.createElement('li');
              li.innerHTML = `<a href="${name}@${version}/snapshot.html">${name}@${version}</a>`;
              ul.appendChild(li);
            });
          })();
          </script>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
