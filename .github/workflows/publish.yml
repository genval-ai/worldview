name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install kanonak CLI
        run: npm install -g @kanonak-protocol/cli

      # ---------------------------------------------------------------
      # 1. Validate every .kan.yml in the publisher tree.
      # Any validation failure halts the publish; we never publish
      # broken packages.
      # ---------------------------------------------------------------
      - name: Validate packages
        run: |
          set -e
          for pkg in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            echo "Validating $pkg"
            kanonak validate "$pkg"
          done

      # ---------------------------------------------------------------
      # 2. For each WorldviewSnapshot-bearing package, render an HTML
      # snapshot via the snapshot-to-html transformation. Output goes
      # to _site/<package-name>@<version>/snapshot.html. The package
      # detection is heuristic - we match any file named example-*
      # (sample worldviews) or worldview@* (production worldviews if
      # any are eventually added) and skip the ontology / transformation
      # files themselves.
      # ---------------------------------------------------------------
      - name: Render WorldviewSnapshots
        run: |
          set -e
          mkdir -p _site
          for pkg_file in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            base=$(basename "$pkg_file" .kan.yml)
            # Skip ontology / transformation / non-snapshot packages
            case "$base" in
              core@*|finance@*|snapshot-to-html@*) continue ;;
            esac
            # Only render packages that contain a WorldviewSnapshot.
            # Quick grep test before invoking the transformation.
            if ! grep -q "type: wv\.WorldviewSnapshot\|type: worldview\.genval\.ai/core/WorldviewSnapshot" "$pkg_file"; then
              echo "Skipping $base (no WorldviewSnapshot)"
              continue
            fi
            # Extract package URI - filename is "<name>@<version>"
            pkg_uri="worldview.genval.ai/${base}"
            out_dir="_site/${base}"
            echo "Rendering $pkg_uri -> $out_dir"
            kanonak transform run \
              worldview.genval.ai/snapshot-to-html/snapshot-to-html-transformation \
              --scope "$pkg_uri" \
              --format html \
              --out "$out_dir/"
          done

      # ---------------------------------------------------------------
      # 3. Stage the publisher manifest + index.txt + a placeholder
      # landing page so the static site doubles as the Kanonak Protocol
      # publisher origin (https://worldview.genval.ai/).
      #
      # The packages themselves are mirrored under their canonical paths
      # (https://worldview.genval.ai/<package>/<version>.kan.yml) so any
      # consumer can `import worldview.genval.ai/core@^1.0.0` and have
      # it resolve over HTTPS.
      # ---------------------------------------------------------------
      - name: Stage publisher manifest + package mirror
        run: |
          set -e
          mkdir -p _site/.well-known
          cp .well-known/kanonak.json _site/.well-known/kanonak.json
          cp index.txt _site/index.txt
          # GitHub Pages custom-domain binding requires a CNAME file in
          # the deployed artifact root. Without it, each deploy invalidates
          # the custom-domain validation even though the Pages settings
          # still record the cname. Write it directly here rather than
          # tracking a CNAME file in the repo, so the source of truth is
          # the workflow (not a sometimes-out-of-sync file).
          echo "worldview.genval.ai" > _site/CNAME
          # Mirror each package file at its canonical path.
          for pkg_file in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            base=$(basename "$pkg_file" .kan.yml)
            # Filename is "<name>@<version>"; canonical path is
            # https://worldview.genval.ai/<name>/<version>.kan.yml
            name="${base%@*}"
            version="${base#*@}"
            mkdir -p "_site/${name}"
            cp "$pkg_file" "_site/${name}/${version}.kan.yml"
          done

      # ---------------------------------------------------------------
      # 4. Render the landing page via the landing-page SetTransformation.
      # Aggregates every WorldviewSnapshot in scope, sorts by observedAt
      # descending, and emits _site/index.html. This replaces the prior
      # placeholder and is itself the public ontology being eaten by the
      # publisher.
      # ---------------------------------------------------------------
      - name: Render landing page
        run: |
          set -e
          # Scope the SetTransformation across every worldview.genval.ai
          # package; the input pattern filters to wv.WorldviewSnapshot, so
          # only snapshot-bearing packages contribute. Output: index.html
          # at the artifact root (overwrites any prior placeholder).
          # Each example-* package's own snapshot is matched.
          # The transformation reads the inputs sorted by observedAt desc,
          # so "newest snapshot first" ordering is structural.
          for pkg_file in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            base=$(basename "$pkg_file" .kan.yml)
            case "$base" in
              core@*|finance@*|snapshot-to-html@*|landing-page@*) continue ;;
            esac
            if grep -q "type: wv\.WorldviewSnapshot" "$pkg_file"; then
              # Each contributing package needs to be in the loaded scope -
              # we pass them as comma-separated --scope arguments.
              scopes="${scopes}${scopes:+,}worldview.genval.ai/${base}"
            fi
          done
          if [ -z "$scopes" ]; then
            echo "No WorldviewSnapshot packages found - skipping landing page render"
            # write a minimal placeholder so the site still has an index.html
            echo "<h1>worldview.genval.ai</h1><p>No snapshots published yet.</p>" > _site/index.html
            exit 0
          fi
          echo "Rendering landing page over scopes: $scopes"
          kanonak transform run \
            worldview.genval.ai/landing-page/landing-page-transformation \
            --scope "$scopes" \
            --format html \
            --out "_site/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
