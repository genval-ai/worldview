name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install kanonak CLI
        run: npm install -g @kanonak-protocol/cli

      - name: Cache kanonak package cache
        uses: actions/cache@v4
        with:
          path: ~/.kanonak
          key: kanonak-${{ runner.os }}-${{ hashFiles('kanonak-packages/**/*.kan.yml') }}
          restore-keys: |
            kanonak-${{ runner.os }}-

      - name: Validate packages
        run: |
          set -euo pipefail
          find kanonak-packages/worldview.genval.ai -name '*.kan.yml' -print0 | \
            xargs -0 -P 4 -I {} kanonak validate "{}"

      - name: Publish resources via the look layer
        run: |
          kanonak publish \
            --workspace kanonak-packages/worldview.genval.ai \
            --out _site

      - name: Stage publisher manifest + package mirror
        run: |
          set -e
          mkdir -p _site/.well-known
          cp .well-known/kanonak.json _site/.well-known/kanonak.json
          echo "worldview.genval.ai" > _site/CNAME
          : > _site/index.txt.unsorted
          for pkg_dir in kanonak-packages/worldview.genval.ai/*/; do
            name=$(basename "$pkg_dir")
            mkdir -p "_site/${name}"
            for pkg_file in "$pkg_dir"*.kan.yml; do
              [ -f "$pkg_file" ] || continue
              version=$(basename "$pkg_file" .kan.yml)
              cp "$pkg_file" "_site/${name}/${version}.kan.yml"
              echo "${name}/${version}" >> _site/index.txt.unsorted
            done
          done
          sort -V _site/index.txt.unsorted > _site/index.txt
          rm _site/index.txt.unsorted

      - name: Redirect / to the site index page
        run: |
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Redirecting…</title>
          <meta http-equiv="refresh" content="0; url=/site/index">
          <link rel="canonical" href="/site/index">
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
