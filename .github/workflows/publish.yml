name: Publish

# Publishes worldview.genval.ai as a static GitHub Pages site using the
# Kanonak Protocol look authoring surface. Per-class HTML + CSS rendering
# is handled by `kanonak publish` walking the workspace and routing
# resources through their declared `derivation.look` (in worldview-look).
#
# This workflow replaces the pre-3.0.0 publish.yml that orchestrated a
# dozen explicit `kanonak transform run` calls. The look layer collapses
# those into one `kanonak publish` step.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install kanonak CLI
        run: npm install -g @kanonak-protocol/cli

      - name: Cache kanonak package cache
        uses: actions/cache@v4
        with:
          path: ~/.kanonak
          key: kanonak-${{ runner.os }}-${{ hashFiles('kanonak-packages/**/*.kan.yml') }}
          restore-keys: |
            kanonak-${{ runner.os }}-

      - name: Validate packages
        run: |
          set -euo pipefail
          ls kanonak-packages/worldview.genval.ai/*.kan.yml | \
            xargs -P 4 -I {} kanonak validate "{}"

      # One step renders every resource — HTML and CSS — per its class's
      # `derivation.look` declaration. Output lands at canonical Kanonak
      # URL paths under _site/.
      - name: Publish resources via the look layer
        run: |
          kanonak publish \
            --workspace kanonak-packages/worldview.genval.ai \
            --out _site

      # SVG identity icons. The look layer doesn't yet emit SVG; the
      # 4-tier semantic-zoom renderers in worldview-chrome@3.0.0 still
      # produce these via explicit transform-run. Two evidence concept
      # sets land at /core/2.0.0/ and /finance/3.0.0/ for use as
      # <img src> references in rendered HTML.
      - name: Render ontology concept SVGs
        run: |
          set -euo pipefail
          mkdir -p _site/core/2.0.0 _site/finance/3.0.0
          kanonak transform run worldview.genval.ai/worldview-chrome/evidence-strength-svg-renderer \
            --scope worldview.genval.ai/core@2.0.0 \
            --format svg --out _site/core/2.0.0/ >/dev/null
          kanonak transform run worldview.genval.ai/worldview-chrome/evidence-type-svg-renderer \
            --scope worldview.genval.ai/core@2.0.0 \
            --format svg --out _site/core/2.0.0/ >/dev/null
          kanonak transform run worldview.genval.ai/worldview-chrome/evidence-type-svg-renderer \
            --scope worldview.genval.ai/finance@3.0.0 \
            --format svg --out _site/finance/3.0.0/ >/dev/null

      # Publisher manifest + canonical package mirror. Required at the
      # publisher's origin so `import worldview.genval.ai/core` resolves
      # over HTTPS.
      - name: Stage publisher manifest + package mirror
        run: |
          set -e
          mkdir -p _site/.well-known
          cp .well-known/kanonak.json _site/.well-known/kanonak.json
          echo "worldview.genval.ai" > _site/CNAME
          : > _site/index.txt.unsorted
          for pkg_file in kanonak-packages/worldview.genval.ai/*.kan.yml; do
            base=$(basename "$pkg_file" .kan.yml)
            name="${base%@*}"
            version="${base#*@}"
            mkdir -p "_site/${name}"
            cp "$pkg_file" "_site/${name}/${version}.kan.yml"
            echo "${name}/${version}" >> _site/index.txt.unsorted
          done
          sort -V _site/index.txt.unsorted > _site/index.txt
          rm _site/index.txt.unsorted

      # Aggregate views (snapshots/, timeline/, horizon/, changes/,
      # sources/, regime/). Uses `kanonak site build` until the look
      # layer's package-view authoring fully replaces site.AggregateView.
      - name: Render aggregate views
        run: |
          set -e
          kanonak site build --out _site || true
          printf '%s\n' \
            'snapshots-aggregate _site/snapshots/' \
            'timeline-aggregate _site/timeline/' \
            'horizon-aggregate _site/horizon/' \
            'changes-aggregate _site/changes/' \
            'sources-aggregate _site/sources/' \
            'regime-aggregate _site/regime/' | \
            xargs -n 2 -P 4 sh -c '
              kanonak derive "worldview.genval.ai/pages@2.1.0/$1" \
                --format stylesheet --out "$2" >/dev/null 2>&1 || true
            ' _

      # Latest snapshot → /index.html. The `kanonak publish` step already
      # rendered `_site/snapshot/2.1.x/view.html`; copy it to the site
      # root so visiting `/` shows the latest worldview.
      - name: Install latest snapshot at /index.html
        run: |
          set -e
          latest_dir=$(ls -d _site/snapshot/*/ 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$latest_dir" ] && [ -f "${latest_dir}view.html" ]; then
            cp "${latest_dir}view.html" _site/index.html
            cp "${latest_dir}view.css" _site/snapshot.css 2>/dev/null || true
          else
            cat > _site/index.html <<'HTML'
          <!doctype html><html><head><meta charset="utf-8"><title>worldview.genval.ai</title></head>
          <body><h1>worldview.genval.ai</h1><p>No snapshots published yet.</p></body></html>
          HTML
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
