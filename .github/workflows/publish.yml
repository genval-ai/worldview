name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install kanonak CLI
        run: npm install -g @kanonak-protocol/cli

      - name: Validate packages
        run: |
          set -euo pipefail
          find kanonak-packages/worldview.genval.ai -name '*.kan.yml' -print0 | \
            xargs -0 -P 4 -I {} kanonak validate "{}"

      - name: Publish resources via the look layer
        run: |
          kanonak publish \
            --workspace kanonak-packages/worldview.genval.ai \
            --out _site

      - name: Add GitHub Pages host specifics
        # `kanonak publish` already emits the publisher endpoints —
        # index.txt, .well-known/kanonak.json, and the raw
        # {package}/{version}.kan.yml sources that HTTP import resolution
        # and `kanonak install` fetch. Only the GitHub-Pages host
        # specifics remain: the custom domain, and .nojekyll so Pages
        # serves the tree verbatim (preserving .well-known/ and any
        # underscore paths rather than running Jekyll over them).
        run: |
          echo "worldview.genval.ai" > _site/CNAME
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
