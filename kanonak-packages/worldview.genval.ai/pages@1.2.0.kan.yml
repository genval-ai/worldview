pages:
  type: Package
  publisher: worldview.genval.ai
  version: 1.2.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: site
          match: ^
          version: 1.0.0
          alias: site
        - package: derivation
          match: ^
          version: 1.0.0
          alias: derivation
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
        - package: transformations
          match: ^
          version: 3.11.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.2.0
          alias: wv

# =============================================================================
# Publisher curation for worldview.genval.ai — 1.1.0.
#
# Migration from 1.0.0 to the formats.stylesheet derivative pattern:
#
#   - The shared "chrome" CSS that was previously stored as a
#     `site.Asset` (`worldview-chrome-css`) and pulled into every
#     transformation's inline `<style>` via PropertyRead is now a
#     `tx.ExpressionFragment` (`worldview-chrome-fragment`) returning
#     a `docast.RawBlock(text/css)`. Per-class stylesheet
#     transformations consume it via `tx.CallFragment` per the
#     `composable-css-fragments` pattern in
#     kanonak.org/derivation-conventions@1.0.0.
#
#   - `wv.WorldviewSnapshot` now binds (formats.stylesheet, default)
#     in addition to its (formats.html, default) binding, dispatching
#     to `worldview.genval.ai/snapshot-to-html@1.1.0/snapshot-stylesheet`.
#     `kanonak site build` materializes both artifacts per snapshot.
#
#   - Each `site.AggregateView` resource carries a per-instance
#     (formats.stylesheet, default) binding pointing at its package's
#     stylesheet transformation. Per-instance derivations have REPLACE
#     semantics, so this does not pollute other publishers'
#     `site.AggregateView` instances.
#
#   - HTML transformations no longer inline `<style>` blocks; they
#     emit `<link rel="stylesheet" href="...">` referencing the
#     sibling `.css` artifact materialized at the same output path.
#
# Net result: chrome CSS lives in one fragment; per-class CSS lives in
# one transformation per page-class; HTML and CSS each cache
# independently in browser, and the `.css` artifact is discoverable by
# any future Kanonak Browser / Chrome plugin via the same derivation
# walk used for HTML and Markdown.
# =============================================================================

# -----------------------------------------------------------------------------
# Shared chrome fragment — design tokens, body resets, site-nav layout,
# anchor-scroll offset. Identical bytes across every page-class
# stylesheet in this publisher.
#
# The `--kan-*` block at the bottom of `:root` maps the protocol-level
# theming variables documented in
# kanonak.org/universal-derivations@1.7.0 (#any-resource-stylesheet) to
# worldview's existing design tokens, so a Kanonak Browser host that
# rebinds `--kan-link-color` etc. via its outer stylesheet picks up
# worldview's accent palette automatically without the chrome fragment
# having to know about any specific consumer.
# -----------------------------------------------------------------------------

worldview-chrome-fragment:
  type: tx.ExpressionFragment
  tx.body:
    type: tx.BuildAstNode
    tx.astClass: docast.RawBlock
    tx.set:
      - tx.field: docast.mediaType
        tx.bindValue:
          type: tx.UriLiteral
          tx.refTo: docast.text-css
      - tx.field: docast.rawContent
        tx.bindValue:
          type: tx.StringLiteral
          tx.stringLiteral: |
            /* Suppress the CLI's default metadata frontmatter render — we set the page <title> via docast.metadata; we don't want it duplicated as a visible body frontmatter card. */
            dl.metadata{display:none!important}
            /* Design tokens — dark theme palette + theme-icon HSL tuning vars consumed by every typed-visual renderer (thesis icons, condition graphs, mini-timelines, etc.). The hue per token comes from each instance's data; saturation/lightness centralized here so a future light-mode override flips the whole site at once. */
            :root{
              --bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--bg-input:#0c1220;
              --fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;
              --accent:#7dd3fc;--accent-2:#38bdf8;--accent-3:#0ea5e9;
              --strong:#34d399;--moderate:#fbbf24;--weak:#64748b;--danger:#f87171;
              --border:#1e293b;--border-soft:#162033;
              --radius:8px;--radius-sm:4px;
              --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
              --font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;
              --font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif;
              --theme-arc-saturation:60%;
              --theme-arc-lightness:62%;
              --theme-ring-saturation:28%;
              --theme-ring-lightness:26%;
              --theme-fill-saturation:55%;
              --theme-fill-lightness:18%;
              /* Protocol-level theme bridge — see kanonak.org/universal-derivations@1.7.0#any-resource-stylesheet. A Kanonak Browser host can rebind any of these in its outer stylesheet to retheme without overriding worldview's selectors. */
              --kan-link-color:var(--accent);
              --kan-link-hover-color:var(--accent-2);
              --kan-text-color:var(--fg);
              --kan-muted-color:var(--fg-dim);
              --kan-border-color:var(--border);
              --kan-badge-bg:rgba(125,211,252,0.10);
              --kan-badge-fg:var(--accent);
              --kan-table-header-bg:var(--bg-elev)
            }
            /* Reset */
            *{box-sizing:border-box;margin:0;padding:0}
            html,body{background:var(--bg)}
            /* Override the CLI's default light-theme body wrapper (max-width:860px;margin:2rem auto;padding:0 1rem) so our sticky nav can span the full viewport. The article inside has its own max-width centering. */
            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
            /* Links */
            a{color:var(--accent);text-decoration:none;transition:color 120ms}
            a:hover{color:var(--accent-2)}
            /* Site nav — sticky, full-bleed, blurred translucent background */
            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
            /* Anchor-link scroll offset — accounts for the sticky nav so #thesis-X / #any-id lands below the nav with breathing room. Doubles on mobile where the nav wraps to two rows. */
            [id]{scroll-margin-top:80px}
            @media (max-width:600px){[id]{scroll-margin-top:120px}}
            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
            ul.site-nav-links a:hover{color:var(--fg)}
            ul.site-nav-links a.active{color:var(--fg)}
            @media (max-width:600px){nav.site-nav{padding:12px 20px}.site-nav-inner{gap:16px}ul.site-nav-links{gap:16px;margin-left:0;flex-basis:100%}}
            /* Prose paragraph preservation — temporary stand-in for the protocol-level prose property type tracked in kanonak-protocol/typescript#20. Authors put `\n\n` between paragraphs in YAML literal-block scalars; HTML collapses whitespace runs into single spaces by default, so without this rule multi-paragraph prose renders as one wall of text. `pre-line` preserves authored newlines while still letting words wrap. Selectors enumerate every prose class used across this publisher's transformations; new prose-bearing classes should be added here so paragraph rendering stays consistent. */
            .hero-narrative,.thesis-statement,.confidence-rationale,.change-rationale,.lead,.invalidation > p,.prose{white-space:pre-line}

# =============================================================================
# DERIVATION BINDINGS ON wv.WorldviewSnapshot
#
# Open-world augmentation: this top-level entry adds derivations to the
# existing `worldview.genval.ai/core@1.0.0/WorldviewSnapshot` class. The
# parser merges by canonical URI, so this binding attaches to the same
# subject the core package declared. Pattern mirrors
# kanonak.org/universal-derivations@1.0.0 augmenting rdfs.Resource.
#
# Two bindings:
#   - (formats.html, default)       → snapshot-to-html-transformation
#   - (formats.stylesheet, default) → snapshot-stylesheet
# =============================================================================

wv.WorldviewSnapshot:
  derivation.derivations:
    - type: derivation.Derivation
      derivation.format: formats.html
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: snapshot-to-html
        tx.version: 1.2.0
        tx.name: snapshot-to-html-transformation
    - type: derivation.Derivation
      derivation.format: formats.stylesheet
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: snapshot-to-html
        tx.version: 1.2.0
        tx.name: snapshot-stylesheet

# =============================================================================
# AGGREGATE VIEWS
#
# Each AggregateView declares one cross-version page produced by a
# SetTransformation aggregating across every published snapshot. After
# `kanonak site build`, those steps collapse to one `kanonak site build`
# invocation that materializes every AggregateView at its outputPath.
#
# scopeSources uses the `publisher/package@*` wildcard form so each view
# automatically picks up new snapshot versions on the next build — no
# workflow edit needed.
#
# Each AggregateView carries a per-instance (formats.stylesheet, default)
# `derivation.derivations` binding pointing at its package's stylesheet
# transformation. The site builder materializes the sibling `.css`
# artifact at `<dirname-of-outputPath>/index.css` so the HTML's
# `<link rel="stylesheet" href="index.css">` resolves path-relative.
# =============================================================================

snapshots-aggregate:
  type: site.AggregateView
  site.outputPath: snapshots/index.html
  site.scopeClass: wv.WorldviewSnapshot
  site.scopeSources:
    - worldview.genval.ai/snapshot@*
  site.transformation:
    type: tx.TransformationReference
    tx.publisher: worldview.genval.ai
    tx.package: landing-page
    tx.version: 1.1.0
    tx.name: landing-page-transformation
  derivation.derivations:
    - type: derivation.Derivation
      derivation.format: formats.stylesheet
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: landing-page
        tx.version: 1.1.0
        tx.name: landing-page-stylesheet

timeline-aggregate:
  type: site.AggregateView
  site.outputPath: timeline/index.html
  site.scopeClass: wv.WorldviewSnapshot
  site.scopeSources:
