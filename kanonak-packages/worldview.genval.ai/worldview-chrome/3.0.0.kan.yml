                            <style>
                            text{font-family:'SF Mono',ui-monospace,Consolas,Menlo,monospace}
                            .frame.s-active{stroke:#34d399}
                            .frame.s-retired{stroke:#64748b;stroke-dasharray:4 3}
                            .frame.s-invalidated{stroke:#f87171}
                            .status-text.s-active{fill:#34d399}
                            .status-text.s-retired{fill:#9aa5b8}
                            .status-text.s-invalidated{fill:#f87171}
                            /* SEMANTIC ZOOM — see convention block at top of file.
                               Default to tier-full; cascade down through tier-card →
                               tier-icon → tier-chip as the SVG's rendered viewport shrinks. */
                            .tier-chip,.tier-icon,.tier-card{display:none}
                            .tier-full{display:block}
                            @media (max-width:400px){
                              .tier-full{display:none}
                              .tier-card{display:block}
                            }
                            @media (max-width:160px){
                              .tier-card{display:none}
                              .tier-icon{display:block}
                            }
                            @media (max-width:60px){
                              .tier-icon{display:none}
                              .tier-chip{display:block}
                            }
                            /* tier-icon — adds the confidence value as text over the
                               status-framed, theme-filled body. */
                            .i-conf{font-size:110px;font-weight:700;fill:#e6eaf2}
                            /* tier-card — large fonts in user-space so they stay readable
                               when scaled down to ~200px renders. */
                            .c-status{font-size:30px;font-weight:600;letter-spacing:8px}
                            .c-conf{font-size:120px;font-weight:700;fill:#e6eaf2}
                            .c-theme{font-size:18px;fill:#9aa5b8;letter-spacing:4px}
                            /* Full layout typography stays small in user-space because at full
                               render size it's already large enough on screen. */
                            .meta-label{fill:#6b7689;font-size:9px;letter-spacing:2.5px}
                            .meta-value{fill:#9aa5b8;font-size:11px}
                            .conf-value{fill:#e6eaf2;font-size:50px;font-weight:600}
                            .conf-label{fill:#6b7689;font-size:9px;letter-spacing:2.5px}
                            .ev-label{fill:#6b7689;font-size:9px;letter-spacing:2.5px}
