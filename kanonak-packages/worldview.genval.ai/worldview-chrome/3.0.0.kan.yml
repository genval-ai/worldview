
worldview-chrome:
  type: Package
  publisher: worldview.genval.ai
  version: 3.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.11.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
        - package: derivation
          match: ^
          version: 1.0.0
          alias: derivation
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
        - package: estimates
          match: ^
          version: 1.0.0
          alias: est
        - package: sources
          match: ^
          version: 1.0.0
          alias: src
        - package: finance
          match: ^
          version: 3.0.0
          alias: fin
        - package: visual
          match: ^
          version: 2.0.0
          alias: vis


thesis-svg-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: wv.WorldviewThesis
    tx.requires:
      - wv.confidence

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.svg

