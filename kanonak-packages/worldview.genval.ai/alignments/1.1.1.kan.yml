      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.88
        estimateStdDev: 0.04
        betaAlpha: 26.0
        betaBeta: 3.5
      securityRationale: |
        Long [[sec.amd]] is the second-GPU-vendor **alternate** - strong evidence
        including the [[ws.ev-amd-q1-2026-blowout|Q1 2026 blowout]], the
