alignments:
  type: Package
  publisher: worldview.genval.ai
  version: 1.1.1
  label: Alignment data - patch refresh against snapshot 3.0.1
  comment: >-
    Patch refresh of the public alignment data, re-derived against worldview
    snapshot 3.0.1 (Thursday July 2 - the Iran de-escalation deepened (OFAC General
    License X, June 29 halt-hostilities, WTI below $69), May PCE core ticked to 3.4%,
    Warsh reinforced the hawkish regime at Sintra, equities recovered and VIX collapsed
    to ~16.5, gold sold off below $4,000 then bounced). Same seven wv.active theses as
    1.1.0, so a patch - and no securities bump. All baskets hold structurally; the only
    alignment-level change is the equity UVIX hedge easing 0.72 to 0.70 as vol collapsed
    further. Rationale refreshed to the 3.0.1 regime. Superseded by the next operator
    refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: estimates
          match: ^
          version: 1.0.0
          alias: est
        - package: securities
          match: ^
          version: 2.3.0
          alias: sec
        - package: snapshots
          match: '='
          version: 3.0.1
          alias: ws

view:
  type: align.Alignment
  label: Thesis alignments (1.1.1 - patch refresh against snapshot 3.0.1, the Thursday July 2 moment - the Iran de-escalation deepened and WTI fell below $69, May PCE core ticked to 3.4%, Warsh reinforced the hawkish regime at Sintra, equities recovered and VIX collapsed to ~16.5; all seven baskets hold structurally, the equity UVIX hedge eases 0.72 to 0.70 on the vol collapse, rationale refreshed to the 3.0.1 regime)
  alignmentObservedAt: 2026-07-02T12:52:00Z
  alignmentNarrative: |
    Patch refresh against [[ws.view|worldview snapshot 3.0.1]] (observedAt 2026-07-02T12:45:52Z). Same seven `wv.active` theses as 1.1.0 - the [[ws.powell-warsh-transition-risk|Fed-transition thesis]] stays retired and [[ws.hawkish-warsh-regime]] carries the higher-for-longer story - so this is a patch, no `ThesisAlignment` added or dropped, and no securities bump. The window continued both trends 3.0.0 identified (de-escalation, hawkish Warsh), so at the ALIGNMENT level almost nothing moves: `alignmentStrength` is structural fit, independent of the thesis-confidence drift the snapshot already carries. Snapshot drift for downstream joint math: [[ws.persistent-energy-shock|energy]] 0.50 to 0.45, [[ws.gold-debasement-bid|gold]] 0.88 to 0.85, [[ws.hawkish-warsh-regime|hawkish-Warsh]] 0.72 to 0.76, [[ws.equity-melt-up-vs-recession-risk|equity]] 0.76 to 0.78, [[ws.stagflation-risk|stagflation]] 0.88 to 0.87, [[ws.iran-war-rearmament|defense]] 0.84 to 0.83, [[ws.ai-capex-cycle-with-china-tail|ai-capex]] 0.88 held.

    **Energy - a thesis-confidence move, not an alignment move.** [[ws.persistent-energy-shock]] fell to 0.45 on [[ws.ev-ofac-general-license-x-jun22|the OFAC license]], [[ws.ev-us-iran-halt-hostilities-jun29|the June 29 halt-hostilities]], and [[ws.ev-wti-below-69-jul1|WTI below $69]]. The long-energy stack ([[sec.xle]] / [[sec.xom]] / [[sec.cvx]]) expresses the thesis exactly as strongly regardless of conviction, so ranks and strengths hold and the confidence drop flows downstream through the snapshot band. Same treatment [[gold-debasement-bid-alignment|the gold basket]] gets after its sub-$4,000 dip.

    **The hawkish-Warsh basket gets more apt as the regime confirms.** [[ws.hawkish-warsh-regime]] rose to 0.76 on [[ws.ev-warsh-sintra-independence-jul1|Warsh's Sintra independence and price-stability pledge]] and [[ws.ev-fedwatch-dec-hike-66pct-jun|a December hike priced into the dots]]. Its rate-up basket - short [[sec.tlt]] / short [[sec.ief]] inverse-expressions, long [[sec.dbmf]] / [[sec.kmlm]] trend carry - is unchanged, but its regime context is now firmly confirmed rather than nascent. [[ws.stagflation-risk]] (0.87) shares the short-rate legs; those overlaps dedupe downstream in the fund's driver-union on the `rate-path` driver.

    **Gold, defense, AI - structural stacks unchanged.** [[ws.gold-debasement-bid]] (0.85) - the [[sec.gld]] / [[sec.iau]] / [[sec.gdx]] fit is reaffirmed by [[ws.ev-wgc-midyear-outlook-jul1|the WGC mid-year outlook]] despite the price dip. [[ws.iran-war-rearmament]] (0.83) - [[sec.lmt]] / [[sec.rtx]] / [[sec.noc]] hold as [[ws.ev-defense-closes-jul1|the primes stayed firm]]. [[ws.ai-capex-cycle-with-china-tail]] (0.88) - the five-name supplier stack holds; the [[ws.ev-china-export-control-retaliation-jun22|re-armed China tail]] and [[ws.ev-semis-selloff-jul1|July 1 selloff]] are snapshot-band / positioning events, not structural re-ranks.

    **The one alignment-level change: the equity vol-hedge eases.** [[ws.equity-melt-up-vs-recession-risk]] rose to 0.78 as [[ws.ev-vix-collapse-165-jul1|VIX collapsed to ~16.5]] and [[ws.ev-spy-qqq-recover-jul1|equities recovered]]. The long-[[sec.spy]] / [[sec.vti]] core is unchanged, but the [[sec.uvix]] hedge slot eases from 0.72 to 0.70 on the vol collapse - the only strength parameter that moves this refresh.

    **What this patch changed.** Only the [[sec.uvix]] hedge strength in the equity alignment (0.72 to 0.70). All other baskets, ranks, roles, directions, and strength parameters are unchanged; prose refreshed to the 3.0.1 regime. No securities bump, no Tier-3 additions.
  derivedFromSnapshot: ws.view
  hasAlignment:
    - stagflation-risk-alignment
    - persistent-energy-shock-alignment
    - iran-war-rearmament-alignment
    - gold-debasement-bid-alignment
    - ai-capex-cycle-with-china-tail-alignment
    - equity-melt-up-vs-recession-risk-alignment
    - hawkish-warsh-regime-alignment

stagflation-risk-alignment:
  type: align.ThesisAlignment
  label: Stagflation risk alignment
  forThesis: ws.stagflation-risk
  alignmentConfidence:
    estimateMean: 0.55
    estimateStdDev: 0.10
    betaAlpha: 12.0
    betaBeta: 10.0
  alignmentRationale: |
    Macro framework with no direct ticker evidence; synthetic basket. The short-[[sec.tlt]] / short-[[sec.ief]] rate legs got corroboration from [[ws.ev-may-pce-core-34-jun25|core PCE at 3.4%]]; long [[sec.gld]] holds the debasement leg, [[sec.dbmf]] the carry, and long [[sec.xle]] the passthrough leg though its context softened with the ~25% oil collapse. Ranks and strengths hold; the rate legs overlap [[hawkish-warsh-regime-alignment|the hawkish-Warsh basket]] and dedupe downstream. alignmentConfidence 0.55.
  hasAlignedSecurity:
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.65
        estimateStdDev: 0.10
        betaAlpha: 14.0
        betaBeta: 7.5
      securityRationale: |
        Short [[sec.tlt]] is the cleanest single-ticker expression of the
        rate-up component named throughout [[ws.stagflation-risk]] - the move to
        4.55% is the latest print ([[ws.ev-10y-yield-fri-455-jun5]]), extending
        the [[ws.ev-10y-yield-monday-461-may18|May rate-path repricing]], and
        [[ws.ev-fedwatch-hike-by-dec-70pct-jun5|hike-by-December odds at ~70%]]
        corroborate. Long-duration Treasuries fall most under the named rate
        move; **inverse-expression** (short) is the mechanism. Mean at the
        indirect-reasoning cap of 0.65 because the thesis does not name
        [[sec.tlt|TLT]] directly even though the mechanism is unambiguous.
    - alignedSecurity: sec.gld
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.62
        estimateStdDev: 0.10
        betaAlpha: 13.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.gld]] is the classic stagflation hedge - precious metals
        carry the debasement-and-inflation premium. The thesis names rising
        inflation (CPI 3.8% via [[ws.ev-april-cpi-print-headline-38]], PPI +6.0%
        YoY via [[ws.ev-april-ppi-print-may13]]) and the
        [[ws.gold-debasement-bid|gold-debasement-bid thesis]] runs in parallel;
        this alignment captures the inflation side of stagflation. Mean below
        0.65 because [[sec.gld|GLD]] is not named in this thesis's evidence
        directly (see [[gold-debasement-bid-alignment]]).
    - alignedSecurity: sec.xle
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.60
        estimateStdDev: 0.10
        betaAlpha: 12.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.xle]] captures the energy-passthrough mechanism named
        explicitly in [[ws.stagflation-risk]]'s thesisStatement. Crude eased to
        [[ws.ev-wti-fri-ease-93-jun5|~$93 Friday]] but remains a live passthrough
        tailwind well above the invalidation threshold. Mean modest because the
        [[persistent-energy-shock-alignment|persistent-energy-shock alignment]]
        already carries this ticker with higher conviction.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.55
        estimateStdDev: 0.12
        betaAlpha: 9.0
        betaBeta: 7.4
      securityRationale: |
        Long [[sec.dbmf]] captures the trend-following premium that
        managed-futures strategies extract from regime shifts like the current
        rates / commodities / FX repricing. The thesisStatement documents the
        sharpest rate-path repricing of the cycle - exactly the environment in
        which managed-futures vehicles structurally outperform. Mean modest
        because the mechanism is one step removed from the thesis text.
    - alignedSecurity: sec.ief
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.53
        estimateStdDev: 0.10
        betaAlpha: 11.0
        betaBeta: 9.8
      securityRationale: |
        Short [[sec.ief]] is the lower-duration alternate to short
        [[sec.tlt|TLT]] - same inverse-expression sign on the rate-up component
        but smaller single-trade vol. Useful as a sleeve-level diversifier of the
        short-bond expression. Mean lowest in the stack because the primary
        inverse-expression slot is already filled by [[sec.tlt|TLT]].

persistent-energy-shock-alignment:
