    - alignedSecurity: sec.nvda
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.92
        estimateStdDev: 0.03
        betaAlpha: 36.0
        betaBeta: 3.1
      securityRationale: |
        Long [[sec.nvda]] is the canonical AI-capex **primary vehicle** - the
        densest evidence support in the stack, anchored by the
        [[ws.ev-nvda-q1-fy27-full-figures-may21|record Q1 FY2027 beat-and-raise]]
        and backed structurally by the [[ws.ev-h200-export-approval-may14|H200 export approval]]. The extended de-rating
