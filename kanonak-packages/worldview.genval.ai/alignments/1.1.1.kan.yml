        the thesis is the directional bet. Direct evidence including Wednesday's
        [[ws.ev-spy-wed-close-72543-jun10|725.43 close at the session low]],
        part of the broad war-and-CPI de-risking rather than a thesis-breaking
        move (neither VIX leg has fired). **Primary liquid vehicle** for broad
        equity beta.
    - alignedSecurity: sec.vti
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.78
        estimateStdDev: 0.07
        betaAlpha: 11.0
        betaBeta: 3.1
      securityRationale: |
        Long [[sec.vti]] is the broader-market **Tier-2 alternate** (total stock
        market vs S&P 500 cap-weighted) - similar shape to [[sec.spy|SPY]] with
        mid- and small-cap participation that adds a different risk profile. No
        direct evidence mentions but a `typedSector` (broad-market) match with
        [[sec.spy|SPY]] puts it cleanly in the alternate-vehicle slot; lower
        expense ratio is the reason to substitute or complement.
    - alignedSecurity: sec.uvix
      securityRole: align.role-hedge
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.70
        estimateStdDev: 0.10
        betaAlpha: 12.0
        betaBeta: 4.7
      securityRationale: |
        Long [[sec.uvix]] is the vol-expansion **hedge** against the
        recession-risk side firing. The thesis names the vol-expansion
        invalidation pathway (VIX > 25 with SPY breaking its 50d MA for 5
        sessions), and [[ws.ev-vix-wed-close-2222-jun10|VIX closed 22.22 Wednesday after topping 23 intraday - the closest approach yet]] -
        realized volatility is building toward exactly the mechanism this slot
        hedges, so the mean nudges 0.70 to 0.72 and the band tightens slightly.
        UVIX still carries decay cost if the expansion stalls
        ([[ws.ev-thu-premarket-futures-rise-jun11|Thursday futures bounced]]),
        which keeps the band the widest in the basket.

hawkish-warsh-regime-alignment:
  type: align.ThesisAlignment
  label: Hawkish Warsh regime alignment
  forThesis: ws.hawkish-warsh-regime
  alignmentConfidence:
    estimateMean: 0.58
    estimateStdDev: 0.10
    betaAlpha: 12.0
    betaBeta: 8.7
  alignmentRationale: |
    The rate-up / trend basket - short [[sec.tlt]] and short [[sec.ief]] inverse-expressions on the higher-for-longer path, long [[sec.dbmf]] / [[sec.kmlm]] trend carry. The thesis firmed to 0.76 on [[ws.ev-warsh-sintra-independence-jul1|Warsh's Sintra pledge]] and [[ws.ev-fedwatch-dec-hike-66pct-jun|a December hike priced in]], making the short-rate legs more apt; the basket structure and strengths are unchanged. alignmentConfidence 0.58.
  hasAlignedSecurity:
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.70
        estimateStdDev: 0.09
        betaAlpha: 16.0
        betaBeta: 6.9
      securityRationale: |
        Short [[sec.tlt]] is the cleanest single-ticker expression of
        [[ws.hawkish-warsh-regime]] - a hawkish, no-cut, hike-biased Fed drives
        long-duration Treasuries lower, and the [[ws.ev-2y-yield-plus16bp-jun17|16bp 2Y jump]]
        plus [[ws.ev-10y-yield-jun17-449|the 10Y to ~4.49%]] are the move already
        underway. **Inverse-expression** (short): the thesis playing out IS long-duration
        Treasuries falling. Mean just above the indirect-reasoning cap because, unlike a
        confidence input, the mechanism is unambiguous and the FOMC already confirmed the
        direction; band tight for the same reason.
    - alignedSecurity: sec.ief
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.64
        estimateStdDev: 0.10
        betaAlpha: 13.0
        betaBeta: 7.3
      securityRationale: |
        Short [[sec.ief]] expresses the same higher-for-longer path on the belly of the
        curve. Slightly lower mean than [[sec.tlt|TLT]] because intermediate duration moves
        less per basis point of repricing, but the bear-flattening led by the front end
        ([[ws.ev-2y-yield-plus16bp-jun17|2Y +16bp]]) makes the 7-10Y sector a direct
        beneficiary of the hawkish turn. **Inverse-expression**, direction-short.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.56
        estimateStdDev: 0.10
        betaAlpha: 10.0
        betaBeta: 7.9
      securityRationale: |
        Long [[sec.dbmf]] captures the rate-trend premium managed-futures vehicles extract
        from a sustained higher-for-longer regime - such strategies typically run short
        bonds in exactly this environment, so DBMF aligns with the thesis while diversifying
        away from a pure outright short. Modest mean: the mechanism is one step removed from
        the explicit thesis and depends on the trend persisting.
    - alignedSecurity: sec.kmlm
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.50
        estimateStdDev: 0.11
        betaAlpha: 8.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.kmlm]] is the second managed-futures alternate to [[sec.dbmf|DBMF]], a
        different implementation (KFA Mount Lucas vs DBi). Including both diversifies the
        trend sleeve across strategies; lowest mean in the stack given the indirect
        mechanism and the uncertainty over the right managed-futures mix.