        expression - record Q1 2026 backlog of $194B
        ([[ws.ev-lmt-backlog-194b-q1-2026]]) plus the Friday haven bid
        ([[ws.ev-defense-bid-fri-jun5|+0.7% to 523.76]]); named in
        thesisStatement. Direct beneficiary of the multi-year defense-spending
