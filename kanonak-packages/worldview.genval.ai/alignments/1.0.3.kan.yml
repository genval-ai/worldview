        [[ws.ev-googl-intc-tpu-order-jun8|Alphabet's order for over 3 million TPUs manufactured at Intel for 2028 (+10% to ~109)]] makes Intel's
        foundry a named beneficiary of hyperscaler custom-silicon
        diversification. Mean nudged up from 0.65; band still wide because the
        foundry-execution risk is idiosyncratic and the
        [[ws.ev-chip-closes-wed-jun10|sector de-rating]] applies fully.

equity-melt-up-vs-recession-risk-alignment:
  type: align.ThesisAlignment
  label: Equity melt-up vs recession risk alignment
  forThesis: ws.equity-melt-up-vs-recession-risk
  alignmentConfidence:
    estimateMean: 0.72
    estimateStdDev: 0.08
    betaAlpha: 14.0
    betaBeta: 5.5
  alignmentRationale: |
    Long [[sec.spy]] / [[sec.vti]] core plus a [[sec.uvix]] vol hedge. With [[ws.ev-vix-collapse-165-jul1|VIX collapsing from 22.22 to ~16.5]] and [[ws.ev-spy-qqq-recover-jul1|equities recovering to a strongest-quarter-since-2020 finish]], the melt-up leg is winning and the hedge slot eases from 0.72 back to 0.70 - the exact mirror of the 1.0.2 nudge UP when vol was approaching the >25 vol-expansion leg. The core long ranks and strengths are unchanged; this is the only strength parameter that moves this refresh.
  hasAlignedSecurity:
    - alignedSecurity: sec.spy
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
        betaAlpha: 17.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.spy]] is the canonical S&P 500 exposure - the melt-up side of
        the thesis is the directional bet. Direct evidence including Wednesday's
        [[ws.ev-spy-wed-close-72543-jun10|725.43 close at the session low]],
        part of the broad war-and-CPI de-risking rather than a thesis-breaking
        move (neither VIX leg has fired). **Primary liquid vehicle** for broad
        equity beta.
    - alignedSecurity: sec.vti
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.78
        estimateStdDev: 0.07
        betaAlpha: 11.0
        betaBeta: 3.1
      securityRationale: |
        Long [[sec.vti]] is the broader-market **Tier-2 alternate** (total stock
        market vs S&P 500 cap-weighted) - similar shape to [[sec.spy|SPY]] with
        mid- and small-cap participation that adds a different risk profile. No
        direct evidence mentions but a `typedSector` (broad-market) match with
        [[sec.spy|SPY]] puts it cleanly in the alternate-vehicle slot; lower
        expense ratio is the reason to substitute or complement.
    - alignedSecurity: sec.uvix
      securityRole: align.role-hedge
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.70
        estimateStdDev: 0.10
        betaAlpha: 12.0
        betaBeta: 4.7
      securityRationale: |
        Long [[sec.uvix]] is the vol-expansion **hedge** against the
        recession-risk side firing. The thesis names the vol-expansion
        invalidation pathway (VIX > 25 with SPY breaking its 50d MA for 5
        sessions), and [[ws.ev-vix-wed-close-2222-jun10|VIX closed 22.22 Wednesday after topping 23 intraday - the closest approach yet]] -
        realized volatility is building toward exactly the mechanism this slot
        hedges, so the mean nudges 0.70 to 0.72 and the band tightens slightly.
        UVIX still carries decay cost if the expansion stalls
        ([[ws.ev-thu-premarket-futures-rise-jun11|Thursday futures bounced]]),
        which keeps the band the widest in the basket.

powell-warsh-transition-risk-alignment:
  type: align.ThesisAlignment
  label: Powell-Warsh transition risk alignment
  forThesis: ws.powell-warsh-transition-risk
  alignmentConfidence:
    estimateMean: 0.50
    estimateStdDev: 0.12
    betaAlpha: 8.0
    betaBeta: 8.0
  alignmentRationale: |
    Uncertainty basket - [[sec.uvix]] primary, [[sec.dbmf]] and [[sec.kmlm]] managed-futures alternates, short [[sec.tlt]] inverse-expression. The transition resolved benignly ([[ws.ev-warsh-sintra-independence-jul1|Warsh's independence and price-stability pledge]], [[ws.ev-fomc-jun17-hold-hawkish-dots|a clean hawkish first FOMC]]), so thesis confidence fell to 0.48; the vol / carry basket structure is unchanged, though its regime context is less apt as the transition risk abates. alignmentConfidence held at 0.50.
  hasAlignedSecurity:
    - alignedSecurity: sec.uvix
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.65
        estimateStdDev: 0.10
        betaAlpha: 14.0
        betaBeta: 7.5
      securityRationale: |
        Long [[sec.uvix]] is the cleanest single-ticker expression of
        Fed-transition uncertainty - vol-expansion is the most direct mechanism
        by which "policy uncertainty" gets priced. The bi-directional structure
        ([[ws.ev-warsh-room-to-cut-quote|"room to cut"]] vs
        [[ws.ev-warsh-historically-hawkish|hawkish record]]) is exactly the
        asymmetric-outcome shape long-vol benefits from. Mean at the
        indirect-reasoning cap of 0.65; band wider because UVIX decay cost is
        meaningful if the June 16-17 FOMC fails to produce a vol-generating move.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.60
        estimateStdDev: 0.10
        betaAlpha: 11.0
        betaBeta: 7.3
      securityRationale: |
        Long [[sec.dbmf]] captures the trend-regime premium managed-futures
        vehicles extract from a Fed-transition rate-path repricing. The named
        rate move ([[ws.ev-10y-yield-fri-455-jun5|10Y to 4.55%]] with
        [[ws.ev-global-bond-yields-multi-year-highs-may18|global yields at multi-year highs]]) is exactly the multi-asset trend [[sec.dbmf|DBMF]]'s
        strategy rides. Modest mean because the mechanism is one step removed from
        the explicit thesis text.
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.58
        estimateStdDev: 0.10
        betaAlpha: 10.0
        betaBeta: 7.2
      securityRationale: |
        Short [[sec.tlt]] captures the current rate-up trajectory if the
        Warsh-as-chair backdrop sustains the bond-market repricing (the latest
        leg is [[ws.ev-10y-yield-fri-455-jun5|the 10Y to 4.55%]] on the jobs
        print). **Inverse-expression** because the thesis playing out on the
        hawkish-backdrop side drives long-duration Treasuries lower.
        Direction-short carries reversal risk if Warsh delivers a dovish surprise
        at the June 16-17 FOMC, which is precisely what keeps
        `alignmentConfidence` on this thesis modest.
    - alignedSecurity: sec.kmlm
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.55
        estimateStdDev: 0.10
        betaAlpha: 9.0
        betaBeta: 7.4
      securityRationale: |
        Long [[sec.kmlm]] is the second-managed-futures alternate to
        [[sec.dbmf|DBMF]], with a different strategy implementation (KFA Mount
        Lucas vs DBi). Including both diversifies the managed-futures sleeve
        across implementations - useful given the low alignment confidence on
        this thesis and the uncertainty over the right managed-futures mix. Mean
        lowest in the stack as a result.
