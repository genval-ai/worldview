    [[sec.gld]] primary, [[sec.iau]] alternate, [[sec.gdx]] high-beta - unchanged. Gold dipped below $4,000 ([[ws.ev-gold-below-4000-jun30]]) before bouncing, a confidence input the snapshot's wider band already carries; the structural fit of the stack to the DEBASEMENT thesis - reaffirmed by [[ws.ev-wgc-midyear-outlook-jul1|the WGC mid-year outlook and continued central-bank buying]] - is unchanged, so ranks and strengths hold.
  hasAlignedSecurity:
    - alignedSecurity: sec.gld
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.92
        estimateStdDev: 0.03
        betaAlpha: 36.0
        betaBeta: 3.1
      securityRationale: |
        Long [[sec.gld]] is the canonical primary vehicle - named in
        thesisStatement with deep evidence support including
        [[ws.ev-lbma-q1-record-4873|the LBMA Q1 record]] and JPM/UBS/Citi targets
        pointing materially higher; the deepening drawdown
        ([[ws.ev-gld-wed-close-37458-jun10|374.58 Wednesday]]) is a yield-driven
