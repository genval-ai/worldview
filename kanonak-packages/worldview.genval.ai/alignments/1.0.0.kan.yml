        [[sec.spy|SPY]] with mid-and small-cap participation that adds a
        different risk profile. No direct evidence mentions but
        `typedSector` match with [[sec.spy|SPY]] (broad-market) puts it
        cleanly in the alternate-vehicle slot. Lower expense-ratio
        efficiency is the primary reason to substitute or complement
        [[sec.spy|SPY]].
    - alignedSecurity: sec.uvix
      securityRole: align.role-hedge
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.70
        estimateStdDev: 0.10
        betaAlpha: 10.0
        betaBeta: 4.3
      securityRationale: |
        Long [[sec.uvix]] is the vol-expansion **hedge** against the
        recession-risk side of the thesis firing. The thesis explicitly
        names the vol-expansion invalidation pathway (VIX > 25 with SPY
        breaking 50d MA for 5 trading days), so a long-vol position is the
        directly-mechanically-aligned hedge. [[sec.vix|VIX]] eased to
        ~15.61 ([[ws.ev-vix-thu-close-1561-may28]]), now ~0.6 from the
        < 15 melt-up-confirmation leg - so the recession-risk side this
