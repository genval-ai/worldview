powell-warsh-transition-risk-alignment:
  type: align.ThesisAlignment
  label: Powell-Warsh transition risk alignment
  forThesis: ws.powell-warsh-transition-risk
  alignmentConfidence:
    estimateMean: 0.50
    estimateStdDev: 0.12
    betaAlpha: 8.0
    betaBeta: 8.0
  alignmentRationale: |
    No `fin.aboutSecurity` or `fin.forecastTarget` references appear in
    [[ws.powell-warsh-transition-risk]]'s `supportingEvidence` and no
    `sec.<ticker>` names appear in the thesisStatement - all evidence is
    policy/economic with yield-and-rate-path observations rather than
    specific tickers. Tier 1 and Tier 2 are therefore empty; the candidate
    set below is **Tier-3 skill judgment** using baseline tickers only, so
    per the indirect-reasoning calibration the per-security means are
    capped around 0.65.

    The thesis's structural ambiguity (0.51 confidence in 2.1.13 reflects near-50/50 uncertainty about the substantive transition outcome) shapes the alignment toward uncertainty-and-vol-capturing expressions rather than directional bets: long [[sec.uvix]] as the vol-expansion primary, long [[sec.dbmf]] and long [[sec.kmlm]] as managed-futures trend-capture, and short [[sec.tlt]] as the inverse-expression for the current rate-up trajectory. No new Warsh-as-chair policy substance landed in 2.1.13 - the April PCE [[ws.ev-april-pce-print-actual-38-33-may28|landed core 3.3% / headline 3.8% YoY]], hardening the room-to-cut-versus-higher-for-longer contradiction the new chair inherits, even as [[ws.ev-10y-yield-thu-446-may28|the 10Y eased to 4.46%]] and markets still price [[ws.ev-fedwatch-hike-by-dec-70pct-may26|~70% hike-by-December odds]] - so the policy contradiction is unresolved and the thesis holds at 0.51; the substantive transition opens with the June 16-17 FOMC, so the uncertainty-capturing basket is unchanged.

    `alignmentConfidence` is held at 0.50 +/- 0.12 - the lowest in this
    alignment package - reflecting both the thesis's own low confidence and
    the significant Tier-3 expansion required to build any candidate basket.
    A different operator could reasonably argue for a different stack given
    the same evidence.
  hasAlignedSecurity:
    - alignedSecurity: sec.uvix
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.65
        estimateStdDev: 0.10
        betaAlpha: 14.0
        betaBeta: 7.5
      securityRationale: |
        Long [[sec.uvix]] is the cleanest single-ticker expression of the
        Fed-transition uncertainty - vol-expansion is the most direct
        mechanism by which "policy uncertainty" gets priced. The thesis's
        bi-directional structure (hawkish surprise vs dovish-tilt risk,
        per [[ws.ev-warsh-room-to-cut-quote|Warsh's "room to cut"]] vs
        [[ws.ev-warsh-historically-hawkish|Warsh's historical hawkish record]]) is exactly the asymmetric-outcome shape long-vol benefits
        from. Mean at the indirect-reasoning cap of 0.65; band wider
        because [[sec.uvix|UVIX]] decay cost is meaningful if the June
        16-17 FOMC fails to produce a vol-generating move.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.60
        estimateStdDev: 0.10
        betaAlpha: 11.0
        betaBeta: 7.3
      securityRationale: |
        Long [[sec.dbmf]] captures the trend-regime premium that
        managed-futures vehicles extract from a Fed-transition rate-path
        repricing. The thesis's named rate move
        ([[ws.ev-10y-yield-monday-461-may18|10Y to 4.61-4.63%]] with
        [[ws.ev-global-bond-yields-multi-year-highs-may18|global yields at multi-year highs]]) is exactly the kind of multi-asset trend
        that [[sec.dbmf|DBMF]]'s strategy is built to ride. Modest mean
        because the mechanism is one step removed from the explicit thesis
        text.
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.58
        estimateStdDev: 0.10
        betaAlpha: 10.0
        betaBeta: 7.2
      securityRationale: |
        Short [[sec.tlt]] captures the current rate-up trajectory if the
        Warsh-as-chair backdrop sustains the bond-market repricing (the
        thesis names [[ws.ev-10y-yield-friday-459-may15|10Y to 4.59% Friday]] extending to [[ws.ev-10y-yield-monday-461-may18|4.61-4.63% Monday]]). **Inverse-expression** because the thesis playing out
        on the hawkish-backdrop side drives long-duration Treasuries
        lower. Direction-short carries reversal risk if Warsh delivers a
        dovish surprise at the June 16-17 FOMC, which is precisely what
        makes `alignmentConfidence` on this thesis modest.
    - alignedSecurity: sec.kmlm
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.55
        estimateStdDev: 0.10
        betaAlpha: 9.0
        betaBeta: 7.4
      securityRationale: |
        Long [[sec.kmlm]] is the second-managed-futures alternate to
        [[sec.dbmf|DBMF]], with a different strategy implementation
        (KFA Mount Lucas vs DBi). Including both diversifies the
        managed-futures sleeve across implementations - useful given the
        alignment confidence on this thesis is low and the right
        managed-futures mix is itself uncertain. Mean lowest in the stack
        as a result.
