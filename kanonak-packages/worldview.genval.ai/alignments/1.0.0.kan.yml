  alignmentConfidence:
    estimateMean: 0.72
    estimateStdDev: 0.08
    betaAlpha: 14.0
    betaBeta: 5.5
  alignmentRationale: |
    Three tradable candidates after filtering out non-tradable indexes
    ([[sec.spx|SPX]], [[sec.ixic|IXIC]], [[sec.vix|VIX]] appear in
    [[ws.equity-melt-up-vs-recession-risk]]'s evidence but are not directly
    held). [[sec.spy]] is the canonical melt-up **primary-vehicle** with two
    direct evidence mentions ([[ws.ev-spy-friday-close-73917-may15|Friday close at 739.17]], [[ws.ev-spy-premarket-down-may18|Monday pre-market -0.19% to $737.74]]); [[sec.vti]] is the broader-market **Tier-2
    alternate**; [[sec.uvix]] is the vol-expansion **hedge** against the
    recession-risk side firing.

    The bi-directional thesis shape (0.73 confidence in 2.1.11 reflects the
    melt-up side still favored even as recession-risk presses) is the
    key alignment challenge - a pure long-equity stack underweights the
    downside, while a pure hedge stack overweights the recession scenario.
    The three-candidate primary + alternate + hedge structure tracks the
    snapshot's own framing.

    The thesis stepped +0.02 to 0.76 in 2.1.13 as the Thursday cash close made a fourth consecutive record THROUGH the hottest annual PCE in three years ([[ws.ev-spx-thu-close-7563-may28|S&P 500 7,563.63 (+0.58%)]], [[ws.ev-nasdaq-comp-thu-close-26917-may28|Nasdaq Composite ~26,917]], [[ws.ev-dow-thu-close-50669-may28|Dow 50,668.97]]) with [[ws.ev-vix-thu-close-1561-may28|VIX falling to ~15.61]] - now ~0.6 from the < 15 melt-up-confirmation invalidation leg - without tripping either side; [[ws.ev-april-pce-print-actual-38-33-may28|the in-line PCE with soft monthly pace]] removed the inflation overhang. The long-core-plus-vol-hedge structure is unchanged - the VIX moving toward the < 15 line strengthens the case for the [[sec.uvix]] hedge slot, but the hedge slot itself (long UVIX as protection against the recession-risk leg firing) doesn't shift; the alignmentStrength on UVIX held at 0.70 +/- 0.10 reflects unchanged structural fit.
  hasAlignedSecurity:
    - alignedSecurity: sec.spy
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
        betaAlpha: 17.0
        betaBeta: 3.0
      securityRationale: |
