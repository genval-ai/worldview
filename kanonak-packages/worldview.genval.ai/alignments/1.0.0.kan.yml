alignments:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  label: Alignment data - genesis public version
  comment: >-
    The first public alignment data version, ported from the private portfolio
    engine's thesis-alignments@1.0.8 (which derived from worldview snapshot
    2.1.13). Re-typed against the worldview.genval.ai/alignment ontology; the
    analysis content is unchanged. Superseded by the next operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: estimates
          match: ^
          version: 1.0.0
          alias: est
        - package: securities
          match: ^
          version: 2.1.0
          alias: sec
        - package: snapshots
          match: '='
          version: 2.1.13
          alias: ws

view:
  type: align.Alignment
  label: Thesis alignments (1.0.0 - genesis public version ported from private engine 1.0.8; patch refresh against snapshot 2.1.13, the Friday May 29 post-PCE moment - April PCE prints in line (headline 3.8% / core 3.3% YoY) with a softer monthly pace, the Thursday May 28 cash close makes a fourth consecutive S&P record (7,563.63) through the hot print with VIX easing to ~15.6, and crude completes a ~20% monthly collapse on a tentative 60-day US-Iran memorandum pending Trump sign-off; same seven theses, baskets and ranks unchanged, energy thesis 0.72 to 0.68 and equity 0.74 to 0.76 in the snapshot)
  alignmentObservedAt: 2026-05-29T18:49:21Z
  derivedFromSnapshot: ws.view
  alignmentNarrative: |
    Patch refresh against [[ws.view|worldview snapshot 2.1.13]] (observedAt 2026-05-29T17:54:43Z, the Friday post-PCE moment integrating the April PCE print and the full Thursday May 28 cash close). Same seven `wv.active` theses as 1.0.7, so this is a patch, not a minor - no `ThesisAlignment` added or dropped. The candidate baskets, rank order, roles, directions, and `alignmentStrength` distributional parameters are unchanged: the 2.1.13 evidence added no new ticker (the April PCE print, the Thursday closes, the ~20% monthly oil collapse, and the tentative 60-day US-Iran memorandum all reference securities already in the baseline or no ticker at all) and shifted no candidate's structural fit. What moved is the rationale prose, refreshed to the 2.1.13 regime, plus the thesis-confidence figures cited in prose - structural fit is independent of the thesis-confidence drift captured in the snapshot (energy 0.72 to 0.68, equity 0.74 to 0.76, stagflation 0.83 to 0.82, the other four held).

    **Cross-thesis themes shaping the basket.**

    Energy and defense remain the two structurally overweight themes, but the energy two-sided risk rose materially this window. Crude completed a ~20% monthly collapse (its worst month since the COVID crash) - [[ws.ev-wti-fri-sub88-may29|WTI below $88 Friday]], [[ws.ev-brent-fri-9256-may29|Brent ~$92.56]] - after negotiators [[ws.ev-us-iran-60day-mou-tentative-may28|reached a tentative 60-day memorandum with explicit Strait-of-Hormuz-reopening and shipping-restoration steps]], pending [[ws.ev-trump-final-determination-hormuz-may29|President Trump's "final determination"]]. [[ws.persistent-energy-shock]] stepped 0.72 to 0.68 (band wider) - the first concrete framework moving the invalidation `SequencedCondition`'s first leg materially closer - yet WTI ~$88 still sits well above the < $80-for-30-days threshold, energy equities only drifted Thursday ([[ws.ev-xom-thu-close-14696-may28|XOM 146.96 (-0.64%)]], [[ws.ev-cvx-thu-close-18303-may28|CVX 183.03 (+0.35%)]], [[ws.ev-xle-thu-close-5695-may28|XLE 56.95 (-0.07%)]]) rather than collapsing with crude - a residual structural bid - and the IEA deficit read is intact, so the long [[sec.xle]] / [[sec.xom]] / [[sec.cvx]] basket holds with structural fit unchanged. [[ws.iran-war-rearmament]] held at 0.87 and the defense tape actually FIRMED on the day despite the peace-MoU optimism ([[ws.ev-lmt-thu-close-53733-may28|LMT +1.17%]], [[ws.ev-rtx-thu-close-17896-may28|RTX +1.34%]], [[ws.ev-noc-thu-close-55929-may28|NOC +1.44%]]) on the $1.5T FY2027 budget bid - the [[sec.lmt]] / [[sec.rtx]] / [[sec.noc]] basket is unchanged.

    Precious metals ([[ws.gold-debasement-bid]]) holds a clean three-vehicle stack ([[sec.gld]] / [[sec.iau]] / [[sec.gdx]]) at 0.85; bullion rebounded on the otherwise risk-on record day ([[ws.ev-gold-spot-thu-4470-may28|spot ~$4,470]], [[ws.ev-gld-thu-close-41277-may28|GLD +1.05%]], [[ws.ev-gdx-thu-close-8718-may28|GDX +2.04%]]) as [[ws.ev-10y-yield-thu-446-may28|the 10Y eased to 4.46%]] and the in-line PCE plus oil collapse pointed to easier forward inflation - the structural-bull supports unchanged.

    AI capex ([[ws.ai-capex-cycle-with-china-tail]]) fills the 5-cap with a semiconductor-plus-tech-hardware stack ([[sec.nvda]] / [[sec.amd]] / [[sec.csco]] / [[sec.intc]] / [[sec.mu]]) and holds at 0.86 - chips LED the Thursday record day ([[ws.ev-nvda-thu-close-21425-may28|NVDA +0.78%]], [[ws.ev-amd-thu-close-51809-may28|AMD +4.55%]]) on positioning rather than a new demand signal, so [[sec.nvda|NVDA]] keeps the primary slot and rank order holds; the [[ws.ev-nvda-q1-fy27-full-figures-may21|Q1 FY2027 beat-and-raise]] and the [[ws.ev-h200-export-approval-may14|H200 export approval]] remain the operative reads.

    The two macro-policy theses without direct ticker mentions in their evidence ([[ws.stagflation-risk]], [[ws.powell-warsh-transition-risk]]) still required Tier-3 skill judgment to build a basket from baseline tickers; per the indirect-reasoning calibration, per-security means there are capped around 0.65 and the per-thesis `alignmentConfidence` values are the lowest in the package. [[ws.stagflation-risk]] eased to 0.82 - the April PCE landed [[ws.ev-april-pce-print-actual-38-33-may28|core 3.3% / headline 3.8% YoY, in line with a softer monthly pace]], confirming sticky-but-not-hotter core, while [[ws.ev-10y-yield-thu-446-may28|the 10Y eased to 4.46%]] and the ~20% oil collapse are forward-disinflationary offsets - the long-[[sec.gld]] / long-[[sec.xle]] / short-[[sec.tlt]] basket is intact. [[ws.powell-warsh-transition-risk]] held at 0.51 - the PCE hardens the room-to-cut-versus-higher-for-longer contradiction the new chair inherits but no Warsh-as-chair policy substance landed, so the uncertainty-capturing basket (long [[sec.uvix]] vol, managed-futures, short [[sec.tlt]]) is unchanged ahead of the June 16-17 FOMC.

    The [[ws.equity-melt-up-vs-recession-risk]] alignment is the bi-directional case - thesis confidence stepped +0.02 to 0.76 in 2.1.13 as the Thursday cash close made a fourth consecutive record THROUGH the hottest annual PCE in three years ([[ws.ev-spx-thu-close-7563-may28|S&P 500 7,563.63 (+0.58%)]], [[ws.ev-nasdaq-comp-thu-close-26917-may28|Nasdaq Composite ~26,917]], [[ws.ev-dow-thu-close-50669-may28|Dow 50,668.97]]) with [[ws.ev-vix-thu-close-1561-may28|VIX falling to ~15.61]] - now ~0.6 from the < 15 melt-up-confirmation invalidation leg - without tripping either side. The basket combines a long [[sec.spy]] / [[sec.vti]] equity-beta core with a [[sec.uvix]] vol-expansion hedge against the recession-risk leg firing; the VIX approaching the < 15 line strengthens the melt-up-confirmation case but the hedge slot's structural fit is unchanged.

    **What this patch changed.** Rank order, roles, directions, and `alignmentStrength` distributional parameters are unchanged from 1.0.7 - no new evidence named a new ticker and no candidate's structural fit shifted (alignmentStrength is structural participation, independent of the thesis-confidence drift). The rationale prose was refreshed to the 2.1.13 regime (the in-line April PCE with soft monthly pace, the fourth-consecutive record made through the print, VIX easing to ~15.6, the ~20% monthly oil collapse on the tentative 60-day US-Iran memorandum, gold's rebound, the defense tape firming), and the thesis-confidence figures cited in prose were updated to 2.1.13 levels (energy 0.68, equity 0.76, stagflation 0.82; defense / gold / AI / Warsh held).

    No Tier-3 (out-of-baseline) ticker additions were required this refresh, so no companion `worldview.genval.ai/securities` bump accompanies this file.
  hasAlignment:
    - stagflation-risk-alignment
    - persistent-energy-shock-alignment
    - iran-war-rearmament-alignment
    - gold-debasement-bid-alignment
    - ai-capex-cycle-with-china-tail-alignment
    - equity-melt-up-vs-recession-risk-alignment
    - powell-warsh-transition-risk-alignment

stagflation-risk-alignment:
  type: align.ThesisAlignment
  label: Stagflation risk alignment
  forThesis: ws.stagflation-risk
  alignmentConfidence:
    estimateMean: 0.55
    estimateStdDev: 0.10
    betaAlpha: 12.0
    betaBeta: 10.0
  alignmentRationale: |
    No `fin.aboutSecurity` or `fin.forecastTarget` references appear in
    [[ws.stagflation-risk]]'s `supportingEvidence` and no `sec.<ticker>`
    names appear in the `thesisStatement` - the thesis is a macro framework
    (CPI/PPI/PCE + rate-path + energy-passthrough) rather than a single-name
    argument. Tier 1 and Tier 2 are therefore empty; the candidate set
    below is **Tier-3 skill judgment** using baseline tickers only, so per
    the indirect-reasoning calibration the per-security means are capped
    around 0.65.

    Four mechanisms drive the picks:

    - **Rates up = bonds down**, which motivates short [[sec.tlt]] as the
      inverse-expression and short [[sec.ief]] as the lower-beta alternate.
    - **Inflation + debasement hedge**, which motivates long [[sec.gld]].
    - **Energy-passthrough as the operative inflation channel**, which
      motivates long [[sec.xle]].
    - **Trend-regime capture**, which motivates long [[sec.dbmf]] in the
      managed-futures sleeve.

    The [[ws.ev-walmart-cfo-tariff-price-warning-may21|Walmart CFO tariff-passthrough warning]] keeps the inflation channel behind the long-[[sec.gld]] / long-[[sec.xle]] legs intact, with the thesis eased to 0.82 in 2.1.13 - the April PCE landed [[ws.ev-april-pce-print-actual-38-33-may28|core 3.3% / headline 3.8% YoY in line with a softer monthly pace]], confirming sticky-but-not-hotter core, while [[ws.ev-10y-yield-thu-446-may28|the 10Y eased to 4.46%]] and the ~20% monthly oil collapse are forward-disinflationary offsets that do not break the higher-for-longer read - so the basket and rank order are unchanged after the print. `alignmentConfidence` is held modest (0.55 +/- 0.10) precisely because the thesis lacks direct ticker evidence - the rank order is defensible but a different operator could reasonably argue for a different basket given the same thesis text.
  hasAlignedSecurity:
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.65
        estimateStdDev: 0.10
        betaAlpha: 14.0
        betaBeta: 7.5
      securityRationale: |
        Short [[sec.tlt]] is the cleanest single-ticker expression of the
        rate-up component named throughout [[ws.stagflation-risk]]'s
        thesisStatement - the 10Y move to 4.61-4.63% is documented by
        [[ws.ev-10y-yield-monday-461-may18]], the global bond rout by
        [[ws.ev-global-bond-yields-multi-year-highs-may18]], and the
        FedWatch hike-by-Dec at 56% by
        [[ws.ev-fedwatch-hike-by-dec-56pct-may15]]. Long-duration
        Treasuries fall most under the named rate move; the
        **inverse-expression** sign (short) is the mechanism. Mean is
        at the indirect-reasoning cap of 0.65 because the thesis does
        not name [[sec.tlt|TLT]] directly even though the mechanism is
        unambiguous.
    - alignedSecurity: sec.gld
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.62
        estimateStdDev: 0.10
        betaAlpha: 13.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.gld]] is the classic stagflation hedge - precious metals
        carry the debasement-and-inflation premium. The thesis names rising
        inflation (CPI 3.8% via [[ws.ev-april-cpi-print-headline-38]],
        PPI +6.0% YoY via [[ws.ev-april-ppi-print-may13]]) and the
        [[ws.gold-debasement-bid|gold-debasement-bid thesis]] runs in
        parallel; this alignment captures the inflation-side of stagflation.
        Mean below 0.65 because [[sec.gld|GLD]] is not named in this
        thesis's evidence directly (the gold thesis names it more strongly
        - see [[gold-debasement-bid-alignment]]).
    - alignedSecurity: sec.xle
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.60
        estimateStdDev: 0.10
        betaAlpha: 12.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.xle]] captures the energy-passthrough mechanism named
        explicitly in [[ws.stagflation-risk]]'s thesisStatement
        ([[ws.ev-wti-monday-10798-may18|WTI to $107.98]],
        [[ws.ev-brent-monday-11142-may18|Brent above $110]],
        imported-fuel +16.3% m/m via
        [[ws.ev-april-import-prices-42-may14]]). Energy is the named
        inflation channel, so a long-energy position aligns with the
        cost-push component of the stagflation regime. Mean modest because
        the [[persistent-energy-shock-alignment|persistent-energy-shock alignment]] already carries this ticker with higher conviction.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.55
        estimateStdDev: 0.12
        betaAlpha: 9.0
        betaBeta: 7.4
      securityRationale: |
        Long [[sec.dbmf]] captures the trend-following premium that
        managed-futures strategies extract from regime shifts like the
        current rates / commodities / FX repricing. The thesisStatement
        documents the sharpest rate-path repricing of the cycle and a
        multi-asset volatility regime - exactly the environment in which
        managed-futures vehicles structurally outperform. Mean modest
        because the mechanism is one step removed from the thesis text.
    - alignedSecurity: sec.ief
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.53
        estimateStdDev: 0.10
        betaAlpha: 11.0
        betaBeta: 9.8
      securityRationale: |
        Short [[sec.ief]] is the lower-duration alternate to short
        [[sec.tlt|TLT]] - same inverse-expression sign on the rate-up
        component but smaller single-trade vol. Useful as a sleeve-level
        diversifier of the short-bond expression. Mean lowest in the stack
        because the primary inverse-expression slot is already filled by
        [[sec.tlt|TLT]].

persistent-energy-shock-alignment:
  type: align.ThesisAlignment
  label: Persistent energy shock alignment
  forThesis: ws.persistent-energy-shock
  alignmentConfidence:
    estimateMean: 0.88
    estimateStdDev: 0.04
    betaAlpha: 22.0
    betaBeta: 3.0
  alignmentRationale: |
    Three **Tier-1 candidates** with strong direct evidence support and
    clean rank order. [[sec.xle]], [[sec.xom]], and [[sec.cvx]] are all
    named in [[ws.persistent-energy-shock]]'s thesisStatement and each has
    a dedicated `fin.MarketDataEvidence` instance with a Friday May 15
    close print referenced via `fin.aboutSecurity`
    ([[ws.ev-xle-friday-close-5944-may15]],
    [[ws.ev-xom-friday-close-15792-may15]],
    [[ws.ev-cvx-friday-close-19110-may15]]). [[sec.xle|XLE]] leads as the
    sector ETF (broadest, most-liquid expression); [[sec.xom|XOM]] and
    [[sec.cvx|CVX]] provide single-name equity exposure to the integrated
    majors that capture the largest absolute beta to a sustained oil-price
    regime.

    No hedge or inverse-expression candidate is yet in scope - the thesis is structurally directional on energy prices staying elevated - though the two-sided risk rose materially this window and a hedge remains a watch item pending a durable signed deal. The alignment is built on the structural-supply read ([[ws.ev-iea-omr-may-2026-undersupply|IEA 1.78 mb/d 2026 deficit]]), which is not contingent on the diplomatic track. The thesis stepped 0.72 to 0.68 (band wider) as crude completed a ~20% monthly collapse ([[ws.ev-wti-fri-sub88-may29|WTI below $88 Friday]], [[ws.ev-brent-fri-9256-may29|Brent ~$92.56]]) after negotiators [[ws.ev-us-iran-60day-mou-tentative-may28|reached a tentative 60-day memorandum with explicit Hormuz-reopening steps]], pending [[ws.ev-trump-final-determination-hormuz-may29|Trump's sign-off]] - the first concrete move toward the invalidation `SequencedCondition`'s first leg. But the energy complex only drifted Thursday ([[ws.ev-xle-thu-close-5695-may28|XLE -0.07%]], [[ws.ev-xom-thu-close-14696-may28|XOM -0.64%]], [[ws.ev-cvx-thu-close-18303-may28|CVX +0.35%]]) rather than collapsing with crude - a residual structural bid - WTI ~$88 still sits well above the < $80-for-30-days threshold, and the framework remains unsigned and unimplemented, so the structural fit and rank order hold.
  hasAlignedSecurity:
    - alignedSecurity: sec.xle
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.91
        estimateStdDev: 0.03
        betaAlpha: 30.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.xle]] is the canonical sector-ETF expression of the
        energy thesis. Named in thesisStatement with the Friday close
        (59.44, +2.36%) and supported by
        [[ws.ev-xle-friday-close-5944-may15]]. Broad diversified exposure
        across integrated majors, refiners, and services - matches the
        structural-supply read that does not single out any one operator.
        Tight band because the sector-ETF expression has the cleanest
        argument and the lowest idiosyncratic risk in the stack.
    - alignedSecurity: sec.xom
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
        betaAlpha: 17.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.xom]] is the largest-integrated-major single-name
        alternate to [[sec.xle|XLE]] - same broad upstream-plus-downstream
        exposure, slightly more concentrated on the company's specific
        reserves and operating leverage. Named in thesisStatement
        (157.92 Friday close, +3.36%) and supported by direct
        `fin.MarketDataEvidence` ([[ws.ev-xom-friday-close-15792-may15]]).
        Modest band reflects the single-name concentration premium
        relative to the ETF expression.
    - alignedSecurity: sec.cvx
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.83
        estimateStdDev: 0.05
        betaAlpha: 16.0
        betaBeta: 3.3
      securityRationale: |
        Long [[sec.cvx]] is the second-integrated-major single-name
        alternate - similar shape to [[sec.xom|XOM]] with slightly
        different production mix and more chemicals exposure. Named in
        thesisStatement (191.10 Friday close, +2.39%) and supported by
        direct `fin.MarketDataEvidence`
        ([[ws.ev-cvx-friday-close-19110-may15]]). Marginally lower mean
        than [[sec.xom|XOM]] only because [[sec.xom|XOM]] has higher
        upstream leverage to the named oil-price move.

iran-war-rearmament-alignment:
  type: align.ThesisAlignment
  label: Iran war rearmament alignment
  forThesis: ws.iran-war-rearmament
  alignmentConfidence:
    estimateMean: 0.86
    estimateStdDev: 0.04
    betaAlpha: 24.0
    betaBeta: 3.9
  alignmentRationale: |
    Three **Tier-1 candidates** with strong direct evidence support.
    [[sec.lmt]] and [[sec.rtx]] each appear twice in
    [[ws.iran-war-rearmament]]'s `supportingEvidence` (Q1 2026
    record-backlog `fin.CorporateEvidence` via
    [[ws.ev-lmt-backlog-194b-q1-2026]] and
    [[ws.ev-rtx-backlog-271b-q1-2026]], plus Friday close
    `fin.MarketDataEvidence` via [[ws.ev-lmt-friday-close-51601-may15]]
    and [[ws.ev-rtx-friday-close-17118-may15]]); [[sec.noc]] appears
    once via [[ws.ev-noc-friday-close-54069-may15]]. All three are
    named in the thesisStatement.

    Rank order is driven by the depth of the missile-and-missile-defense exposure that the thesis emphasizes as multi-year-procurement-cycle beneficiaries - [[sec.lmt|LMT]] and [[sec.rtx|RTX]] lead with comparable Q1 2026 record backlogs ($194B and $271B respectively), [[sec.noc|NOC]] ranks below as it has less direct missile-defense exposure and more stealth/strategic systems concentration. On the Thursday cash close the defense tape FIRMED despite the peace-MoU optimism ([[ws.ev-lmt-thu-close-53733-may28|LMT +1.17%]], [[ws.ev-rtx-thu-close-17896-may28|RTX +1.34%]], [[ws.ev-noc-thu-close-55929-may28|NOC +1.44%]]) on the [[ws.ev-trump-defense-budget-15t-2027-may26|$1.5T FY2027 budget]] bid, and the thesis held at 0.87. The [[ws.ev-us-iran-60day-mou-tentative-may28|tentative 60-day memorandum]] is a de-escalation pull, but the procurement-cycle structural argument survives near-term diplomatic outcomes (the thesis explicitly says "regardless of diplomatic-track outcomes") - the multi-year backlogs ($194B LMT, $271B RTX) plus the $1.5T budget proposal outlast a framework short of implementation - so no hedge candidate is in scope and rank order holds.
  hasAlignedSecurity:
    - alignedSecurity: sec.lmt
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.89
        estimateStdDev: 0.04
        betaAlpha: 27.0
        betaBeta: 3.3
      securityRationale: |
        Long [[sec.lmt]] is the canonical missile-and-missile-defense
        prime expression. Two strong evidence mentions - record Q1 2026
        backlog of $194B ([[ws.ev-lmt-backlog-194b-q1-2026]]) plus
        Friday May 15 close at 516.01 ([[ws.ev-lmt-friday-close-51601-may15]]);
        named in thesisStatement. Direct beneficiary of the multi-year
        defense-spending cycle ([[ws.ev-fy2026-defense-budget-1t|FY2026 $1T base]], [[ws.ev-fy2027-defense-budget-projection|FY2027 projection]]) and replenishment of depleted munitions stockpiles
        ([[ws.ev-iran-uae-cumulative-attacks-april1|438 ballistic missiles / 2,012 drones / 19 cruise missiles fired at UAE through April 1]]). **Primary-vehicle** role earned by the
        density of evidence support.
    - alignedSecurity: sec.rtx
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.88
        estimateStdDev: 0.04
        betaAlpha: 26.0
        betaBeta: 3.5
      securityRationale: |
        Long [[sec.rtx]] is the second-prime alternate - similar
        missile-and-missile-defense exposure to [[sec.lmt|LMT]] with the
        largest record backlog ($271B via
        [[ws.ev-rtx-backlog-271b-q1-2026]]) and explicit thesisStatement
        mention. Two strong evidence mentions; **alternate-vehicle** role
        rather than co-primary because [[sec.lmt|LMT]]'s name-recognition
        concentration in missile-defense contracts is the more pure-play
        expression. Mean essentially tied with [[sec.lmt|LMT]].
    - alignedSecurity: sec.noc
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.83
        estimateStdDev: 0.06
        betaAlpha: 19.0
        betaBeta: 3.9
      securityRationale: |
        Long [[sec.noc]] is the third-prime alternate - stealth/strategic
        systems exposure that complements [[sec.lmt|LMT]] and
        [[sec.rtx|RTX]]'s missile-defense concentration. One direct
        evidence mention ([[ws.ev-noc-friday-close-54069-may15|Friday May 15 close at 540.69, -1.45%]]) and thesisStatement reference.
        Slightly wider band than [[sec.lmt|LMT]] / [[sec.rtx|RTX]]
        because the procurement-cycle beneficiary argument applies less
        directly to NOC's portfolio than to the two missile-defense
        leaders.

gold-debasement-bid-alignment:
  type: align.ThesisAlignment
  label: Gold debasement bid alignment
  forThesis: ws.gold-debasement-bid
  alignmentConfidence:
    estimateMean: 0.88
    estimateStdDev: 0.04
    betaAlpha: 24.0
    betaBeta: 3.3
  alignmentRationale: |
    Three precious-metals candidates with clean rank order. [[sec.gld]] is
    the canonical liquid vehicle with **nine strong evidence mentions**
    including [[ws.ev-lbma-q1-record-4873|LBMA Q1 record $4,873/oz]], the
    central-bank 2026 projection ([[ws.ev-cb-2026-projection-755-tonnes|755 tonnes]]), [[ws.ev-jpm-gold-target-5055-6300|JPM]] /
    [[ws.ev-ubs-gold-target-6200|UBS]] /
    [[ws.ev-citi-gold-target-5000-7000|Citi]] forecast targets, and multiple
    Friday-and-Monday spot price prints
    ([[ws.ev-gld-friday-close-41729-may15]],
