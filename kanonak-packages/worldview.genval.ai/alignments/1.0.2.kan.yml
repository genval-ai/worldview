    [[ws.ev-spy-fri-close-73755-jun5]]); [[sec.vti]] is the broader-market
    **Tier-2 alternate**; [[sec.uvix]] is the vol-expansion **hedge** against the
    recession-risk side firing.

    The bi-directional thesis shape is the alignment challenge - a pure
    long-equity stack underweights the downside, a pure hedge stack overweights
    the recession scenario - so the primary + alternate + hedge structure tracks
    the snapshot's own framing. The thesis stepped 0.78 to 0.75 (band wider) in
    2.2.4 as three of four sessions closed lower -
    [[ws.ev-wednesday-cpi-selloff-jun10|Wednesday near session lows (S&P -1.62% to 7,266.99, Dow -900) on the 4.2% CPI and the war headlines]] - and
    [[ws.ev-vix-wed-close-2222-jun10|VIX closed 22.22 after topping 23 intraday, the closest approach yet to the >25 vol-expansion leg]], while the recession
    side stayed quiet and [[ws.ev-thu-premarket-futures-rise-jun11|Thursday futures bounced on the strike completion]]. The long-core-plus-vol-hedge
    structure is exactly built for this tape; the basket holds and the
    [[sec.uvix]] hedge slot's strength nudges UP (0.70 to 0.72) because the
    vol-expansion mechanism it hedges is now the nearer resolution.
  hasAlignedSecurity:
    - alignedSecurity: sec.spy
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
