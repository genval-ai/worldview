    empty; the basket below is **Tier-3 skill judgment** using baseline tickers
    only, so per the indirect-reasoning calibration the per-security means are
    capped around 0.65.

    The thesis's structural ambiguity (0.53 confidence, near-coin-flip on the
    transition outcome) shapes the alignment toward uncertainty-and-vol-capturing
    expressions rather than directional bets: long [[sec.uvix]] vol-expansion
    primary, long [[sec.dbmf]] and long [[sec.kmlm]] managed-futures
    trend-capture, short [[sec.tlt]] inverse-expression for the rate-up
    trajectory. The thesis stepped to 0.53 in 2.2.4 on the first event bearing on
    the transition itself: [[ws.ev-trump-rate-increase-wrong-jun7|Trump's on-the-record "a rate increase would be wrong"]] - direct presidential
    pressure on the new chair days before
    [[ws.ev-fomc-jun16-warsh-debut-preview|his debut FOMC (June 16-17, full SEP and dot plot, ~98% hold priced)]] - against
    [[ws.ev-may-cpi-print-42-jun10|a 4.2% CPI]] and a fully-priced December
    hike. The contradiction ([[ws.ev-warsh-room-to-cut-quote|"room to cut"]] vs
    [[ws.ev-warsh-historically-hawkish|his hawkish record]]) is now being
    publicly litigated; the uncertainty basket is unchanged and its
    vol-capturing slots are MORE apt with the FOMC five days out.

    `alignmentConfidence` is held at 0.50 +/- 0.12 - the lowest in this package -
    reflecting both the thesis's own low confidence and the significant Tier-3
    expansion required to build any basket.
