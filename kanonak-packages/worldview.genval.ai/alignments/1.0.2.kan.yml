alignments:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.2
  label: Alignment data - patch refresh against snapshot 2.2.4
  comment: >-
    Patch refresh of the public alignment data, re-derived against worldview
    snapshot 2.2.4 (Thursday June 11 pre-market, integrating the June 8-10
    sessions - the war re-escalated to direct Iran-Israel exchanges and US strike
    waves, May CPI printed a three-year-high 4.2%, and the tape broke lower with
    VIX at 22.22). Same seven wv.active theses as 1.0.1, so a patch - but the AI
    capex basket re-ranks: securities 2.3.0 adds AVGO and ORCL (both now carrying
    dense Tier-1 evidence) which displace CSCO and MU; all other baskets hold
    structurally with rationale refreshed to the 2.2.4 regime. Superseded by the
    next operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: estimates
          match: ^
          version: 1.0.0
          alias: est
        - package: securities
          match: ^
          version: 2.3.0
          alias: sec
        - package: snapshots
          match: '='
          version: 2.2.4
          alias: ws

view:
  type: align.Alignment
  label: Thesis alignments (1.0.2 - patch refresh against snapshot 2.2.4, the Thursday June 11 pre-market moment integrating the June 8-10 sessions - the war re-escalated to direct Iran-Israel exchanges and US strike waves, May CPI printed a three-year-high 4.2% YoY, the tape broke lower (S&P -1.62% to 7,266.99 Wednesday, VIX 22.22) and gold failed the haven test again; the AI basket re-ranks on securities 2.3.0 - AVGO and ORCL enter on dense fresh evidence, CSCO and MU exit; all other baskets hold with refreshed rationale)
  alignmentObservedAt: 2026-06-11T10:40:48Z
  derivedFromSnapshot: ws.view
  alignmentNarrative: |
    Patch refresh against [[ws.view|worldview snapshot 2.2.4]] (observedAt 2026-06-11T10:16:27Z, the Thursday pre-market moment integrating the June 8-10 cash sessions). Same seven `wv.active` theses as 1.0.1, so this is a patch, not a minor - no `ThesisAlignment` added or dropped. What DID move structurally this refresh: the securities baseline stepped to 2.3.0, adding [[sec.avgo]], [[sec.orcl]], and [[sec.googl]] (plus a software-cloud sector), and two of those now carry dense Tier-1 evidence in the snapshot - so the AI capex basket re-ranks (AVGO and ORCL enter; CSCO and MU exit). Every other basket holds its composition, ranks, roles, and directions; rationale prose is refreshed to the 2.2.4 regime. Snapshot confidence drift for downstream joint math: stagflation 0.85 to 0.86, energy 0.75 to 0.78 (band tighter), defense 0.87 to 0.88, gold 0.85 to 0.84 (band wider), ai-capex 0.87 held, equity 0.78 to 0.75 (band wider), Warsh 0.51 to 0.53.

    **The window's two shocks and what they did to the basket.** The war re-escalated to direct Iran-Israel exchanges - [[ws.ev-iran-ballistic-missiles-israel-jun8|~30 Iranian ballistic missiles at Israel, the first direct strike since the April 8 ceasefire]], [[ws.ev-israel-strikes-tehran-isfahan-jun8|Israeli strikes on Tehran, Tabriz, and Isfahan]], and [[ws.ev-us-strikes-iran-wed-night-jun10|US strike waves on consecutive nights]] with [[ws.ev-centcom-strikes-complete-thu-jun11|investors repricing the conflict as a "long grind"]] - and [[ws.ev-may-cpi-print-42-jun10|May CPI printed 4.2% YoY, a three-year high, driven by gasoline +40.5% YoY]]. Both shocks reinforce the existing structural tilts: the long-energy stack and the defense stack get their strongest confirmation window of the sequence, the short-[[sec.tlt]] / short-[[sec.ief]] rate legs get the CPI corroboration, and the [[sec.uvix]] hedge slots get [[ws.ev-vix-wed-close-2222-jun10|VIX at 22.22 approaching the vol-expansion leg]].

    **Energy and defense - the overweight themes get their best window.** [[ws.persistent-energy-shock]] stepped to 0.78 (band tighter): every leg confirmed at once - the kinetic escalation, the dead memorandum ([[ws.ev-trump-pay-the-price-jun10|"pay the price"]]), the firm price tape ([[ws.ev-wti-wed-91-jun10|WTI toward $91]], [[ws.ev-energy-complex-wed-jun10|the complex green through a -1.6% S&P session]]), and the passthrough printing in the CPI. The long [[sec.xle]] / [[sec.xom]] / [[sec.cvx]] stack is unchanged and its conviction context is the strongest yet. [[ws.iran-war-rearmament]] stepped to 0.88: the broadened war and [[ws.ev-defense-closes-wed-jun10|defense's relative strength through Wednesday's selloff (LMT 525.02)]] reinforce the [[sec.lmt]] / [[sec.rtx]] / [[sec.noc]] basket unchanged.

    **Gold fails the haven test; the structural stack still holds.** [[ws.gold-debasement-bid]] stepped to 0.84 (band wider): for the second consecutive window gold fell INTO a major escalation ([[ws.ev-gold-spot-wed-4090-jun10|spot ~$4,090, ~10% off the late-May band]], [[ws.ev-gdx-wed-close-7381-jun10|GDX -6.4%]]) as the yield channel dominated. The structural fit of [[sec.gld]] / [[sec.iau]] / [[sec.gdx]] to the DEBASEMENT thesis is unchanged - the failed haven bid is a thesis-confidence input (captured in the snapshot's wider band), not an alignment-strength input - so the stack and ranks hold.

    **AI capex - the basket re-ranks on the expanded baseline.** [[ws.ai-capex-cycle-with-china-tail]] held at 0.87, but the alignment changes structurally because securities 2.3.0 finally gives the two heaviest evidence-carriers a `sec.<ticker>` instance: [[sec.avgo]] (the [[ws.ev-avgo-q2-fy26-blowout-jun3|Q2 blowout - AI semis +143% YoY, FY2027 reiterated above $100B]], previously un-alignable for lack of an instance) and [[sec.orcl]] ([[ws.ev-orcl-q4-fy26-rpo-638b-jun10|the $638B RPO print, +363% YoY - the largest buyer-side capex confirmation of the cycle]]). They enter at ranks 3 and 4; [[sec.intc]] holds the high-beta slot on fresh evidence ([[ws.ev-googl-intc-tpu-order-jun8|Alphabet's 3M+ TPU order]]); [[sec.csco|CSCO]] (stale mid-May evidence) and [[sec.mu|MU]] (mechanical proxy) exit under the 5-candidate cap. [[sec.googl]] was considered and excluded - its capex is the thesis's DEMAND evidence, but as a diversified platform its equity participates in the AI cycle far less cleanly than the suppliers.

    **The two macro-policy theses and the equity case.** [[ws.stagflation-risk]] stepped to 0.86 on [[ws.ev-may-cpi-print-42-jun10|the 4.2% CPI]] - still a macro framework with no direct ticker evidence, so the long-[[sec.gld]] / long-[[sec.xle]] / short-[[sec.tlt]] basket is unchanged with modest `alignmentConfidence`. [[ws.powell-warsh-transition-risk]] stepped to 0.53 on [[ws.ev-trump-rate-increase-wrong-jun7|Trump's "a rate increase would be wrong"]] - the first direct political-pressure event on the new chair, five days before [[ws.ev-fomc-jun16-warsh-debut-preview|his debut FOMC]] - the long-[[sec.uvix]] / managed-futures / short-[[sec.tlt]] uncertainty basket is unchanged and its vol-capture slots are MORE apt with the FOMC inside the horizon. [[ws.equity-melt-up-vs-recession-risk]] stepped to 0.75 (band wider) as [[ws.ev-wednesday-cpi-selloff-jun10|three of four sessions closed lower]] and [[ws.ev-vix-wed-close-2222-jun10|VIX reached 22.22, the closest approach to the >25 vol-expansion leg]] - the long-[[sec.spy]] / [[sec.vti]] core plus [[sec.uvix]] hedge structure is exactly built for this; the hedge slot's strength nudges up.

    **What this patch changed.** The AI capex basket re-ranked: [[sec.avgo]] (0.86, alternate) and [[sec.orcl]] (0.80, alternate) enter; CSCO and MU exit under the cap; [[sec.intc]] holds the high-beta slot with fresh TPU-order evidence. The [[sec.uvix]] hedge in the equity alignment nudges 0.70 to 0.72 on the approaching vol-expansion leg. All other baskets, ranks, roles, directions, and strength parameters are unchanged; prose refreshed throughout to the 2.2.4 regime. No Tier-3 additions were needed by THIS skill - the securities 2.3.0 bump was produced upstream by the worldview refresh and is a companion artifact in this publish cycle.
  hasAlignment:
    - stagflation-risk-alignment
    - persistent-energy-shock-alignment
    - iran-war-rearmament-alignment
    - gold-debasement-bid-alignment
    - ai-capex-cycle-with-china-tail-alignment
    - equity-melt-up-vs-recession-risk-alignment
    - powell-warsh-transition-risk-alignment

stagflation-risk-alignment:
  type: align.ThesisAlignment
  label: Stagflation risk alignment
  forThesis: ws.stagflation-risk
  alignmentConfidence:
    estimateMean: 0.55
    estimateStdDev: 0.10
    betaAlpha: 12.0
    betaBeta: 10.0
  alignmentRationale: |
    No `fin.aboutSecurity` or `fin.forecastTarget` references appear in
    [[ws.stagflation-risk]]'s `supportingEvidence` and no `sec.<ticker>` names
    appear in the `thesisStatement` - the thesis is a macro framework
    (CPI/PPI/PCE + rate-path + energy-passthrough) rather than a single-name
    argument. Tier 1 and Tier 2 are empty; the basket below is **Tier-3 skill
    judgment** using baseline tickers only, so per the indirect-reasoning
    calibration the per-security means are capped around 0.65.

    Four mechanisms drive the picks: **rates up = bonds down** (short
    [[sec.tlt]] inverse-expression, short [[sec.ief]] lower-beta alternate);
    **inflation + debasement hedge** (long [[sec.gld]]); **energy-passthrough as
    the operative inflation channel** (long [[sec.xle]]); and **trend-regime
    capture** (long [[sec.dbmf]]). The thesis stepped to 0.86 in 2.2.4 as its
    named mid-June tell fired: [[ws.ev-may-cpi-print-42-jun10|May CPI printed 4.2% YoY, a three-year high, with energy contributing over 60% of the monthly rise and gasoline +40.5% YoY]] - the passthrough channel behind the
    long [[sec.xle]] leg now visible in the index itself - while
    [[ws.ev-10y-yield-wed-454-jun10|the 10Y held ~4.54%]] and
    [[ws.ev-fedwatch-june-hold-98-jun10|a December hike became essentially fully priced]], reinforcing the short-bond legs directly. The
    [[ws.ev-may-cpi-core-29-jun10|contained 2.9% core]] is the offsetting
    caveat. Basket and rank order unchanged. `alignmentConfidence` is held
    modest (0.55 +/- 0.10) precisely because the thesis lacks direct ticker
    evidence.
  hasAlignedSecurity:
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.65
        estimateStdDev: 0.10
        betaAlpha: 14.0
        betaBeta: 7.5
      securityRationale: |
        Short [[sec.tlt]] is the cleanest single-ticker expression of the
        rate-up component named throughout [[ws.stagflation-risk]] - the move to
        4.55% is the latest print ([[ws.ev-10y-yield-fri-455-jun5]]), extending
        the [[ws.ev-10y-yield-monday-461-may18|May rate-path repricing]], and
        [[ws.ev-fedwatch-hike-by-dec-70pct-jun5|hike-by-December odds at ~70%]]
        corroborate. Long-duration Treasuries fall most under the named rate
        move; **inverse-expression** (short) is the mechanism. Mean at the
        indirect-reasoning cap of 0.65 because the thesis does not name
        [[sec.tlt|TLT]] directly even though the mechanism is unambiguous.
    - alignedSecurity: sec.gld
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.62
        estimateStdDev: 0.10
        betaAlpha: 13.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.gld]] is the classic stagflation hedge - precious metals
        carry the debasement-and-inflation premium. The thesis names rising
        inflation (CPI 3.8% via [[ws.ev-april-cpi-print-headline-38]], PPI +6.0%
        YoY via [[ws.ev-april-ppi-print-may13]]) and the
        [[ws.gold-debasement-bid|gold-debasement-bid thesis]] runs in parallel;
        this alignment captures the inflation side of stagflation. Mean below
        0.65 because [[sec.gld|GLD]] is not named in this thesis's evidence
        directly (see [[gold-debasement-bid-alignment]]).
    - alignedSecurity: sec.xle
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.60
        estimateStdDev: 0.10
        betaAlpha: 12.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.xle]] captures the energy-passthrough mechanism named
        explicitly in [[ws.stagflation-risk]]'s thesisStatement. Crude eased to
        [[ws.ev-wti-fri-ease-93-jun5|~$93 Friday]] but remains a live passthrough
        tailwind well above the invalidation threshold. Mean modest because the
        [[persistent-energy-shock-alignment|persistent-energy-shock alignment]]
        already carries this ticker with higher conviction.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.55
        estimateStdDev: 0.12
        betaAlpha: 9.0
        betaBeta: 7.4
      securityRationale: |
        Long [[sec.dbmf]] captures the trend-following premium that
        managed-futures strategies extract from regime shifts like the current
        rates / commodities / FX repricing. The thesisStatement documents the
        sharpest rate-path repricing of the cycle - exactly the environment in
        which managed-futures vehicles structurally outperform. Mean modest
        because the mechanism is one step removed from the thesis text.
    - alignedSecurity: sec.ief
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.53
        estimateStdDev: 0.10
        betaAlpha: 11.0
        betaBeta: 9.8
      securityRationale: |
        Short [[sec.ief]] is the lower-duration alternate to short
        [[sec.tlt|TLT]] - same inverse-expression sign on the rate-up component
        but smaller single-trade vol. Useful as a sleeve-level diversifier of the
        short-bond expression. Mean lowest in the stack because the primary
        inverse-expression slot is already filled by [[sec.tlt|TLT]].

persistent-energy-shock-alignment:
  type: align.ThesisAlignment
  label: Persistent energy shock alignment
  forThesis: ws.persistent-energy-shock
  alignmentConfidence:
    estimateMean: 0.88
    estimateStdDev: 0.04
    betaAlpha: 22.0
    betaBeta: 3.0
  alignmentRationale: |
    Three **Tier-1 candidates** with strong direct evidence support and clean
    rank order. [[sec.xle]], [[sec.xom]], and [[sec.cvx]] are all named in
    [[ws.persistent-energy-shock]]'s thesisStatement and each has dedicated
    `fin.MarketDataEvidence`. [[sec.xle|XLE]] leads as the sector ETF (broadest,
    most-liquid expression); [[sec.xom|XOM]] and [[sec.cvx|CVX]] provide
    single-name exposure to the integrated majors that capture the largest
    absolute beta to a sustained oil-price regime.

    No hedge or inverse-expression candidate is in scope - the thesis is
    structurally directional on energy prices staying elevated. The alignment
    rests on the structural-supply read ([[ws.ev-iea-omr-may-2026-undersupply|IEA 1.78 mb/d 2026 deficit]]), which is not contingent on the diplomatic track.
    The thesis stepped to 0.78 (band tighter) in 2.2.4 on its strongest
    confirmation window of the sequence: the war broadened to
    [[ws.ev-iran-ballistic-missiles-israel-jun8|direct Iran-Israel ballistic exchanges]] and [[ws.ev-us-strikes-iran-wed-night-jun10|US strike waves on consecutive nights]], the memorandum died in all but name
    ([[ws.ev-trump-pay-the-price-jun10|"pay the price"]]),
    [[ws.ev-wti-wed-91-jun10|WTI firmed toward $91]] with
    [[ws.ev-energy-complex-wed-jun10|the complex green (XOM 150.62, CVX 189.80, XLE 58.25) through a -1.6% S&P session]], and the passthrough now prints in
    [[ws.ev-may-cpi-print-42-jun10|the 4.2% CPI]]. Structural fit and rank order
    hold - the window strengthens conviction context without changing any
    candidate's participation.
  hasAlignedSecurity:
    - alignedSecurity: sec.xle
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.91
        estimateStdDev: 0.03
        betaAlpha: 30.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.xle]] is the canonical sector-ETF expression of the energy
        thesis - named in thesisStatement, with the latest print
        [[ws.ev-energy-complex-wed-jun10|58.25 Wednesday, green through a -1.6% S&P session]]. Broad diversified exposure across integrated majors,
        refiners, and services - matches the structural-supply read that does
        not single out any one operator. Tight band because the sector-ETF
        expression has the cleanest argument and the lowest idiosyncratic risk
        in the stack.
    - alignedSecurity: sec.xom
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
        betaAlpha: 17.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.xom]] is the largest-integrated-major single-name alternate to
        [[sec.xle|XLE]] - same broad upstream-plus-downstream exposure, slightly
        more concentrated on the company's specific reserves and operating
        leverage ([[ws.ev-energy-complex-wed-jun10|150.62 Wednesday]]). Modest
        band reflects the single-name concentration premium relative to the ETF
        expression.
    - alignedSecurity: sec.cvx
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.83
        estimateStdDev: 0.05
        betaAlpha: 16.0
        betaBeta: 3.3
      securityRationale: |
        Long [[sec.cvx]] is the second-integrated-major single-name alternate -
        similar shape to [[sec.xom|XOM]] with a different production mix and more
        chemicals exposure ([[ws.ev-energy-complex-wed-jun10|189.80 Wednesday]]). Marginally lower mean than [[sec.xom|XOM]] only because
        [[sec.xom|XOM]] has higher upstream leverage to the named oil-price move.

