equity-melt-up-vs-recession-risk-alignment:
  type: align.ThesisAlignment
  label: Equity melt-up vs recession risk alignment
  forThesis: ws.equity-melt-up-vs-recession-risk
  alignmentConfidence:
    estimateMean: 0.72
    estimateStdDev: 0.08
    betaAlpha: 14.0
    betaBeta: 5.5
  alignmentRationale: |
    Three tradable candidates after filtering out the non-tradable indexes
    ([[sec.spx|SPX]], [[sec.vix|VIX]] appear in
    [[ws.equity-melt-up-vs-recession-risk]]'s evidence but are not directly
    held). [[sec.spy]] is the canonical melt-up **primary-vehicle** with direct
    evidence support ([[ws.ev-spy-friday-close-73917-may15]],
    [[ws.ev-spy-fri-close-73755-jun5]]); [[sec.vti]] is the broader-market
    **Tier-2 alternate**; [[sec.uvix]] is the vol-expansion **hedge** against the
    recession-risk side firing.

    The bi-directional thesis shape is the alignment challenge - a pure
    long-equity stack underweights the downside, a pure hedge stack overweights
    the recession scenario - so the primary + alternate + hedge structure tracks
    the snapshot's own framing. The thesis stepped 0.80 to 0.78 in 2.2.3 as
    [[ws.ev-triple-index-selloff-fri-jun5|the worst equity day since April 2025]]
    decisively ended the melt-up-confirmation leg while
    [[ws.ev-may-jobs-report-actual-172k-jun5|the hot jobs print]] kept the
    recession leg quiet - a rate-and-positioning repricing, neither melt-up nor
    recession. The long-core-plus-vol-hedge structure is exactly right for that
    two-sided tape, so the basket and the UVIX hedge slot hold unchanged.
  hasAlignedSecurity:
    - alignedSecurity: sec.spy
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
        betaAlpha: 17.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.spy]] is the canonical S&P 500 exposure - the melt-up side of
        the thesis is the directional bet. Direct evidence including Friday's
        [[ws.ev-spy-fri-close-73755-jun5|737.55 close (-2.0%)]], part of the
        broad de-risking rather than a thesis-breaking move. **Primary liquid
        vehicle** for broad equity beta.
    - alignedSecurity: sec.vti
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.78
        estimateStdDev: 0.07
        betaAlpha: 11.0
        betaBeta: 3.1
      securityRationale: |
        Long [[sec.vti]] is the broader-market **Tier-2 alternate** (total stock
        market vs S&P 500 cap-weighted) - similar shape to [[sec.spy|SPY]] with
        mid- and small-cap participation that adds a different risk profile. No
        direct evidence mentions but a `typedSector` (broad-market) match with
        [[sec.spy|SPY]] puts it cleanly in the alternate-vehicle slot; lower
        expense ratio is the reason to substitute or complement.
    - alignedSecurity: sec.uvix
      securityRole: align.role-hedge
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.70
        estimateStdDev: 0.10
        betaAlpha: 10.0
        betaBeta: 4.3
      securityRationale: |
        Long [[sec.uvix]] is the vol-expansion **hedge** against the
        recession-risk side firing. The thesis names the vol-expansion
        invalidation pathway (VIX > 25 with SPY breaking its 50d MA for 5
        sessions), so a long-vol position is the directly-mechanically-aligned
        hedge. Friday's sharp equity drop nudged the tape toward the
        vol-expansion side, but UVIX carries decay cost when vol does not sustain
        an expansion, which keeps the band on this judgment wide.

powell-warsh-transition-risk-alignment:
  type: align.ThesisAlignment
  label: Powell-Warsh transition risk alignment
  forThesis: ws.powell-warsh-transition-risk
  alignmentConfidence:
    estimateMean: 0.50
    estimateStdDev: 0.12
    betaAlpha: 8.0
    betaBeta: 8.0
  alignmentRationale: |
    No `fin.aboutSecurity` or `fin.forecastTarget` references appear in
    [[ws.powell-warsh-transition-risk]]'s `supportingEvidence` and no
    `sec.<ticker>` names appear in the thesisStatement - all evidence is
    policy/economic with yield-and-rate-path observations. Tier 1 and Tier 2 are
    empty; the basket below is **Tier-3 skill judgment** using baseline tickers
    only, so per the indirect-reasoning calibration the per-security means are
    capped around 0.65.

    The thesis's structural ambiguity (0.51 confidence, near-50/50 on the
    transition outcome) shapes the alignment toward uncertainty-and-vol-capturing
    expressions rather than directional bets: long [[sec.uvix]] vol-expansion
    primary, long [[sec.dbmf]] and long [[sec.kmlm]] managed-futures
    trend-capture, short [[sec.tlt]] inverse-expression for the rate-up
    trajectory. No new Warsh-as-chair substance landed in 2.2.3, but
    [[ws.ev-may-jobs-report-actual-172k-jun5|the hot jobs print]] and
    [[ws.ev-fedwatch-hike-by-dec-70pct-jun5|~70% hike-by-December pricing]] harden
    the room-to-cut-versus-higher-for-longer contradiction
    ([[ws.ev-warsh-room-to-cut-quote|Warsh's "room to cut"]] vs
    [[ws.ev-warsh-historically-hawkish|his hawkish record]]) the new chair
    inherits - so the contradiction is unresolved, the thesis holds at 0.51, and
    the uncertainty basket is unchanged ahead of the June 16-17 FOMC.

    `alignmentConfidence` is held at 0.50 +/- 0.12 - the lowest in this package -
    reflecting both the thesis's own low confidence and the significant Tier-3
    expansion required to build any basket.
  hasAlignedSecurity:
    - alignedSecurity: sec.uvix
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.65
        estimateStdDev: 0.10
        betaAlpha: 14.0
        betaBeta: 7.5
      securityRationale: |
        Long [[sec.uvix]] is the cleanest single-ticker expression of
        Fed-transition uncertainty - vol-expansion is the most direct mechanism
        by which "policy uncertainty" gets priced. The bi-directional structure
        ([[ws.ev-warsh-room-to-cut-quote|"room to cut"]] vs
        [[ws.ev-warsh-historically-hawkish|hawkish record]]) is exactly the
        asymmetric-outcome shape long-vol benefits from. Mean at the
        indirect-reasoning cap of 0.65; band wider because UVIX decay cost is
        meaningful if the June 16-17 FOMC fails to produce a vol-generating move.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.60
        estimateStdDev: 0.10
        betaAlpha: 11.0
        betaBeta: 7.3
      securityRationale: |
        Long [[sec.dbmf]] captures the trend-regime premium managed-futures
        vehicles extract from a Fed-transition rate-path repricing. The named
        rate move ([[ws.ev-10y-yield-fri-455-jun5|10Y to 4.55%]] with
        [[ws.ev-global-bond-yields-multi-year-highs-may18|global yields at multi-year highs]]) is exactly the multi-asset trend [[sec.dbmf|DBMF]]'s
        strategy rides. Modest mean because the mechanism is one step removed from
        the explicit thesis text.
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.58
        estimateStdDev: 0.10
        betaAlpha: 10.0
        betaBeta: 7.2
      securityRationale: |
        Short [[sec.tlt]] captures the current rate-up trajectory if the
        Warsh-as-chair backdrop sustains the bond-market repricing (the latest
        leg is [[ws.ev-10y-yield-fri-455-jun5|the 10Y to 4.55%]] on the jobs
        print). **Inverse-expression** because the thesis playing out on the
        hawkish-backdrop side drives long-duration Treasuries lower.
        Direction-short carries reversal risk if Warsh delivers a dovish surprise
        at the June 16-17 FOMC, which is precisely what keeps
        `alignmentConfidence` on this thesis modest.
    - alignedSecurity: sec.kmlm
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.55
        estimateStdDev: 0.10
        betaAlpha: 9.0
        betaBeta: 7.4
      securityRationale: |
        Long [[sec.kmlm]] is the second-managed-futures alternate to
        [[sec.dbmf|DBMF]], with a different strategy implementation (KFA Mount
        Lucas vs DBi). Including both diversifies the managed-futures sleeve
        across implementations - useful given the low alignment confidence on
