alignments:
  type: Package
  publisher: worldview.genval.ai
  version: 1.1.0
  label: Alignment data - minor refresh against snapshot 3.0.0 (Fed-transition alignment retired, hawkish-Warsh added)
  comment: >-
    Minor refresh of the public alignment data, re-derived against worldview
    snapshot 3.0.0 (Thursday June 18 post-FOMC regime reframe - Warsh set an
    explicitly hawkish higher-for-longer regime at his first FOMC, the Iran war
    turned toward a negotiated end with WTI collapsing ~18% to ~$75, and gold made
    a fresh ATH). MINOR, not patch: the snapshot retired powell-warsh-transition-risk
    and added hawkish-warsh-regime, so the Fed-transition alignment is DROPPED and a
    new hawkish-Warsh-regime alignment ADDED (short TLT / short IEF inverse legs,
    DBMF / KMLM managed-futures alternates). The six continuing baskets hold
    structurally - alignmentStrength is independent of the thesis-confidence shifts
    the snapshot booked. No securities bump. Superseded by the next operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: estimates
          match: ^
          version: 1.0.0
          alias: est
        - package: securities
          match: ^
          version: 2.3.0
          alias: sec
        - package: snapshots
          match: '='
          version: 3.0.0
          alias: ws

view:
  type: align.Alignment
  label: Thesis alignments (1.1.0 - minor refresh against snapshot 3.0.0, the Thursday June 18 post-FOMC regime reframe - Kevin Warsh set an explicitly hawkish higher-for-longer regime at his first FOMC, the Iran war turned toward a negotiated end with WTI collapsing ~18% to ~$75, and gold made a fresh ATH; the Fed-transition alignment is DROPPED as its thesis retired and a new hawkish-Warsh-regime alignment ADDED, while the six continuing baskets hold structurally - alignmentStrength is independent of the thesis-confidence shifts the snapshot booked)
  alignmentObservedAt: 2026-06-18T18:40:00Z
  derivedFromSnapshot: ws.view
  alignmentNarrative: |
    Minor refresh against [[ws.view|worldview snapshot 3.0.0]] (observedAt 2026-06-18T18:25:12Z, the post-FOMC regime reframe). This is a MINOR, not a patch: the source snapshot retired [[ws.powell-warsh-transition-risk]] and added [[ws.hawkish-warsh-regime]], so one `ThesisAlignment` is dropped and one is added. The six continuing baskets hold their composition, ranks, roles, and directions - `alignmentStrength` measures structural thesis-to-security fit, which is independent of the (substantial) thesis-confidence moves the snapshot booked. Those confidence moves are downstream joint-math inputs, surfaced here for context: [[ws.persistent-energy-shock]] 0.78 to 0.50, [[ws.gold-debasement-bid]] 0.84 to 0.88, [[ws.stagflation-risk]] 0.86 to 0.88, [[ws.ai-capex-cycle-with-china-tail]] 0.87 to 0.88, [[ws.equity-melt-up-vs-recession-risk]] 0.75 to 0.76, [[ws.iran-war-rearmament]] 0.88 to 0.84.

    **The Fed transition resolves into a hawkish regime.** [[ws.ev-fomc-jun17-hold-warsh-debut|Warsh held at his first FOMC]] but [[ws.ev-fomc-jun17-hawkish-dots-hike|the dot plot put a 2026 hike on the table with no cuts]] and [[ws.ev-warsh-inflation-is-a-choice-jun17|committed the Fed to price stability]]. The retired Fed-transition thesis's uncertainty basket (long-[[sec.uvix]] vol, managed futures, short-[[sec.tlt]]) is replaced by a cleaner rate-path basket on the successor [[ws.hawkish-warsh-regime]]: short [[sec.tlt]] (primary inverse-expression) and short [[sec.ief]] lead, because a hawkish higher-for-longer path drives long-duration Treasuries DOWN unambiguously, with [[sec.dbmf]] / [[sec.kmlm]] managed futures as the rate-trend sleeve. The vol-capture (UVIX) slot is dropped - this regime is vol-DOWN ([[ws.ev-vix-jun17-1718|VIX crushed to 17.2]]), the opposite of the uncertainty it succeeded.

    **Energy: the basket is structurally unchanged but the thesis is near invalidation.** [[ws.persistent-energy-shock]] was cut to 0.50 as the war turned toward an end ([[ws.ev-us-iran-end-war-deal-jun14|the June 14 deal and Hormuz reopening]]) and [[ws.ev-wti-jun18-7482|WTI collapsed ~18% to ~$75, below the $80 invalidation leg]]. The long [[sec.xle]] / [[sec.xom]] / [[sec.cvx]] basket still expresses the thesis structurally (alignmentStrength unchanged), but downstream joint math (confidence x strength) now de-emphasizes it sharply - the right read is "same vehicles, far less conviction". If the fragile MOU holds 30 days the thesis invalidates and the basket drops next refresh.

    **Gold confirms structurally; defense softens on the acute leg.** [[ws.gold-debasement-bid]] stepped to 0.88 as [[ws.ev-gold-ath-jun16-4353|gold made a fresh ATH ~$4,353 INTO the de-escalation]] - a debasement bid, not a war hedge - so the long [[sec.gld]] / [[sec.iau]] / [[sec.gdx]] basket holds with rising downstream conviction. [[ws.iran-war-rearmament]] eased to 0.84 as the acute war premium fades, but the [[sec.lmt]] / [[sec.rtx]] / [[sec.noc]] basket holds on the decade-scale structural backlog ([[ws.ev-defense-wobble-ceasefire-jun17|$21B Q1 FMS, 416-jet F-35 backlog]]).

    **AI and equity hold; stagflation reframes around the hawkish core.** [[ws.ai-capex-cycle-with-china-tail]] (0.88) keeps the [[sec.nvda]] / [[sec.avgo]] / [[sec.orcl]] / [[sec.intc]] basket - the melt-up proved resilient ([[ws.ev-qqq-jun17-72251|QQQ +4.2% on the week]]). [[ws.equity-melt-up-vs-recession-risk]] (0.76) keeps the long-[[sec.spy]] / [[sec.vti]] core plus [[sec.uvix]] hedge; with [[ws.ev-vix-jun17-1718|VIX at 17.2]] the hedge stays cheap insurance. [[ws.stagflation-risk]] (0.88) keeps its long-[[sec.gld]] / long-[[sec.xle]] / short-[[sec.tlt]] macro basket; its short-[[sec.tlt]] rate leg now rhymes with the new [[hawkish-warsh-regime-alignment]], the two theses sharing the rate-path channel.

    **What this minor changed.** Dropped `powell-warsh-transition-risk-alignment` (thesis retired); added `hawkish-warsh-regime-alignment` (short [[sec.tlt]] / short [[sec.ief]] primary, [[sec.dbmf]] / [[sec.kmlm]] managed-futures alternates, alignmentConfidence 0.58). All six continuing baskets, ranks, roles, directions, and strength parameters are unchanged from 1.0.2; the snapshot's confidence moves are downstream joint-math inputs, not alignment-strength inputs. No securities bump - every ticker resolves against the 2.3.0 baseline.
  hasAlignment:
    - stagflation-risk-alignment
    - persistent-energy-shock-alignment
    - iran-war-rearmament-alignment
    - gold-debasement-bid-alignment
    - ai-capex-cycle-with-china-tail-alignment
    - equity-melt-up-vs-recession-risk-alignment
    - hawkish-warsh-regime-alignment

stagflation-risk-alignment:
  type: align.ThesisAlignment
  label: Stagflation risk alignment
  forThesis: ws.stagflation-risk
  alignmentConfidence:
    estimateMean: 0.55
    estimateStdDev: 0.10
    betaAlpha: 12.0
    betaBeta: 10.0
  alignmentRationale: |
    No `fin.aboutSecurity` or `fin.forecastTarget` references appear in
    [[ws.stagflation-risk]]'s `supportingEvidence` and no `sec.<ticker>` names
    appear in the `thesisStatement` - the thesis is a macro framework
    (CPI/PPI/PCE + rate-path + energy-passthrough) rather than a single-name
    argument. Tier 1 and Tier 2 are empty; the basket below is **Tier-3 skill
    judgment** using baseline tickers only, so per the indirect-reasoning
    calibration the per-security means are capped around 0.65.

    Four mechanisms drive the picks: **rates up = bonds down** (short
    [[sec.tlt]] inverse-expression, short [[sec.ief]] lower-beta alternate);
    **inflation + debasement hedge** (long [[sec.gld]]); **energy-passthrough as
    the operative inflation channel** (long [[sec.xle]]); and **trend-regime
    capture** (long [[sec.dbmf]]). The thesis stepped to 0.86 in 2.2.4 as its
    named mid-June tell fired: [[ws.ev-may-cpi-print-42-jun10|May CPI printed 4.2% YoY, a three-year high, with energy contributing over 60% of the monthly rise and gasoline +40.5% YoY]] - the passthrough channel behind the
    long [[sec.xle]] leg now visible in the index itself - while
    [[ws.ev-10y-yield-wed-454-jun10|the 10Y held ~4.54%]] and
    [[ws.ev-fedwatch-june-hold-98-jun10|a December hike became essentially fully priced]], reinforcing the short-bond legs directly. The
    [[ws.ev-may-cpi-core-29-jun10|contained 2.9% core]] is the offsetting
    caveat. Basket and rank order unchanged. `alignmentConfidence` is held
    modest (0.55 +/- 0.10) precisely because the thesis lacks direct ticker
    evidence.
  hasAlignedSecurity:
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.65
        estimateStdDev: 0.10
        betaAlpha: 14.0
        betaBeta: 7.5
      securityRationale: |
        Short [[sec.tlt]] is the cleanest single-ticker expression of the
        rate-up component named throughout [[ws.stagflation-risk]] - the move to
        4.55% is the latest print ([[ws.ev-10y-yield-fri-455-jun5]]), extending
        the [[ws.ev-10y-yield-monday-461-may18|May rate-path repricing]], and
        [[ws.ev-fedwatch-hike-by-dec-70pct-jun5|hike-by-December odds at ~70%]]
        corroborate. Long-duration Treasuries fall most under the named rate
        move; **inverse-expression** (short) is the mechanism. Mean at the
        indirect-reasoning cap of 0.65 because the thesis does not name
        [[sec.tlt|TLT]] directly even though the mechanism is unambiguous.
    - alignedSecurity: sec.gld
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.62
        estimateStdDev: 0.10
        betaAlpha: 13.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.gld]] is the classic stagflation hedge - precious metals
        carry the debasement-and-inflation premium. The thesis names rising
        inflation (CPI 3.8% via [[ws.ev-april-cpi-print-headline-38]], PPI +6.0%
        YoY via [[ws.ev-april-ppi-print-may13]]) and the
        [[ws.gold-debasement-bid|gold-debasement-bid thesis]] runs in parallel;
        this alignment captures the inflation side of stagflation. Mean below
        0.65 because [[sec.gld|GLD]] is not named in this thesis's evidence
        directly (see [[gold-debasement-bid-alignment]]).
    - alignedSecurity: sec.xle
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.60
        estimateStdDev: 0.10
        betaAlpha: 12.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.xle]] captures the energy-passthrough mechanism named
        explicitly in [[ws.stagflation-risk]]'s thesisStatement. Crude eased to
        [[ws.ev-wti-fri-ease-93-jun5|~$93 Friday]] but remains a live passthrough
        tailwind well above the invalidation threshold. Mean modest because the
        [[persistent-energy-shock-alignment|persistent-energy-shock alignment]]
        already carries this ticker with higher conviction.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.55
        estimateStdDev: 0.12
        betaAlpha: 9.0
        betaBeta: 7.4
      securityRationale: |
        Long [[sec.dbmf]] captures the trend-following premium that
        managed-futures strategies extract from regime shifts like the current
        rates / commodities / FX repricing. The thesisStatement documents the
        sharpest rate-path repricing of the cycle - exactly the environment in
        which managed-futures vehicles structurally outperform. Mean modest
        because the mechanism is one step removed from the thesis text.
    - alignedSecurity: sec.ief
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.53
        estimateStdDev: 0.10
        betaAlpha: 11.0
        betaBeta: 9.8
      securityRationale: |
        Short [[sec.ief]] is the lower-duration alternate to short
        [[sec.tlt|TLT]] - same inverse-expression sign on the rate-up component
        but smaller single-trade vol. Useful as a sleeve-level diversifier of the
        short-bond expression. Mean lowest in the stack because the primary
        inverse-expression slot is already filled by [[sec.tlt|TLT]].

persistent-energy-shock-alignment:
  type: align.ThesisAlignment
  label: Persistent energy shock alignment
  forThesis: ws.persistent-energy-shock
  alignmentConfidence:
    estimateMean: 0.88
    estimateStdDev: 0.04
    betaAlpha: 22.0
    betaBeta: 3.0
  alignmentRationale: |
    Three **Tier-1 candidates** with strong direct evidence support and clean
    rank order. [[sec.xle]], [[sec.xom]], and [[sec.cvx]] are all named in
    [[ws.persistent-energy-shock]]'s thesisStatement and each has dedicated
    `fin.MarketDataEvidence`. [[sec.xle|XLE]] leads as the sector ETF (broadest,
    most-liquid expression); [[sec.xom|XOM]] and [[sec.cvx|CVX]] provide
    single-name exposure to the integrated majors that capture the largest
    absolute beta to a sustained oil-price regime.

    No hedge or inverse-expression candidate is in scope - the thesis is
    structurally directional on energy prices staying elevated. The alignment
    rests on the structural-supply read ([[ws.ev-iea-omr-may-2026-undersupply|IEA 1.78 mb/d 2026 deficit]]), which is not contingent on the diplomatic track.
    The thesis stepped to 0.78 (band tighter) in 2.2.4 on its strongest
    confirmation window of the sequence: the war broadened to
    [[ws.ev-iran-ballistic-missiles-israel-jun8|direct Iran-Israel ballistic exchanges]] and [[ws.ev-us-strikes-iran-wed-night-jun10|US strike waves on consecutive nights]], the memorandum died in all but name
    ([[ws.ev-trump-pay-the-price-jun10|"pay the price"]]),
    [[ws.ev-wti-wed-91-jun10|WTI firmed toward $91]] with
    [[ws.ev-energy-complex-wed-jun10|the complex green (XOM 150.62, CVX 189.80, XLE 58.25) through a -1.6% S&P session]], and the passthrough now prints in
    [[ws.ev-may-cpi-print-42-jun10|the 4.2% CPI]]. Structural fit and rank order
    hold - the window strengthens conviction context without changing any
    candidate's participation.
  hasAlignedSecurity:
    - alignedSecurity: sec.xle
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.91
        estimateStdDev: 0.03
        betaAlpha: 30.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.xle]] is the canonical sector-ETF expression of the energy
        thesis - named in thesisStatement, with the latest print
        [[ws.ev-energy-complex-wed-jun10|58.25 Wednesday, green through a -1.6% S&P session]]. Broad diversified exposure across integrated majors,
        refiners, and services - matches the structural-supply read that does
        not single out any one operator. Tight band because the sector-ETF
        expression has the cleanest argument and the lowest idiosyncratic risk
        in the stack.
    - alignedSecurity: sec.xom
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
        betaAlpha: 17.0
        betaBeta: 3.0
      securityRationale: |
        Long [[sec.xom]] is the largest-integrated-major single-name alternate to
        [[sec.xle|XLE]] - same broad upstream-plus-downstream exposure, slightly
        more concentrated on the company's specific reserves and operating
        leverage ([[ws.ev-energy-complex-wed-jun10|150.62 Wednesday]]). Modest
        band reflects the single-name concentration premium relative to the ETF
        expression.
    - alignedSecurity: sec.cvx
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.83
        estimateStdDev: 0.05
        betaAlpha: 16.0
        betaBeta: 3.3
      securityRationale: |
        Long [[sec.cvx]] is the second-integrated-major single-name alternate -
        similar shape to [[sec.xom|XOM]] with a different production mix and more
        chemicals exposure ([[ws.ev-energy-complex-wed-jun10|189.80 Wednesday]]). Marginally lower mean than [[sec.xom|XOM]] only because
        [[sec.xom|XOM]] has higher upstream leverage to the named oil-price move.

iran-war-rearmament-alignment:
  type: align.ThesisAlignment
  label: Iran war rearmament alignment
  forThesis: ws.iran-war-rearmament
  alignmentConfidence:
    estimateMean: 0.86
    estimateStdDev: 0.04
    betaAlpha: 24.0
    betaBeta: 3.9
  alignmentRationale: |
    Three **Tier-1 candidates** with strong direct evidence support. [[sec.lmt]]
    and [[sec.rtx]] each appear multiple times in [[ws.iran-war-rearmament]]'s
    `supportingEvidence` (Q1 2026 record-backlog `fin.CorporateEvidence` via
    [[ws.ev-lmt-backlog-194b-q1-2026]] and [[ws.ev-rtx-backlog-271b-q1-2026]]);
    [[sec.noc]] appears with less direct missile-defense exposure. All three are
    named in the thesisStatement.

    Rank order is driven by the depth of missile-and-missile-defense exposure -
    [[sec.lmt|LMT]] and [[sec.rtx|RTX]] lead with comparable record backlogs
    ($194B and $271B), [[sec.noc|NOC]] ranks below on more stealth/strategic
    concentration. The thesis stepped to 0.88 in 2.2.4 on the war's sharpest
    sequence since February - [[ws.ev-iran-ballistic-missiles-israel-jun8|direct Iran-Israel ballistic exchanges]], [[ws.ev-us-strikes-iran-wed-night-jun10|US strike waves on consecutive nights]], and a
    [[ws.ev-centcom-strikes-complete-thu-jun11|"long grind" consensus repricing]] - with [[ws.ev-defense-closes-wed-jun10|the defense tape holding roughly flat (LMT 525.02, RTX 177.41, NOC 542.14) through Wednesday's -1.6% S&P session]], relative strength on the escalation. The procurement-cycle
    argument survives near-term diplomatic outcomes (the multi-year backlogs
    plus the [[ws.ev-fy2026-defense-budget-1t|$1T FY2026 base]] and the
    [[ws.ev-trump-defense-budget-15t-2027-may26|$1.5T FY2027 proposal]] outlast
    any framework short of implementation), so no hedge candidate is in scope
    and rank order holds.
  hasAlignedSecurity:
    - alignedSecurity: sec.lmt
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.89
        estimateStdDev: 0.04
        betaAlpha: 27.0
        betaBeta: 3.3
      securityRationale: |
        Long [[sec.lmt]] is the canonical missile-and-missile-defense prime
        expression - record Q1 2026 backlog of $194B
        ([[ws.ev-lmt-backlog-194b-q1-2026]]) plus the Friday haven bid
        ([[ws.ev-defense-bid-fri-jun5|+0.7% to 523.76]]); named in
        thesisStatement. Direct beneficiary of the multi-year defense-spending
        cycle ([[ws.ev-fy2026-defense-budget-1t|FY2026 $1T base]]). **Primary
        vehicle** earned by the density of evidence support.
    - alignedSecurity: sec.rtx
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.88
        estimateStdDev: 0.04
        betaAlpha: 26.0
        betaBeta: 3.5
      securityRationale: |
        Long [[sec.rtx]] is the second-prime alternate - similar
        missile-and-missile-defense exposure to [[sec.lmt|LMT]] with the largest
        record backlog ($271B via [[ws.ev-rtx-backlog-271b-q1-2026]]) and
        explicit thesisStatement mention; it also caught the Friday haven bid
        ([[ws.ev-defense-bid-fri-jun5|+1.0% to 180.99]]). **Alternate-vehicle**
        rather than co-primary because [[sec.lmt|LMT]]'s missile-defense
        concentration is the more pure-play expression. Mean essentially tied.
    - alignedSecurity: sec.noc
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.83
        estimateStdDev: 0.06
        betaAlpha: 19.0
        betaBeta: 3.9
      securityRationale: |
        Long [[sec.noc]] is the third-prime alternate - stealth/strategic systems
        exposure that complements [[sec.lmt|LMT]] and [[sec.rtx|RTX]]'s
        missile-defense concentration ([[ws.ev-defense-bid-fri-jun5|firm at 544.40 Friday]]). Slightly wider band because the procurement-cycle beneficiary
        argument applies less directly to NOC's portfolio than to the two
        missile-defense leaders.

gold-debasement-bid-alignment:
  type: align.ThesisAlignment
  label: Gold debasement bid alignment
  forThesis: ws.gold-debasement-bid
  alignmentConfidence:
    estimateMean: 0.88
    estimateStdDev: 0.04
    betaAlpha: 24.0
    betaBeta: 3.3
  alignmentRationale: |
    Three precious-metals candidates with clean rank order. [[sec.gld]] is the
    canonical liquid vehicle with deep evidence support including
    [[ws.ev-lbma-q1-record-4873|the LBMA Q1 record $4,873/oz]] and
    [[ws.ev-jpm-gold-target-5055-6300|JPM]] / [[ws.ev-ubs-gold-target-6200|UBS]] /
    [[ws.ev-citi-gold-target-5000-7000|Citi]] forecast targets; directly named in
    the thesisStatement. [[sec.iau]] is the same-sector **Tier-2 alternate** with
    no direct evidence mentions but a materially lower expense ratio and
    structurally equivalent tracking. [[sec.gdx]] is the **high-beta-proxy** via
    gold miners.

    No hedge candidate is in scope - the thesis is structurally directional and
    stepped to 0.84 (band wider) in 2.2.4. The drawdown deepened - for the
    second consecutive window gold fell INTO a major escalation
    ([[ws.ev-gold-spot-wed-4090-jun10|spot ~$4,090 Wednesday, ~10% off the late-May band]], [[ws.ev-gld-wed-close-37458-jun10|GLD 374.58]],
    [[ws.ev-gdx-wed-close-7381-jun10|GDX -6.4% to 73.81]]) as
    [[ws.ev-may-cpi-print-42-jun10|the 4.2% CPI]] and
    [[ws.ev-10y-yield-wed-454-jun10|the ~4.54% 10Y]] kept the yield channel
    dominant. That failed haven bid is a thesis-confidence input (the snapshot's
    wider band carries it), NOT an alignment-strength input: these three
    vehicles' structural participation in a DEBASEMENT thesis is unchanged, no
    leg of the `AndCondition` invalidation triplet is in motion, and the
    structural-bull supports (central-bank buying, the LBMA record, the analyst
    targets) stand - so the stack and rank order hold.
  hasAlignedSecurity:
    - alignedSecurity: sec.gld
      securityRole: align.role-primary-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.92
        estimateStdDev: 0.03
        betaAlpha: 36.0
        betaBeta: 3.1
      securityRationale: |
        Long [[sec.gld]] is the canonical primary vehicle - named in
        thesisStatement with deep evidence support including
        [[ws.ev-lbma-q1-record-4873|the LBMA Q1 record]] and JPM/UBS/Citi targets
        pointing materially higher; the deepening drawdown
        ([[ws.ev-gld-wed-close-37458-jun10|374.58 Wednesday]]) is a yield-driven
        tactical dip, not a structural break. Deep liquidity, tight tracking.
        **Tight band** because corroborating evidence density is the highest in
        this package.
    - alignedSecurity: sec.iau
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.86
        estimateStdDev: 0.06
        betaAlpha: 16.0
        betaBeta: 2.6
      securityRationale: |
        Long [[sec.iau]] is the same-sector **Tier-2 alternate** to [[sec.gld|GLD]]
        - no direct evidence mentions but structurally equivalent gold-exposure
        tracking with a materially lower expense ratio. Preferred when cost basis
        matters more than incremental liquidity. Modest band because the
        alternate-vehicle argument is sector-mechanical rather than
        evidence-driven.
    - alignedSecurity: sec.gdx
      securityRole: align.role-high-beta-proxy
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.76
        estimateStdDev: 0.07
        betaAlpha: 12.0
        betaBeta: 3.8
      securityRationale: |
        Long [[sec.gdx]] is the **high-beta-proxy** via gold miners - named in
        thesisStatement; Wednesday's [[ws.ev-gdx-wed-close-7381-jun10|-6.4% session to 73.81]] is the characteristic miner beta amplifying spot's
        yield-driven decline. Miner leverage amplifies the upside of a sustained
        gold regime but introduces idiosyncratic operating risk, so the band is
        wider than the ETF candidates [[sec.gld]] / [[sec.iau]].

ai-capex-cycle-with-china-tail-alignment:
  type: align.ThesisAlignment
  label: AI capex cycle alignment
  forThesis: ws.ai-capex-cycle-with-china-tail
  alignmentConfidence:
    estimateMean: 0.84
    estimateStdDev: 0.05
    betaAlpha: 17.0
    betaBeta: 3.2
  alignmentRationale: |
    Five **Tier-1 candidates** fill the cap exactly - [[sec.nvda]], [[sec.amd]],
