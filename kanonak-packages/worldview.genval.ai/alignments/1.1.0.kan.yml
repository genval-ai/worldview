hawkish-warsh-regime-alignment:
  type: align.ThesisAlignment
  label: Hawkish Warsh regime alignment
  forThesis: ws.hawkish-warsh-regime
  alignmentConfidence:
    estimateMean: 0.58
    estimateStdDev: 0.10
    betaAlpha: 12.0
    betaBeta: 8.7
  alignmentRationale: |
    [[ws.hawkish-warsh-regime]] is the rate-path successor to the retired
    [[ws.powell-warsh-transition-risk]] - the transition uncertainty resolved into an
    explicitly hawkish, higher-for-longer regime at the June 16-17 FOMC. As with the
    predecessor, no `fin.aboutSecurity` / `fin.forecastTarget` references appear in the
    thesis's `supportingEvidence` and no `sec.<ticker>` names appear in the thesisStatement
    - the evidence is FOMC actions and yield observations
    ([[ws.ev-fomc-jun17-hawkish-dots-hike|the hike-biased dot plot]],
    [[ws.ev-2y-yield-plus16bp-jun17|the 2Y +16bp]],
    [[ws.ev-10y-yield-jun17-449|the 10Y to ~4.49%]]). Tier 1 and Tier 2 are empty; the
    basket is **Tier-3 skill judgment** on baseline tickers. But the mechanism is far
    cleaner than the predecessor's: a hawkish, no-cut, hike-biased path drives long-duration
    Treasuries DOWN unambiguously, so the short-[[sec.tlt]] / short-[[sec.ief]]
    inverse-expression legs lead at the top of the indirect-reasoning band rather than the
    middle, and the managed-futures sleeve ([[sec.dbmf]] / [[sec.kmlm]]) captures the
    rate-trend the regime sustains.

    `alignmentConfidence` 0.58 +/- 0.10 - above the predecessor's 0.50 because the
    thesis-to-rate-path mapping is unambiguous (the regime IS a rate-path call), but still
    Tier-3 (no direct ticker evidence) and exposed to reversal risk: a soft CPI/PCE sequence
    that pulls the no-cut dots back toward easing would flip the short-bond legs, which is
    exactly the thesis's invalidation leg.
  hasAlignedSecurity:
    - alignedSecurity: sec.tlt
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.70
        estimateStdDev: 0.09
        betaAlpha: 16.0
        betaBeta: 6.9
      securityRationale: |
        Short [[sec.tlt]] is the cleanest single-ticker expression of
        [[ws.hawkish-warsh-regime]] - a hawkish, no-cut, hike-biased Fed drives
        long-duration Treasuries lower, and the [[ws.ev-2y-yield-plus16bp-jun17|16bp 2Y jump]]
        plus [[ws.ev-10y-yield-jun17-449|the 10Y to ~4.49%]] are the move already
        underway. **Inverse-expression** (short): the thesis playing out IS long-duration
        Treasuries falling. Mean just above the indirect-reasoning cap because, unlike a
        confidence input, the mechanism is unambiguous and the FOMC already confirmed the
        direction; band tight for the same reason.
    - alignedSecurity: sec.ief
      securityRole: align.role-inverse-expression
      allocationDirection: align.direction-short
      alignmentStrength:
        estimateMean: 0.64
        estimateStdDev: 0.10
        betaAlpha: 13.0
        betaBeta: 7.3
      securityRationale: |
        Short [[sec.ief]] expresses the same higher-for-longer path on the belly of the
        curve. Slightly lower mean than [[sec.tlt|TLT]] because intermediate duration moves
        less per basis point of repricing, but the bear-flattening led by the front end
        ([[ws.ev-2y-yield-plus16bp-jun17|2Y +16bp]]) makes the 7-10Y sector a direct
        beneficiary of the hawkish turn. **Inverse-expression**, direction-short.
    - alignedSecurity: sec.dbmf
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.56
        estimateStdDev: 0.10
        betaAlpha: 10.0
        betaBeta: 7.9
      securityRationale: |
        Long [[sec.dbmf]] captures the rate-trend premium managed-futures vehicles extract
        from a sustained higher-for-longer regime - such strategies typically run short
        bonds in exactly this environment, so DBMF aligns with the thesis while diversifying
        away from a pure outright short. Modest mean: the mechanism is one step removed from
        the explicit thesis and depends on the trend persisting.
    - alignedSecurity: sec.kmlm
      securityRole: align.role-alternate-vehicle
      allocationDirection: align.direction-long
      alignmentStrength:
        estimateMean: 0.50
        estimateStdDev: 0.11
        betaAlpha: 8.0
        betaBeta: 8.0
      securityRationale: |
        Long [[sec.kmlm]] is the second managed-futures alternate to [[sec.dbmf|DBMF]], a
        different implementation (KFA Mount Lucas vs DBi). Including both diversifies the
        trend sleeve across strategies; lowest mean in the stack given the indirect
        mechanism and the uncertainty over the right managed-futures mix.