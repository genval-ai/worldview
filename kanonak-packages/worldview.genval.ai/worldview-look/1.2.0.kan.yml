worldview-look:
  type: Package
  publisher: worldview.genval.ai
  version: 1.2.0
  label: Worldview Look
  comment: >-
    Declarative visual presentation for worldview.genval.ai classes.
    Sets publisher brand tokens on rdfs.Resource and declares
    derivation.look bands for WorldviewThesis, Evidence, Source,
    fin.Security, and reg.Regime. 1.2.0 migrates every look.semanticSvg
    tier from {{...}} string templates to typed tx.Expression trees
    (look@1.21.0 declares the tier properties as range tx.Expression), so
    each property reference resolves through the object model and is
    validated at author time. The change-vs-previous "delta" glyph helpers
    have no typed cross-version equivalent, so the thesis and snapshot
    glyphs now show confidence μ directly; the change story stays on the
    page via the VersionDelta band.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: core-kanonak
          match: ^
          version: 2.0.0
          alias: ck
        - package: derivation
          match: ^
          version: 1.1.0
          alias: derivation
        - package: look
          match: ^
          version: 1.20.0
          alias: look
        - package: look-tokens
          match: ^
          version: 1.0.0
          alias: tok
        - package: look-styles
          match: ^
          version: 1.15.0
          alias: look-styles
        - package: transformations
          match: ^
          version: 3.14.0
          alias: tx
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
        - package: snapshots
          match: ^
          version: 2.1.4
          alias: snap
        - package: sources
          match: ^
          version: 1.0.0
          alias: src
        - package: estimates
          match: ^
          version: 1.0.0
          alias: est
        - package: finance
          match: ^
          version: 3.0.0
          alias: fin
        - package: securities
          match: ^
          version: 2.1.0
          alias: sec
        - package: regimes
          match: ^
          version: 1.0.0
          alias: reg
        - package: visual
          match: ^
          version: 2.0.0
          alias: vis
        - package: factors
          match: ^
          version: 1.0.0
          alias: fac

index:
  type: ck.Publisher
  rdfs.label: worldview.genval.ai
  rdfs.comment: >-
    A continuously-updated probabilistic macro worldview — versioned
    snapshots of theses, confidence, evidence, and the conditions that
    would break them.
  derivation.look:
    type: look.PublisherView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.subtitle: rdfs.comment
      - type: look.FeaturedResource
        look.source: snap.view

rdfs.Resource:
  derivation.tokens:
    tok.bg: "#0a0e1a"
    tok.bg-card: "#0c1220"
    tok.bg-elev: "#162033"
    tok.text: "#e6eaf2"
    tok.text-dim: "#9aa5b8"
    tok.text-faint: "#6b7689"
    tok.border: "#1e293b"
    tok.border-soft: "#162033"
    tok.accent: "#38bdf8"
    tok.accent-hover: "#7dd3fc"
    tok.badge-bg: "rgba(56, 189, 248, 0.12)"
    tok.badge-fg: "#7dd3fc"
    tok.font-display: "'Iowan Old Style', 'Palatino Linotype', Palatino, 'URW Palladio L', serif"
    tok.font-body: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: rdfs.type
        look.subtitle: rdfs.comment
      - type: look.Details

