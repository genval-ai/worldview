worldview-look:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  label: Worldview Look
  comment: >-
    Declarative visual presentation for worldview.genval.ai classes.
    Sets publisher brand tokens on rdfs.Resource and declares
    derivation.look bands for WorldviewThesis, Evidence, Source,
    fin.Security, and reg.Regime.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: derivation
          match: ^
          version: 1.1.0
          alias: derivation
        - package: look
          match: ^
          version: 1.13.0
          alias: look
        - package: look-tokens
          match: ^
          version: 1.0.0
          alias: tok
        - package: look-styles
          match: ^
          version: 1.12.0
          alias: look-styles
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
        - package: snapshots
          match: ^
          version: 2.1.4
          alias: snap
        - package: sources
          match: ^
          version: 1.0.0
          alias: src
        - package: finance
          match: ^
          version: 3.0.0
          alias: fin
        - package: regimes
          match: ^
          version: 1.0.0
          alias: reg

index:
  type: rdfs.Resource
  rdfs.label: worldview.genval.ai
  rdfs.comment: >-
    A continuously-updated probabilistic macro worldview — versioned
    snapshots of theses, confidence, evidence, and the conditions that
    would break them.
  derivation.look:
    type: look.PublisherView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.subtitle: rdfs.comment
      - type: look.FeaturedResource
        look.source: snap.view
      - type: look.PublisherPackages

rdfs.Resource:
  derivation.tokens:
    tok.bg: "#0a0e1a"
    tok.bg-card: "#0c1220"
    tok.bg-elev: "#162033"
    tok.text: "#e6eaf2"
    tok.text-dim: "#9aa5b8"
    tok.text-faint: "#6b7689"
    tok.border: "#1e293b"
    tok.border-soft: "#162033"
    tok.accent: "#38bdf8"
    tok.accent-hover: "#7dd3fc"
    tok.badge-bg: "rgba(56, 189, 248, 0.12)"
    tok.badge-fg: "#7dd3fc"
    tok.font-display: "'Iowan Old Style', 'Palatino Linotype', Palatino, 'URW Palladio L', serif"
    tok.font-body: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: rdfs.type
        look.subtitle: rdfs.comment
      - type: look.Details

wv.WorldviewThesis:
  look.semanticSvg:
    look.tierChip: |
      <rect x="0" y="0" width="400" height="400" rx="88" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/>
      <text x="200" y="305" text-anchor="middle" font-size="300" font-weight="700" fill="#0a0e1a">{{deltaArrow:wv.confidence/est.estimateMean}}</text>
    look.tierIcon: |
      <rect x="0" y="0" width="400" height="400" rx="48" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/>
      <text x="200" y="215" text-anchor="middle" font-size="200" font-weight="700" fill="#0a0e1a">{{deltaArrow:wv.confidence/est.estimateMean}}</text>
      <text x="200" y="330" text-anchor="middle" font-size="84" font-weight="700" fill="#0a0e1a" font-family="var(--kan-font-mono)">{{delta:wv.confidence/est.estimateMean}}</text>
    look.tierCard: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="80" rx="14" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/>
      <rect x="0" y="60" width="400" height="20" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/>
      <text x="40" y="50" font-size="22" font-weight="700" fill="#0a0e1a" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="40" y="145" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CHANGE</text>
      <text x="40" y="210" font-size="68" font-weight="700" fill="{{deltaColor:wv.confidence/est.estimateMean}}">{{deltaArrow:wv.confidence/est.estimateMean}} {{delta:wv.confidence/est.estimateMean}}</text>
      <text x="40" y="285" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CONFIDENCE μ</text>
      <text x="40" y="325" font-size="34" font-weight="600" fill="var(--kan-text)">{{wv.confidence/est.estimateMean}}</text>
    look.tierFull: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/>
      <text x="24" y="32" font-size="11" fill="#0a0e1a" font-family="var(--kan-font-mono)" opacity="0.8">THESIS</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="#0a0e1a" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="130" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CHANGE VS PREVIOUS</text>
      <text x="24" y="188" font-size="56" font-weight="700" fill="{{deltaColor:wv.confidence/est.estimateMean}}">{{deltaArrow:wv.confidence/est.estimateMean}} {{delta:wv.confidence/est.estimateMean}}</text>
      <text x="24" y="238" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CONFIDENCE μ</text>
      <text x="24" y="268" font-size="30" font-weight="700" fill="var(--kan-text)">{{wv.confidence/est.estimateMean}}</text>
      <rect x="24" y="290" width="352" height="6" rx="3" fill="var(--kan-border)"/>
      <svg x="24" y="290" width="352" height="6" viewBox="0 0 1 1" preserveAspectRatio="none"><rect width="{{wv.confidence/est.estimateMean}}" height="1" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/></svg>
      <text x="24" y="345" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">STATUS</text>
      <text x="24" y="368" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.status/rdfs.label}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: wv.status
      - type: look.SectionHeading
        look.heading: "What changed"
        look.note: "The headline signal — how confidence moved from the previous snapshot, and why."
      - type: look.VersionDelta
        look.metricPath: "wv.confidence/est.estimateMean"
      - type: look.Markdown
        look.source: wv.confidenceRationale
      - type: look.SectionHeading
        look.heading: "The thesis"
        look.note: "The claim and where confidence stands now."
      - type: look.Distribution
        look.alphaPath: "wv.confidence/est.betaAlpha"
        look.betaPath: "wv.confidence/est.betaBeta"
        look.metricPath: "wv.confidence/est.estimateMean"
        look.lowerPath: "wv.confidence/est.estimateLower95"
        look.upperPath: "wv.confidence/est.estimateUpper95"
        look.hueBy: "vis.thesisTheme/vis.themeHue"
      - type: look.Markdown
        look.source: wv.thesisStatement
      - type: look.SectionHeading
        look.heading: "Supporting evidence"
        look.note: "Typed, citation-backed observations across time, grouped by strength. Hover a point for the claim."
      - type: look.TimePlot
        look.source: wv.supportingEvidence
        look.orderBy: wv.evidenceObservedAt
        look.laneBy: "wv.evidenceStrength"
        look.labelPath: "wv.evidenceStatement"
      - type: look.SectionHeading
        look.heading: "What would invalidate this"
        look.note: "The machine-evaluable conditions that would falsify the thesis."
      - type: look.Horizon
        look.source: wv.invalidationCondition

wv.Evidence:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: wv.evidenceStatement
        look.eyebrow: rdfs.type
        look.badges: wv.evidenceStrength
      - type: look.Details
        look.skip:
          - wv.evidenceStatement

src.Source:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.subtitle: rdfs.comment
      - type: look.Details

fin.Security:
  look.semanticSvg:
    look.tierChip: |
      <rect x="0" y="0" width="400" height="400" rx="64" fill="var(--kan-accent)"/>
      <text x="200" y="252" text-anchor="middle" font-size="120" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)">{{fin.ticker}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: fin.ticker
      - type: look.Details

reg.Regime:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.subtitle: rdfs.comment
      - type: look.Details

wv.WorldviewSnapshot:
  look.semanticSvg:
    look.tierIcon: |
      <rect x="0" y="0" width="400" height="400" rx="48" fill="var(--kan-accent)"/>
      <text x="200" y="200" text-anchor="middle" font-size="120" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{firstLetter}}</text>
      <text x="200" y="280" text-anchor="middle" font-size="44" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)">WV</text>
    look.tierCard: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="var(--kan-accent)"/>
      <text x="24" y="32" font-size="11" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)" opacity="0.8">WORLDVIEW SNAPSHOT</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="140" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">OBSERVED</text>
      <text x="24" y="165" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.observedAt}}</text>
    look.tierFull: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="var(--kan-accent)"/>
      <text x="24" y="32" font-size="11" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)" opacity="0.8">WORLDVIEW SNAPSHOT</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="130" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">OBSERVED</text>
      <text x="24" y="152" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.observedAt}}</text>
      <text x="24" y="370" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">{{uri}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: wv.observedAt
      - type: look.Markdown
        look.source: wv.narrative
      - type: look.ResourceGrid
        look.source: wv.hasThesis

snap.snapshots:
  derivation.look:
    type: look.PackageView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
      - type: look.Timeline
        look.source: wv.WorldviewSnapshot
        look.orderBy: wv.observedAt
        look.track: wv.hasThesis
        look.metricPath: "wv.confidence/est.estimateMean"
        look.hueBy: "vis.thesisTheme/vis.themeHue"
        look.valueLabel: "μ"
        look.axisMin: 0
        look.axisMax: 1
        look.lowerPath: "wv.confidence/est.estimateLower95"
        look.upperPath: "wv.confidence/est.estimateUpper95"
      - type: look.VersionDiff
        look.source: wv.WorldviewSnapshot
        look.orderBy: wv.observedAt
        look.track: wv.hasThesis
        look.metricPath: "wv.confidence/est.estimateMean"
        look.hueBy: "vis.thesisTheme/vis.themeHue"
