wv.WorldviewSnapshot:
  look.semanticSvg:
    look.tierIcon: |
      <rect x="0" y="0" width="400" height="400" rx="48" fill="var(--kan-accent)"/>
      <text x="200" y="200" text-anchor="middle" font-size="120" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{firstLetter}}</text>
      <text x="200" y="280" text-anchor="middle" font-size="44" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)">WV</text>
    look.tierCard: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="var(--kan-accent)"/>
      <text x="24" y="32" font-size="11" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)" opacity="0.8">WORLDVIEW SNAPSHOT</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="140" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">OBSERVED</text>
      <text x="24" y="165" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.observedAt}}</text>
    look.tierFull: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="var(--kan-accent)"/>
      <text x="24" y="32" font-size="11" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)" opacity="0.8">WORLDVIEW SNAPSHOT</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="130" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">OBSERVED</text>
      <text x="24" y="152" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.observedAt}}</text>
      <text x="24" y="370" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">{{uri}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: wv.observedAt
      - type: look.Diagram
        look.figureTitle: "Theses in this snapshot, edge weight = confidence"
        look.placement: floatRight
        look.width: "40%"
        look.facets:
          - look.relation: wv.hasThesis
            look.encode: look.connector
            look.nodeTier: chip
            look.edgeValue: "rdfs.label"
            look.channels:
              - look.mapPath: "wv.confidence/est.estimateMean"
                look.to: thickness
      - type: look.Markdown
        look.source: wv.narrative
      - type: look.ResourceGrid
        look.source: wv.hasThesis

snap.snapshots:
  derivation.look:
    type: look.PackageView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
      - type: look.Timeline
        look.source: wv.WorldviewSnapshot
        look.orderBy: wv.observedAt
        look.track: wv.hasThesis
        look.metricPath: "wv.confidence/est.estimateMean"
        look.hueBy: "vis.thesisTheme/vis.themeHue"
        look.valueLabel: "μ"
        look.axisMin: 0
        look.axisMax: 1
        look.lowerPath: "wv.confidence/est.estimateLower95"
        look.upperPath: "wv.confidence/est.estimateUpper95"
      - type: look.VersionDiff
        look.source: wv.WorldviewSnapshot
        look.orderBy: wv.observedAt
        look.track: wv.hasThesis
        look.metricPath: "wv.confidence/est.estimateMean"
        look.hueBy: "vis.thesisTheme/vis.themeHue"
