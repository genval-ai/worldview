worldview-look:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  label: Worldview Look
  comment: >-
    Declarative visual presentation for worldview.genval.ai classes.
    Sets publisher brand tokens on rdfs.Resource and declares
    derivation.look bands for WorldviewThesis, Evidence, Source,
    fin.Security, and reg.Regime.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: derivation
          match: ^
          version: 1.1.0
          alias: derivation
        - package: look
          match: ^
          version: 1.0.0
          alias: look
        - package: look-tokens
          match: ^
          version: 1.0.0
          alias: tok
        - package: look-styles
          match: ^
          version: 1.1.0
          alias: look-styles
        - package: site
          match: ^
          version: 1.0.0
          alias: site
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
        - package: sources
          match: ^
          version: 1.0.0
          alias: src
        - package: finance
          match: ^
          version: 3.0.0
          alias: fin
        - package: regimes
          match: ^
          version: 1.0.0
          alias: reg

rdfs.Resource:
  derivation.tokens:
    tok.bg: "#0a0e1a"
    tok.bg-card: "#0c1220"
    tok.bg-elev: "#162033"
    tok.text: "#e6eaf2"
    tok.text-dim: "#9aa5b8"
    tok.text-faint: "#6b7689"
    tok.border: "#1e293b"
    tok.border-soft: "#162033"
    tok.accent: "#38bdf8"
    tok.accent-hover: "#7dd3fc"
    tok.badge-bg: "rgba(56, 189, 248, 0.12)"
    tok.badge-fg: "#7dd3fc"
    tok.font-display: "'Iowan Old Style', 'Palatino Linotype', Palatino, 'URW Palladio L', serif"
    tok.font-body: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: rdfs.type
        look.subtitle: rdfs.comment

wv.WorldviewThesis:
  look.semanticSvg:
    look.tierChip: |
      <rect x="0" y="0" width="400" height="400" rx="80" fill="hsl({{vis.thesisTheme/vis.themeHue}},65%,55%)"/>
    look.tierIcon: |
      <rect x="0" y="0" width="400" height="400" rx="48" fill="hsl({{vis.thesisTheme/vis.themeHue}},65%,55%)"/>
      <text x="200" y="245" text-anchor="middle" font-size="240" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{firstLetter}}</text>
    look.tierCard: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="80" rx="14" fill="hsl({{vis.thesisTheme/vis.themeHue}},65%,55%)"/>
      <rect x="0" y="60" width="400" height="20" fill="hsl({{vis.thesisTheme/vis.themeHue}},65%,55%)"/>
      <text x="40" y="50" font-size="22" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="40" y="140" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">STATUS</text>
      <text x="40" y="165" font-size="16" font-weight="600" fill="var(--kan-text)">{{wv.status/rdfs.label}}</text>
      <text x="220" y="140" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CONFIDENCE</text>
      <text x="220" y="165" font-size="16" font-weight="600" fill="var(--kan-text)">{{wv.confidence/est.estimateMean}}</text>
    look.tierFull: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="hsl({{vis.thesisTheme/vis.themeHue}},65%,55%)"/>
      <text x="24" y="32" font-size="11" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)" opacity="0.8">THESIS</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="120" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CONFIDENCE</text>
      <text x="200" y="160" text-anchor="middle" font-size="48" font-weight="700" fill="var(--kan-text)">{{wv.confidence/est.estimateMean}}</text>
      <rect x="24" y="190" width="352" height="6" rx="3" fill="var(--kan-border)"/>
      <svg x="24" y="190" width="352" height="6" viewBox="0 0 1 1" preserveAspectRatio="none"><rect width="{{wv.confidence/est.estimateMean}}" height="1" fill="hsl({{vis.thesisTheme/vis.themeHue}},65%,55%)"/></svg>
      <text x="24" y="240" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">STATUS</text>
      <text x="24" y="262" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.status/rdfs.label}}</text>
      <text x="200" y="240" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">THEME</text>
      <text x="200" y="262" font-size="14" font-weight="600" fill="var(--kan-text)">{{vis.thesisTheme/rdfs.label}}</text>
      <text x="24" y="370" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">{{uri}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: wv.status
        look.subtitle: wv.thesisStatement
      - type: look.ReferenceList
        look.entries:
          - wv.supportingEvidence

wv.Evidence:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: wv.evidenceStatement
        look.eyebrow: rdfs.type
        look.badges: wv.evidenceStrength

src.Source:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.subtitle: rdfs.comment

fin.Security:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: fin.ticker
      - type: look.ChipRow
        look.chips:
          - fin.assetClass

reg.Regime:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.subtitle: rdfs.comment

site.StaticPage:
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: site.title
      - type: look.Markdown
        look.source: site.body

wv.WorldviewSnapshot:
  look.semanticSvg:
    look.tierIcon: |
      <rect x="0" y="0" width="400" height="400" rx="48" fill="var(--kan-accent)"/>
      <text x="200" y="200" text-anchor="middle" font-size="120" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{firstLetter}}</text>
      <text x="200" y="280" text-anchor="middle" font-size="44" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)">WV</text>
    look.tierCard: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="var(--kan-accent)"/>
      <text x="24" y="32" font-size="11" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)" opacity="0.8">WORLDVIEW SNAPSHOT</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="140" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">OBSERVED</text>
      <text x="24" y="165" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.observedAt}}</text>
    look.tierFull: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="var(--kan-accent)"/>
      <text x="24" y="32" font-size="11" fill="var(--kan-bg-card)" font-family="var(--kan-font-mono)" opacity="0.8">WORLDVIEW SNAPSHOT</text>
      <text x="24" y="62" font-size="20" font-weight="700" fill="var(--kan-bg-card)" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="130" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">OBSERVED</text>
      <text x="24" y="152" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.observedAt}}</text>
      <text x="24" y="370" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">{{uri}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: wv.observedAt
      - type: look.Markdown
        look.source: wv.narrative
      - type: look.ResourceGrid
        look.source: wv.hasThesis
