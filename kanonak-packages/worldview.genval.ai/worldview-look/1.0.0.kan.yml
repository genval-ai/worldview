worldview-look:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  label: Worldview Look
  comment: >-
    Declarative visual presentation for worldview.genval.ai classes.
    Sets publisher brand tokens on rdfs.Resource and declares
    derivation.look bands for WorldviewThesis, Evidence, Source,
    fin.Security, and reg.Regime.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: core-kanonak
          match: ^
          version: 2.0.0
          alias: ck
        - package: derivation
          match: ^
          version: 1.1.0
          alias: derivation
        - package: look
          match: ^
          version: 1.20.0
          alias: look
        - package: look-tokens
          match: ^
          version: 1.0.0
          alias: tok
        - package: look-styles
          match: ^
          version: 1.15.0
          alias: look-styles
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
        - package: snapshots
          match: ^
          version: 2.1.4
          alias: snap
        - package: sources
          match: ^
          version: 1.0.0
          alias: src
        - package: finance
          match: ^
          version: 3.0.0
          alias: fin
        - package: securities
          match: ^
          version: 2.1.0
          alias: sec
        - package: regimes
          match: ^
          version: 1.0.0
          alias: reg
        - package: visual
          match: ^
          version: 2.0.0
          alias: vis

index:
  type: ck.Publisher
  rdfs.label: worldview.genval.ai
  rdfs.comment: >-
    A continuously-updated probabilistic macro worldview — versioned
    snapshots of theses, confidence, evidence, and the conditions that
    would break them.
  derivation.look:
    type: look.PublisherView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.subtitle: rdfs.comment
      - type: look.FeaturedResource
        look.source: snap.view

rdfs.Resource:
  derivation.tokens:
    tok.bg: "#0a0e1a"
    tok.bg-card: "#0c1220"
    tok.bg-elev: "#162033"
    tok.text: "#e6eaf2"
    tok.text-dim: "#9aa5b8"
    tok.text-faint: "#6b7689"
    tok.border: "#1e293b"
    tok.border-soft: "#162033"
    tok.accent: "#38bdf8"
    tok.accent-hover: "#7dd3fc"
    tok.badge-bg: "rgba(56, 189, 248, 0.12)"
    tok.badge-fg: "#7dd3fc"
    tok.font-display: "'Iowan Old Style', 'Palatino Linotype', Palatino, 'URW Palladio L', serif"
    tok.font-body: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: rdfs.type
        look.subtitle: rdfs.comment
      - type: look.Details

wv.WorldviewThesis:
  look.semanticSvg:
    look.tierChip: |
      <rect x="0" y="0" width="400" height="400" rx="88" fill="hsl({{vis.thesisTheme/vis.themeHue}},60%,52%)"/>
      <circle cx="200" cy="200" r="150" fill="#0a0e1a" opacity="0.22"/>
      <text x="200" y="298" text-anchor="middle" font-size="260" font-weight="700" fill="{{deltaColor:wv.confidence/est.estimateMean}}">{{deltaArrow:wv.confidence/est.estimateMean}}</text>
    look.tierIcon: |
      <rect x="0" y="0" width="400" height="400" rx="48" fill="hsl({{vis.thesisTheme/vis.themeHue}},60%,52%)"/>
      <circle cx="200" cy="165" r="120" fill="#0a0e1a" opacity="0.22"/>
      <text x="200" y="225" text-anchor="middle" font-size="170" font-weight="700" fill="{{deltaColor:wv.confidence/est.estimateMean}}">{{deltaArrow:wv.confidence/est.estimateMean}}</text>
      <text x="200" y="338" text-anchor="middle" font-size="76" font-weight="700" fill="#0a0e1a" font-family="var(--kan-font-mono)">{{delta:wv.confidence/est.estimateMean}}</text>
    look.tierCard: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="84" rx="14" fill="hsl({{vis.thesisTheme/vis.themeHue}},60%,52%)"/>
      <rect x="0" y="64" width="400" height="20" fill="hsl({{vis.thesisTheme/vis.themeHue}},60%,52%)"/>
      <text x="36" y="34" font-size="12" fill="#0a0e1a" font-family="var(--kan-font-mono)" opacity="0.85">THESIS</text>
      <text x="36" y="64" font-size="21" font-weight="700" fill="#0a0e1a" font-family="var(--kan-font-display)">{{label}}</text>
      <rect x="36" y="128" width="216" height="58" rx="29" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/>
      <text x="144" y="167" text-anchor="middle" font-size="30" font-weight="700" fill="#0a0e1a">{{deltaArrow:wv.confidence/est.estimateMean}} {{delta:wv.confidence/est.estimateMean}}</text>
      <text x="36" y="250" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CONFIDENCE μ</text>
      <text x="36" y="300" font-size="46" font-weight="700" fill="var(--kan-text)">{{wv.confidence/est.estimateMean}}</text>
    look.tierFull: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <rect x="0" y="0" width="400" height="90" rx="14" fill="hsl({{vis.thesisTheme/vis.themeHue}},60%,52%)"/>
      <text x="24" y="34" font-size="11" fill="#0a0e1a" font-family="var(--kan-font-mono)" opacity="0.85">THESIS · {{vis.thesisTheme/rdfs.label}}</text>
      <text x="24" y="64" font-size="19" font-weight="700" fill="#0a0e1a" font-family="var(--kan-font-display)">{{label}}</text>
      <text x="24" y="132" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CHANGE VS PREVIOUS</text>
      <rect x="24" y="148" width="200" height="54" rx="27" fill="{{deltaColor:wv.confidence/est.estimateMean}}"/>
      <text x="124" y="184" text-anchor="middle" font-size="28" font-weight="700" fill="#0a0e1a">{{deltaArrow:wv.confidence/est.estimateMean}} {{delta:wv.confidence/est.estimateMean}}</text>
      <text x="24" y="252" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">CONFIDENCE μ</text>
      <text x="24" y="284" font-size="32" font-weight="700" fill="var(--kan-text)">{{wv.confidence/est.estimateMean}}</text>
      <rect x="24" y="306" width="352" height="6" rx="3" fill="var(--kan-border)"/>
      <svg x="24" y="306" width="352" height="6" viewBox="0 0 1 1" preserveAspectRatio="none"><rect width="{{wv.confidence/est.estimateMean}}" height="1" fill="hsl({{vis.thesisTheme/vis.themeHue}},60%,52%)"/></svg>
      <text x="24" y="350" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">STATUS</text>
      <text x="24" y="372" font-size="14" font-weight="600" fill="var(--kan-text)">{{wv.status/rdfs.label}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: rdfs.label
        look.eyebrow: rdfs.type
        look.badges: wv.status
      - type: look.SectionNav
      - type: look.SectionHeading
        look.heading: "What changed"
        look.note: "The headline signal — how confidence moved from the previous snapshot, and why."
      - type: look.VersionDelta
        look.metricPath: "wv.confidence/est.estimateMean"
      - type: look.Markdown
        look.source: wv.confidenceRationale
      - type: look.SectionHeading
        look.heading: "The thesis"
        look.note: "The claim and where confidence stands now."
      - type: look.Distribution
        look.alphaPath: "wv.confidence/est.betaAlpha"
        look.betaPath: "wv.confidence/est.betaBeta"
        look.metricPath: "wv.confidence/est.estimateMean"
        look.lowerPath: "wv.confidence/est.estimateLower95"
        look.upperPath: "wv.confidence/est.estimateUpper95"
        look.hueBy: "vis.thesisTheme/vis.themeHue"
      - type: look.Markdown
        look.source: wv.thesisStatement
      - type: look.SectionHeading
        look.heading: "Supporting evidence"
        look.note: "Typed, citation-backed observations across time, grouped by strength. Hover a point for the claim."
      - type: look.TimePlot
        look.source: wv.supportingEvidence
        look.orderBy: wv.evidenceObservedAt
        look.laneBy: "wv.evidenceStrength"
        look.labelPath: "wv.evidenceStatement"
      - type: look.SectionHeading
        look.heading: "What would invalidate this"
        look.note: "The machine-evaluable conditions that would falsify the thesis."
      - type: look.Horizon
        look.source: wv.invalidationCondition

