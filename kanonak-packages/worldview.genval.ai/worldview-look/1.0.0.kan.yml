      <text x="200" y="344" text-anchor="middle" font-size="28" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">EVIDENCE</text>
    look.tierCard: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <text x="36" y="52" font-size="12" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">EVIDENCE</text>
      <svg x="36" y="68" width="116" height="116" viewBox="0 0 24 24" color="var(--kan-accent)">{{svg:wv.evidenceStrength/wv.iconGlyph}}</svg>
      <text x="172" y="132" font-size="40" font-weight="700" fill="var(--kan-text)" font-family="var(--kan-font-display)">{{wv.evidenceStrength/rdfs.label}}</text>
      <text x="172" y="166" font-size="15" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">SIGNAL STRENGTH</text>
      <text x="36" y="266" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">SOURCE</text>
      <text x="36" y="298" font-size="20" font-weight="600" fill="var(--kan-text)">{{wv.citationSource/src.sourceName}}</text>
    look.tierFull: |
      <rect x="0" y="0" width="400" height="400" rx="14" fill="var(--kan-bg-card)" stroke="var(--kan-border)" stroke-width="2"/>
      <text x="24" y="44" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">EVIDENCE</text>
      <svg x="24" y="60" width="108" height="108" viewBox="0 0 24 24" color="var(--kan-accent)">{{svg:wv.evidenceStrength/wv.iconGlyph}}</svg>
      <text x="150" y="118" font-size="36" font-weight="700" fill="var(--kan-text)" font-family="var(--kan-font-display)">{{wv.evidenceStrength/rdfs.label}}</text>
      <text x="150" y="150" font-size="14" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">SIGNAL STRENGTH</text>
      <text x="24" y="226" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">SOURCE</text>
      <text x="24" y="258" font-size="20" font-weight="600" fill="var(--kan-text)">{{wv.citationSource/src.sourceName}}</text>
      <text x="24" y="318" font-size="11" fill="var(--kan-text-dim)" font-family="var(--kan-font-mono)">TYPE</text>
      <text x="24" y="346" font-size="16" font-weight="600" fill="var(--kan-text)">{{rdfs.type}}</text>
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: wv.evidenceStatement
        look.eyebrow: rdfs.type
        look.badges: wv.evidenceStrength
      - type: look.Diagram
        look.figureTitle: "Provenance — node opacity = source trust"
        look.facets:
          - look.relation: wv.citationSource
            look.encode: look.connector
            look.nodeTier: card
            look.edgeLabel: "published by"
            look.channels:
              - look.mapPath: "src.trustEstimate/est.estimateMean"
                look.to: opacity
      - type: look.Details
        look.skip:
          - wv.evidenceStatement

