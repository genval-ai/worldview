                                                                      type: tx.PropertyRead
                                                                      tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                      tx.readProp: wv.operands
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: ' operands (nested)</span></div>'
                                                            # Threshold grand-operand
                                                            - type: tx.When
                                                              tx.condition:
                                                                type: tx.IsSet
