                                                                  type: tx.PropertyRead
                                                                  tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                  tx.readProp: wv.observable
                                                              tx.thenBuild:
                                                                type: tx.Concat
                                                                tx.parts:
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: '<div class="cond cond-threshold"><span class="cond-type">Threshold</span> <span class="resource"><code class="cond-observable">'
                                                                  - type: tx.PropertyRead
                                                                    tx.readSource:
