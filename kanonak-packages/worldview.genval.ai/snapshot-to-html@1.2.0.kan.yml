                                                  tx.readProp: fin.forecastValue
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</span></li>'

                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
                                              tx.checkExpr:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource:
                                                    type: tx.VarRef
                                                    tx.varName: evRef
                                                tx.readProp: fin.forecastHorizon
                                            tx.thenBuild:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<li class="ev-fact"><span class="ev-fact-label">Horizon</span><span class="ev-fact-value resource">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
