snapshot-to-html:
  type: Package
  publisher: worldview.genval.ai
  version: 1.2.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.11.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
        - package: site
          match: ^
          version: 1.0.0
          alias: site
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.0.0
          alias: wv
        - package: finance
          match: ^
          version: 1.0.0
          alias: fin
        - package: visual
          match: ^
          version: 1.0.0
          alias: vis
        - package: pages
          match: ^
          version: 1.1.0
          alias: pages

# =============================================================================
# WorldviewSnapshot -> single-page HTML + paired stylesheet.
#
# 1.2.0 migration notes:
#
#   - The hero narrative is now rendered with `tx.RenderMarkdown`
#     (transformations@3.11.0) instead of a plain `tx.PropertyRead`.
#     `wv.narrative` is a `prose.Markdown` value as of core@1.1.0, so the
#     hero now renders basic markdown formatting AND turns embedded
#     `[[references]]` into canonical-URL hyperlinks. The wrapping element
#     changed from `<p class="hero-narrative">` to
#     `<div class="hero-narrative">` because the rendered markdown emits
#     its own block-level elements (`<p>`, `<h2>`, ...). Snapshots whose
#     `narrative` is still plain text render unchanged (Markdown is a
#     subtype of xsd.string).
#
# 1.1.0 migration notes:
#
#   - CSS is now externalised. The HTML transformation emits a
#     `<link rel="stylesheet" href="snapshot.css">` and the paired
#     `snapshot-stylesheet` InstanceTransformation (below) produces the
#     `.css` artifact by composing `pages.worldview-chrome-fragment`
#     (publisher chrome) with the snapshot-specific CSS rules that
#     used to live in the inline `<style>` block. `pages@1.1.0`
#     binds (formats.stylesheet, default) on wv.WorldviewSnapshot at
#     `snapshot-stylesheet`, so `kanonak site build` materialises both
#     `.html` and `.css` per snapshot in the same output directory.
#
#   - The legacy `.scripts/add-resource-tooltips.py` YAML mutator was
#     retired in 1.1.0. Its output (the hand-rolled
#     `<span class="resource"><code>label</code><span class="resource-tip">
#     comment</span></span>` chain at every typed-reference render site)
#     is already committed in this file, so deleting the script is
#     functionally a no-op. New reference renders should follow the
#     same pattern.
#
#   - **Phase 4b (native `docast.ResourceLink` + `docast.linkTooltip`)
#     was evaluated and declined.** Two reasons:
#       1. Architecture mismatch. This transformation builds the entire
#          body as one `RawBlock(text/html)` (giant `tx.join("",
#          tx.concat(...))`). `ResourceLink` is an inline AST node;
#          using it natively would require breaking the RawBlock into
#          a structural docast tree (Document → Paragraph → ResourceLink
#          → ...), which loses the pixel-level control over SVG
#          confidence bars, condition-graph topology, mini-timeline
#          geometry, and other inline visualizations this transformation
#          relies on.
#       2. Visual regression. `docast.linkTooltip` renders as a native
#          HTML `title=""` attribute — a small, unstyled, browser-
#          default popup. The current `.resource > .resource-tip` is a
#          dark-themed card with soft shadow, 320px width, multi-line
#          text, and arrow pointer. Switching would be a visible
#          downgrade for readers.
#     Net: the hand-rolled tooltip pattern stays. The `--kan-*` chrome-
#     fragment variable bridge means a future Kanonak Browser viewing
#     these pages still gets reasonable defaults if its host stylesheet
#     binds `--kan-link-color` etc., but the resource cards are
#     publisher-specific and worth keeping.
#
# Each wv.WorldviewSnapshot input emits:
#   - HTML artifact (snapshot.html) — the page itself
#   - CSS artifact (snapshot.css)   — paired stylesheet, this package
#
# HTML content:
#   - dynamically-sized SVG confidence bars (raw 0..1 value -> bar fill)
#   - per-thesis cards with progressive disclosure (<details>) for
#     invalidation conditions + supporting evidence
#   - type-specific evidence facts via is-set checks (no type branching;
#     each subclass field is rendered when present)
#   - evidence type / status / strength humanized via CSS pseudo-element
#     content keyed on uri-name segments (no arithmetic / no comparisons
#     in the DSL, so categorical encoding via uri-name + CSS is the
#     mechanism)
#   - confidenceRationale (when authored) rendered below confidence
#   - previousSnapshot (when set) rendered as a header navigation hint
#
# The structured `invalidationCondition` (a Condition subclass tree) is
# rendered as a typed nested visualization via two ExpressionFragments
# (render-cond-d0 / render-cond-d1) that handle subclass dispatch and
# bounded recursion. d0 recurses via d1 for nested operands; d1 is
# leaf-rendering with type-name indicators for any further nesting.
# Together they cover depth-2 trees, which is enough for every
# invalidationCondition shape in the example packages today.
#
# The whole body is one text-html RawBlock built via a single
# tx.join("",  tx.concat(...))  expression. The HTML backend passes
# text/html RawBlocks through verbatim, which is how this transformation
# attains pixel-level control over layout, type, and SVG geometry.
# =============================================================================



snapshot-to-html-transformation:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: wv.WorldviewSnapshot
    tx.requires:
      - wv.observedAt
      - wv.narrative
      - wv.hasThesis

  tx.artifactName:
    type: tx.StringLiteral
    tx.stringLiteral: snapshot

  tx.outputs:
    - tx.html

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      # =========================================================
      # METADATA — read by the HTML backend for the <title> tag.
      # Composed as "Worldview &middot; <observedAt> &middot;
      # worldview.genval.ai" so each snapshot's browser-tab title
      # carries its observation date.
      # =========================================================
      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: title
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.Join
                                tx.separator: ""
                                tx.source:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: "Worldview · "
                                    - type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.VarRef
                                        tx.varName: input
                                      tx.readProp: wv.observedAt
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · worldview.genval.ai"

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        # =====================================================
                        # STYLESHEET LINK + INLINE SVG DEFS
                        # External CSS is materialized by `snapshot-stylesheet`
                        # at the sibling path `snapshot.css` — both artifacts
                        # land in the same output directory per
                        # WorldviewSnapshot, so the path-relative href resolves
                        # under static-site export and any future Kanonak
                        # Browser viewer. The stylesheet itself pulls
                        # `pages.worldview-chrome-fragment` then appends the
                        # snapshot-page CSS that previously lived inline here.
                        # The svg-defs block stays inline because the
                        # `<defs>` are referenced by per-thesis confidence
                        # bars rendered later in the same document.
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <link rel="stylesheet" href="snapshot.css">
                            <svg class="svg-defs" aria-hidden="true"><defs><linearGradient id="conf-gradient" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0ea5e9"/><stop offset="0.5" stop-color="#7dd3fc"/><stop offset="1" stop-color="#34d399"/></linearGradient></defs></svg>

                        # =====================================================
                        # SITE NAV + ARTICLE OPEN + HERO
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <nav class="site-nav">
                            <div class="site-nav-inner">
                            <a href="/" class="site-nav-brand">worldview.genval.ai</a>
                            <ul class="site-nav-links">
                            <li><a href="/">Latest</a></li>
                            <li><a href="/snapshots/">Snapshots</a></li>
                            <li><a href="/timeline/">Timeline</a></li>
                            <li><a href="/changes/">Changes</a></li>
                            <li><a href="/horizon/">Horizon</a></li>
                            <li><a href="/about/">About</a></li>
                            </ul>
                            </div>
                            </nav>
                            <article class="snapshot" data-snapshot-uri="
                        - type: tx.SubjectUri
                          tx.subjectOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ">
                            <header class="hero">
                            <div class="hero-meta">
                            <span class="eyebrow">Worldview Snapshot</span>
                            <span class="snapshot-version hero-version">v
                        - type: tx.UriVersion
                          tx.uriVersionOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </span>
                            <time datetime="
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: wv.observedAt
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: wv.observedAt
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </time>
                            </div>
                            <h1>
                        - type: tx.Fallback
                          tx.primary:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: rdfs.label
                          tx.alternate:
                            type: tx.StringLiteral
                            tx.stringLiteral: Worldview
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </h1>
                            <div class="hero-narrative">
                        - type: tx.RenderMarkdown
                          tx.renderSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.renderProp: wv.narrative
                          tx.renderFormat: tx.render-html
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            </div>

                        # --- previousSnapshot link (optional) ---
                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: wv.previousSnapshot
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<p class="hero-prev">&larr; Previous snapshot: '
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.VarRef
                                    tx.varName: input
                                  tx.readProp: wv.previousSnapshot
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</p>'

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            </header>

                        # =====================================================
                        # THESIS RAIL ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â one chip per thesis with mini bar
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <ol class="thesis-rail">
                        - type: tx.ForEach
                          tx.source:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: wv.hasThesis
                          tx.loopVar: thesisRef
                          tx.emit:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<li><a href="#thesis-'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.VarRef
                                  tx.varName: thesisRef
                              - type: tx.StringLiteral
                                tx.stringLiteral: '"><span class="rail-bar"><svg viewBox="0 0 1 1" preserveAspectRatio="none"><rect x="0" y="0" width="'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.VarRef
                                    tx.varName: thesisRef
                                tx.readProp: wv.confidence
                              - type: tx.StringLiteral
                                tx.stringLiteral: '" height="1" class="rail-fill"/></svg></span><span class="rail-label">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.VarRef
                                    tx.varName: thesisRef
                                tx.readProp: rdfs.label
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  </span></a></li>
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            </ol>

                        # =====================================================
                        # EVIDENCE SWARM ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â one dot per (thesis, evidence)
                        # Visualizes evidence-by-strength gestalt without
                        # arithmetic; sheer count is the chart.
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <section class="evidence-swarm">
                            <h2>Evidence at a glance</h2>
                            <p class="swarm-sub">One mark per supporting evidence item across all theses, colored by strength.</p>
                            <div class="swarm-grid">
                        - type: tx.ForEach
                          tx.source:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: wv.hasThesis
                          tx.loopVar: thesisRefSwarm
                          tx.emit:
                            type: tx.ForEach
                            tx.source:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.ResolveRef
                                tx.resolveSource:
                                  type: tx.VarRef
                                  tx.varName: thesisRefSwarm
                              tx.readProp: wv.supportingEvidence
                            tx.loopVar: evRefSwarm
                            tx.emit:
                              type: tx.Concat
                              tx.parts:
                                - type: tx.StringLiteral
                                  tx.stringLiteral: '<span class="swarm-dot s-'
                                - type: tx.UriName
                                  tx.uriNameOf:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.ResolveRef
                                      tx.resolveSource:
                                        type: tx.VarRef
                                        tx.varName: evRefSwarm
                                    tx.readProp: wv.evidenceStrength
                                - type: tx.StringLiteral
                                  tx.stringLiteral: '" title="'
                                - type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.ResolveRef
                                    tx.resolveSource:
                                      type: tx.VarRef
                                      tx.varName: evRefSwarm
                                  tx.readProp: wv.evidenceStatement
                                - type: tx.StringLiteral
                                  tx.stringLiteral: '"></span>'
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            </div>
                            <ul class="swarm-legend">
                            <li><span class="dot" style="background:var(--strong)"></span>Strong</li>
                            <li><span class="dot" style="background:var(--moderate)"></span>Moderate</li>
                            <li><span class="dot" style="background:var(--weak)"></span>Weak</li>
                            </ul>
                            </section>

                        # =====================================================
                        # THESES SECTION
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <section class="theses">
                            <h2 class="section-title">Theses</h2>
                            <p class="section-lead">Each thesis below carries a machine-evaluable <code>invalidationCondition</code> — a typed condition tree (<code>AND</code> / <code>OR</code> / <code>Threshold</code> / <code>Event</code> / <code>Sequenced</code>) that defines exactly when the claim should be considered broken — plus typed, citation-backed Evidence. Click a thesis's <em>Supporting evidence</em> to see the audit trail behind the confidence.</p>

                        - type: tx.ForEach
                          tx.source:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: wv.hasThesis
                          tx.loopVar: thesisRefMain
                          tx.emit:
                            type: tx.Concat
                            tx.parts:

                              # --- CARD OPEN ---
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<article class="thesis-card status-'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.ResolveRef
                                    tx.resolveSource:
                                      type: tx.VarRef
                                      tx.varName: thesisRefMain
                                  tx.readProp: wv.status
                              - type: tx.StringLiteral
                                tx.stringLiteral: '" id="thesis-'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.VarRef
                                  tx.varName: thesisRefMain
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  ">

                              # --- THESIS CARD VISUAL (links to standalone thesis page) ---
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<a class="thesis-card-visual" href="'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.VarRef
                                  tx.varName: thesisRefMain
                              - type: tx.StringLiteral
                                tx.stringLiteral: '" aria-label="Thesis card"><img src="'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.VarRef
                                  tx.varName: thesisRefMain
                              - type: tx.StringLiteral
                                tx.stringLiteral: '.svg" alt="" loading="lazy"/></a>'

                              # --- HEADER (icon + label + status pill) ---
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  <header class="thesis-header">
                                  <span class="thesis-icon" data-confidence="
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.VarRef
                                    tx.varName: thesisRefMain
                                tx.readProp: wv.confidence
                              - type: tx.StringLiteral
                                tx.stringLiteral: '" data-theme-hue="'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.ResolveRef
                                      tx.resolveSource:
                                        type: tx.VarRef
                                        tx.varName: thesisRefMain
                                    tx.readProp: vis.thesisTheme
                                tx.readProp: vis.themeHue
                              - type: tx.StringLiteral
                                tx.stringLiteral: '" data-status="'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.ResolveRef
                                    tx.resolveSource:
                                      type: tx.VarRef
                                      tx.varName: thesisRefMain
                                  tx.readProp: wv.status
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  "></span>
                                  <h3 class="thesis-label">
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.VarRef
                                    tx.varName: thesisRefMain
                                tx.readProp: rdfs.label
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  </h3>
                                  <span class="status-pill status-
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.ResolveRef
                                    tx.resolveSource:
                                      type: tx.VarRef
                                      tx.varName: thesisRefMain
                                  tx.readProp: wv.status
                              - type: tx.StringLiteral
                                tx.stringLiteral: '">'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.ResolveRef
                                    tx.resolveSource:
                                      type: tx.VarRef
                                      tx.varName: thesisRefMain
                                  tx.readProp: wv.status
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  </span>
                                  <span class="ev-count-chip" data-thesis-name="
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.VarRef
                                  tx.varName: thesisRefMain
                              - type: tx.StringLiteral
                                tx.stringLiteral: '"><span class="ev-count-num">'
                              - type: tx.Count
                                tx.source:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.ResolveRef
                                    tx.resolveSource:
                                      type: tx.VarRef
                                      tx.varName: thesisRefMain
                                  tx.readProp: wv.supportingEvidence
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  </span><span class="ev-count-label">evidence</span></span>
                                  </header>

                              # --- CONFIDENCE STRIP (SVG bar with gradient) ---
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  <div class="confidence-strip">
                                  <div class="confidence-meter">
                                  <svg viewBox="0 0 1 1" preserveAspectRatio="none"><rect x="0" y="0" width="
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.VarRef
                                    tx.varName: thesisRefMain
                                tx.readProp: wv.confidence
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  " height="1" class="conf-fill"/></svg>
                                  </div>
                                  <span class="confidence-label">Conf <span class="conf-value">
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.VarRef
                                    tx.varName: thesisRefMain
                                tx.readProp: wv.confidence
                              - type: tx.StringLiteral
                                tx.stringLiteral: |
                                  </span></span>
                                  </div>

                              # --- CONFIDENCE RATIONALE (optional, new in this version) ---
                              - type: tx.When
                                tx.condition:
                                  type: tx.IsSet
                                  tx.checkExpr:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.ResolveRef
                                      tx.resolveSource:
                                        type: tx.VarRef
                                        tx.varName: thesisRefMain
                                    tx.readProp: wv.confidenceRationale
                                tx.thenBuild:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '<p class="confidence-rationale"><span class="rationale-label">Why this confidence:</span> '
                                    - type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.ResolveRef
                                        tx.resolveSource:
                                          type: tx.VarRef
                                          tx.varName: thesisRefMain
                                      tx.readProp: wv.confidenceRationale
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '</p>'

                              # --- STATEMENT ---
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<p class="thesis-statement">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.VarRef
                                    tx.varName: thesisRefMain
                                tx.readProp: wv.thesisStatement
                              - type: tx.StringLiteral
                                tx.stringLiteral: |
                                  </p>

                              # --- INVALIDATION (structured tree) ---
                              # Renders the Condition tree via two recursive
                              # ExpressionFragments (render-cond-d0 / d1)
                              # defined at the top of this package. d0 is
                              # the top-level call; it dispatches on subclass
                              # and recurses via d1 for nested operands. d1
                              # renders without recursion (type-name + key
                              # fields). Together they cover depth-2 trees,
                              # which is enough for every invalidationCondition
                              # shape in the example packages.
                              - type: tx.When
                                tx.condition:
                                  type: tx.IsSet
                                  tx.checkExpr:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.ResolveRef
                                      tx.resolveSource:
                                        type: tx.VarRef
                                        tx.varName: thesisRefMain
                                    tx.readProp: wv.invalidationCondition
                                tx.thenBuild:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: |-
                                        <details class="invalidation" open>
                                        <summary>Invalidation condition</summary>
                                        <div class="invalidation-content">
                                        <div class="cond-tree">

                                    # ===== TOP-LEVEL DISPATCH =====
                                    # Each tx.When checks a property unique to one
                                    # Condition subclass. The PropertyRead chain
                                    # reads from thesis.invalidationCondition each
                                    # time. For And/Or we ForEach over operands
                                    # with loopVar=cond and inline a leaf dispatch
                                    # (same 9-branch structure but reading via
                                    # var-ref(cond)).

                                    # AndCondition / OrCondition - top level
                                    - type: tx.When
                                      tx.condition:
                                        type: tx.IsSet
                                        tx.checkExpr:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
                                            tx.readProp: wv.invalidationCondition
                                          tx.readProp: wv.operands
                                      tx.thenBuild:
                                        type: tx.Concat
                                        tx.parts:
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<div class="cond cond-bool"><span class="cond-type">'
                                          - type: tx.UriName
                                            tx.uriNameOf:
                                              type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
                                                tx.readProp: wv.invalidationCondition
                                              tx.readProp: rdfs.type
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '</span> <span class="cond-summary">'
                                          - type: tx.Count
                                            tx.source:
                                              type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
                                                tx.readProp: wv.invalidationCondition
                                              tx.readProp: wv.operands
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: ' operands</span><ul class="cond-operands">'

                                          # ForEach over operands (loopVar=cond)
                                          # Each operand renders via the LEAF dispatch.
                                          - type: tx.ForEach
                                            tx.source:
                                              type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
                                                tx.readProp: wv.invalidationCondition
                                              tx.readProp: wv.operands
                                            tx.loopVar: cond
                                            tx.emit:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<li>'

                                                # ===== LEAF DISPATCH (reads from cond) =====

                                                # And/Or as operand: type + count + ForEach over grand-operands.
                                                # Grand-operands rendered with terminal-level dispatch
                                                # (leaf nodes get full detail; further-nested And/Or
                                                # collapses to type + count again).
                                                - type: tx.When
                                                  tx.condition:
                                                    type: tx.IsSet
                                                    tx.checkExpr:
                                                      type: tx.PropertyRead
                                                      tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                      tx.readProp: wv.operands
                                                  tx.thenBuild:
                                                    type: tx.Concat
                                                    tx.parts:
                                                      - type: tx.StringLiteral
                                                        tx.stringLiteral: '<div class="cond cond-bool"><span class="cond-type">'
                                                      - type: tx.UriName
                                                        tx.uriNameOf:
                                                          type: tx.PropertyRead
                                                          tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                          tx.readProp: rdfs.type
                                                      - type: tx.StringLiteral
                                                        tx.stringLiteral: '</span> <span class="cond-summary">'
                                                      - type: tx.Count
                                                        tx.source:
                                                          type: tx.PropertyRead
                                                          tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                          tx.readProp: wv.operands
                                                      - type: tx.StringLiteral
                                                        tx.stringLiteral: ' operands</span><ul class="cond-operands">'
                                                      - type: tx.ForEach
                                                        tx.source:
                                                          type: tx.PropertyRead
                                                          tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                          tx.readProp: wv.operands
                                                        tx.loopVar: cond
                                                        tx.emit:
                                                          type: tx.Concat
                                                          tx.parts:
                                                            - type: tx.StringLiteral
                                                              tx.stringLiteral: '<li>'
                                                            # Grand-operand: terminal dispatch
                                                            # (And/Or further-nested → count only)
                                                            - type: tx.When
                                                              tx.condition:
                                                                type: tx.IsSet
                                                                tx.checkExpr:
                                                                  type: tx.PropertyRead
                                                                  tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                  tx.readProp: wv.operands
                                                              tx.thenBuild:
                                                                type: tx.Concat
                                                                tx.parts:
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: '<div class="cond cond-bool"><span class="cond-type">'
                                                                  - type: tx.UriName
                                                                    tx.uriNameOf:
                                                                      type: tx.PropertyRead
                                                                      tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                      tx.readProp: rdfs.type
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: '</span> <span class="cond-summary">'
                                                                  - type: tx.Count
