                                                                      type: tx.ResolveRef
                                                                      tx.resolveSource:
                                                                        type: tx.PropertyRead
                                                                        tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                        tx.readProp: wv.left
                                                                    tx.readProp: rdfs.comment
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: '</span></span> <em class="cond-comparator">'
                                                                  - type: tx.UriName
                                                                    tx.uriNameOf:
                                                                      type: tx.PropertyRead
                                                                      tx.readSource: { type: tx.VarRef, tx.varName: cond }
