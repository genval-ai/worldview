                                            tx.stringLiteral: '<div class="cond cond-event"><span class="cond-type">Event</span> <span class="resource"><code class="cond-event-id">'
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
                                                  tx.readProp: wv.invalidationCondition
                                                tx.readProp: wv.event
                                            tx.readProp: rdfs.label
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '</code><span class="resource-tip">'
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
