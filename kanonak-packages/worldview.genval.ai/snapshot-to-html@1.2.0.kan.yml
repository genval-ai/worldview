                                      tx.readSource:
                                        type: tx.ResolveRef
                                        tx.resolveSource:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.ResolveRef
                                            tx.resolveSource:
                                              type: tx.VarRef
                                              tx.varName: thesisRefMain
                                          tx.readProp: vis.thesisTheme
                                      tx.readProp: vis.themeHue
