                                                        tx.readSource:
                                                          type: tx.ResolveRef
                                                          tx.resolveSource:
                                                            type: tx.PropertyRead
                                                            tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                            tx.readProp: wv.indicator
                                                        tx.readProp: rdfs.comment
                                                      - type: tx.StringLiteral
                                                        tx.stringLiteral: '</span></span></div>'

                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</li>'
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '</ul></div>'

                                    # Top-level Threshold (rare, but supported)
                                    - type: tx.When
                                      tx.condition:
                                        type: tx.IsSet
                                        tx.checkExpr:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
                                            tx.readProp: wv.invalidationCondition
                                          tx.readProp: wv.observable
                                      tx.thenBuild:
                                        type: tx.Concat
                                        tx.parts:
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<div class="cond cond-threshold"><span class="cond-type">Threshold</span> <span class="resource"><code class="cond-observable">'
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource: { type: tx.VarRef, tx.varName: thesisRefMain }
                                                  tx.readProp: wv.invalidationCondition
                                                tx.readProp: wv.observable
                                            tx.readProp: rdfs.label
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '</code><span class="resource-tip">'
