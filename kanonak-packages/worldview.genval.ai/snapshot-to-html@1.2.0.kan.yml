                                                                        type: tx.PropertyRead
                                                                        tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                        tx.readProp: wv.persistence
                                                                    tx.thenBuild:
                                                                      type: tx.Concat
                                                                      tx.parts:
                                                                        - type: tx.StringLiteral
                                                                          tx.stringLiteral: ' <span class="cond-persistence">over '
                                                                        - type: tx.PropertyRead
                                                                          tx.readSource:
                                                                            type: tx.PropertyRead
                                                                            tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                            tx.readProp: wv.persistence
                                                                          tx.readProp: wv.duration
                                                                        - type: tx.StringLiteral
                                                                          tx.stringLiteral: ' '
                                                                        - type: tx.UriName
                                                                          tx.uriNameOf:
                                                                            type: tx.PropertyRead
                                                                            tx.readSource:
                                                                              type: tx.PropertyRead
                                                                              tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                              tx.readProp: wv.persistence
                                                                            tx.readProp: wv.windowUnit
                                                                        - type: tx.StringLiteral
                                                                          tx.stringLiteral: '</span>'
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: '</div>'
                                                            # IndicatorComparison grand-operand
                                                            - type: tx.When
                                                              tx.condition:
                                                                type: tx.IsSet
                                                                tx.checkExpr:
                                                                  type: tx.PropertyRead
                                                                  tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                  tx.readProp: wv.left
                                                              tx.thenBuild:
                                                                type: tx.Concat
                                                                tx.parts:
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: '<div class="cond cond-comparison"><span class="cond-type">IndicatorComparison</span> <span class="resource"><code class="cond-left">'
                                                                  - type: tx.PropertyRead
                                                                    tx.readSource:
                                                                      type: tx.ResolveRef
                                                                      tx.resolveSource:
                                                                        type: tx.PropertyRead
                                                                        tx.readSource: { type: tx.VarRef, tx.varName: cond }
                                                                        tx.readProp: wv.left
                                                                    tx.readProp: rdfs.label
                                                                  - type: tx.StringLiteral
                                                                    tx.stringLiteral: '</code><span class="resource-tip">'
                                                                  - type: tx.PropertyRead
