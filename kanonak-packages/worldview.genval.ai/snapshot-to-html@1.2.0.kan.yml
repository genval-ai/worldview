                                        tx.readSource:
                                          type: tx.ResolveRef
                                          tx.resolveSource:
                                            type: tx.VarRef
                                            tx.varName: thesisRefMain
                                        tx.readProp: wv.supportingEvidence
                                      tx.loopVar: evRef
                                      tx.emit:
                                        type: tx.Concat
                                        tx.parts:

                                          # ITEM OPEN with strength class + name + observedAt for timeline lookup
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<li class="evidence-item strength-'
                                          - type: tx.UriName
                                            tx.uriNameOf:
                                              type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource:
                                                  type: tx.VarRef
                                                  tx.varName: evRef
                                              tx.readProp: wv.evidenceStrength
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '" data-evidence-name="'
                                          - type: tx.UriName
                                            tx.uriNameOf:
                                              type: tx.VarRef
                                              tx.varName: evRef
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '" data-evidence-observed-at="'
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource:
                                                type: tx.VarRef
                                                tx.varName: evRef
                                            tx.readProp: wv.evidenceObservedAt
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '" data-evidence-type="'
                                          - type: tx.UriName
                                            tx.uriNameOf:
                                              type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource:
                                                  type: tx.VarRef
                                                  tx.varName: evRef
                                              tx.readProp: rdfs.type
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: |-
                                              ">

                                          # HEAD: strength dot + type label + observedAt
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<header class="ev-head"><span class="ev-strength strength-'
                                          - type: tx.UriName
                                            tx.uriNameOf:
                                              type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource:
                                                  type: tx.VarRef
                                                  tx.varName: evRef
                                              tx.readProp: wv.evidenceStrength
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '"></span><span class="ev-type" data-type="'
                                          - type: tx.UriName
                                            tx.uriNameOf:
                                              type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource:
                                                  type: tx.VarRef
                                                  tx.varName: evRef
                                              tx.readProp: rdfs.type
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '"></span>'
                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
                                              tx.checkExpr:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource:
                                                    type: tx.VarRef
                                                    tx.varName: evRef
                                                tx.readProp: wv.evidenceObservedAt
                                            tx.thenBuild:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<time class="ev-time">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.VarRef
                                                      tx.varName: evRef
                                                  tx.readProp: wv.evidenceObservedAt
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</time>'
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: |-
                                              </header>

                                          # STATEMENT
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<p class="ev-statement">'
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource:
                                                type: tx.VarRef
                                                tx.varName: evRef
                                            tx.readProp: wv.evidenceStatement
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: |
                                              </p>

                                          # FACTS LIST ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â every type-specific
                                          # field is a `when is-set` chip.
                                          # Order roughly: who/what/when/value
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<ul class="ev-facts">'

                                          # --- Securities-bearing fields ---
                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
                                              tx.checkExpr:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource:
                                                    type: tx.VarRef
                                                    tx.varName: evRef
                                                tx.readProp: fin.aboutSecurity
                                            tx.thenBuild:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<li class="ev-fact"><span class="ev-fact-label">Security</span><span class="ev-fact-value resource">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.aboutSecurity
                                                  tx.readProp: rdfs.label
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<span class="resource-tip">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.aboutSecurity
                                                  tx.readProp: rdfs.comment
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</span></span></li>'

                                          # --- MarketDataEvidence ---
                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
                                              tx.checkExpr:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource:
                                                    type: tx.VarRef
                                                    tx.varName: evRef
                                                tx.readProp: fin.marketMetric
                                            tx.thenBuild:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<li class="ev-fact"><span class="ev-fact-label">Metric</span><span class="ev-fact-value resource">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.marketMetric
                                                  tx.readProp: rdfs.label
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<span class="resource-tip">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.marketMetric
                                                  tx.readProp: rdfs.comment
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</span></span></li>'

                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
                                              tx.checkExpr:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource:
                                                    type: tx.VarRef
                                                    tx.varName: evRef
                                                tx.readProp: fin.observedValue
                                            tx.thenBuild:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<li class="ev-fact"><span class="ev-fact-label">Value</span><span class="ev-fact-value">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.VarRef
                                                      tx.varName: evRef
                                                  tx.readProp: fin.observedValue
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</span></li>'

                                          # --- AnalystEvidence ---
                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
                                              tx.checkExpr:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource:
                                                    type: tx.VarRef
                                                    tx.varName: evRef
                                                tx.readProp: fin.analystInstitution
                                            tx.thenBuild:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<li class="ev-fact"><span class="ev-fact-label">Source</span><span class="ev-fact-value resource">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.analystInstitution
                                                  tx.readProp: rdfs.label
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<span class="resource-tip">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.analystInstitution
                                                  tx.readProp: rdfs.comment
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</span></span></li>'

                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
                                              tx.checkExpr:
                                                type: tx.PropertyRead
                                                tx.readSource:
                                                  type: tx.ResolveRef
                                                  tx.resolveSource:
                                                    type: tx.VarRef
                                                    tx.varName: evRef
                                                tx.readProp: fin.forecastTarget
                                            tx.thenBuild:
                                              type: tx.Concat
                                              tx.parts:
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<li class="ev-fact"><span class="ev-fact-label">Target</span><span class="ev-fact-value resource">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.forecastTarget
                                                  tx.readProp: rdfs.label
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '<span class="resource-tip">'
                                                - type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource:
                                                      type: tx.PropertyRead
                                                      tx.readSource:
                                                        type: tx.ResolveRef
                                                        tx.resolveSource:
                                                          type: tx.VarRef
                                                          tx.varName: evRef
                                                      tx.readProp: fin.forecastTarget
                                                  tx.readProp: rdfs.comment
                                                - type: tx.StringLiteral
                                                  tx.stringLiteral: '</span></span></li>'

                                          - type: tx.When
                                            tx.condition:
                                              type: tx.IsSet
