                                            tx.stringLiteral: '</div>'

                                    - type: tx.StringLiteral
                                      tx.stringLiteral: |
                                        </div>
                                        <div class="cond-graph" aria-hidden="true"></div>
                                        </div>
                                        </details>

                              # --- SUPPORTING EVIDENCE (collapsible, open default) ---
                              - type: tx.When
                                tx.condition:
                                  type: tx.IsSet
                                  tx.checkExpr:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.ResolveRef
                                      tx.resolveSource:
                                        type: tx.VarRef
                                        tx.varName: thesisRefMain
                                    tx.readProp: wv.supportingEvidence
                                tx.thenBuild:
                                  type: tx.Concat
                                  tx.parts:
                                    # Wrapper section opens here so the heading + timeline + collapsible
                                    # card list all sit visually inside one Supporting evidence block.
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: |-
                                        <section class="evidence-section">
                                        <h4 class="ev-section-heading">Supporting evidence</h4>

                                    # Always-visible per-thesis mini timeline. Populated by inline JS
                                    # that walks the rendered evidence-item LIs for date + strength.
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '<div class="ev-timeline-mini" data-thesis-name="'
                                    - type: tx.UriName
                                      tx.uriNameOf:
                                        type: tx.VarRef
                                        tx.varName: thesisRefMain
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '" data-theme-hue="'
