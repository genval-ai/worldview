changes:
  type: Package
  publisher: worldview.genval.ai
  version: 1.1.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.10.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
        - package: site
          match: ^
          version: 1.0.0
          alias: site
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.0.0
          alias: wv
        - package: pages
          match: ^
          version: 1.1.0
          alias: pages

# =============================================================================
# Diff-centric view of worldview evolution.
#
# Multi-scope SetTransformation walks every published snapshot in scope
# (sorted ascending by observedAt) and emits per-(snapshot, thesis) data
# blocks with confidence, status, rationale, and the supportingEvidence
# list. Inline JS reads the embedded data, computes consecutive-pair
# diffs (Δ confidence, evidence set-difference, status transitions,
# theses added / retired), and renders the diff log newest-first.
#
# This is the second non-list aggregate view, complementing /timeline/'s
# trajectory chart with a "what changed and why" log. Together they
# answer: timeline shows the SHAPE of worldview evolution; changes
# explains the MECHANICS of each step.
# =============================================================================

changes-transformation:
  type: tx.SetTransformation

  tx.inputPattern:
    tx.matchesClass: wv.WorldviewSnapshot
    tx.sortBy:
      - tx.byProperty: wv.observedAt
        tx.order: tx.ascending

  tx.artifactName:
    type: tx.StringLiteral
    tx.stringLiteral: index

  tx.outputs:
    - tx.html

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      # =========================================================
      # METADATA - HTML <title>
      # =========================================================
      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: title
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.StringLiteral
                                tx.stringLiteral: 'Changes · worldview.genval.ai'

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        # =====================================================
                        # STYLESHEET LINK
                        # External CSS materialized by `changes-stylesheet`
                        # at sibling path `index.css` under the changes/
                        # output directory.
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <link rel="stylesheet" href="index.css">

                        # =====================================================
                        # SITE NAV
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <nav class="site-nav">
                            <div class="site-nav-inner">
                            <a href="/" class="site-nav-brand">worldview.genval.ai</a>
                            <ul class="site-nav-links">
                            <li><a href="/">Latest</a></li>
                            <li><a href="/snapshots/">Snapshots</a></li>
                            <li><a href="/timeline/">Timeline</a></li>
                            <li><a href="/changes/" class="active">Changes</a></li>
                            <li><a href="/horizon/">Horizon</a></li>
                            <li><a href="/about/">About</a></li>
                            </ul>
                            </div>
                            </nav>

                        # =====================================================
                        # ARTICLE OPEN + HERO + STATUS TRANSITIONS HEADER
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <article class="changes">
                            <header class="intro">
                            <span class="eyebrow">Changes</span>
                            <h1>What changed between versions</h1>
                            <p class="lead">Diff between consecutive published snapshots. Each entry surfaces confidence shifts, the author's rationale for the change, and the new typed Evidence that landed alongside it &mdash; mechanically connecting the WHAT moved to the WHY.</p>
                            </header>
                            <section class="transitions">
                            <h2 class="section-title">Status transitions</h2>
                            <ul class="diff-changes">

                        # =====================================================
                        # STATUS TRANSITIONS BODY
                        # For each consecutive pair (prev, curr) and each thesis
                        # common to both, when prev.status != curr.status, emit
                        # a transition row. Iteration goes oldest-first
                        # (matches the falsifiability narrative: events appear
                        # in the order they happened).
                        # =====================================================
                        - type: tx.Join
                          tx.separator: ""
                          tx.source:
                            type: tx.PairwiseMap
                            tx.source: { type: tx.VarRef, tx.varName: inputs }
                            tx.firstVar: prev
                            tx.secondVar: curr
                            tx.pairBody:
                              type: tx.ForEach
                              tx.source:
                                type: tx.PropertyRead
                                tx.readSource: { type: tx.VarRef, tx.varName: curr }
                                tx.readProp: wv.hasThesis
                              tx.loopVar: currThesisRef
                              tx.emit:
                                type: tx.When
                                # Common to prev + curr?
                                tx.condition:
                                  type: tx.Contains
                                  tx.haystack:
                                    type: tx.PropertyRead
                                    tx.readSource: { type: tx.VarRef, tx.varName: prev }
                                    tx.readProp: wv.hasThesis
                                  tx.needle: { type: tx.VarRef, tx.varName: currThesisRef }
                                tx.thenBuild:
                                  type: tx.When
                                  # Status differs? Compare the URIs of the two
                                  # status values. UriName flattens both sides
                                  # to local-name strings so Equals does a
                                  # straight string compare.
                                  tx.condition:
                                    type: tx.Not
                                    tx.operand:
                                      type: tx.Equals
                                      tx.compareLeft:
                                        # prev's status URI name: lookup prev thesis
                                        # ref by URI in prev.hasThesis, ResolveRef,
                                        # read wv.status, take its UriName.
                                        type: tx.UriName
                                        tx.uriNameOf:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.ResolveRef
                                            tx.resolveSource:
                                              type: tx.ListItemAt
                                              tx.source:
                                                type: tx.Filter
                                                tx.source:
                                                  type: tx.PropertyRead
                                                  tx.readSource: { type: tx.VarRef, tx.varName: prev }
                                                  tx.readProp: wv.hasThesis
                                                tx.loopVar: prevRef
                                                tx.predicate:
                                                  type: tx.Equals
                                                  tx.compareLeft: { type: tx.VarRef, tx.varName: prevRef }
                                                  tx.compareRight: { type: tx.VarRef, tx.varName: currThesisRef }
                                              tx.itemIndex: { type: tx.IntegerLiteral, tx.integerLiteral: 0 }
                                          tx.readProp: wv.status
                                      tx.compareRight:
                                        # curr's status URI name: ResolveRef directly
                                        # on currThesisRef, read wv.status, take UriName.
                                        type: tx.UriName
                                        tx.uriNameOf:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.ResolveRef
                                            tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                          tx.readProp: wv.status
                                  tx.thenBuild:
                                    # Statuses differ — emit the transition row
                                    type: tx.Concat
                                    tx.parts:
                                      - type: tx.StringLiteral
                                        tx.stringLiteral: '<li class="diff-change"><div class="diff-change-header"><span class="change-thesis-label"><img class="thesis-icon-inline" src="/snapshot/'
                                      - type: tx.UriVersion
                                        tx.uriVersionOf: { type: tx.VarRef, tx.varName: currThesisRef }
                                      - type: tx.StringLiteral
                                        tx.stringLiteral: '/'
                                      - type: tx.UriName
                                        tx.uriNameOf: { type: tx.VarRef, tx.varName: currThesisRef }
                                      - type: tx.StringLiteral
                                        tx.stringLiteral: '.svg" alt="" loading="lazy"/>'
                                      - type: tx.PropertyRead
                                        tx.readSource:
                                          type: tx.ResolveRef
                                          tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                        tx.readProp: rdfs.label
                                      - type: tx.StringLiteral
                                        tx.stringLiteral: '</span><span class="change-shift"><span class="change-status">'
                                      - type: tx.UriName
                                        tx.uriNameOf:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.ResolveRef
                                            tx.resolveSource:
                                              type: tx.ListItemAt
                                              tx.source:
                                                type: tx.Filter
                                                tx.source:
                                                  type: tx.PropertyRead
                                                  tx.readSource: { type: tx.VarRef, tx.varName: prev }
                                                  tx.readProp: wv.hasThesis
                                                tx.loopVar: prevRef
                                                tx.predicate:
                                                  type: tx.Equals
                                                  tx.compareLeft: { type: tx.VarRef, tx.varName: prevRef }
                                                  tx.compareRight: { type: tx.VarRef, tx.varName: currThesisRef }
                                              tx.itemIndex: { type: tx.IntegerLiteral, tx.integerLiteral: 0 }
                                          tx.readProp: wv.status
                                      - type: tx.StringLiteral
                                        tx.stringLiteral: '</span><span class="arrow">&rarr;</span><span class="change-status">'
                                      - type: tx.UriName
                                        tx.uriNameOf:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.ResolveRef
                                            tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                          tx.readProp: wv.status
                                      - type: tx.StringLiteral
                                        tx.stringLiteral: '</span><span class="delta flat" style="background:rgba(248,113,113,0.12);color:var(--danger);border:1px solid rgba(248,113,113,0.3)">v'
                                      - type: tx.UriVersion
                                        tx.uriVersionOf: { type: tx.VarRef, tx.varName: curr }
                                      - type: tx.StringLiteral
                                        tx.stringLiteral: '</span></span></div></li>'

                        # =====================================================
                        # CLOSE TRANSITIONS SECTION + OPEN DIFF LOG
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </ul>
                            </section>
                            <section class="diff-log">
                            <h2 class="section-title">Version pair changes</h2>

                        # =====================================================
                        # DIFF LOG BODY
                        # When < 2 snapshots: empty state. Otherwise: Reverse
                        # over PairwiseMap pairs (newest first) emitting one
                        # <section class="diff-pair"> per pair.
                        # =====================================================
                        - type: tx.When
                          tx.condition:
                            type: tx.LessThan
                            tx.compareLeft:
                              type: tx.Count
                              tx.source: { type: tx.VarRef, tx.varName: inputs }
                            tx.compareRight: { type: tx.IntegerLiteral, tx.integerLiteral: 2 }
                          tx.thenBuild:
                            type: tx.StringLiteral
                            tx.stringLiteral: '<div class="empty-state">Need at least two published snapshots to show diffs.</div>'
                          tx.elseBuild:
                            type: tx.Join
                            tx.separator: ""
                            tx.source:
                              type: tx.Reverse
                              tx.source:
                                type: tx.PairwiseMap
                                tx.source: { type: tx.VarRef, tx.varName: inputs }
                                tx.firstVar: prev
                                tx.secondVar: curr
                                tx.pairBody:
                                  type: tx.Concat
                                  tx.parts:
                                    # Pair section open + header.
                                    # Visual anchor: the prev + curr snapshot SVGs side by side
                                    # let readers see the regime shift before reading the diff.
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '<section class="diff-pair"><header class="diff-pair-header"><div class="diff-pair-visual"><a class="diff-snap-link" href="/snapshot/'
                                    - type: tx.UriVersion
                                      tx.uriVersionOf: { type: tx.VarRef, tx.varName: prev }
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '/view"><img class="diff-snap" src="/snapshot/'
                                    - type: tx.UriVersion
                                      tx.uriVersionOf: { type: tx.VarRef, tx.varName: prev }
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '/view.svg" alt="snapshot before" loading="lazy"/></a><span class="diff-snap-arrow">&rarr;</span><a class="diff-snap-link" href="/snapshot/'
                                    - type: tx.UriVersion
                                      tx.uriVersionOf: { type: tx.VarRef, tx.varName: curr }
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '/view"><img class="diff-snap" src="/snapshot/'
                                    - type: tx.UriVersion
                                      tx.uriVersionOf: { type: tx.VarRef, tx.varName: curr }
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '/view.svg" alt="snapshot after" loading="lazy"/></a></div></header><ul class="diff-changes">'

                                    # New + changed thesis rows (iterate curr.hasThesis)
                                    - type: tx.ForEach
                                      tx.source:
                                        type: tx.PropertyRead
                                        tx.readSource: { type: tx.VarRef, tx.varName: curr }
                                        tx.readProp: wv.hasThesis
                                      tx.loopVar: currThesisRef
                                      tx.emit:
                                        type: tx.When
                                        tx.condition:
                                          type: tx.Contains
                                          tx.haystack:
                                            type: tx.PropertyRead
                                            tx.readSource: { type: tx.VarRef, tx.varName: prev }
                                            tx.readProp: wv.hasThesis
                                          tx.needle: { type: tx.VarRef, tx.varName: currThesisRef }
                                        tx.thenBuild:
                                          # CHANGED row: thesis exists in both prev and curr
                                          type: tx.Concat
                                          tx.parts:
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '<li class="diff-change"><div class="diff-change-header"><span class="change-thesis-label"><img class="thesis-icon-inline" src="/snapshot/'
                                            - type: tx.UriVersion
                                              tx.uriVersionOf: { type: tx.VarRef, tx.varName: currThesisRef }
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '/'
                                            - type: tx.UriName
                                              tx.uriNameOf: { type: tx.VarRef, tx.varName: currThesisRef }
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '.svg" alt="" loading="lazy"/>'
                                            - type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                              tx.readProp: rdfs.label
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '</span><span class="change-shift"><span class="from-conf">'
                                            # prev confidence as percentage
                                            - type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource:
                                                  type: tx.ListItemAt
                                                  tx.source:
                                                    type: tx.Filter
                                                    tx.source:
                                                      type: tx.PropertyRead
                                                      tx.readSource: { type: tx.VarRef, tx.varName: prev }
                                                      tx.readProp: wv.hasThesis
                                                    tx.loopVar: prevRef
                                                    tx.predicate:
                                                      type: tx.Equals
                                                      tx.compareLeft: { type: tx.VarRef, tx.varName: prevRef }
                                                      tx.compareRight: { type: tx.VarRef, tx.varName: currThesisRef }
                                                  tx.itemIndex: { type: tx.IntegerLiteral, tx.integerLiteral: 0 }
                                              tx.readProp: wv.confidence
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '</span><span class="arrow">&rarr;</span><span class="to-conf">'
                                            - type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                              tx.readProp: wv.confidence
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '</span></span></div>'
                                            # Rationale (if set)
                                            - type: tx.When
                                              tx.condition:
                                                type: tx.IsSet
                                                tx.checkExpr:
                                                  type: tx.PropertyRead
                                                  tx.readSource:
                                                    type: tx.ResolveRef
                                                    tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                                  tx.readProp: wv.confidenceRationale
                                              tx.thenBuild:
                                                type: tx.Concat
                                                tx.parts:
                                                  - type: tx.StringLiteral
                                                    tx.stringLiteral: '<p class="change-rationale">'
                                                  - type: tx.PropertyRead
                                                    tx.readSource:
                                                      type: tx.ResolveRef
                                                      tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                                    tx.readProp: wv.confidenceRationale
                                                  - type: tx.StringLiteral
                                                    tx.stringLiteral: '</p>'
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '</li>'
                                        tx.elseBuild:
                                          # NEW row: thesis is only in curr (not in prev)
                                          type: tx.Concat
                                          tx.parts:
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '<li class="diff-change"><div class="diff-change-header"><span class="change-thesis-label"><img class="thesis-icon-inline" src="/snapshot/'
                                            - type: tx.UriVersion
                                              tx.uriVersionOf: { type: tx.VarRef, tx.varName: currThesisRef }
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '/'
                                            - type: tx.UriName
                                              tx.uriNameOf: { type: tx.VarRef, tx.varName: currThesisRef }
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '.svg" alt="" loading="lazy"/>'
                                            - type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                              tx.readProp: rdfs.label
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: ' <span class="new-thesis-badge">new</span></span><span class="change-shift"><span class="to-conf">'
                                            - type: tx.PropertyRead
                                              tx.readSource:
                                                type: tx.ResolveRef
                                                tx.resolveSource: { type: tx.VarRef, tx.varName: currThesisRef }
                                              tx.readProp: wv.confidence
                                            - type: tx.StringLiteral
                                              tx.stringLiteral: '</span></span></div></li>'

                                    # Retired thesis rows (iterate prev.hasThesis filter NOT in curr)
                                    - type: tx.ForEach
                                      tx.source:
                                        type: tx.Filter
                                        tx.source:
                                          type: tx.PropertyRead
                                          tx.readSource: { type: tx.VarRef, tx.varName: prev }
                                          tx.readProp: wv.hasThesis
                                        tx.loopVar: prevThesisRef
                                        tx.predicate:
                                          type: tx.Not
                                          tx.operand:
                                            type: tx.Contains
                                            tx.haystack:
                                              type: tx.PropertyRead
                                              tx.readSource: { type: tx.VarRef, tx.varName: curr }
                                              tx.readProp: wv.hasThesis
                                            tx.needle: { type: tx.VarRef, tx.varName: prevThesisRef }
                                      tx.loopVar: prevThesisRef
                                      tx.emit:
                                        type: tx.Concat
                                        tx.parts:
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<li class="diff-change"><div class="diff-change-header"><span class="change-thesis-label"><img class="thesis-icon-inline" src="/snapshot/'
                                          - type: tx.UriVersion
                                            tx.uriVersionOf: { type: tx.VarRef, tx.varName: prevThesisRef }
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '/'
                                          - type: tx.UriName
                                            tx.uriNameOf: { type: tx.VarRef, tx.varName: prevThesisRef }
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '.svg" alt="" loading="lazy"/>'
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource: { type: tx.VarRef, tx.varName: prevThesisRef }
                                            tx.readProp: rdfs.label
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: ' <span class="new-thesis-badge" style="background:rgba(248,113,113,0.12);color:var(--danger);border-color:rgba(248,113,113,0.3)">retired</span></span><span class="change-shift"><span class="from-conf">last seen at '
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource: { type: tx.VarRef, tx.varName: prevThesisRef }
                                            tx.readProp: wv.confidence
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '</span></span></div></li>'

                                    # Pair section close
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '</ul></section>'

                        # =====================================================
                        # ARTICLE CLOSE + FOOTER
                        # No data embedding, no inline JS — the diff log is now
                        # entirely server-rendered by the declarative pipeline
                        # above. /changes/ is 100% on declarative infrastructure.
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </section>
                            <footer class="changes-footer">
                            <span><a href="/about/">About this publisher</a></span>
                            <span><a href="https://github.com/genval-ai/worldview">github.com/genval-ai/worldview</a></span>
                            <span>Apache 2.0</span>
                            </footer>
                            </article>


# =============================================================================
# Changes-aggregate -> index.css
#
# Paired stylesheet SetTransformation. `pages@1.1.0/changes-aggregate`
# binds (formats.stylesheet, default) → this transformation.
# =============================================================================

changes-stylesheet:
  type: tx.SetTransformation

  tx.inputPattern:
    tx.matchesClass: wv.WorldviewSnapshot

  tx.artifactName:
    type: tx.StringLiteral
    tx.stringLiteral: index.css

  tx.outputs:
    - tx.stylesheet

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:
      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:

            - type: tx.CallFragment
              tx.fragmentRef: pages.worldview-chrome-fragment

            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-css
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.StringLiteral
                    tx.stringLiteral: |
                      article.changes{max-width:1400px;margin:0 auto;padding:48px 32px 96px}
                      @media (max-width:760px){article.changes{padding:32px 20px 64px}}
                      header.intro{padding:0 0 56px;border-bottom:1px solid var(--border);margin-bottom:56px;position:relative}
                      header.intro::before{content:"";position:absolute;top:-12px;left:0;width:48px;height:2px;background:var(--accent)}
                      header.intro .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:24px;display:block}
                      header.intro h1{font-family:var(--font-display);font-size:64px;font-weight:400;letter-spacing:-0.025em;margin-bottom:32px;line-height:1.0;color:var(--fg)}
                      @media (max-width:760px){header.intro h1{font-size:42px}}
                      header.intro .lead{font-size:19px;color:var(--fg-dim);line-height:1.7;font-weight:300}
                      section.transitions,section.diff-log{margin-top:56px}
                      .section-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg-dim);margin-bottom:24px;display:flex;align-items:center;gap:12px}
                      .section-title::after{content:"";flex:1;height:1px;background:var(--border)}
                      .empty-state{padding:24px;background:var(--bg-card);border:1px dashed var(--border);border-radius:8px;color:var(--fg-faint);font-size:13px;line-height:1.6;font-style:italic}
                      .diff-pair{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:8px;margin-bottom:24px;overflow:hidden;position:relative}
                      .diff-pair-header{padding:24px 28px 18px;border-bottom:1px solid var(--border-soft);background:var(--bg-elev)}
                      .diff-pair-visual{display:flex;align-items:center;gap:14px;justify-content:center}
                      .diff-snap-link{display:block;line-height:0;transition:transform 150ms,box-shadow 150ms;border-radius:8px}
                      .diff-snap-link:hover{transform:translateY(-2px);box-shadow:0 6px 22px -4px rgba(14,165,233,0.25)}
                      .diff-snap{display:block;width:200px;height:auto;border-radius:8px}
                      .diff-snap-arrow{color:var(--fg-faint);font-size:24px;font-family:var(--font-mono)}
                      @media (max-width:520px){.diff-snap{width:140px}}
                      .diff-changes{list-style:none;padding:0;margin:0}
                      .diff-change{padding:18px 28px;border-bottom:1px solid var(--border-soft)}
                      .diff-change:last-child{border-bottom:none}
                      .diff-change.major{background:rgba(125,211,252,0.03)}
                      .diff-change-header{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;margin-bottom:10px}
                      .change-thesis-label{font-size:15px;color:var(--fg);font-weight:500;display:inline-flex;align-items:center;gap:10px}
                      .thesis-icon-inline{display:inline-block;width:44px;height:auto;border-radius:3px;vertical-align:middle;flex-shrink:0}
                      .change-shift{font-family:var(--font-mono);font-size:13px;color:var(--fg-dim);display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
                      .change-shift .from-conf{color:var(--fg-faint)}
                      .change-shift .to-conf{color:var(--fg)}
                      .change-shift .arrow{color:var(--fg-faint)}
                      .change-shift .delta{padding:2px 8px;border-radius:4px;font-size:11px;letter-spacing:0.05em;font-weight:600}
                      .change-shift .delta.up{background:rgba(52,211,153,0.12);color:var(--strong);border:1px solid rgba(52,211,153,0.3)}
                      .change-shift .delta.down{background:rgba(248,113,113,0.12);color:var(--danger);border:1px solid rgba(248,113,113,0.3)}
                      .change-shift .delta.flat{color:var(--fg-faint)}
                      .change-status{padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;background:var(--bg-elev);border:1px solid var(--border);color:var(--fg-dim)}
                      .change-rationale{font-size:13px;color:var(--fg-dim);line-height:1.65;border-left:2px solid var(--accent);padding:6px 0 6px 14px;margin:8px 0;font-style:italic}
                      .change-evidence{margin-top:12px}
                      .change-evidence summary{font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;padding:6px 0;list-style:none;display:inline-flex;align-items:center;gap:8px}
                      .change-evidence summary::-webkit-details-marker{display:none}
                      .change-evidence summary::before{content:"+";font-family:var(--font-mono);width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:3px;color:var(--accent);transition:transform 120ms}
                      .change-evidence[open] summary::before{content:"-"}
                      .change-evidence summary:hover{color:var(--fg-dim)}
                      .change-evidence ul{list-style:none;padding:8px 0 0 22px;margin:0}
                      .change-evidence li{padding:10px 0;border-bottom:1px solid var(--border-soft);font-size:13px;color:var(--fg-dim);line-height:1.6;display:flex;align-items:flex-start;gap:10px;position:relative}
                      .change-evidence li:last-child{border-bottom:none}
                      .ev-strength-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:7px}
                      .ev-strength-dot.evidence-strong{background:var(--strong);box-shadow:0 0 6px rgba(52,211,153,0.4)}
                      .ev-strength-dot.evidence-moderate{background:var(--moderate);box-shadow:0 0 6px rgba(251,191,36,0.4)}
                      .ev-strength-dot.evidence-weak{background:var(--weak)}
                      .ev-statement{flex:1;color:var(--fg-dim);min-width:0}
                      .ev-citation-link{flex-shrink:0;font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);padding:2px 8px;border:1px solid var(--border);border-radius:3px;text-decoration:none;letter-spacing:0.04em;transition:color 120ms,border-color 120ms;align-self:flex-start;margin-top:2px}
                      .ev-citation-link:hover{color:var(--accent);border-color:var(--accent)}
                      .change-evidence li:hover .ev-tip{opacity:1;transform:translateY(0)}
                      .ev-tip{position:absolute;bottom:calc(100% - 4px);left:18px;background:var(--bg-elev);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-family:var(--font-mono);font-size:11px;color:var(--fg);letter-spacing:0.04em;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 120ms,transform 120ms;z-index:50;box-shadow:0 4px 16px -4px rgba(0,0,0,0.5);transform:translateY(4px);display:flex;gap:14px;align-items:center}
                      .ev-tip .ev-tip-strength{padding:1px 6px;border-radius:3px;text-transform:uppercase;font-size:10px;letter-spacing:0.08em}
                      .ev-tip .ev-tip-strength.evidence-strong{background:rgba(52,211,153,0.15);color:var(--strong);border:1px solid rgba(52,211,153,0.3)}
                      .ev-tip .ev-tip-strength.evidence-moderate{background:rgba(251,191,36,0.15);color:var(--moderate);border:1px solid rgba(251,191,36,0.3)}
                      .ev-tip .ev-tip-strength.evidence-weak{background:rgba(100,116,139,0.15);color:var(--weak);border:1px solid var(--border)}
                      .ev-tip .ev-tip-date{color:var(--fg-dim)}
                      .change-evidence.removed summary{color:var(--danger)}
                      .change-evidence.removed li .ev-strength-dot{filter:grayscale(0.7) opacity(0.5)}
                      .new-thesis-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.08em;background:rgba(52,211,153,0.12);color:var(--strong);border:1px solid rgba(52,211,153,0.3);margin-left:8px}
                      .stable-summary{font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);letter-spacing:0.06em;padding:14px 28px;border-top:1px solid var(--border-soft);background:var(--bg-card)}
                      .data{display:none}
                      footer.changes-footer{margin-top:80px;padding-top:32px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);display:flex;justify-content:space-between;letter-spacing:0.08em;text-transform:uppercase;flex-wrap:wrap;gap:16px}
                      footer.changes-footer a{color:var(--accent)}
