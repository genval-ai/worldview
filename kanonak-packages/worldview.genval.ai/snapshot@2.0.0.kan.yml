  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    Iran declared the Strait of Hormuz closed on 2026-03-04 and threatened any
    transiting vessel. Monthly transit volume has since fallen to roughly 5
    percent of the pre-conflict norm of about 3000 vessels, with open transits
    near zero since 2026-05-06. The International Energy Agency has called it
    the largest supply disruption in the history of the global oil market.
  evidenceStrength: wv.evidence-strong
