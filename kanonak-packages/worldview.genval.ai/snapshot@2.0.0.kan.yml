view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: "2026-05-14T03:42:31Z"
  narrative: >-
    This snapshot opens a new major version of the worldview. It is authored
    as a fresh, self-contained reading of the macro regime as of mid-May 2026
    and deliberately does not carry forward the evidence chain or thesis
    lineage of any prior snapshot. The dominant regime is a stagflationary
    collision: United States equities are at all-time highs, carried by the
    strongest corporate earnings cycle since 2021 and a hyperscaler AI
    capital-expenditure boom, while an energy-driven inflation re-acceleration,
    the direct consequence of the 2026 Iran war and the de facto closure of
    the Strait of Hormuz, is forcing wholesale and consumer prices higher and
    freezing the Federal Reserve in place. The market is pricing the earnings
    boom and discounting the supply shock; this worldview holds both as live,
    simultaneously true, and in tension.


    The pivotal events behind the regime: a United States and Israeli air war
    against Iran that began on 2026-02-28, Iran's de facto closure of the
    Strait of Hormuz on 2026-03-04, and a United States naval blockade of
    Iranian ports from 2026-04-13, together producing what the International
    Energy Agency has characterized as the largest supply disruption in the
    history of the global oil market. April headline CPI printed 3.8 percent
    year over year, the highest since May 2023, and April producer prices rose
    1.4 percent month over month, the sharpest monthly gain since 2022. The
    FOMC held its policy rate at 3.5 to 3.75 percent on 2026-04-29 in an 8-4
    vote, the first four-dissent decision since October 1992. Kevin Warsh was
    confirmed as Federal Reserve Chair on 2026-05-13 in a 54-45 Senate vote,
    the most divisive Fed chair confirmation in modern history, succeeding
    Jerome Powell whose term expires 2026-05-15. Despite all of this, the
    S&P 500 closed at a record 7444.25 on 2026-05-13 with the VIX near 18.


    This is a major version because the worldview is being framed from first
    principles around the stagflation regime rather than revised at the
    margin. Confidence calibration: the energy-shock and defense-rerating
    theses carry the highest conviction (0.85 and 0.83) because their
    structural supports, a closed strait, a one-trillion-dollar defense
    budget, and record contractor backlogs, are slow-moving and well-sourced.
    The AI-capex supercycle and Fed-credibility theses are high-conviction
    working hypotheses (0.80 and 0.78). The equity melt-up, bond bear, and
    gold consolidation theses are sized more modestly (0.70, 0.72, 0.68)
    because each has invalidation conditions partially in motion or depends on
    a market path rather than a structural fact. No prior snapshot was
    consulted in authoring this version; every confidence is an initial
    calibration, not a delta. Two research limitations are recorded in the
    evidence below: the Massive index-aggregate endpoints returned
    NOT_AUTHORIZED under the current plan tier, and the Massive treasury-yields
    endpoint returned no data for the requested date, so the S&P 500 index
    level, the VIX level, and the 10-year Treasury yield were sourced via web
    research and annotated as such.
  hasThesis:
    - stagflation-shock-from-hormuz
    - equity-melt-up-despite-shock
    - ai-capex-supercycle
    - fed-credibility-under-transition-strain
    - bond-bear-resumes-on-inflation
    - defense-structural-rerating
    - gold-consolidation-after-parabola

stagflation-shock-from-hormuz:
  type: wv.WorldviewThesis
  label: "Stagflation shock from the Hormuz closure"
  thesisStatement: >-
    The 2026 Iran war and the de facto closure of the Strait of Hormuz have
    produced an energy-driven inflation re-acceleration that is the dominant
    macro force of the regime. With roughly 20 percent of global seaborne oil
    normally transiting Hormuz and transit volumes now near 5 percent of
    pre-conflict levels, the supply shock pushed April headline CPI to 3.8
    percent year over year and April producer prices up 1.4 percent month over
    month. The shock remains in force until the strait reopens durably, oil
    prices normalize, and consumer inflation decelerates back toward target.
  confidence: 0.85
  status: wv.active
  confidenceRationale: >-
    Confidence 0.85: the supply shock is a structural, well-documented fact
    with a closed strait and a standing United States blockade. The only path
    to invalidation requires a durable reopening that is not in evidence as of
    the observation date.
  supportingEvidence:
    - ev-iran-war-outbreak-2026-02-28
    - ev-hormuz-de-facto-closure-2026-03-04
    - ev-us-iran-port-blockade-2026-04-13
    - ev-wti-front-month-2026-05-13
    - ev-brent-front-month-2026-05-13
    - ev-cpi-april-2026
    - ev-tariff-regime-2026
    - ev-xle-close-2026-05-13
    - ev-xom-close-2026-05-13
  invalidationCondition:
    type: wv.AndCondition
    operands:
      - type: wv.EventCondition
        event: fin.evt-strait-of-hormuz-reopened
        durability: wv.durable
      - type: wv.ThresholdCondition
        observable: fin.ind-wti-close
        comparator: wv.lt
        threshold: 80.0
        unit: "usd-per-bbl"
        persistence:
          wv.duration: 30
          windowUnit: wv.calendar-days
      - type: wv.ThresholdCondition
        observable: fin.ind-headline-cpi-yoy
        comparator: wv.lt
        threshold: 3.0
        unit: "pct"

equity-melt-up-despite-shock:
  type: wv.WorldviewThesis
  label: "Equity melt-up despite the supply shock"
  thesisStatement: >-
    United States equities are in a melt-up that is shrugging off the energy
    and inflation shock. The S&P 500 closed at a record 7444.25 on 2026-05-13
    with the VIX near 18, supported by a Q1 2026 earnings season in which 84
    percent of companies beat estimates, blended earnings grew about 13 percent
    year over year, and net margins held at 13.4 percent. The melt-up thesis
    breaks if the index gives back its gains in a sustained drawdown or if
    volatility regime-shifts higher.
  confidence: 0.70
  status: wv.active
  confidenceRationale: >-
    Confidence 0.70: the earnings support is real and current, but a melt-up
    driven by positioning and narrative is path-dependent and vulnerable to the
    very inflation shock that the stagflation thesis describes. This is a
    working hypothesis to size modestly, not a high-conviction call.
  supportingEvidence:
    - ev-spy-close-2026-05-13
    - ev-sp500-record-high-2026-05-13
    - ev-vix-close-2026-05-13
    - ev-sp500-q1-2026-beat-rate
    - ev-sp500-q1-2026-eps-growth
    - ev-sp500-q1-2026-net-margin
    - ev-yardeni-sp500-target
  invalidationCondition:
    type: wv.OrCondition
    operands:
      - type: wv.ThresholdCondition
        observable: fin.ind-spy-close
        comparator: wv.lt
        threshold: 660.0
        unit: "usd"
        persistence:
          wv.duration: 20
          windowUnit: wv.trading-days
      - type: wv.ThresholdCondition
        observable: fin.ind-vix-close
        comparator: wv.gt
        threshold: 35.0
        unit: "vix-points"
        persistence:
          wv.duration: 10
          windowUnit: wv.trading-days

ai-capex-supercycle:
  type: wv.WorldviewThesis
  label: "AI capital-expenditure supercycle"
  thesisStatement: >-
    Hyperscaler AI capital expenditure is a structural earnings engine that is
    concentrated in semiconductors and still accelerating. The big four United
    States hyperscalers plan roughly 630 billion dollars of 2026 capital
    expenditure, up about 62 percent from 2025, and that spend is showing up
    directly in chip-maker results: NVIDIA data-center revenue reached 197.3
    billion dollars in fiscal 2026 and AMD data-center revenue grew 57 percent
    year over year in Q1 2026. The supercycle thesis breaks if planned
    hyperscaler capex is cut materially below the 2025 spending level.
  confidence: 0.80
  status: wv.active
  confidenceRationale: >-
    Confidence 0.80: the capex commitments and the chip-maker prints that
    corroborate them are concrete and recent, but a single demand-cycle or
    financing-cost shift could compress the spend, so this sits just below the
    structural theses.
  supportingEvidence:
    - ev-hyperscaler-capex-2026
    - ev-nvda-datacenter-fy2026
    - ev-amd-q1-2026-datacenter
    - ev-amd-q1-2026-eps
    - ev-lisa-su-datacenter-statement
    - ev-nvda-close-2026-05-13
    - ev-amd-close-2026-05-13
  invalidationCondition:
    type: wv.ThresholdCondition
    observable: ind-hyperscaler-ai-capex-2026
    comparator: wv.lt
    threshold: 500.0
    unit: "usd-billions"

fed-credibility-under-transition-strain:
  type: wv.WorldviewThesis
  label: "Fed credibility under transition strain"
  thesisStatement: >-
    The Federal Reserve enters its most contested leadership transition in
    modern history with a fracturing committee and no room to ease. The FOMC
    held at 3.5 to 3.75 percent on 2026-04-29 in an 8-4 vote, the first
    four-dissent decision since 1992, and Kevin Warsh was confirmed Chair on
    2026-05-13 in a 54-45 Senate vote, succeeding Powell. With April CPI at 3.8
    percent and a still-resilient labor market at 4.3 percent unemployment,
    policy is paralyzed between political pressure to cut and an inflation
    print that forbids it. The thesis resolves if Warsh restores a credible,
    near-consensus policy footing.
  confidence: 0.78
  status: wv.active
  confidenceRationale: >-
    Confidence 0.78: the dissent count, the partisan confirmation, and the
    inflation print are all on the record, but the thesis is about an
    institution under strain rather than a measured quantity, and Warsh's first
    FOMC on 2026-06-16 is a near-term test that could move it either way.
  supportingEvidence:
    - ev-fomc-april-2026-hold
    - ev-warsh-confirmation-2026-05-13
    - ev-10y-yield-2026-05-13
    - ev-unemployment-april-2026
  invalidationCondition:
    type: wv.OrCondition
    operands:
      - type: wv.EventCondition
        event: fin.evt-fed-credibility-restored
        durability: wv.durable
      - type: wv.AndCondition
        operands:
          - type: wv.EventCondition
            event: fin.evt-fed-chair-continuity-signal
          - type: wv.ThresholdCondition
            observable: fin.ind-fomc-dissent-count
            comparator: wv.lte
            threshold: 1.0
            unit: "dissent-count"

bond-bear-resumes-on-inflation:
  type: wv.WorldviewThesis
  label: "Bond bear resumes on inflation"
  thesisStatement: >-
    Long-duration United States Treasuries are repricing lower as the inflation
    shock reopens the term-premium story. The 10-year yield reached 4.49
    percent on 2026-05-13, its highest since July 2025, driven by a 3.8 percent
    CPI print and a producer-price shock, with TLT trading near 84.80. The bond
    bear remains in force until the 10-year yield falls durably back below 4.0
    percent.
  confidence: 0.72
  status: wv.active
  confidenceRationale: >-
    Confidence 0.72: the yield breakout and its inflation catalyst are clearly
    observed, but rates are a market path and a growth scare or a
    flight-to-quality bid could reverse the move quickly, so conviction is
    moderate.
  supportingEvidence:
    - ev-10y-yield-2026-05-13
    - ev-tlt-close-2026-05-13
    - ev-cpi-april-2026
  invalidationCondition:
    type: wv.ThresholdCondition
    observable: fin.ind-10y-treasury-yield
    comparator: wv.lt
    threshold: 4.0
    unit: "pct"
    persistence:
      wv.duration: 30
      windowUnit: wv.calendar-days

defense-structural-rerating:
  type: wv.WorldviewThesis
  label: "Defense structural rerating"
  thesisStatement: >-
    The Iran war has triggered a structural rerating of United States defense.
    The fiscal 2026 defense budget is near one trillion dollars with a fiscal
    2027 request approaching 1.5 trillion, contractor backlogs are at records,
    Lockheed Martin near 194 billion dollars and RTX near 268 billion, and
    roughly half of the United States most expensive missile stocks were
    depleted in the first seven weeks of the conflict, guaranteeing a
    multi-year restocking cycle. The rerating thesis breaks only on a durable
    United States and Iran peace agreement combined with a flat or declining
    defense outlay trajectory.
  confidence: 0.83
  status: wv.active
  confidenceRationale: >-
    Confidence 0.83: backlogs, appropriations, and depletion data are
    slow-moving structural facts, and the invalidation requires both a durable
    peace and a budget reversal, neither of which is in evidence.
  supportingEvidence:
    - ev-defense-budget-fy2027-proposal
    - ev-us-iran-port-blockade-2026-04-13
    - ev-lmt-backlog-q4-2025
    - ev-rtx-backlog-q4-2025
    - ev-lmt-close-2026-05-13
    - ev-rtx-close-2026-05-13
    - ev-noc-close-2026-05-13
  invalidationCondition:
    type: wv.AndCondition
    operands:
      - type: wv.EventCondition
        event: fin.evt-us-iran-peace-agreement-implemented
        durability: wv.durable
      - type: wv.ThresholdCondition
        observable: fin.ind-dod-outlays-yoy-change
        comparator: wv.lt
        threshold: 0.0
        unit: "pct"

gold-consolidation-after-parabola:
  type: wv.WorldviewThesis
  label: "Gold consolidation after the parabola"
  thesisStatement: >-
    Gold is consolidating a sharp drawdown rather than reversing a structural
    bull market. Spot gold has pulled back roughly 16 percent from its January
    2026 all-time high near 5589 dollars, but central banks bought a net 244
    tonnes in Q1 2026 and institutional forecasters including Goldman Sachs
    still target 5400 dollars by year end. GLD traded near 430.50 and the
    miners proxy GDX near 96.23. The consolidation thesis breaks if spot gold
    falls durably below 4000 dollars.
  confidence: 0.68
  status: wv.active
  confidenceRationale: >-
    Confidence 0.68: the central-bank bid and the forecaster targets support a
    consolidation read, but gold has already given back a large move and the
    thesis depends on a price level holding, so it is the most modestly sized
    thesis in the snapshot.
  supportingEvidence:
    - ev-gld-close-2026-05-13
    - ev-gdx-close-2026-05-13
    - ev-cb-gold-buying-q1-2026
    - ev-goldman-gold-target
  invalidationCondition:
    type: wv.ThresholdCondition
    observable: fin.ind-gold-spot
    comparator: wv.lt
    threshold: 4000.0
    unit: "usd-per-oz"
    persistence:
      wv.duration: 30
      windowUnit: wv.calendar-days

