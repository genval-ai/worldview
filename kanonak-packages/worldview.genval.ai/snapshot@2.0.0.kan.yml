ev-tariff-regime-2026:
  type: wv.PolicyEvidence
  evidenceStatement: >-
    United States tariff rates stand at their highest since 1943, with a
    Section 122 ten-percent universal surcharge set to expire 2026-07-24 and a
    China effective rate near 31.6 percent. The Court of International Trade
    struck down the latest round on 2026-05-07, but the duties continue to be
    collected during the administration's appeal, leaving the tariff regime an
    active contributor to goods-price pressure.
  evidenceStrength: wv.evidence-strong
