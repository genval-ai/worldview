# =============================================================================
# snapshot @ 2.0.0 - first worked example using distributional confidence +
# typed citation sources.
#
# This snapshot is parallel to the existing 1.0.x chain (snapshot@1.0.15 and
# predecessors). It is NOT a continuation - the 1.0.x chain remains the
# operational record. This 2.0.0 demonstrates the new schema end-to-end:
#
#   - Every thesis's confidence is a DistributionEstimate with mean, stddev,
#     and beta family declaration. Renderers (worldview-chrome@2.0.0,
#     snapshot-to-html@2.0.0, timeline@2.0.0, changes@2.0.0) read the mean
#     via the chained PropertyRead pattern (wv.confidence -> est.estimateMean).
#
#   - Every Evidence carries both citation (URL) and citationSource (typed
#     src.Source reference). The typed Source unlocks source-network
#     visualizations and trust-weighted evidence rendering downstream.
#
#   - Distributional confidence allows expressing what a point estimate
#     cannot: a high-conviction tight thesis (mean 0.86, stdDev 0.03) vs a
#     working-hypothesis wide thesis (mean 0.55, stdDev 0.12) is a
#     qualitatively different signal than two 0.7 confidences.
#
# Three theses cover the regime as of 2026-05-17. Subsequent 2.0.N versions
# would extend the same way 1.0.x chain did - new versions for new
# observations, never mutations of an existing version.
# =============================================================================

view:
  type: wv.WorldviewSnapshot
  label: Macro worldview (2.0.0 distributional baseline)
  observedAt: 2026-05-17T22:00:00Z
  # Per-instance derivation override per the polymorphic-derivation-discovery
  # rule. Necessary because BOTH pages@1.2.0 and pages@2.0.0 augment the
  # canonical wv.WorldviewSnapshot class with derivations - the CLI picks
  # one by load order (the workspace-augmentation gotcha). An instance-level
  # binding sits above class-hierarchy discovery and forces this snapshot's
  # 2.0.0 distributional confidence to render through the 2.0.0 renderer
  # chain. Existing 1.0.x snapshots, lacking this instance override, fall
  # back to whichever pages package's class-level binding the CLI picks.
  derivation.derivations:
    - derivation.format: formats.html
      derivation.variant: derivation.default
      derivation.transformation:
        tx.publisher: worldview.genval.ai
        tx.package: snapshot-to-html
        tx.version: 2.0.0
        tx.name: snapshot-to-html-transformation
    - derivation.format: formats.stylesheet
      derivation.variant: derivation.default
      derivation.transformation:
        tx.publisher: worldview.genval.ai
        tx.package: snapshot-to-html
        tx.version: 2.0.0
        tx.name: snapshot-stylesheet
  narrative: |
    Sunday-evening baseline using the new core@2.0.0 distributional-confidence
    schema. Three theses re-expressed from the 1.0.15 worldview with
    explicit uncertainty bounds. The structural inflation, energy-shock,
    and defense-procurement regime hasn't changed from Friday's close - the
    upgrade here is in how the confidence is recorded, not what it says.

    **Stagflation-risk** remains the highest-conviction thesis at
    mean=0.82, stdDev=0.04. The tight band reflects four independent
    structural-inflation measurements that landed in a single trading
    week (April CPI 3.8% YoY, April PPI +6.0% YoY, April import prices
    +4.2% YoY, 10Y to 4.59% in a 13bp single-session move). When
    multiple independent observations land within hours and all point
    the same direction, the posterior tightens. The wide-band scenario
    would be a wait-for-PCE story where one weak print could move us
    20bps; instead we have four prints that already happened. April PCE
    on May 28 is the formal invalidation indicator.

    **Persistent-energy-shock** at mean=0.68, stdDev=0.07. The wider
    band reflects two genuinely uncertain offsetting forces - the IEA
    May 2026 OMR confirms the structural undersupply through Q3 (which
    would push confidence higher) but the Saturday Trump 20-year
    nuclear-suspension framing is a partial diplomatic-positive that
    weakens the durable-reopening leg of the SequencedCondition. Both
    moves are real; the IEA print is the stronger of the two by a
    margin, yielding a slightly higher mean (vs 0.66 in 1.0.13) but
    with the stdDev expanded to acknowledge the volatility.

    **Iran-war-rearmament** at mean=0.82, stdDev=0.05. Held from
    1.0.15. The slightly wider band than stagflation reflects that
    the procurement cycle is structural (Golden Dome $185B is
    committed multi-year programs) but the weekly cash-tape sentiment
    is more volatile - LMT/RTX/NOC trade on chip rotation as much as
    on defense fundamentals on any given Friday. Authoring the stdDev
    explicitly captures that the multi-year structural conviction is
    higher than the weekly mark-to-market.
  hasThesis:
    - stagflation-risk
    - persistent-energy-shock
    - iran-war-rearmament


# =============================================================================
# 1. STAGFLATION RISK - high conviction, tight band (4 independent prints)
# =============================================================================

stagflation-risk:
  type: wv.WorldviewThesis
  label: Stagflation risk and Fed independence stress
  thesisStatement: >-
    April CPI on May 12 fired the energy-passthrough binary tell directly:
    headline 3.8% YoY (highest since May 2023), core 2.8% YoY. April PPI on
    May 13 ran hotter than CPI - headline +1.4% m/m / +6.0% YoY, core +1.0%
    m/m / +5.2% YoY (highest in three years). April import prices on May 14
    added +1.9% m/m / +4.2% YoY (largest YoY since October 2022) with
    imported fuel +16.3% m/m. Friday May 15 delivered the sharpest
    single-session rate-path repricing of the cycle: oil +4.5% (WTI to $106,
    weekly +11%), the 10Y to 4.59% (up ~13bps in one day, fresh ~1-year high,
    biggest weekly yield jump since April 2025), and CME FedWatch
    hike-by-December odds to ~56% from ~36% Thursday and ~16% a week
    earlier - a 20pp single-day move. The bond-market rout was global, with
    longer-dated yields most affected and 30Y to the cusp of the 2023 peak.
    Powell exited chair Friday with conciliatory final remarks; Warsh now
    chair, first public statement still ahead. Calendar: April 29 FOMC
    minutes Wednesday May 20 2 PM ET, Walmart Q1 FY2027 Thursday May 21
    pre-open, April PCE the formal invalidation indicator on May 28.
  confidence:
    type: est.BetaEstimate
    estimateMean: 0.82
    estimateStdDev: 0.04
    estimateLower95: 0.74
    estimateUpper95: 0.89
    betaAlpha: 33.0
    betaBeta: 7.2
  vis.thesisTheme: vis.theme-inflation
  status: wv.active
  confidenceRationale: >-
    Tight band (stdDev 0.04) reflects four independent structural-inflation
    measurements in one trading week: CPI 3.8% YoY, PPI +6.0% YoY, import
    prices +4.2% YoY, and the 10Y rate-path 20pp repricing. Beta(33, 7.2)
    parameterization encodes ~40 effective independent observations - the
    Bayesian frame makes the evidence weight explicit. Wider band would
    apply if we were waiting on a single decisive print; we're past that.
  supportingEvidence:
    - ev-april-cpi-print-headline-38
    - ev-april-ppi-print-may13
    - ev-april-import-prices-42-may14
    - ev-10y-yield-friday-459-may15
    - ev-fedwatch-hike-by-dec-56pct-may15
    - ev-global-bond-rout-may15
    - ev-fomc-minutes-release-may20
    - ev-april-pce-release-may28
  invalidationCondition:
    type: wv.OrCondition
    wv.operands:
      - type: wv.AndCondition
        wv.operands:
          - type: wv.ThresholdCondition
            observable: fin.ind-core-pce-yoy
            comparator: wv.lt
            threshold: 2.5
            persistence:
              wv.duration: 3
              wv.windowUnit: wv.months
          - type: wv.ThresholdCondition
            observable: fin.ind-unemployment-rate
            comparator: wv.between
            threshold: 4.0
            thresholdHigh: 4.5
            persistence:
              wv.duration: 3
              wv.windowUnit: wv.months


# =============================================================================
# 2. PERSISTENT ENERGY SHOCK - wider band (offsetting structural / diplomatic)
# =============================================================================

persistent-energy-shock:
  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: >-
    Oil prices remain structurally elevated as long as the Strait of Hormuz
    reopening sequence is incomplete and Iranian retaliation risk is intact.
    The IEA May 2026 Oil Market Report forecasts a 1.78 mb/d 2026 supply
    deficit (sharp reversal from prior expected surplus), with world supply
    falling 3.9 mb/d in 2026 on assumed gradual Hormuz resumption from June;
    output from Hormuz-affected Gulf countries is 14.4 mb/d below pre-war
    levels and the agency warns the market stays severely undersupplied
    through Q3 2026 even if Middle East fighting ends by early June. UBS
    separately expects global inventories to approach all-time lows by
    end-May. Saturday May 15 added Trump's Air Force One framing of a
    20-year Iranian nuclear suspension as acceptable (partial diplomatic-
    positive) and an indication that lifting sanctions on Chinese
    Iranian-oil buyers is under consideration. Neither addresses Iran's
    May 10 demand for full sovereignty over the Strait of Hormuz, which
    remains procedurally incompatible with the durable-reopening leg of
    the SequencedCondition.
  confidence:
    type: est.BetaEstimate
    estimateMean: 0.68
    estimateStdDev: 0.07
    estimateLower95: 0.54
    estimateUpper95: 0.81
    betaAlpha: 14.0
    betaBeta: 6.6
  vis.thesisTheme: vis.theme-energy
  status: wv.active
  confidenceRationale: >-
    Wider band (stdDev 0.07) reflects two genuinely offsetting forces -
    the IEA structural-undersupply confirmation pushes confidence up, the
    Trump 20-year framing and possible Chinese-buyer sanction relief
    pushes it down. Beta(14, 6.6) parameterization expresses ~20 effective
    observations - lower weight than stagflation because the
    central-tendency signal is partly offset by the diplomatic
    contrary-evidence, not just absent.
  supportingEvidence:
    - ev-iea-omr-may-2026-undersupply
    - ev-ubs-inventories-record-low-may15
    - ev-wti-friday-settle-106-may15
    - ev-iran-hormuz-sovereignty-demand-may10
    - ev-trump-20yr-nuke-suspension-may15
    - ev-trump-china-iran-oil-sanctions-may15
  invalidationCondition:
    type: wv.OrCondition
    wv.operands:
      - type: wv.SequencedCondition
        after:
          type: wv.EventCondition
          event: fin.evt-strait-of-hormuz-reopened
          durability: wv.durable
        then:
          type: wv.ThresholdCondition
          observable: fin.ind-wti-close
          comparator: wv.lt
          threshold: 80
          persistence:
            wv.duration: 30
            wv.windowUnit: wv.calendar-days
      - type: wv.EventCondition
        event: fin.evt-opec-supply-shock


# =============================================================================
# 3. IRAN WAR REARMAMENT - structural high conviction, weekly mark-to-market
# =============================================================================

iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: >-
    The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered
    a multi-year defense spending cycle that benefits prime contractors
    with missile and missile-defense exposure regardless of diplomatic-track
    outcomes. The Trump-Xi summit concluded Friday May 15 without any
    concrete Iran de-escalation deliverable; the NYT reported May 15 that
    the US and Israel are intensifying preparations for renewed strikes
    on Iran. Depleted munitions stockpiles (438 Iranian ballistic missiles,
    2,012 drones, 19 cruise missiles fired at UAE through April 1) and
    Golden Dome ($185B) are committed multi-year programs that survive
    any near-term deal scenario. Defense primes were mixed on the Friday
    chip-led tape rotation: LMT $516.01 (-0.85%), RTX $171.18 (-2.56%),
    NOC $540.69 (-1.45%). Daily rotation does not bend the multi-year
    procurement cycle.
  confidence:
    type: est.BetaEstimate
    estimateMean: 0.82
    estimateStdDev: 0.05
    estimateLower95: 0.71
    estimateUpper95: 0.91
    betaAlpha: 23.0
    betaBeta: 5.0
  vis.thesisTheme: vis.theme-defense
  status: wv.active
  confidenceRationale: >-
    Same mean as stagflation (0.82) but slightly wider band (stdDev 0.05 vs
    0.04) because the structural conviction is multi-year procurement
    cycles (high) but the weekly mark-to-market is volatile (LMT/RTX/NOC
    trade on chip rotation as much as defense). Beta(23, 5.0) encodes the
    asymmetry: the upside is bounded by structural cycle math; the
    downside is bounded by the floor on committed procurement.
  supportingEvidence:
    - ev-operation-epic-fury-feb28
    - ev-iran-tomahawks-fired-2026q1
    - ev-fy2026-defense-budget-1t
    - ev-nyt-israel-us-iran-strikes-prep-may15
    - ev-lmt-friday-close-51601-may15
    - ev-trump-xi-summit-concludes-may15
  invalidationCondition:
    type: wv.AndCondition
    wv.operands:
      - type: wv.EventCondition
        event: fin.evt-us-iran-peace-agreement-implemented
        durability: wv.durable
      - type: wv.ThresholdCondition
        observable: fin.ind-dod-outlays-yoy-change
        comparator: wv.lt
        threshold: 0
        persistence:
          wv.duration: 2
          wv.windowUnit: wv.fiscal-quarters


