  type: wv.WorldviewThesis
  label: Gold structural debasement bid
  thesisStatement: 'Gold sits in mid-cycle of a multi-year structural bull market driven by central-bank buying, sovereign de-dollarization, $39T US debt, stock-bond correlation breakdown, and Fed independence concerns. Q1 2026 set records on multiple dimensions - LBMA quarterly average $4,873/oz, central-bank net purchases 244 tonnes (highest Q1 ever, +17% QoQ), aggregate Q1 demand value $193B. Spot $4,720-4,740 May 8 (highest since April 22, weekly gain +2%) even as oil retreated. Major bank targets all imply materially higher levels (JPM $5,055-$6,300, UBS $6,200, Citi $5,000-$7,000).'
