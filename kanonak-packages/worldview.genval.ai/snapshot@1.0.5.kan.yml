  vis.thesisTheme: vis.theme-gold
  status: wv.active
  confidenceRationale: 'Up to 0.85 from 0.82. The 1.0.4 step-down was predicated on the Hormuz first-vessel transit and 48-hour Iran-deal response window making the durable-peace leg of the AndCondition invalidation closer. With the May 7-8 record (US-Iran fire exchange, UAE missile attack), durable peace is materially further away again. Gold $4,720-$4,740 Friday is the highest since April 22 and confirms the bid even as Brent retreated weekly. Reverting to 0.85; the joint-AND invalidation (durable peace + Fed credibility restored + deficit declining) requires three hard things simultaneously and the durable-peace leg just walked back.'
