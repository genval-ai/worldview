iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: 'The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered a multi-year defense spending cycle that benefits prime contractors with missile and missile-defense exposure regardless of whether the May 6 14-point MOU framework holds and whether the Pakistan-mediated 2-week ceasefire converts to a durable peace, because depleted munitions stockpiles must be replenished and Golden Dome ($185B) is now a multi-year program. The procurement cycle persists through diplomatic resolution unless DoD outlays meaningfully reverse.'
  confidence: 0.75
  vis.thesisTheme: vis.theme-defense
  status: wv.active
  confidenceRationale: 'Up to 0.75 from 0.72. May 7-8 escalation reinforces the procurement-cycle case: Iran fired on three US destroyers in the strait Thursday, UAE absorbed missile + drone attacks Friday (3 wounded; biggest escalation since the ceasefire began), US disabled two Iranian tankers and sank seven small Iranian boats. Active kinetic operations ongoing inside a "ceasefire" - munitions consumption rate is non-trivial. Even if the diplomatic track lands a deal this month, the replenishment + Golden Dome obligations are committed.'
