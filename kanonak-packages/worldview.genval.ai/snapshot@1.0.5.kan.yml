# =============================================================================
# Worldview snapshot - 2026-05-10 18:00 UTC (Sunday evening)
#
# Walk-back. Saturday afternoon (1.0.4) leaned hard on the Qatar LNG transit
# and the IRGC's "safe and sustainable transit facilitated" framing as the
# Hormuz-reopening sequence finally firing. Re-reading the May 7-8 record
# inverts the picture: Iran fired on three US Navy destroyers in the Strait
# Thursday night, a UAE drone-and-missile attack hit Abu Dhabi Friday
# (biggest escalation since the ceasefire began four weeks ago), the US
# disabled two Iranian tankers (Sea Star III, Sevda) running the blockade
# - F/A-18 dropped precision munitions into smokestacks - and US Navy sank
# seven small Iranian boats in the strait. Iran's 14-point counter-proposal
# is more maximalist than the US framing - asset unfreeze, sanctions lift,
# REPARATIONS, end of US naval blockade, 30-day resolution (vs the US
# 2-month ceasefire). Trump's framing oscillates between "very possible
# we'll make a deal" and "Iran has not yet paid a big enough price for
# what they have done to Humanity." Both can be true simultaneously - and
# both are.
#
# What 1.0.4 got right: the diplomatic calendar is tightening (Iran response
# expected this week, Lebanon talks Wednesday-Thursday, Warsh confirmation
# Monday, April CPI Tuesday). What 1.0.4 got wrong: assuming the Hormuz
# transit signal dominates the kinetic-escalation signal. The Qatar LNG
# transit is real but partial; 1,550+ vessels are still trapped, US Navy
# is still firing on Iranian shipping, and Iran is still firing on UAE.
# "Open with conditions" is not "open."
#
# Macro this week: April CPI prints Tuesday May 12 - first read on whether
# the energy-driven inflation pickup is sustained. UMich preliminary
# sentiment hit a record low 48.2 in early May with one-third of consumers
# spontaneously citing gas prices ($4.54 national avg, +44% YoY). One-year
# inflation expectations 4.5%, long-run 3.4%. Sentiment-vs-price divergence
# (record low sentiment, ATH equities) widened further this week.
#
# Each version of this package is the worldview AS PUBLISHED on a specific
# date. Versions are immutable; new dates produce new versions.
# =============================================================================

view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: 2026-05-10T18:00:00Z
  previousSnapshot: snapshot.view
  narrative: |
    Sunday evening reset. The Qatar LNG transit narrative that anchored
    Saturday's view collides with the May 7-8 record once that record is
    weighted properly: Iran fired on three US destroyers in the Strait of
    Hormuz Thursday night, the UAE absorbed two ballistic missiles and
    three drones from Iran on Friday (the biggest escalation since the
    ceasefire began on Apr 12), and the US disabled two Iranian tankers
    running the naval blockade with F/A-18-delivered precision munitions
    into smokestacks. US Navy also sank seven small Iranian boats in the
    strait. Treating "first vessel transit since March" as the dominant
    signal while three concurrent kinetic engagements played out was the
    1.0.4 mistake. The thesis revisions below correct it.

    Iran's 14-point counter-proposal (delivered May 2, demands published
    in regional press) goes further than the one-page US MOU framework:
    end of US naval blockade, release of frozen Iranian assets, lifting
    of sanctions, reparations, a new mechanism for Strait of Hormuz
    governance, and resolution within 30 days rather than the US-proposed
    2-month ceasefire. Trump's framing has been oscillating - "great
    progress, deal possible any day" alongside "they have not yet paid a
    big enough price" alongside threats to bomb at "much higher level" if
    no deal lands within a week. The diplomatic mechanics are real but
    the gap between proposals is large.

    Calendar this week: Warsh Senate confirmation Monday May 11 5:30 PM ET
    (Fetterman + Tillis support locked in, 53-seat Republican majority,
    confirmation effectively certain before Powell's term ends Friday May 15);
    April CPI Tuesday May 12 8:30 AM (first read on whether the energy-driven
    inflation pickup is sustained beyond March's 3.3% YoY headline);
    Lebanon-Israel third round of peace talks Wednesday-Thursday May 14-15
    in Washington (Karam, Dermer); NVDA Q1 FY2027 earnings May 20 5 PM ET
    (revenue guide $78B, +77% YoY, China DC explicitly zero - Huang's
    estimate of the unrealized Chinese market is ~$50B "effectively gone
    with no clear return timeline").

    Markets: SPX closed at a fresh ATH 7,398.93 Friday on a six-week
    winning streak (longest since 2024); Nasdaq ATH 26,247.08; Brent
    $101.29 (+1% on UAE attack); WTI $95.42; gold $4,720-4,740 (highest
    since April 22, weekly +2%); VIX 17.08; SPX futures Sunday 7,419
    (above Friday). UMich sentiment 48.2 (record low). The risk-on /
    consumer-sentiment divergence keeps widening.
  hasThesis:
    - iran-war-rearmament
    - persistent-energy-shock
    - stagflation-risk
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

