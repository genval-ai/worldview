  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: Oil prices remain structurally elevated as long as the Strait of Hormuz reopening sequence is incomplete and Iranian retaliation risk is intact. Brent settled $101.29 on May 8 (+1% on the UAE attack) with WTI $95.42; the May 7-8 record (US firing on Iranian tankers, Iran firing on US destroyers, UAE absorbing Iranian missiles) shows the shipping environment is contested, not "open with conditions" as Saturday's view assumed. The supply-side reset hasn't materialized and Goldman's $77.50 Brent target sits 25%+ below spot.
  confidence: 0.45
  vis.thesisTheme: vis.theme-energy
  status: wv.active
  confidenceRationale: 'Up to 0.45 from 0.30 - the 1.0.4 cut was a mistake. Saturday weighted the Qatar LNG transit and the IRGC "safe transit" commitment as the durable-Hormuz-reopening leg of the SequencedCondition firing. Re-reading the May 7-8 record inverts that: the US is still firing on Iranian shipping, Iran is still firing on US Navy assets and on UAE territory, 1,550+ vessels remain trapped in the Gulf, analysts say full pre-war flow is "months if not years" away. The Qatar LNG transit is real but partial. The Hormuz reopening trajectory is closer to "just barely begun" than "durable" - 1.0.4 was too dovish on the binary; correcting to a level that reflects active kinetic operations alongside diplomatic talks.'
