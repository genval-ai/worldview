stagflation-risk:
  type: wv.WorldviewThesis
  label: Stagflation risk and Fed independence stress
  thesisStatement: 'The Fed faces a hard mandate balance with energy-driven inflation tracking elevated, unemployment at 4.3-4.4%, and consumer sentiment at a record low (UMich May preliminary 48.2). One-third of consumers spontaneously cite gas prices, with the national average $4.54/gallon (+44% YoY); year-ahead inflation expectations 4.5%, long-run 3.4%. April CPI prints Tuesday May 12 - the first read on whether the energy pickup is sustained beyond March''s 3.3% headline. Political pressure on Fed independence intensifies into the May 15 transition - 8-4 dissent on April 29 was the highest since 1992, the Senate Banking 13-11 party-line advance was historically partisan for a Fed Chair nominee, and Trump rate-cut pressure is sustained.'
  confidence: 0.65
  vis.thesisTheme: vis.theme-inflation
  status: wv.active
  confidenceRationale: 'Up to 0.65 from 0.60. UMich preliminary May sentiment hit a fresh record low (48.2), driven explicitly by gas prices ($4.54 national avg, +44% YoY) and tariffs - direct stagflation-pattern read on the consumer side. Year-ahead inflation expectations 4.5% (down a tick from 4.7% but elevated). Tuesday''s April CPI is the inflection - if it prints above the 3.3% March headline with energy contributing, the energy-shock-to-inflation transmission is confirmed and the stagflation case strengthens further. April NFP soft (115K, AHE +3.6%) cuts the wage-pressure leg slightly but the sentiment + energy + Fed-pressure combination dominates.'
