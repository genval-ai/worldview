persistent-energy-shock:
  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: 'Oil prices remain structurally elevated as long as the Strait of Hormuz reopening sequence is incomplete and Iranian retaliation risk is intact. WTI June futures settled $98.07 on May 11 (+3% on the day after Trump rejected Iran''s MOU response) and Brent July $104.21 (+3%); the rejection mechanically deferred the energy-relief tail markets had been pricing through May 6-9. Iran on May 10 formally demanded "full Iranian sovereignty over the Strait of Hormuz" as a precondition for any deal - directly incompatible with the durable-reopening leg of the SequencedCondition invalidation. May 10 Hormuz transit data: 17 vessels (13 inbound / 4 outbound; 10 AIS-visible, 7 dark / EO-detected only) against pre-war ~120 crossings/day. Iran''s newly-formed Persian Gulf Strait Authority (PGSA) requires every transiting vessel to file an IRGC application form. Iran on May 11 framed its demands as "legitimate" / "reasonable and responsible" with no walk-back.'
