equity-melt-up-vs-recession-risk:
  type: wv.WorldviewThesis
  label: Equity melt-up versus building recession risk
  thesisStatement: 'S&P 500 set a fresh ATH 7,412.84 on May 11 (the first close above 7,400) with Nasdaq Composite at 26,274.13 (also fresh ATH) and Russell 2000 setting records too. VIX expanded to 18.36 (+6.80% on the day) - still well below the 25 vol-expansion invalidation threshold. The cash market muscled through the Sunday Trump rejection of Iran''s MOU response (and Monday''s "massive life support" framing) - a meaningful sentiment-vs-price divergence given UMich preliminary May 48.2 (fresh record low) and the energy-into-CPI passthrough (consensus 3.7-3.8% headline) printing tomorrow into a deferred energy-relief environment. Q1 2026 earnings season concluded at 84% beat rate (highest since Q2 2021), 27.1% blended EPS growth, blended net margin 13.4% (May 7 FactSet refresh). Invalidation requires either a vol-expansion break (VIX > 25 with SPY breaking 50d MA) or unimpeded melt-up confirmation (SPX > 7,300 with VIX < 15).'
