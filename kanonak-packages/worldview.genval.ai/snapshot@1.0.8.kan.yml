  thesisStatement: 'Senate cloture vote on Warsh scheduled Monday May 11 at 5:30 PM ET (21:30 UTC) - approximately 1.4 hours after the 20:09 UTC snapshot time. Republicans hold a 53-seat majority and Sen. Fetterman (D-PA) signaled support, so confirmation is effectively locked in before Powell''s chair-term expiry May 15. The transition window through August FOMC is structurally higher-vol than normal because every Warsh comment will be priced as new information; the 13-11 party-line Banking Committee advance was the first fully partisan Fed-Chair vote in committee history. Warsh confirmation-hearing framing - "won''t be sock puppet" / "room to cut without inflation" - introduces a dovish-tilt risk to the dollar / long-duration cross. Tuesday''s April CPI (3.7-3.8% headline consensus, energy passthrough confirmed by Monday''s oil move) is the first major data print Warsh will inherit, against a 10Y at 4.41% / 30Y at 4.97% (May 7 Massive verified; May 8 and May 11 not yet posted upstream).'
