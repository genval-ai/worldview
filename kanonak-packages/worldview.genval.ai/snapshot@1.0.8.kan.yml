iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: 'The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered a multi-year defense spending cycle that benefits prime contractors with missile and missile-defense exposure regardless of diplomatic-track outcomes. With Iran formally rejecting the US 14-point MOU on May 10 (Trump: "TOTALLY UNACCEPTABLE") and Trump on May 11 escalating to "massive life support" for the ceasefire plus implied fresh kinetic exchanges ("just like we knocked them out again today, we''ll knock them out a lot harder, and a lot more violently, in the future"), the procurement / replenishment cycle persists and arguably accelerates. Depleted munitions stockpiles (438 Iranian ballistic missiles, 2,012 drones, 19 cruise missiles fired at UAE through April 1) and Golden Dome ($185B) are committed multi-year programs that survive any near-term deal scenario.'
  confidence: 0.82
  vis.thesisTheme: vis.theme-defense
  status: wv.active
  confidenceRationale: 'Up to 0.82 from 0.80. Trump''s May 11 escalation - "massive life support" framing of the ceasefire plus "just like we knocked them out again today, we''ll knock them out a lot harder, and a lot more violently" - implies a fresh kinetic exchange on Monday that the snapshot cannot fully characterize from open sources at this timestamp but that tilts the threat-and-engage posture further toward engage. Iran reaffirming its demands as "legitimate" / "reasonable and responsible" and vowing to "never bow" keeps durable peace structurally further away. The cumulative munitions-fired denominator (UAE Defense Ministry total: 438 ballistic + 2,012 drones + 19 cruise through April 1) gives a real consumption rate that LMT $194B / RTX $271B backlogs have to absorb. FY2026 $1T defense budget plus Golden Dome commitments survive any deal scenario. Capped near 0.85 - the AndCondition invalidation requires BOTH durable peace AND a sustained 2-quarter DoD outlay decline, neither of which is near firing; further upside needs more concrete fresh-conflict events.'
