# =============================================================================
# Worldview snapshot - 2026-05-11 20:09 UTC (Monday 4:09 PM ET / 1:09 PM PT)
#
# Patch bump from 1.0.7. The Sunday step-down in equity-melt-up did not pan out
# in Monday cash: SPX printed its first close above 7,400 (7,412.84) and
# Nasdaq set a fresh ATH (26,274.13) despite the Trump rejection. But beneath
# the index headline the recession-risk leg got incremental support: WTI June
# +3% settle 98.07, Brent July +3% settle 104.21, VIX +6.80% to 18.36, and
# Trump escalated language to "massive life support" plus an implied fresh
# kinetic exchange ("just like we knocked them out again today, we'll knock
# them out a lot harder, and a lot more violently, in the future").
#
# Confidence shifts: equity-melt-up-vs-recession-risk 0.70 -> 0.72 (partial
# revert of the Sunday tactical step-down; the cash market muscle-through
# deserves recognition but the recession-risk leg also got incremental
# support so the bounce-back is partial); persistent-energy-shock 0.55 ->
# 0.58 (the oil move directly on the rejection confirms structural
# transmission); iran-war-rearmament 0.80 -> 0.82 (Trump's escalated framing
# plus the implied fresh kinetic action locks the procurement-cycle case
# in further); stagflation-risk holds at 0.70 (CPI tomorrow is the binary
# tell); gold-debasement-bid holds at 0.87 (mild pullback inside daily
# band - structural supports intact); ai-capex-cycle holds at 0.85 (NVDA
# +1.96%, AMD +2.4%, Micron fresh ATH; NVDA May 20 print is the binary
# tell); powell-warsh-transition-risk holds at 0.50 (cloture vote scheduled
# 5:30 PM ET = 21:30 UTC, 1.4 hours after snapshot time).
#
# Market data verified via Massive on this refresh: NVDA Friday close
# 215.20 (Monday close 219.44 +1.96% per Yahoo Finance); LMT Friday close
# 506.51; XOM Friday close 144.57. Treasury yield data unchanged from
# May 7 in the upstream dataset (10Y 4.41% / 30Y 4.97%); May 8 and May 11
# not yet posted. Monday cash index closes sourced from Yahoo Finance:
# SPX 7,412.84, NDX 26,274.13, DJI 49,704.47, RUT 2,869.84, VIX 18.36.
#
# Macro this week unchanged in shape from 1.0.7 but the diplomatic-track
# failure plus Monday's oil move re-frame Tuesday's April CPI print
# directly into a no-energy-relief environment. Warsh cloture Monday
# 5:30 PM ET. Lebanon-Israel third round (delegation-level escalation
# from the April ambassador-level talks) Wed-Thu May 14-15 in Washington.
# Powell exits as chair Friday May 15. NVDA Q1 FY2027 May 20 5 PM ET.
#
# Each version of this package is the worldview AS PUBLISHED on a specific
# date. Versions are immutable; new dates produce new versions.
# =============================================================================

view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: 2026-05-11T20:09:39Z
  narrative: >
    Monday-evening reset. The equity cash market absorbed the Sunday Trump
    rejection of Iran's MOU response and printed fresh all-time highs on
    both SPX (7,412.84, the first close above 7,400) and Nasdaq
    (26,274.13). Beneath the index headlines the recession-risk leg got
    incremental support: WTI June +3% settle 98.07 and Brent July +3%
    settle 104.21 directly defer the energy-relief tail into Tuesday's
    April CPI; VIX expanded 6.8% to 18.36 (still well below the 25
    vol-expansion invalidation level); and Trump escalated to "massive
    life support" for the ceasefire alongside a fresh kinetic-exchange
    framing ("just like we knocked them out again today, we'll knock them
    out a lot harder, and a lot more violently, in the future"). Iran
    framed its demands as "legitimate" and "reasonable and responsible"
    and vowed to "never bow," reinforcing the maximalist end-state
    position from Sunday rather than walking it back.

    Persistent-energy-shock steps to 0.58 (from 0.55). Oil moving 3% on
    the rejection is the direct price response - the market priced the
    structural transmission rather than shrugging it off. Hormuz transit
    flow on May 10 totalled 17 vessels (13 inbound / 4 outbound; 10 AIS
    visible, 7 dark / EO-detected) - the procedural opacity that Iran's
    PGSA application overlay was designed to produce, and far below
    pre-war ~120/day. The Iran-sovereignty demand sits squarely against
    the SequencedCondition's durable-reopening leg.

    Iran-war-rearmament steps to 0.82 (from 0.80). Trump's "knocked them
    out again today" framing implies a fresh kinetic exchange on Monday
    that the snapshot cannot fully characterize from open sources at this
    timestamp, but combined with the Sunday rejection it locks the
    procurement-cycle case in further. The FY2026 $1T defense budget plus
    Golden Dome commitments survive any near-term deal-track resolution.

    Equity-melt-up-vs-recession-risk steps to 0.72 (from 0.70). The
    Sunday tactical step-down anticipated cash-market weakness that did
    not materialize; SPX and NDX both set fresh ATHs. The muscle-through
    deserves partial recognition. But the recession-risk leg also got
    incremental support (oil +3%, VIX +6.8%, deal-track failure), so the
    bounce-back stays partial - not back to 0.75. Neither invalidation
    leg fires - VIX 18.36 is well below the 25 vol-expansion threshold
    and the "unimpeded melt-up" leg (SPX>7,300 with VIX<15) also cannot
    fire with VIX at 18.

    Stagflation-risk holds at 0.70. Tuesday's April CPI print (consensus
    headline 3.7-3.8% YoY, core 2.7% YoY, multiple forecasters
    explicitly attributing the lift to gasoline passthrough) is the
    binary near-term tell and the right place for the next confidence
    move. The Monday oil move makes the passthrough mechanically harder
    to undo by Tuesday morning.

    Gold-debasement-bid holds at 0.87. Spot pulled back to roughly
    $4,677-4,730 from Friday's $4,720-4,740 range - inside the normal
    daily band, not a structural break. Central-bank Q1 record 244-tonne
    buying, 30Y Treasury yield 4.97% (May 7 Massive verified, May 8 and
    May 11 not yet posted upstream), and major bank targets implying
    materially higher levels remain the structural bid.

    AI-capex-cycle-with-china-tail holds at 0.85. NVDA Monday +1.96% to
    $219.44 and AMD +2.4% extend the Friday post-Q1 rally; Micron posted
    a fresh ATH (chip-stock rotation continues). The May 20 NVDA Q1
    FY2027 print remains the binary tell for any next move on this
    thesis.

    Powell-Warsh transition risk holds at 0.50. The Senate cloture vote
    is scheduled for 5:30 PM ET (21:30 UTC, 1.4 hours after snapshot
    time) and is procedurally near-certain with a 53-seat Republican
    majority plus Fetterman support. The "what does Warsh do once
    confirmed" risk premium is the active question, which the June 16-17
    FOMC resolves first.

    Calendar this week: April CPI Tuesday May 12 8:30 AM ET (the
    dominant near-term tell with energy passthrough mechanically
    confirmed by Monday's oil move); Lebanon-Israel third round
    Wed-Thu May 14-15 in Washington (Karam, Dermer; delegation-level
    escalation from the April ambassador-level talks); Powell exits as
    chair Friday May 15; NVDA Q1 FY2027 May 20 5 PM ET.
  hasThesis:
    - iran-war-rearmament
    - persistent-energy-shock
    - stagflation-risk
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

