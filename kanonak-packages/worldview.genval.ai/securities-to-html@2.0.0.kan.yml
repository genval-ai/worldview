securities-to-html:
  type: Package
  publisher: worldview.genval.ai
  version: 2.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.1.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.11.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
        - package: derivation
          match: ^
          version: 1.0.0
          alias: derivation
    - publisher: worldview.genval.ai
      packages:
        - package: finance
          match: ^
          version: 3.0.0
          alias: fin
        - package: securities
          match: ^
          version: 2.0.0
          alias: sec
        - package: pages
          match: ^
          version: 2.0.0
          alias: pages

security-to-html-transformation:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: fin.Security
    tx.requires:
      - fin.ticker

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.html

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: title
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.Join
                                tx.separator: ""
                                tx.source:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.VarRef
                                        tx.varName: input
                                      tx.readProp: fin.ticker
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · "
                                    - type: tx.Fallback
                                      tx.primary:
                                        type: tx.PropertyRead
                                        tx.readSource:
                                          type: tx.VarRef
                                          tx.varName: input
                                        tx.readProp: rdfs.label
                                      tx.alternate:
                                        type: tx.StringLiteral
                                        tx.stringLiteral: "Security"
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · worldview.genval.ai"

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <style>
                            dl.metadata{display:none!important}
                            :root{--bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;--accent:#7dd3fc;--accent-2:#38bdf8;--border:#1e293b;--border-soft:#162033;--radius:8px;--radius-sm:4px;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;--font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif}
                            *{box-sizing:border-box;margin:0;padding:0}
                            html,body{background:var(--bg)}
                            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
                            a{color:var(--accent);text-decoration:none;transition:color 120ms}
                            a:hover{color:var(--accent-2)}
                            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
                            [id]{scroll-margin-top:80px}
                            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
                            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
                            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
                            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
                            ul.site-nav-links a:hover{color:var(--fg)}
                            @media (max-width:600px){nav.site-nav{padding:12px 20px}.site-nav-inner{gap:16px}ul.site-nav-links{gap:16px;margin-left:0;flex-basis:100%}}
                            article.security{max-width:880px;margin:0 auto;padding:48px 32px 96px}
                            @media (max-width:760px){article.security{padding:32px 20px 64px}}
                            .hero{padding:0 0 40px;border-bottom:1px solid var(--border);position:relative;padding-right:300px;min-height:180px}
                            .hero::before{content:"";position:absolute;top:-12px;left:0;width:48px;height:2px;background:var(--accent)}
                            .hero-visual{position:absolute;top:8px;right:0;width:280px;height:168px}
                            .hero-visual img{width:100%;height:100%;display:block;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.35)}
                            @media (max-width:780px){.hero{padding-right:0;min-height:0}.hero-visual{position:static;margin:0 auto 24px;width:100%;max-width:400px;height:auto;aspect-ratio:5/3}}
                            .hero-meta{display:flex;align-items:baseline;font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:32px;gap:16px;flex-wrap:wrap}
                            .hero-meta .eyebrow{color:var(--accent)}
                            .security-version{font-family:var(--font-mono);color:var(--accent);font-size:11px;letter-spacing:0.05em;background:rgba(125,211,252,0.1);border:1px solid rgba(125,211,252,0.25);padding:2px 8px;border-radius:4px;text-transform:none}
                            .ticker-line{margin-bottom:16px}
                            .ticker{font-family:var(--font-mono);font-size:42px;font-weight:600;color:var(--accent);letter-spacing:0.04em}
                            @media (max-width:760px){.ticker{font-size:32px}}
                            .hero h1{font-family:var(--font-display);font-size:42px;font-weight:400;letter-spacing:-0.02em;line-height:1.1;color:var(--fg);margin-bottom:24px}
                            @media (max-width:760px){.hero h1{font-size:30px}}
                            .tag-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
                            .tag{display:inline-block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:5px 12px;border-radius:4px;border:1px solid var(--border)}
                            .tag-class{background:rgba(125,211,252,0.10);color:var(--accent);border-color:rgba(125,211,252,0.25)}
                            .tag-sector{background:var(--bg-card);color:var(--fg-dim)}
                            .price-block{margin-top:18px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;font-family:var(--font-mono);font-size:13px;display:inline-flex;align-items:baseline;gap:10px;flex-wrap:wrap}
                            .price-label{color:var(--fg-faint);text-transform:uppercase;letter-spacing:0.1em;font-size:10px}
                            .price{color:var(--fg);font-weight:600;font-size:18px}
                            .price-asof{color:var(--fg-dim);font-size:11px}
                            .security-description{font-size:15px;color:var(--fg-dim);line-height:1.7;margin:24px 0 0;font-weight:300}
                            .security-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);letter-spacing:0.04em}
                            .security-footer p{margin-bottom:6px}
                            .security-footer code{color:var(--accent);background:var(--bg-card);padding:1px 6px;border-radius:3px;border:1px solid var(--border-soft);font-size:11px}
                            .footer-siblings a{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
                            .footer-siblings a:hover{color:var(--accent-2);border-bottom-color:var(--accent-2)}
                            </style>
                            <nav class="site-nav">
                            <div class="site-nav-inner">
                            <a href="/" class="site-nav-brand">worldview.genval.ai</a>
                            <ul class="site-nav-links">
                            <li><a href="/">Latest</a></li>
                            <li><a href="/snapshots/">Snapshots</a></li>
                            <li><a href="/timeline/">Timeline</a></li>
                            <li><a href="/changes/">Changes</a></li>
                            <li><a href="/horizon/">Horizon</a></li>
                            <li><a href="/about/">About</a></li>
                            </ul>
                            </div>
                            </nav>
                            <article class="security" data-security-uri="
                        - type: tx.SubjectUri
                          tx.subjectOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ">
                            <header class="hero">
                        - type: tx.StringLiteral
                          tx.stringLiteral: '<div class="hero-visual"><img src="'
                        - type: tx.UriName
                          tx.uriNameOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: '.svg" alt="Security card" loading="lazy"/></div>'
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <div class="hero-meta">
                            <span class="eyebrow">Security</span>
                            <span class="security-version">v
                        - type: tx.UriVersion
                          tx.uriVersionOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </span>
                            </div>
                            <div class="ticker-line">
                            <span class="ticker">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: fin.ticker
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </span>
                            </div>
                            <h1>
                        - type: tx.Fallback
                          tx.primary:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: rdfs.label
                          tx.alternate:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: fin.ticker
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </h1>
                            <div class="tag-row">

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: sec.typedAssetClass
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<span class="tag tag-class">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: sec.typedAssetClass
                                tx.readProp: rdfs.label
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span>'

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: sec.typedSector
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<span class="tag tag-sector">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: sec.typedSector
                                tx.readProp: rdfs.label
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span>'

                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </div>

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: sec.referencePrice
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<div class="price-block"><span class="price-label">Reference price</span> <span class="price">$'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: sec.referencePrice
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span><span class="price-asof"> as of '
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: sec.priceAsOf
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span></div>'

                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </header>

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: rdfs.comment
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<p class="security-description">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: rdfs.comment
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</p>'

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <footer class="security-footer">
                            <p class="footer-uri">Canonical URI: <code>
                        - type: tx.SubjectUri
                          tx.subjectOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: '</code></p><p class="footer-siblings">Also: <a href="'
                        - type: tx.UriName
                          tx.uriNameOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: '.md">Markdown</a> &middot; <a href="/securities/'
                        - type: tx.UriVersion
                          tx.uriVersionOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            .kan.yml">Source</a></p>
                            </footer>
                            </article>

# =============================================================================
# security-svg-renderer — fin.Security as a sector-colored visual identifier.
# Adopts the 4-tier semantic-zoom convention (see worldview-chrome@1.0.0).
# The visual primitive is a sector-colored rect with the ticker as the iconic
# text; tier-card adds the label + tag chips; tier-full adds the canonical
# URI footer. Sector → color is hardcoded in CSS because Sector has no
# themeHue property in securities@1.2.0; if that property is added later,
# this renderer can switch to reading vis.sectorHue and computing hsl().
# =============================================================================

security-svg-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: fin.Security
    tx.requires:
      - fin.ticker

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.svg

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:
      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.image-svg-xml
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" overflow="hidden">
                            <style>
                            text{font-family:'SF Mono',ui-monospace,Consolas,Menlo,monospace}
                            svg{overflow:hidden}
                            /* Sector palette — hardcoded per sec.Sector instance.
                               Used as the accent band on card / full tiers. */
                            .sec-sector-defense{fill:hsl(0,65%,55%)}
                            .sec-sector-energy{fill:hsl(32,65%,55%)}
                            .sec-sector-semiconductors{fill:hsl(160,65%,55%)}
                            .sec-sector-precious-metals{fill:hsl(48,65%,55%)}
                            .sec-sector-broad-market{fill:hsl(261,65%,55%)}
                            .sec-sector-volatility{fill:hsl(320,65%,55%)}
                            .sec-sector-media-entertainment{fill:hsl(199,65%,55%)}
                            .sec-sector-long-treasury{fill:hsl(180,65%,55%)}
                            .sec-sector-medium-treasury{fill:hsl(200,65%,55%)}
                            .sec-sector-managed-futures{fill:hsl(280,65%,55%)}
                            .sec-bg{fill:#0a0e1a}
                            .sec-frame{fill:none;stroke:#1e293b;stroke-width:2}
                            .sec-ticker-chip{fill:#fff;font-weight:700}
                            .sec-ticker-big{fill:#fff;font-weight:700;letter-spacing:2px}
                            .sec-ticker-card{fill:#7dd3fc;font-weight:700;letter-spacing:1px}
                            .sec-label{fill:#9aa5b8}
                            .sec-tag{fill:#6b7689;letter-spacing:2px}
                            .sec-price{fill:#e6eaf2;font-weight:600}
                            .sec-price-asof{fill:#6b7689}
                            .sec-uri{fill:#7dd3fc}
                            /* 4-tier semantic zoom cascade. */
                            .tier-chip,.tier-icon,.tier-card{display:none}
                            .tier-full{display:block}
                            @media (max-width:400px){
                              .tier-full{display:none}
                              .tier-card{display:block}
                            }
                            @media (max-width:160px){
                              .tier-card{display:none}
                              .tier-icon{display:block}
                            }
                            @media (max-width:60px){
                              .tier-icon{display:none}
                              .tier-chip{display:block}
                            }
                            </style>

                        # =====================================================
                        # tier-chip — dark card with the ticker as the iconic
                        # visual identifier. Ticker is the most recognizable
                        # token for a security at any zoom; sector is dropped
                        # here because color-coding doesn't scale across the
                        # full security universe.
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-chip">
                            <rect x="4" y="4" width="392" height="232" rx="14" class="sec-bg"/>
                            <rect x="4" y="4" width="392" height="232" rx="14" class="sec-frame"/>
                            <text x="200" y="170" text-anchor="middle" class="sec-ticker-chip" font-size="140">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: fin.ticker
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </text>
                            </g>

                        # =====================================================
                        # tier-icon — neutral dark card + big ticker text
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-icon">
                            <rect x="40" y="20" width="320" height="200" rx="20" class="sec-bg"/>
                            <rect x="40" y="20" width="320" height="200" rx="20" class="sec-frame"/>
                            <text x="200" y="142" text-anchor="middle" class="sec-ticker-big" font-size="80">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: fin.ticker
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </text>
                            </g>

                        # =====================================================
                        # tier-card — dark card with sector accent band,
                        # ticker, label, asset-class · sector chips, optional price
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-card">
                            <rect x="4" y="4" width="392" height="232" rx="14" class="sec-bg"/>
                            <rect x="4" y="4" width="392" height="232" rx="14" class="sec-frame"/>
                            <rect x="14" y="14" width="372" height="6" rx="3" class="sec-sector-
                        - type: tx.UriName
                          tx.uriNameOf:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: sec.typedSector
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            "/>
                            <text x="200" y="78" text-anchor="middle" class="sec-ticker-card" font-size="44">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: fin.ticker
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </text>
                            <text x="200" y="106" text-anchor="middle" class="sec-label" font-size="14"><![CDATA[
                        - type: tx.Fallback
                          tx.primary:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: rdfs.label
                          tx.alternate:
                            type: tx.StringLiteral
                            tx.stringLiteral: ''
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ]]></text>
                            <text x="200" y="148" text-anchor="middle" class="sec-tag" font-size="11" style="text-transform:uppercase"><![CDATA[
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.ResolveRef
                            tx.resolveSource:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: sec.typedAssetClass
                          tx.readProp: rdfs.label
                        - type: tx.StringLiteral
                          tx.stringLiteral: ' · '
                        - type: tx.PropertyRead
