site:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: site
          match: ^
          version: 1.0.0
          alias: site
        - package: look
          match: ^
          version: 1.1.0
          alias: look
    - publisher: worldview.genval.ai
      packages:
        - package: snapshot
          match: ^
          version: 2.1.4
          alias: snap
        - package: pages
          match: ^
          version: 2.1.0
          alias: pages
  comment: >-
    Publisher-curation content for worldview.genval.ai — the landing page,
    authored static pages (about), and the site-wide navigation. Every
    entry is a real Kanonak resource that renders via the universal look
    layer, so the validator catches broken nav targets and the URLs are
    not magic strings buried inside a transformation.

index:
  type: site.StaticPage
  label: "worldview.genval.ai"
  site.title: "worldview.genval.ai"
  site.body: |
    Macro worldview tracking — point-in-time reads of the market regime,
    built from evidence, scored as theses, and re-evaluated as the world
    moves. Every snapshot is a frozen, link-stable record of what we
    believed and why.

    ## Browse

    - **Snapshots** — every published worldview, newest first.
    - **Timeline** — the same snapshots ordered as a time series.
    - **Changes** — what moved between consecutive snapshots.
    - **Horizon** — upcoming catalysts that could invalidate active theses.
    - **Sources** — the underlying evidence the theses depend on.
    - **Regime** — the structural read on the current market regime.
    - **About** — what this site is and how to read it.

about:
  type: site.StaticPage
  label: "About"
  site.title: "About worldview.genval.ai"
  site.body: |
    worldview.genval.ai is a public log of macro-market readings. It
    publishes a *worldview snapshot* on a regular cadence — each snapshot
    a JSON-and-evidence-backed view on the regime, the active theses, the
    open catalysts, and the level of conviction behind each call.

    ## How the site is laid out

    - Each **snapshot** is a versioned resource at
      `/snapshot/<version>/view`. The latest is always available at
      `/snapshot/view` (the `*` operator — latest matching package).
      Individual theses, evidence items, and sources are addressable
      under the same path.
    - **Aggregate views** (Snapshots, Timeline, Changes, Horizon,
      Sources, Regime) are pages that summarize across every published
      snapshot. They live at `/<aggregate>/` and re-publish on each
      release.

    ## What you're looking at

    The site is built on Kanonak Protocol — an ontology-first model for
    publishing reasoning-grade content. Every page on this site is a
    Kanonak resource with declared types, properties, and relationships.
    The HTML is a derivation of the underlying graph. The same data
    flows through aggregations, validators, and (eventually) downstream
    consumers without re-authoring.

    Source: <https://github.com/genval-ai/worldview>

nav-latest:
  type: look.NavLink
  label: "Latest"
  look.target: snap.view

nav-snapshots:
  type: look.NavLink
  label: "Snapshots"
  look.target: pages.snapshots-aggregate

nav-timeline:
  type: look.NavLink
  label: "Timeline"
  look.target: pages.timeline-aggregate

nav-regime:
  type: look.NavLink
  label: "Regime"
  look.target: pages.regime-aggregate

nav-changes:
  type: look.NavLink
  label: "Changes"
  look.target: pages.changes-aggregate

nav-horizon:
  type: look.NavLink
  label: "Horizon"
  look.target: pages.horizon-aggregate

nav-sources:
  type: look.NavLink
  label: "Sources"
  look.target: pages.sources-aggregate

nav-about:
  type: look.NavLink
  label: "About"
  look.target: about

site-nav:
  type: look.NavGroup
  label: "worldview.genval.ai navigation"
  look.entries:
    - nav-latest
    - nav-snapshots
    - nav-timeline
    - nav-regime
    - nav-changes
    - nav-horizon
    - nav-sources
    - nav-about
