site:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: site
          match: ^
          version: 1.0.0
          alias: site
        - package: look
          match: ^
          version: 1.1.0
          alias: look
        - package: derivation
          match: ^
          version: 1.1.0
          alias: derivation
    - publisher: worldview.genval.ai
      packages:
        - package: snapshot
          match: ^
          version: 2.1.4
          alias: snap
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
  comment: >-
    Publisher-curation content for worldview.genval.ai — landing page,
    about, aggregate pages, and site-wide navigation. Every entry is a
    real Kanonak resource rendered by the look layer; the validator
    catches broken nav targets and no URLs are hidden inside transformations.

index:
  type: site.StaticPage
  rdfs.label: "worldview.genval.ai"
  site.title: "worldview.genval.ai"
  site.body: |
    Macro worldview tracking — point-in-time reads of the market regime,
    built from evidence, scored as theses, and re-evaluated as the world
    moves. Every snapshot is a frozen, link-stable record of what we
    believed and why.

    ## Browse

    - **Snapshots** — every published worldview, newest first.
    - **Timeline** — the same snapshots ordered as a time series.
    - **Changes** — what moved between consecutive snapshots.
    - **Horizon** — upcoming catalysts that could invalidate active theses.
    - **Sources** — the underlying evidence the theses depend on.
    - **Regime** — the structural read on the current market regime.
    - **About** — what this site is and how to read it.

about:
  type: site.StaticPage
  rdfs.label: "About"
  site.title: "About worldview.genval.ai"
  site.body: |
    worldview.genval.ai is a public log of macro-market readings. It
    publishes a *worldview snapshot* on a regular cadence — each snapshot
    a JSON-and-evidence-backed view on the regime, the active theses, the
    open catalysts, and the level of conviction behind each call.

    ## How the site is laid out

    - Each **snapshot** is a versioned resource at
      `/snapshot/<version>/view`. The latest is always available at
      `/snapshot/view` (the `*` operator — latest matching package).
      Individual theses, evidence items, and sources are addressable
      under the same path.
    - **Aggregate views** (Snapshots, Timeline, Changes, Horizon,
      Sources, Regime) are pages that summarize across every published
      snapshot. They live at `/<aggregate>/` and re-publish on each
      release.

    ## What you're looking at

    The site is built on Kanonak Protocol — an ontology-first model for
    publishing reasoning-grade content. Every page on this site is a
    Kanonak resource with declared types, properties, and relationships.
    The HTML is a derivation of the underlying graph. The same data
    flows through aggregations, validators, and (eventually) downstream
    consumers without re-authoring.

    Source: <https://github.com/genval-ai/worldview>

nav-latest:
  type: look.NavLink
  rdfs.label: "Latest"
  look.target: snap.view

nav-snapshots:
  type: look.NavLink
  rdfs.label: "Snapshots"
  look.target: snapshots-aggregate

nav-timeline:
  type: look.NavLink
  rdfs.label: "Timeline"
  look.target: timeline-aggregate

nav-regime:
  type: look.NavLink
  rdfs.label: "Regime"
  look.target: regime-aggregate

nav-changes:
  type: look.NavLink
  rdfs.label: "Changes"
  look.target: changes-aggregate

nav-horizon:
  type: look.NavLink
  rdfs.label: "Horizon"
  look.target: horizon-aggregate

nav-sources:
  type: look.NavLink
  rdfs.label: "Sources"
  look.target: sources-aggregate

nav-about:
  type: look.NavLink
  rdfs.label: "About"
  look.target: about

site-nav:
  type: look.NavGroup
  rdfs.label: "worldview.genval.ai navigation"
  look.entries:
    - nav-latest
    - nav-snapshots
    - nav-timeline
    - nav-regime
    - nav-changes
    - nav-horizon
    - nav-sources
    - nav-about

snapshots-aggregate:
  type: site.StaticPage
  rdfs.label: "Snapshots"
  site.title: "All snapshots"
  site.body: |
    Every published worldview snapshot, newest first. Each entry links
    to the full report.
  derivation.look:
    type: look.ResourceView
    look.bands:
      - type: look.Hero
        look.title: site.title
      - type: look.Markdown
        look.source: site.body
      - type: look.ResourceGrid
        look.source: wv.WorldviewSnapshot

timeline-aggregate:
  type: site.StaticPage
  rdfs.label: "Timeline"
  site.title: "Worldview timeline"
  site.body: |
    The full sequence of snapshots as a time series.
