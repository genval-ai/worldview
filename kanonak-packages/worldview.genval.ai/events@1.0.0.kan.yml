events:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.1.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.2.0
          alias: wv
        - package: finance
          match: ^
          version: 2.1.0
          alias: fin
        - package: securities
          match: ^
          version: 1.2.0
          alias: sec

# =============================================================================
# Public event log + Event-subclass taxonomy.
#
# A scheduled or anticipated market event creates a catalyst window.
# Subclasses identify the event category. Strategies in any downstream
# portfolio system may be triggered by or hedge against specific events;
# a worldview thesis may cite an event as supportingEvidence or as the
# subject of an EventCondition.
#
# This package serves two roles:
#   1. Defines the public Event-subclass taxonomy (EarningsEvent,
#      FOMCEvent, EconomicDataEvent, GeopoliticalEvent, RegulatoryEvent)
#      as subclasses of wv.Event.
#   2. Serves as the canonical event log - named instances of upcoming
#      and historical events that any publisher running a worldview can
#      reference by URI.
#
# Public on the theory that the events themselves are facts. Multiple
# publishers may interpret the same event differently in their theses;
# they all reference the same `worldview.genval.ai/events/amd-q1-2026-earnings`
# URI as the subject.
# =============================================================================

# =============================================================================
# 1. EVENT SUBCLASS TAXONOMY
# =============================================================================

EarningsEvent:
  type: rdfs.Class
  subClassOf: wv.Event
  label: Earnings Event
  comment: >-
    Scheduled corporate earnings release. Creates implied-volatility
    expansion before and reset after the print. Future revisions may
    add per-earnings properties (consensusEPS, consensusRevenue,
    lastQuarterMove) on this subclass.

FOMCEvent:
  type: rdfs.Class
  subClassOf: wv.Event
  label: FOMC Event
  comment: >-
    Federal Open Market Committee meeting and statement. Drives rate,
    balance-sheet, and forward-guidance expectations.

EconomicDataEvent:
  type: rdfs.Class
  subClassOf: wv.Event
  label: Economic Data Event
  comment: >-
    Scheduled macro economic data release - CPI, NFP, GDP, retail sales,
    PMI, consumer sentiment. Creates short-term cross-asset volatility
    on the print.

GeopoliticalEvent:
  type: rdfs.Class
  subClassOf: wv.Event
  label: Geopolitical Event
  comment: >-
    Geopolitical catalyst - war escalation, ceasefire, treaty signing,
    sanctions. May be scheduled (negotiated talks) or unscheduled
    (military action). Creates cross-asset moves in oil, gold, defense
    equities, and risk assets generally.

RegulatoryEvent:
  type: rdfs.Class
  subClassOf: wv.Event
  label: Regulatory Event
  comment: >-
    Government / regulator action - rule changes, executive orders,
    confirmations, hearings, antitrust rulings. Distinct from FOMC
    (which is monetary policy) - this captures fiscal, trade, and
    administrative policy actions.

# =============================================================================
# 2. EVENT PROPERTIES
# =============================================================================

eventDate:
  type: owl.DatatypeProperty
  domain: wv.Event
  range: xsd.date
  label: Event Date
  comment: Scheduled or expected date of the event.

affectsSecurity:
  type: owl.ObjectProperty
  domain: wv.Event
  range: fin.Security
  label: Affects Security
  comment: Securities directly impacted by this event.

eventDescription:
  type: owl.DatatypeProperty
  domain: wv.Event
  range: xsd.string
  label: Event Description
  comment: Short description of the event and what is at stake.

# =============================================================================
# 3. EVENT INSTANCES — upcoming + recent catalysts
#
# Migrated from portfolio-ops.kanonak.com/market-events@1.0.0. Each
# instance's class IS its category - EarningsEvent / FOMCEvent /
# RegulatoryEvent / EconomicDataEvent / GeopoliticalEvent. No separate
# eventType property is needed.
# =============================================================================

amd-q1-2026-earnings:
  type: EarningsEvent
  label: AMD Q1 2026 earnings release
  eventDate: 2026-05-05
  affectsSecurity: sec.amd
  eventDescription: >-
    AMD reports Q1 2026 results after market close. Consensus EPS $1.29,
    revenue $9.88B. Bull case requires data center revenue above $5.6B
    and Q2 guide above $10.5B. Bear case data center under $5.4B drives
    8-15% downside. Stock up 59% YTD into print, asymmetric downside
    given heavy positioning.

dis-q2-fy2026-earnings:
  type: EarningsEvent
  label: Disney Q2 FY2026 earnings release
  eventDate: 2026-05-06
  eventDescription: >-
    Disney reports Q2 FY2026 (calendar Q1) before market open. Consensus
    EPS $1.49, revenue $25.03B. Streaming margin progress (target around
    10% SVOD operating margin) is the key debate. Parks, sports, content
    slate strength all secondary tells.

nvda-q1-fy2027-earnings:
  type: EarningsEvent
  label: NVIDIA Q1 FY2027 earnings release
  eventDate: 2026-05-20
  affectsSecurity: sec.nvda
  eventDescription: >-
    NVIDIA reports Q1 FY2027 after market close. Revenue forecast $78B
    (+77% YoY), explicitly excludes all China data-center compute.
    Huang's estimated unrealized China market ~$50B "effectively gone
    with no clear return timeline."

warsh-confirmation:
  type: RegulatoryEvent
  label: Kevin Warsh Fed Chair confirmation
  eventDate: 2026-05-15
  eventDescription: >-
    Senate confirmation vote for Kevin Warsh as Fed Chair, succeeding
    Powell. Powell expected to retain Board of Governors seat for an
    unspecified period. Confirmation creates immediate market reaction;
    first Warsh-led FOMC roughly mid-June.

april-cpi-release:
  type: EconomicDataEvent
  label: April CPI release
  eventDate: 2026-05-12
  eventDescription: >-
    April Consumer Price Index. Critical given Fed stagflation framing.
    Hot print means rate-cut path further deferred, dollar/yields up,
    gold likely up. Cool print means traditional disinflation narrative
    resumes, equities rally.

april-jobs-report:
  type: EconomicDataEvent
  label: April nonfarm payrolls
  eventDate: 2026-05-08
  eventDescription: >-
    April nonfarm payrolls and unemployment rate. Recent trend is
    low-hire/low-fire, unemployment 4.3-4.4%. Material miss in either
    direction shifts Fed reaction function.

iran-ceasefire-status:
  type: GeopoliticalEvent
  label: Iran ceasefire status review
  eventDate: 2026-05-10
  affectsSecurity: sec.xle
  eventDescription: >-
    Ongoing review of fragile Iran ceasefire. UAE intercepted Iranian
    missiles May 4. Status not bound to a specific date but each week
    without renewed strikes increases probability of durable peace; each
    fresh incident reverses that.
