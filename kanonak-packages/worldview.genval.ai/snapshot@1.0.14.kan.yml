stagflation-risk:
  type: wv.WorldviewThesis
  label: Stagflation risk and Fed independence stress
  thesisStatement: 'April CPI on Tuesday May 12 fired the energy-passthrough binary tell directly: headline 3.8% YoY (highest since May 2023), core 2.8% YoY. April PPI Wednesday May 13 ran hotter than CPI - headline +1.4% m/m / +6.0% YoY, core +1.0% m/m / +5.2% YoY (highest in three years). April import prices Thursday May 14 added +1.9% m/m / +4.2% YoY (largest YoY since October 2022) with imported fuel +16.3% m/m. Friday May 15 delivered the sharpest single-session rate-path repricing of the cycle: oil +4.5% (WTI to $106, weekly +11%) on Trump losing patience with Iran plus fresh Hormuz incidents, the 10Y to 4.59% (up ~13bps in one day, fresh ~1-year high, biggest weekly yield jump since April 2025), and CME FedWatch hike-by-December odds to ~56% from ~36% Thursday and ~16% a week earlier - a 20pp single-day move that prices the structural-inflation regime across two independent measurements moving in lockstep. TLT $83.66 (Massive verified, -1.48%). April retail sales solid (+0.5% m/m, third consecutive monthly increase, core +0.7%) confirms the consumer is still absorbing the energy passthrough. Powell exited chair Friday May 15 with conciliatory final remarks and Warsh now chair; first Warsh-as-chair public statement is still ahead, with the June 16-17 FOMC the first decision point under the hottest inflation backdrop in three years. April PCE - the formal invalidation indicator - is still ahead this month.'
  confidence: 0.81
  vis.thesisTheme: vis.theme-inflation
  status: wv.active
  confidenceRationale: 'Steps from 0.79 to 0.81. The Friday May 15 oil shock (+4.5% / weekly +11%) extends the energy-passthrough directly into the April PCE and forward inflation prints; the same-day 10Y move to 4.59% (~13bps up, fresh 1-year high) and CME FedWatch hike-by-December move to ~56% (from ~36% Thursday, ~16% a week earlier) is the sharpest single-session rate-path repricing of the cycle and a sustained third-independent-measurement confirmation. The thesis statement explicitly named CME FedWatch repricing as the rate-path tell - that tell stepped 20pp in one day. Held below 0.85 because the formal invalidation indicator is core PCE (not CPI / PPI / imports / yields / hike-odds) and the April PCE release is still ahead; the June 16-17 FOMC dot plot is the next direct read on whether Warsh-as-chair shifts the dovish/hawkish balance.'
