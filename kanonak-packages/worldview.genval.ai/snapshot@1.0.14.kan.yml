persistent-energy-shock:
  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: 'Oil prices remain structurally elevated as long as the Strait of Hormuz reopening sequence is incomplete and Iranian retaliation risk is intact. Friday May 15 delivered direct market repricing of Thursday''s diplomatic-positive walk-back: WTI closed near $106 (+4.5% on the day; weekly +11%), Brent settled $106.89 (+1.11%, with intraday readings as high as $110). XLE $59.44 (+2.36%), XOM $157.92 (+3.36%), CVX $191.10 (+2.39%). The catalysts: Trump told reporters on Air Force One he is "losing patience" with Iran and reframed the prior ceasefire as a favor to Pakistan; the Honduras-flagged Hui Chuan was seized off Fujairah and diverted toward Iranian waters; a separate cargo vessel sunk near Oman; China''s Foreign Ministry confirmed China will continue purchasing Iranian oil, which partly undercuts Thursday''s Trump-Xi joint Hormuz-open commitment. The Iran May 10 demand for "full Iranian sovereignty over the Strait of Hormuz" remains in force and procedurally incompatible with the durable-reopening leg of the SequencedCondition invalidation; the US naval blockade remains active. Cumulative supply loss >14M bpd, >1B barrels from Gulf producers since the war began. Saudi Aramco CEO Amin Nasser previously framed the supply impact as "roughly 100 million barrels of supply each week." The diplomatic-pathway pivot the 1.0.13 trim from 0.65 to 0.62 priced in just got tested and partly failed; markets repriced UP across the energy complex.'
  confidence: 0.66
  vis.thesisTheme: vis.theme-energy
  status: wv.active
  confidenceRationale: 'Steps from 0.62 to 0.66. The 1.0.13 trim to 0.62 was specifically the rhetorical Trump-Xi Hormuz-open / mediator-offer / Bessent-China-behind-scenes alignment; on Friday May 15 (the very next session) that alignment got materially walked back: Trump "losing patience" framing on Air Force One, the Hui Chuan seizure and Oman ship sinking restored the Strait-effectively-closed narrative, and China publicly confirmed it will continue buying Iranian oil. Oil priced the walk-back directly: WTI +4.5% / weekly +11%, Brent intraday to ~$110, energy equities up 2-3%. The step UP reverses the Thursday trim and adds for fresh kinetic incidents. Bounded by: Iran has still not formally responded to either the May 10 sovereignty demand context or the Trump-Xi framework; the SequencedCondition still requires durable Hormuz reopening AND 30 days of WTI<$80, neither anywhere near firing - the price action is regime-confirming not regime-resolving.'
