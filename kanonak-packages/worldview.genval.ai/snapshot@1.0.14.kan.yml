  type: wv.WorldviewThesis
  label: Gold structural debasement bid
  thesisStatement: 'Gold sits in mid-cycle of a multi-year structural bull market driven by central-bank buying, sovereign de-dollarization, $39T US debt, stock-bond correlation breakdown, and Fed independence concerns. Q1 2026 set records on multiple dimensions - LBMA quarterly average $4,873/oz, central-bank net purchases 244 tonnes (highest Q1 ever, +17% QoQ), aggregate Q1 demand value $193B. Spot fell to ~$4,530 on Friday May 15 (~$130 drop from Thursday''s $4,660 band) on the rate-up + earlier-week diplomatic-positive backdrop. GLD $417.29 (Massive verified, -2.31%, OHLC 417.64/419.25/414.12/417.29 on 9.4M shares); GDX $87.35 (Massive verified, -7.03% - miners showing characteristic leverage on the cash-complex drawdown). The Friday rate move (10Y to 4.59%, fresh 1-year high, biggest weekly jump since April 2025) is the immediate headwind; meanwhile the Trump-losing-patience / Hui Chuan seizure / Oman ship sinking cuts against Thursday''s diplomatic-positive readout that had been pressuring gold. Major bank targets all imply materially higher levels (JPM $5,055-$6,300, UBS $6,200, Citi $5,000-$7,000); the multi-year structural-bull case is unchanged by a single ~3% session and a -7% miner move. The AndCondition invalidation still requires three hard things simultaneously - durable US-Iran peace AND Fed credibility restored AND a sustained 6-month deficit decline - none of which moved closer.'
