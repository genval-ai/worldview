view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: 2026-05-16T03:37:02Z
  narrative: >
    Post-Friday-close refresh covering the May 15 cash session - the
    [[view]] window from the 1.0.13 22:52-ET wrap (May 15 02:52 UTC)
    to the May 16 03:37 UTC capture. Friday delivered a regime test
    in one direction: yesterday's Trump-Xi Hormuz alignment was
    partially walked back as Trump told reporters on Air Force One he
    is "losing patience" with Iran and that the prior ceasefire was
    granted "as a favor to Pakistan"; the Strait of Hormuz registered
    fresh kinetic incidents (Honduras-flagged Hui Chuan seized off
    Fujairah and diverted toward Iranian waters; a separate cargo
    vessel reported sunk near Oman); China's Foreign Ministry framed
    "the use of force is a dead end" but also confirmed China will
    continue buying Iranian oil, partly undercutting Thursday's joint
    Hormuz-open commitment. The market repriced the diplomatic-
    positive walk-back across every cross at once.

    **Equity.** [[sec.spx]] closed 7,408.50 (-1.24%), retreating
    below 7,500 from Thursday's 7,501.24 record; [[sec.ixic]] (Nasdaq
    Composite) -1.54% to 26,225.14 from Thursday's 26,635.22 record;
    DJI -0.76% (about 380 pts); [[sec.spy]] $739.17 (Massive verified,
    -1.20%, OHLC 741.79/743.46/737.96/739.17 on 60.4M shares);
    [[sec.vix]] surged ~10% to ~19 (still inside 15-20 mid-zone, well
    below the 25 vol-expansion threshold). The named tell from the
    1.0.13 step-up - muscle-through across CPI/PPI/imports - was
    tested by Friday's oil shock + tech wreck and *did not hold past
    the next session*. [[equity-melt-up-vs-recession-risk]] **trims
    from 0.74 to 0.71**, reversing Thursday's step exactly.

    **AI/China.** Chip complex saw broad profit-taking after the
    parabolic run: [[sec.nvda]] -4.42% to $225.32 (Massive verified,
    OHLC 229.76/231.50/224.24/225.32, vol 181M); [[sec.amd]] -5.69%
    to $424.10 (Massive verified, vol 29.1M); Intel -8% to ~$108
    (after a YTD +214% run); Micron -6.6%. CSCO printed a divergent
    +13.4% cash-session close at $118.21 (Massive verified, vol
    38.5M) confirming the Wednesday-AH Q3 print and the AI-spend
    backdrop independent of the chip selloff. The Trump-Xi summit
    concluded with few concrete agreements: Trump touted "fantastic
    trade deals" including 200 Boeing jets and a soybean-purchase
    commitment, but neither Beijing nor Boeing confirmed those
    specifics. Most importantly: the **H200 framework from Thursday
    holds** - no policy reversal, no extended export controls, no
    breakdown on AI. The May 20 [[ev-nvda-q1-fy27-78b-guide-may20|
    NVDA Q1 FY2027]] print remains the binary tell. The price-action
    giveback is profit-taking against still-asymmetric Chinese-side
    absorption (China did not echo the H200 readout) rather than a
    thesis break. [[ai-capex-cycle-with-china-tail]] **trims from
    0.88 to 0.86**.

    **Iran/energy.** WTI closed near $106 (+4.5%, booking an 11%
    weekly gain); Brent $106.89 (+1.11%, intraday readings as high
    as $110). [[sec.xle]] $59.44 (Massive verified, +2.36%);
    [[sec.xom]] $157.92 (Massive verified, +3.36%); [[sec.cvx]]
    $191.10 (Massive verified, +2.39%). The Hui Chuan seizure and
    Oman ship sinking, combined with Trump's "losing patience"
    framing and China's confirmation it will continue buying
    Iranian oil, materially walks back Thursday's diplomatic-
    positive Trump-Xi readout that the 1.0.13 trim from 0.65 to 0.62
    was specifically pricing in. The market repriced UP across crude
    + energy equities; the trim's rationale just reversed.
    [[persistent-energy-shock]] **steps from 0.62 to 0.66**. Defense
    primes were mixed-to-down on the chip-led tape rotation:
    [[sec.lmt]] $516.01 (Massive verified, -0.85%); [[sec.rtx]]
    $171.18 (Massive verified, -2.56%); [[sec.noc]] $540.69 (Massive
    verified, -1.45%). The procurement cycle does not bend on a
    daily rotation; [[iran-war-rearmament]] **holds at 0.82**.

    **Gold.** Spot fell to ~$4,530 (~$130 drop from Thursday's
    $4,660 band) on the rate-up + earlier-week diplomatic-positive
    backdrop, even as Friday's late-day Iran developments cut
    against the diplomatic positive. [[sec.gld]] $417.29 (Massive
    verified, -2.31%, OHLC 417.64/419.25/414.12/417.29);
    [[sec.gdx]] $87.35 (Massive verified, -7.03%, miners showing
    leverage on the cash-complex drawdown). Structural-bull
    supports (Q1 244t central-bank buying, $4,873 LBMA average,
    JPM/UBS/Citi targets at $5K-$7K, Fed-credibility pressure)
    unchanged. The cash-complex drawdown is the immediate signal;
    structural case is multi-year. [[gold-debasement-bid]] **trims
    modestly from 0.86 to 0.85**.

    **Rates and stagflation.** Friday delivered the sharpest rate-
    path repricing of the refresh window: 10Y to 4.59% (up ~13bps
    from Thursday's 4.461% close, fresh ~1-year high, biggest weekly
    yield jump since April 2025); [[sec.tlt]] $83.66 (Massive
    verified, -1.48% from Thursday $84.92). **CME FedWatch hike-by-
    December rose to ~56% from ~36% Thursday and ~16% a week ago** -
    a 20pp single-day repricing on the oil shock that confirms the
    structural-inflation regime across two independent measurements
    moving in lockstep. April PCE later this month remains the
    formal invalidation indicator; the backdrop the upcoming PCE
    print will be measured against is the hottest in three years.
    [[stagflation-risk]] **steps from 0.79 to 0.81**.

    **Fed transition.** Powell completed his chair-term exit Friday
    with conciliatory final remarks ("Stay out of elected politics"
    advice to Warsh; pledge to "keep a low profile as a governor").
    Powell remains on the Board of Governors through 2028. The
    procedural transition was smooth; Warsh now chair. No Warsh-as-
    chair public statement yet - that opens at the June 16-17 FOMC
    under the 4.59% 10Y / 56% CME-hike-by-December backdrop.
    [[powell-warsh-transition-risk]] **holds at 0.50**.

    **Israel-Lebanon.** Direct talks Day 2 in Washington produced a
    framework agreement plus a 45-day ceasefire extension; the
    security track launches at the Pentagon May 29 and the political
    track resumes June 2-3. State Department characterized the days
    as "productive and positive." Concurrent: Israeli strike killed
    seven in Lebanon during the talks - underscoring how unsettled
    the on-ground picture remains even as the diplomatic track
    advances.

    **Calendar from here.** [[ev-nvda-q1-fy27-78b-guide-may20|NVDA
    Q1 FY2027]] Wednesday May 20 5 PM ET (consensus $78.8B / $1.77
    EPS, Q2 guide near $86B is what the print rides on); April PCE
    later this month (formal stagflation-thesis invalidation
    indicator); first Warsh-as-chair public remarks; June 16-17
    FOMC is Warsh's first chair meeting under a backdrop of 56%
    hike-by-December odds, 10Y at 4.59%, and CPI/PPI/imports all
    running hot.
  hasThesis:
    - iran-war-rearmament
    - persistent-energy-shock
    - stagflation-risk
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: 'The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered a multi-year defense spending cycle that benefits prime contractors with missile and missile-defense exposure regardless of diplomatic-track outcomes. The Trump-Xi summit concluded Friday May 15 without any concrete Iran de-escalation deliverable; Trump told reporters on Air Force One that he is "losing patience" with Iran and reframed the prior ceasefire as a personal favor to Pakistan. Fresh Hormuz incidents printed mid-summit: the Honduras-flagged Hui Chuan ("floating armory") seized off Fujairah and diverted toward Iranian waters, plus a separate cargo vessel sunk near Oman. China publicly confirmed it will continue purchasing Iranian oil, partly cutting against the Thursday Hormuz-open commitment. Depleted munitions stockpiles (438 Iranian ballistic missiles, 2,012 drones, 19 cruise missiles fired at UAE through April 1) and Golden Dome ($185B) are committed multi-year programs that survive any near-term deal scenario. Defense primes were mixed-to-down on Friday May 15 chip-led tape rotation: LMT $516.01 (-0.85%), RTX $171.18 (-2.56%), NOC $540.69 (-1.45%). Daily rotation does not bend the multi-year procurement cycle.'
  confidence: 0.82
  vis.thesisTheme: vis.theme-defense
  status: wv.active
  confidenceRationale: 'Held at 0.82. The Trump-Xi summit concluded with no concrete Iran de-escalation; Friday brought fresh Hormuz kinetic incidents (Hui Chuan seizure, Oman ship sunk) and Trump''s "losing patience" framing - directionally supportive of continued procurement-cycle demand but not a step-change. Defense-prime closes were a continued daily rotation away (LMT -0.85%, RTX -2.56%, NOC -1.45%) on a chip-weak, oil-up tape - daily noise rather than a procurement signal. The AndCondition invalidation still requires BOTH durable peace AND a sustained 2-quarter DoD outlay decline; the diplomatic track moved *away* from durable peace this session. FY2026 $1T defense budget plus Golden Dome commitments remain structurally robust independent of the diplomatic track.'
