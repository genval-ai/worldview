powell-warsh-transition-risk:
  type: wv.WorldviewThesis
  label: Fed leadership transition policy uncertainty
  thesisStatement: 'Powell completed his Fed chair-term exit Friday May 15 2026 with conciliatory final remarks: advised Warsh to "Stay out of elected politics" and pledged to "keep a low profile as a governor" through his Board term that runs through 2028. Senate had confirmed Warsh as Federal Reserve Chair 54-45 on Wednesday May 13 - the narrowest modern-era margin since the current approval process was put in place in 1977; Fetterman (D-PA) was the only Democratic crossover. The 13-11 party-line Banking Committee advance, the 51-45 governor confirmation, and the 54-45 chair confirmation all stand as historically partisan Fed-Chair-track outcomes. The procedural transition was smooth and not a market-vol event in itself. Warsh confirmation-hearing framing - "won''t be sock puppet" / "room to cut without inflation" - introduces a dovish-tilt risk to the dollar / long-duration cross. Friday May 15 delivered the sharpest rate-path repricing of the cycle: 10Y to 4.59% (fresh ~1-year high; biggest weekly jump since April 2025), CME FedWatch hike-by-December to ~56% from ~36% Thursday - sharpening the contradiction between Warsh''s "room to cut" framing and the inherited backdrop (CPI 3.8%, PPI +6.0% YoY, imports +4.2% YoY, oil $106). No Warsh-as-chair public statement yet; the substantive policy-content question opens at the June 16-17 FOMC.'
