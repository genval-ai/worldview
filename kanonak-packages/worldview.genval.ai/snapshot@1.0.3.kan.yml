# =============================================================================
# Worldview snapshot - 2026-05-09 (early Saturday weekend-prep observation)
#
# End-of-week summary after Friday's close + Saturday-morning take into
# the Monday May 11 Warsh Senate cloture vote. Equity melt-up confirmed
# at six straight winning weeks with SPX and Nasdaq fresh ATHs Friday;
# Iran negotiation crystallized from "great progress" to a specific
# one-page memorandum framework Iran is reviewing; Lebanon ceasefire
# violations escalated to "most intense since the truce" per UN.
#
# Each version of this package is the worldview AS PUBLISHED on a
# specific date. Versions are immutable; new dates produce new versions.
# =============================================================================

view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: 2026-05-09T03:00:00Z
  narrative: >
    Saturday-morning weekend take into the May 11 Warsh Senate cloture vote.
    The dominant Friday move was the equity-melt-up confirmation: SPX
    closed at 7,398.93 (+0.84% Friday, +2.3% week) and Nasdaq at 26,247.08
    (+1.71%, +4.5% week), both fresh all-time highs at six straight winning
    weeks - the April jobs softness plus AI-capex tailwinds keep doing
    their work. VIX printed 17.08 at the Thursday close. The Iran track
    crystallized further: Iran is now reviewing a specific one-page memo
    that would declare end of conflict and trigger a 30-day window for
    nuclear-moratorium / asset-unfreeze / Hormuz-security to land - more
    concrete than the May 6 "great progress" framing. Trump told reporters
    "very possible we'll make a deal" after 24 hours of talks. Lebanon
    overhang escalated against this: UN flagged this week's Israel-
    Hezbollah strikes as the most intense since the April 16 truce, and
    Tehran still refuses any wider deal that doesn't include a halt to
    Lebanon. Warsh cloture vote scheduled Monday 5:30 PM ET; 53 GOP plus
    Fetterman (D-PA) signaling yes makes Senate confirmation effectively
    locked in before Powell's chair-term expiry May 15.
  hasThesis:
    - iran-war-rearmament
    - persistent-energy-shock
    - stagflation-risk
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

