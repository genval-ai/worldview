stagflation-risk:
  type: wv.WorldviewThesis
  label: Stagflation risk and Fed independence stress
  thesisStatement: 'The Fed faces a hard mandate balance with energy-driven inflation moderating only on the May ceasefire and unemployment at 4.3-4.4%. Political pressure on Fed independence intensifies into the May 15 transition - 8-4 dissent on April 29 was the highest since 1992, the Senate Banking 13-11 party-line advance was historically partisan for a Fed Chair nominee, and Trump rate-cut pressure is sustained. Real assets and defensive positioning benefit; long duration is exposed.'
  confidence: 0.6
  vis.thesisTheme: vis.theme-inflation
  status: wv.active
  confidenceRationale: 'Stepped down from 0.65 to 0.60 on the May 8 NFP print (115K vs 185K March, AHE +3.6% YoY vs +3.8% expected). Soft labor and easing wage pressure relax the stagflation case on the inflation side; 10y eased to 4.38%. Fed-independence side intact - Warsh full-Senate vote Monday May 11.'
