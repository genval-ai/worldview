ai-capex-cycle-with-china-tail:
  type: wv.WorldviewThesis
  label: AI capex sustained but with China decoupling tail risk
  thesisStatement: 'Hyperscaler AI capex continues at elevated pace into 2026 (NVDA $725B+, Gartner $1.3T+ semis with 30% AI share). AMD Q1 2026 (May 5 AH) materially confirmed the thesis - revenue $10.3B vs $9.88B consensus, Data Center +57% YoY at $5.8B vs $5.4B consensus, Q2 guide $11.2B vs $10.3B consensus. NVIDIA China revenue remains effectively zero structurally; the H20 / MI308 15% revenue-share deal partially monetizes the export-control impairment. Tail risk remains escalation of US-China export controls beyond H20.'
  confidence: 0.85
  vis.thesisTheme: vis.theme-ai
  status: wv.active
  confidenceRationale: 'Up to 0.85 from 0.75. The AMD Q1 print and Q2 guide held through the next trading day; data-center momentum is corroborated and not a one-print event. Only surviving invalidation path is China export-control extension (the named tail). NVDA Q1 FY2027 prints May 20 - the next material datapoint.'
