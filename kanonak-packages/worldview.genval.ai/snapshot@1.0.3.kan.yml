iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: 'The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered a multi-year defense spending cycle that benefits prime contractors with missile and missile-defense exposure regardless of whether the May 6 14-point MOU framework holds and whether the Pakistan-mediated 2-week ceasefire converts to a durable peace, because depleted munitions stockpiles must be replenished and Golden Dome ($185B) is now a multi-year program. The procurement cycle persists through diplomatic resolution unless DoD outlays meaningfully reverse.'
  confidence: 0.75
  vis.thesisTheme: vis.theme-defense
  status: wv.active
  confidenceRationale: 'Down to 0.75 from 0.78. Iran reviewing a specific one-page peace memorandum is materially more concrete than the May 6 "great progress" framing. Procurement-cycle thesis remains decoupled from peace by design (committed backlogs at LMT $194B and RTX $271B are multi-year), but the easier diplomatic resolution becomes, the more political risk to FY2027 Pentagon outlay growth.'
  supportingEvidence:
    - ev-operation-epic-fury-feb28
    - ev-iran-tomahawks-fired-2026q1
    - ev-fy2026-defense-budget-1t
    - ev-fy2027-defense-budget-projection
    - ev-lmt-backlog-194b-q1-2026
    - ev-rtx-backlog-271b-q1-2026
    - ev-trump-buyback-eo
    - ev-trump-project-freedom-pause-may6
    - ev-iran-one-page-memo-may8
  invalidationCondition:
    type: wv.AndCondition
    operands:
      - type: wv.EventCondition
        event: fin.evt-us-iran-peace-agreement-implemented
        durability: wv.durable
      - type: wv.ThresholdCondition
        observable: fin.ind-dod-outlays-yoy-change
        comparator: wv.lt
        threshold: 0
        persistence:
          wv.duration: 2
          wv.windowUnit: wv.fiscal-quarters

persistent-energy-shock:
  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: Oil prices remain structurally elevated as long as the Strait of Hormuz reopening sequence is incomplete and Iranian retaliation risk is intact. The May 8 close (WTI $95.33) reflects a partial unwinding of the wartime premium following the Pakistan-mediated 2-week ceasefire and 14-point MOU framework, but the supply-side reset hasn't materialized and Goldman's $77.50 Brent target sits 25%+ below spot.
  confidence: 0.4
  vis.thesisTheme: vis.theme-energy
  status: wv.active
  confidenceRationale: 'Stepped down from 0.45 to 0.40. Iran reviewing the specific one-page memo (declares end-of-conflict, triggers a 30-day window for nuclear-moratorium / asset-unfreeze / Hormuz-security to land) is materially more concrete than the prior "great progress" framing. WTI flat at $95.46 still leaves the thesis above its $80 invalidation threshold, but the SequencedCondition first leg (durable Hormuz reopening) is closer than at any point since the war began.'
  supportingEvidence:
