gold-debasement-bid:
  type: wv.WorldviewThesis
  label: Gold structural debasement bid
  thesisStatement: 'Gold sits in mid-cycle of a multi-year structural bull market driven by central-bank buying, sovereign de-dollarization, $39T US debt, stock-bond correlation breakdown, and Fed independence concerns. Q1 2026 set records on multiple dimensions - LBMA quarterly average $4,873/oz, central-bank net purchases 244 tonnes (highest Q1 ever, +17% QoQ), aggregate Q1 demand value $193B. Spot held above $4,700 May 8 even as oil retreated. Major bank targets all imply materially higher levels (JPM $5,055-$6,300, UBS $6,200, Citi $5,000-$7,000).'
  confidence: 0.85
  vis.thesisTheme: vis.theme-gold
  status: wv.active
  confidenceRationale: 'Steady at 0.85. Three structural drivers (durable peace, Fed credibility restored, deficit declining) are all dependencies that have not moved meaningfully. Holding above $4,700 despite oil retreat is itself confirming evidence.'
