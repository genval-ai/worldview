powell-warsh-transition-risk:
  type: wv.WorldviewThesis
  label: Fed leadership transition policy uncertainty
  thesisStatement: 'Senate cloture vote on Warsh scheduled Monday May 11 at 5:30 PM ET. Republicans hold a 53-seat majority and Sen. Fetterman (D-PA) signaled support, so confirmation is effectively locked in before Powell''s chair-term expiry May 15. The transition window through August FOMC is structurally higher-vol than normal because every Warsh comment will be priced as new information; the 13-11 party-line Banking Committee advance was the first fully partisan Fed-Chair vote in committee history. Warsh confirmation-hearing framing - "won''t be sock puppet" / "room to cut without inflation" - introduces a dovish-tilt risk to the dollar / long-duration cross.'
  confidence: 0.5
  vis.thesisTheme: vis.theme-monetary
  status: wv.active
  confidenceRationale: 'Stepped down from 0.55 to 0.50. Cloture timing is now specific (Monday 5:30 PM ET) and Fetterman''s yes signal makes the vote outcome a near-certainty rather than a contested event - the binary "does Warsh get confirmed" risk collapses, leaving only the "what does Warsh do once confirmed" risk premium. That second part is what the next 30 days price.'
  supportingEvidence:
    - ev-powell-exit-warsh-nominated-may15
    - ev-warsh-banking-cmte-13-11
    - ev-warsh-senate-vote-confirmed-may11
    - ev-warsh-cloture-monday-530-may11
