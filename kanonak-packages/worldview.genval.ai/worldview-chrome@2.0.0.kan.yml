# =============================================================================
# wv.EvidenceStrength -> {evidence-strong,moderate,weak}.svg
#
# 4-tier semantic-zoom renderer for the three EvidenceStrength enum
# members. Reads the instance's iconGlyph (raw SVG fragment authored on
# each member below) + rdfs.label, wraps in tiered chrome. The outer
# group carries a per-instance CSS class that maps the strength URI to
# its semantic color via currentColor — the same color the snapshot
# page already uses (--strong / --moderate / --weak in pages@1.2.0).
# =============================================================================
evidence-strength-svg-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: wv.EvidenceStrength

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.svg

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:
      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.image-svg-xml
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" overflow="hidden">
                            <style>
                            text{font-family:'SF Mono',ui-monospace,Consolas,Menlo,monospace}
                            svg{overflow:hidden}
                            .es-bg{fill:#0a0e1a}
                            .es-frame{fill:none;stroke:#1e293b;stroke-width:2}
                            /* Per-instance color: currentColor in iconGlyph resolves
                               to the wrapper's color. */
