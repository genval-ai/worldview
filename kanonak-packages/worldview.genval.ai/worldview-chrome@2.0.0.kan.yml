                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '</span></li>'
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '</ul>'

                                    # CITATION — outbound link, opens in new tab
                                    - type: tx.When
                                      tx.condition:
                                        type: tx.IsSet
                                        tx.checkExpr:
                                          type: tx.PropertyRead
                                          tx.readSource:
                                            type: tx.ResolveRef
                                            tx.resolveSource:
                                              type: tx.VarRef
                                              tx.varName: ev
                                          tx.readProp: wv.citation
                                      tx.thenBuild:
                                        type: tx.Concat
                                        tx.parts:
                                          - type: tx.StringLiteral
                                            tx.stringLiteral: '<a class="ev-citation" href="'
                                          - type: tx.PropertyRead
                                            tx.readSource:
                                              type: tx.ResolveRef
                                              tx.resolveSource:
                                                type: tx.VarRef
                                                tx.varName: ev
                                            tx.readProp: wv.citation
