# the property's presence is the filter. Reads the class's iconGlyph
# (authored on each evidence subclass below) + rdfs.label. The icon
# renders in the page's neutral accent color since evidence-type is
# orthogonal to strength (which carries its own semantic color).
# =============================================================================
evidence-type-svg-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: rdfs.Class
    tx.requires:
      - wv.iconGlyph

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.svg

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:
      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.image-svg-xml
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" overflow="hidden">
                            <style>
                            text{font-family:'SF Mono',ui-monospace,Consolas,Menlo,monospace}
                            svg{overflow:hidden}
                            .et-bg{fill:#0a0e1a}
                            .et-frame{fill:none;stroke:#1e293b;stroke-width:2}
                            .et-glyph{color:#7dd3fc}
                            .et-label{fill:#e6eaf2;font-weight:600;letter-spacing:0.5px}
                            .et-type-label{fill:#6b7689;font-size:10px;letter-spacing:2.5px;text-transform:uppercase}
                            .et-uri{fill:#7dd3fc;letter-spacing:0.5px}
                            .tier-chip,.tier-icon,.tier-card{display:none}
                            .tier-full{display:block}
                            @media (max-width:400px){
                              .tier-full{display:none}
                              .tier-card{display:block}
                            }
                            @media (max-width:160px){
                              .tier-card{display:none}
                              .tier-icon{display:block}
                            }
                            @media (max-width:60px){
                              .tier-icon{display:none}
                              .tier-chip{display:block}
                            }
                            </style>

                        # ===== chip =====
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-chip et-glyph">
                            <svg x="80" y="0" width="240" height="240" viewBox="0 0 24 24">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: wv.iconGlyph
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </svg>
                            </g>

                        # ===== icon =====
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-icon et-glyph">
                            <svg x="140" y="20" width="120" height="120" viewBox="0 0 24 24">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: wv.iconGlyph
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </svg>
                            <text x="200" y="180" text-anchor="middle" class="et-label" font-size="20"><![CDATA[
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: rdfs.label
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ]]></text>
                            </g>

                        # ===== card =====
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-card">
                            <rect x="4" y="4" width="392" height="232" rx="14" class="et-bg"/>
                            <rect x="4" y="4" width="392" height="232" rx="14" class="et-frame"/>
                            <g class="et-glyph">
                            <svg x="20" y="60" width="120" height="120" viewBox="0 0 24 24">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: wv.iconGlyph
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </svg>
                            </g>
                            <text x="160" y="50" class="et-type-label">Evidence type</text>
                            <text x="160" y="120" class="et-label" font-size="22"><![CDATA[
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: rdfs.label
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ]]></text>
                            </g>

                        # ===== full =====
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-full">
                            <rect x="4" y="4" width="392" height="232" rx="14" class="et-bg"/>
                            <rect x="4" y="4" width="392" height="232" rx="14" class="et-frame"/>
                            <g class="et-glyph">
                            <svg x="20" y="50" width="120" height="120" viewBox="0 0 24 24">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: wv.iconGlyph
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </svg>
                            </g>
                            <text x="160" y="50" class="et-type-label">Evidence type</text>
                            <text x="160" y="110" class="et-label" font-size="22"><![CDATA[
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: rdfs.label
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ]]></text>
                            <text x="200" y="226" text-anchor="middle" class="et-uri" font-size="9" letter-spacing="0.5">
                        - type: tx.SubjectUri
                          tx.subjectOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </text>
                            </g>

                            </svg>

wv.WorldviewSnapshot:
  derivation.derivations:
    - type: derivation.Derivation
      derivation.format: formats.svg
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: worldview-chrome
        tx.version: 1.1.0
        tx.name: snapshot-svg-renderer

