worldview-chrome:
  type: Package
  publisher: worldview.genval.ai
  version: 2.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.1.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.11.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
        - package: derivation
          match: ^
          version: 1.0.0
          alias: derivation
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
        - package: estimates
          match: ^
          version: 1.0.0
          alias: est
        - package: sources
          match: ^
          version: 1.0.0
          alias: src
        - package: finance
          match: ^
          version: 3.0.0
          alias: fin
        - package: visual
          match: ^
          version: 2.0.0
          alias: vis

# =============================================================================
# SVG SEMANTIC-ZOOM TIER CONVENTION (worldview-chrome's reusable pattern)
#
# An SVG renderer for any resource MAY package multiple semantic-zoom
# representations of the resource into one .svg file using sibling <g>
# groups and CSS @media queries inside the SVG <style> block. When the
# SVG is loaded via <img src="...">, the media queries evaluate against
# the image's own rendered viewport in CSS pixels — so the right tier
# auto-shows at the right size, and browser zoom or container resizing
# trips the threshold to reveal more or less detail.
#
# FOUR named tiers (each adds one layer of information over the prior):
#
#   .tier-chip  shown rendered <  60px  — inline text-flow, char-level
#               pure visual identity, NO text. One or two filled shapes
#               encoding the most discriminating dimensions via color
#               and proportion only. Designed for narrative inline use,
#               favicons, and any context where text would be unreadable
#               at the rendered scale.
#
#   .tier-icon  shown rendered 60-160px — small thumbnail, badge
#               + ONE primary value as text (sized very large in user-
#               space so it remains readable when scaled down). Adds
#               the single most-asked-about number. Strokes carry
#               vector-effect="non-scaling-stroke" to stay crisp.
#
#   .tier-card  shown rendered 160-400px — list thumbnail, hero visual
#               + summary stats, secondary labels, one visualization
#               (bar / dot / fill). No legends, no fine print. Fonts
#               sized in user-space so they read at ~200px render.
#
#   .tier-full  shown rendered >= 400px — standalone, detail, billboard
#               full information density: labels, legends, multi-element
#               visualizations, every facet of the resource that admits
#               a visual treatment.
#
# CSS cascade (default = tier-full; smaller media queries override
# down through card → icon → chip):
#
#   .tier-chip, .tier-icon, .tier-card { display: none; }
#   .tier-full { display: block; }
#   @media (max-width: 400px) { .tier-full { display: none } .tier-card { display: block } }
#   @media (max-width: 160px) { .tier-card { display: none } .tier-icon { display: block } }
#   @media (max-width: 60px)  { .tier-icon { display: none } .tier-chip { display: block } }
#
# All four tiers share one viewBox; each layout positions itself
# within that viewBox using whatever shape fits its information
# density. The viewBox aspect ratio is the publisher's choice — keep
# it consistent across all your class SVG renderers for visual
# uniformity. worldview-chrome uses 400x240 (5:3 landscape).
#
# Progressive disclosure: chip → icon adds the primary value as text;
# icon → card adds secondary text + a visualization; card → full adds
# labeled lists + legends. Each next-larger tier is a strict superset.
#
# Adopters: wv.WorldviewThesis (thesis-svg-renderer below), wv.Worldview
# Snapshot (snapshot-svg-renderer below). Other classes (fin.Security,
# wv.Evidence, regimes, indicators) can adopt the same four-tier pattern
# when their SVG renderer is built — the class names and breakpoints are
# the convention's contract.
# =============================================================================

any-resource-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: rdfs.Resource

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.html

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: title
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.Join
                                tx.separator: ""
                                tx.source:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.Fallback
                                      tx.primary:
                                        type: tx.PropertyRead
                                        tx.readSource:
                                          type: tx.VarRef
                                          tx.varName: input
                                        tx.readProp: rdfs.label
                                      tx.alternate:
                                        type: tx.UriName
                                        tx.uriNameOf:
                                          type: tx.VarRef
                                          tx.varName: input
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · worldview.genval.ai"

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <style>
                            dl.metadata{display:none!important}
                            :root{--bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;--accent:#7dd3fc;--accent-2:#38bdf8;--border:#1e293b;--border-soft:#162033;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;--font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif}
                            *{box-sizing:border-box;margin:0;padding:0}
                            html,body{background:var(--bg)}
                            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
                            a{color:var(--accent);text-decoration:none;transition:color 120ms}
                            a:hover{color:var(--accent-2)}
                            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
                            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
                            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
                            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
                            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
                            ul.site-nav-links a:hover{color:var(--fg)}
                            @media (max-width:600px){nav.site-nav{padding:12px 20px}.site-nav-inner{gap:16px}ul.site-nav-links{gap:16px;margin-left:0;flex-basis:100%}}
                            article.resource{max-width:880px;margin:0 auto;padding:48px 32px 96px}
                            @media (max-width:760px){article.resource{padding:32px 20px 64px}}
                            .hero{padding:0 0 40px;border-bottom:1px solid var(--border);position:relative;margin-bottom:32px}
                            .hero::before{content:"";position:absolute;top:-12px;left:0;width:48px;height:2px;background:var(--accent)}
                            .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;display:block}
                            .hero h1{font-family:var(--font-display);font-size:40px;font-weight:400;letter-spacing:-0.02em;line-height:1.1;color:var(--fg);margin-bottom:22px}
                            @media (max-width:760px){.hero h1{font-size:30px}}
                            .canonical-uri{display:inline-block;font-family:var(--font-mono);font-size:12px;color:var(--fg-dim);background:var(--bg-card);border:1px solid var(--border-soft);padding:6px 10px;border-radius:4px;word-break:break-all;max-width:100%}
                            .resource-footer{margin-top:32px;padding-top:20px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);letter-spacing:0.04em}
                            </style>
                            <nav class="site-nav">
                            <div class="site-nav-inner">
                            <a href="/" class="site-nav-brand">worldview.genval.ai</a>
                            <ul class="site-nav-links">
                            <li><a href="/">Latest</a></li>
                            <li><a href="/snapshots/">Snapshots</a></li>
                            <li><a href="/timeline/">Timeline</a></li>
                            <li><a href="/changes/">Changes</a></li>
                            <li><a href="/horizon/">Horizon</a></li>
                            <li><a href="/about/">About</a></li>
                            </ul>
                            </div>
                            </nav>
                            <article class="resource">
                            <header class="hero">
                            <span class="eyebrow">Resource</span>
                            <h1>
                        - type: tx.Fallback
                          tx.primary:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: rdfs.label
                          tx.alternate:
                            type: tx.UriName
                            tx.uriNameOf:
                              type: tx.VarRef
                              tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </h1>
                            <code class="canonical-uri">
                        - type: tx.SubjectUri
                          tx.subjectOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            </code>
                            </header>
                            <footer class="resource-footer">Kanonak Protocol resource</footer>
                            </article>

thesis-html-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: wv.WorldviewThesis
    tx.requires:
      - wv.thesisStatement

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.html

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: title
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.Join
                                tx.separator: ""
                                tx.source:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.Fallback
                                      tx.primary:
                                        type: tx.PropertyRead
                                        tx.readSource:
                                          type: tx.VarRef
                                          tx.varName: input
                                        tx.readProp: rdfs.label
                                      tx.alternate:
                                        type: tx.UriName
                                        tx.uriNameOf:
                                          type: tx.VarRef
                                          tx.varName: input
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · worldview.genval.ai"

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <style>
                            dl.metadata{display:none!important}
                            :root{--bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;--accent:#7dd3fc;--accent-2:#38bdf8;--border:#1e293b;--border-soft:#162033;--strong:#34d399;--moderate:#fbbf24;--weak:#64748b;--danger:#f87171;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;--font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif}
                            *{box-sizing:border-box;margin:0;padding:0}
                            html,body{background:var(--bg)}
                            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
                            a{color:var(--accent);text-decoration:none;transition:color 120ms}
                            a:hover{color:var(--accent-2)}
                            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
                            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
                            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
                            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
                            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
                            ul.site-nav-links a:hover{color:var(--fg)}
                            article.thesis{max-width:880px;margin:0 auto;padding:48px 32px 96px}
                            @media (max-width:760px){article.thesis{padding:32px 20px 64px}}
                            .hero{padding:0 0 32px;border-bottom:1px solid var(--border);position:relative;margin-bottom:32px;padding-right:280px;min-height:170px}
                            .hero::before{content:"";position:absolute;top:-12px;left:0;width:48px;height:2px;background:var(--accent)}
                            .hero-visual{position:absolute;top:8px;right:0;width:260px;height:156px}
                            .hero-visual img{width:100%;height:100%;display:block;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.35)}
                            @media (max-width:780px){.hero{padding-right:0;min-height:0}.hero-visual{position:static;margin:0 auto 24px;width:100%;max-width:400px;height:auto;aspect-ratio:5/3}}
                            .hero-meta{display:flex;align-items:baseline;font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:24px;gap:16px;flex-wrap:wrap}
                            .eyebrow{color:var(--accent)}
                            .thesis-version{font-family:var(--font-mono);color:var(--accent);font-size:11px;letter-spacing:0.05em;background:rgba(125,211,252,0.1);border:1px solid rgba(125,211,252,0.25);padding:2px 8px;border-radius:4px;text-transform:none}
                            .thesis-label{font-family:var(--font-display);font-size:36px;font-weight:400;letter-spacing:-0.02em;line-height:1.15;color:var(--fg);margin-bottom:20px}
                            @media (max-width:760px){.thesis-label{font-size:28px}}
                            .status-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px}
                            .status-pill{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600}
                            .status-pill.status-active{background:rgba(52,211,153,0.12);color:var(--strong)}
                            .status-pill.status-retired{background:rgba(100,116,139,0.18);color:var(--fg-dim)}
                            .status-pill.status-invalidated{background:rgba(248,113,113,0.12);color:var(--danger)}
                            .theme-chip{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg-card);color:var(--fg-dim)}
                            .confidence-strip{display:flex;align-items:center;gap:16px;margin-top:8px}
                            .confidence-meter{flex:1;height:10px;background:var(--bg-elev);border-radius:5px;overflow:hidden}
                            .confidence-meter svg{display:block;width:100%;height:100%}
                            .conf-fill{fill:var(--accent)}
                            .confidence-label{font-family:var(--font-mono);font-size:12px;color:var(--fg-dim);min-width:90px;text-align:right;letter-spacing:0.04em}
                            .confidence-label .conf-value{color:var(--fg);font-weight:600}
                            .thesis-statement{font-size:17px;color:var(--fg);line-height:1.7;font-weight:300;margin-bottom:20px}
                            .thesis-statement p{margin:0 0 12px}
                            .thesis-statement p:last-child{margin-bottom:0}
                            .confidence-rationale{font-size:13px;line-height:1.55;color:var(--fg-dim);margin:8px 0 24px;border-left:2px solid var(--accent);padding-left:14px;font-style:italic}
                            .confidence-rationale p{margin:0 0 8px}
                            .confidence-rationale p:last-child{margin-bottom:0}
                            .narrative-chip{display:inline-block;height:0.95em;width:1.58em;vertical-align:-0.18em;margin-right:0.3em;border-radius:2px;background:#0a0e1a}
                            .section-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg-dim);margin:32px 0 12px;display:flex;align-items:center;gap:12px}
                            .section-title::after{content:"";flex:1;height:1px;background:var(--border)}
                            .invalidation{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;padding:14px 18px;font-family:var(--font-mono);font-size:12px;color:var(--fg-dim)}
                            .invalidation code{color:var(--accent);background:var(--bg-elev);padding:1px 6px;border-radius:3px}
                            .ev-timeline{position:relative;height:62px;margin:8px 0 22px}
                            .ev-timeline-caption{position:absolute;top:0;left:0;right:0;text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--fg-faint);letter-spacing:0.14em;text-transform:uppercase}
                            .ev-timeline-axis{position:absolute;left:0;right:0;top:38px;height:1px;background:var(--border)}
                            .ev-timeline-dot{position:absolute;top:38px;width:9px;height:9px;border-radius:50%;transform:translate(-50%,-50%);border:1.5px solid var(--bg);cursor:pointer;transition:transform 120ms,box-shadow 120ms;z-index:1;text-decoration:none}
                            .ev-timeline-dot:hover,.ev-timeline-dot:focus{transform:translate(-50%,-50%) scale(1.6);z-index:3;outline:none;box-shadow:0 0 0 3px rgba(125,211,252,0.25)}
                            .ev-timeline-dot.strength-evidence-strong{background:var(--strong)}
                            .ev-timeline-dot.strength-evidence-moderate{background:var(--moderate)}
                            .ev-timeline-dot.strength-evidence-weak{background:var(--weak)}
                            .ev-timeline-label{position:absolute;top:50px;font-family:var(--font-mono);font-size:10px;color:var(--fg-faint);letter-spacing:0.1em;text-transform:uppercase}
                            .ev-timeline-label.start{left:0}
                            .ev-timeline-label.end{right:0}
                            .ev-cards{list-style:none;padding:0;margin:0;counter-reset:ev-counter;display:flex;flex-direction:column;gap:10px}
                            .ev-card{counter-increment:ev-counter;background:var(--bg-card);border:1px solid var(--border-soft);border-left-width:3px;border-radius:6px;padding:14px 38px 14px 16px;transition:border-color 120ms,box-shadow 120ms;scroll-margin-top:80px;position:relative}
                            .ev-card::before{content:counter(ev-counter);position:absolute;top:14px;right:14px;font-family:var(--font-mono);font-size:10px;color:var(--fg-faint);letter-spacing:0.04em}
                            .ev-card.strength-evidence-strong{border-left-color:var(--strong)}
                            .ev-card.strength-evidence-moderate{border-left-color:var(--moderate)}
                            .ev-card.strength-evidence-weak{border-left-color:var(--weak)}
                            .ev-card.ev-highlight{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 6px 20px rgba(125,211,252,0.18)}
                            .ev-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:var(--font-mono);font-size:11px;color:var(--fg-dim);letter-spacing:0.04em;flex-wrap:wrap}
                            .ev-head .ev-type-icon{width:14px;height:14px;flex-shrink:0;color:var(--fg-dim);opacity:0.9}
                            .ev-head .ev-type-label{color:var(--fg);font-weight:500;text-transform:none;letter-spacing:0}
                            .ev-head .ev-strength-label{text-transform:uppercase;letter-spacing:0.12em;font-size:10px;font-weight:600}
                            .ev-card.strength-evidence-strong .ev-strength-label{color:var(--strong)}
                            .ev-card.strength-evidence-moderate .ev-strength-label{color:var(--moderate)}
                            .ev-card.strength-evidence-weak .ev-strength-label{color:var(--weak)}
                            .ev-head .ev-time{margin-left:auto;font-family:var(--font-mono);color:var(--fg-faint);font-size:11px;letter-spacing:0.04em}
                            .ev-head .ev-sep{color:var(--fg-faint);opacity:0.4}
                            .ev-statement{font-size:14px;line-height:1.55;color:var(--fg);margin:0}
