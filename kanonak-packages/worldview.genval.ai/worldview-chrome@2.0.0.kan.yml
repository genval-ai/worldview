                            .es-c-evidence-moderate{color:#fbbf24}
                            .es-c-evidence-weak{color:#64748b}
                            .es-label{font-weight:700;letter-spacing:2px;text-transform:uppercase}
                            .es-type-label{fill:#6b7689;font-size:10px;letter-spacing:2.5px;text-transform:uppercase}
                            .es-uri{fill:#7dd3fc;letter-spacing:0.5px}
                            .tier-chip,.tier-icon,.tier-card{display:none}
                            .tier-full{display:block}
                            @media (max-width:400px){
                              .tier-full{display:none}
                              .tier-card{display:block}
                            }
                            @media (max-width:160px){
                              .tier-card{display:none}
                              .tier-icon{display:block}
                            }
                            @media (max-width:60px){
                              .tier-icon{display:none}
                              .tier-chip{display:block}
                            }
                            </style>
                            <g class="es-c-
                        - type: tx.UriName
                          tx.uriNameOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ">

                        # ===== chip: glyph filling viewBox =====
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <g class="tier-chip">
                            <svg x="80" y="0" width="240" height="240" viewBox="0 0 24 24">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: wv.iconGlyph
