                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '</li>'
                              - type: tx.StringLiteral
                                tx.stringLiteral: |-
                                  </ol>
                                  <script>
                                  // Build the evidence timeline DOM from the rendered cards.
                                  // Reads data-evidence-observed-at + data-evidence-strength
                                  // off each .ev-card; plots one dot per dated card; clicking
                                  // a dot scrolls + highlights the target card. Cards without
                                  // a parseable date simply do not appear on the timeline.
                                  (function(){
                                    var cards = Array.from(document.querySelectorAll('.ev-cards .ev-card'));
                                    var timeline = document.querySelector('.ev-timeline');
                                    if (!cards.length || !timeline) return;
                                    var dated = cards.map(function(card){
                                      var iso = card.getAttribute('data-evidence-observed-at');
                                      var t = iso ? Date.parse(iso) : NaN;
                                      return {card: card, t: t, iso: iso, strength: card.getAttribute('data-evidence-strength') || ''};
                                    }).filter(function(p){ return !isNaN(p.t); });
                                    if (!dated.length) { timeline.style.display = 'none'; return; }
                                    var min = dated[0].t, max = dated[0].t;
                                    dated.forEach(function(p){ if(p.t<min)min=p.t; if(p.t>max)max=p.t; });
                                    var span = Math.max(1, max - min);
                                    var fmt = function(t){
                                      var d = new Date(t);
                                      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                                    };
                                    var caption = document.createElement('span');
                                    caption.className = 'ev-timeline-caption';
                                    caption.textContent = dated.length + ' dated · click any dot to jump';
                                    timeline.appendChild(caption);
                                    var axis = document.createElement('div');
                                    axis.className = 'ev-timeline-axis';
                                    timeline.appendChild(axis);
                                    var lblStart = document.createElement('span');
                                    lblStart.className = 'ev-timeline-label start';
                                    lblStart.textContent = fmt(min);
                                    timeline.appendChild(lblStart);
                                    if (max !== min) {
                                      var lblEnd = document.createElement('span');
                                      lblEnd.className = 'ev-timeline-label end';
                                      lblEnd.textContent = fmt(max);
                                      timeline.appendChild(lblEnd);
                                    }
                                    timeline.removeAttribute('aria-hidden');
                                    dated.forEach(function(p){
                                      var dot = document.createElement('a');
                                      dot.className = 'ev-timeline-dot strength-' + p.strength;
                                      dot.href = '#' + p.card.id;
                                      dot.style.left = (((p.t - min) / span) * 100).toFixed(2) + '%';
                                      var typeLabel = p.card.querySelector('.ev-type-label');
                                      dot.title = fmt(p.t) + (typeLabel ? ' · ' + typeLabel.textContent.trim() : '');
                                      dot.setAttribute('aria-label', dot.title);
                                      dot.addEventListener('click', function(e){
                                        e.preventDefault();
                                        p.card.scrollIntoView({behavior:'smooth', block:'start'});
                                        document.querySelectorAll('.ev-card.ev-highlight').forEach(function(c){ c.classList.remove('ev-highlight'); });
                                        p.card.classList.add('ev-highlight');
                                        setTimeout(function(){ p.card.classList.remove('ev-highlight'); }, 2400);
                                        if (history.replaceState) history.replaceState(null, '', '#' + p.card.id);
                                      });
                                      timeline.appendChild(dot);
                                    });
                                  })();
                                  </script>

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <footer class="thesis-footer">
                            <p>Part of <a href="view">snapshot v
                        - type: tx.UriVersion
