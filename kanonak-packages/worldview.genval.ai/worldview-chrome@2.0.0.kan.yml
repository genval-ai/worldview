                            <script>
                            // Inject chip-tier SVGs before [[ref]] links inside thesisStatement /
                            // confidenceRationale markdown. Mirror of the snapshot-view script —
                            // same convention applies wherever worldview prose is rendered.
                            (function(){
                              var RE = /^(?:https?:\/\/[^/]+)?\/(securities|snapshot)\/([^/]+)\/([^/?#]+)$/;
                              document.querySelectorAll('.thesis-statement a, .confidence-rationale a').forEach(function(link){
                                var href = link.getAttribute('href') || '';
                                var m = href.match(RE);
                                if (!m) return;
                                var klass = m[1], version = m[2], name = m[3];
                                if (klass === 'snapshot' && (name === 'view' || name.indexOf('ev-') === 0)) return;
                                var img = document.createElement('img');
                                img.src = '/' + klass + '/' + version + '/' + name + '.svg';
                                img.className = 'narrative-chip';
                                img.alt = '';
                                img.loading = 'lazy';
                                link.insertBefore(img, link.firstChild);
                              });
                            })();
                            </script>

