securities-to-html:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.10.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
        - package: derivation
          match: ^
          version: 1.0.0
          alias: derivation
    - publisher: worldview.genval.ai
      packages:
        - package: finance
          match: ^
          version: 2.0.0
          alias: fin
        - package: securities
          match: ^
          version: 1.0.0
          alias: sec
        - package: pages
          match: ^
          version: 1.2.0
          alias: pages

security-to-html-transformation:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: fin.Security
    tx.requires:
      - fin.ticker

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.html

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: title
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.Join
                                tx.separator: ""
                                tx.source:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.VarRef
                                        tx.varName: input
                                      tx.readProp: fin.ticker
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · "
                                    - type: tx.Fallback
                                      tx.primary:
                                        type: tx.PropertyRead
                                        tx.readSource:
                                          type: tx.VarRef
                                          tx.varName: input
                                        tx.readProp: rdfs.label
                                      tx.alternate:
                                        type: tx.StringLiteral
                                        tx.stringLiteral: "Security"
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · worldview.genval.ai"

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <style>
                            dl.metadata{display:none!important}
                            :root{--bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;--accent:#7dd3fc;--accent-2:#38bdf8;--border:#1e293b;--border-soft:#162033;--radius:8px;--radius-sm:4px;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;--font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif}
                            *{box-sizing:border-box;margin:0;padding:0}
                            html,body{background:var(--bg)}
                            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
                            a{color:var(--accent);text-decoration:none;transition:color 120ms}
                            a:hover{color:var(--accent-2)}
                            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
                            [id]{scroll-margin-top:80px}
                            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
                            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
                            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
                            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
                            ul.site-nav-links a:hover{color:var(--fg)}
                            @media (max-width:600px){nav.site-nav{padding:12px 20px}.site-nav-inner{gap:16px}ul.site-nav-links{gap:16px;margin-left:0;flex-basis:100%}}
                            article.security{max-width:880px;margin:0 auto;padding:48px 32px 96px}
                            @media (max-width:760px){article.security{padding:32px 20px 64px}}
                            .hero{padding:0 0 40px;border-bottom:1px solid var(--border);position:relative}
                            .hero::before{content:"";position:absolute;top:-12px;left:0;width:48px;height:2px;background:var(--accent)}
                            .hero-meta{display:flex;align-items:baseline;font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:32px;gap:16px;flex-wrap:wrap}
                            .hero-meta .eyebrow{color:var(--accent)}
                            .security-version{font-family:var(--font-mono);color:var(--accent);font-size:11px;letter-spacing:0.05em;background:rgba(125,211,252,0.1);border:1px solid rgba(125,211,252,0.25);padding:2px 8px;border-radius:4px;text-transform:none}
                            .ticker-line{margin-bottom:16px}
                            .ticker{font-family:var(--font-mono);font-size:42px;font-weight:600;color:var(--accent);letter-spacing:0.04em}
                            @media (max-width:760px){.ticker{font-size:32px}}
                            .hero h1{font-family:var(--font-display);font-size:42px;font-weight:400;letter-spacing:-0.02em;line-height:1.1;color:var(--fg);margin-bottom:24px}
                            @media (max-width:760px){.hero h1{font-size:30px}}
                            .tag-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
                            .tag{display:inline-block;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:5px 12px;border-radius:4px;border:1px solid var(--border)}
                            .tag-class{background:rgba(125,211,252,0.10);color:var(--accent);border-color:rgba(125,211,252,0.25)}
                            .tag-sector{background:var(--bg-card);color:var(--fg-dim)}
                            .price-block{margin-top:18px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;font-family:var(--font-mono);font-size:13px;display:inline-flex;align-items:baseline;gap:10px;flex-wrap:wrap}
                            .price-label{color:var(--fg-faint);text-transform:uppercase;letter-spacing:0.1em;font-size:10px}
                            .price{color:var(--fg);font-weight:600;font-size:18px}
                            .price-asof{color:var(--fg-dim);font-size:11px}
                            .security-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);letter-spacing:0.04em}
                            .security-footer code{color:var(--accent);background:var(--bg-card);padding:1px 6px;border-radius:3px;border:1px solid var(--border-soft);font-size:11px}
                            </style>
                            <nav class="site-nav">
                            <div class="site-nav-inner">
                            <a href="/" class="site-nav-brand">worldview.genval.ai</a>
                            <ul class="site-nav-links">
                            <li><a href="/">Latest</a></li>
                            <li><a href="/snapshots/">Snapshots</a></li>
                            <li><a href="/timeline/">Timeline</a></li>
                            <li><a href="/changes/">Changes</a></li>
                            <li><a href="/horizon/">Horizon</a></li>
                            <li><a href="/about/">About</a></li>
                            </ul>
                            </div>
                            </nav>
                            <article class="security" data-security-uri="
                        - type: tx.SubjectUri
                          tx.subjectOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            ">
                            <header class="hero">
                            <div class="hero-meta">
                            <span class="eyebrow">Security</span>
                            <span class="security-version">v
                        - type: tx.UriVersion
                          tx.uriVersionOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </span>
                            </div>
                            <div class="ticker-line">
                            <span class="ticker">
                        - type: tx.PropertyRead
                          tx.readSource:
                            type: tx.VarRef
                            tx.varName: input
                          tx.readProp: fin.ticker
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </span>
                            </div>
                            <h1>
                        - type: tx.Fallback
                          tx.primary:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: rdfs.label
                          tx.alternate:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: fin.ticker
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </h1>
                            <div class="tag-row">

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: sec.typedAssetClass
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<span class="tag tag-class">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: sec.typedAssetClass
                                tx.readProp: rdfs.label
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span>'

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: sec.typedSector
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<span class="tag tag-sector">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: sec.typedSector
                                tx.readProp: rdfs.label
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span>'

                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </div>

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: sec.referencePrice
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<div class="price-block"><span class="price-label">Reference price</span> <span class="price">$'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: sec.referencePrice
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span><span class="price-asof"> as of '
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: input
                                tx.readProp: sec.priceAsOf
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span></div>'

                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </header>

                            <footer class="security-footer">
                            <p>Canonical URI: <code>
                        - type: tx.SubjectUri
                          tx.subjectOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            </code></p>
                            </footer>
                            </article>

fin.Security:
  derivation.derivations:
    - type: derivation.Derivation
      derivation.format: formats.html
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: securities-to-html
        tx.version: 1.0.0
        tx.name: security-to-html-transformation
