persistent-energy-shock:
  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: 'Oil prices remain structurally elevated as long as the Strait of Hormuz reopening sequence is incomplete and Iranian retaliation risk is intact. Brent settled $101.29 on May 8 (+1% on the UAE attack) with WTI $95.42; the May 7-8 record (US firing on Iranian tankers, Iran firing on US destroyers, UAE absorbing Iranian missiles) shows the shipping environment is contested, not "open with conditions" as a gesture. Iran has now formally codified Hormuz transit conditionality by creating a government agency to vet and tax transit vessels - "open with conditions" is structural, not informal. ADNOC shut its 922K bpd Ruwais refinery following the May 8 missile damage, a real supply-side hit. Goldman maintains a $77.50 Brent target sitting 25%+ below spot.'
  confidence: 0.5
  vis.thesisTheme: vis.theme-energy
  status: wv.active
  confidenceRationale: 'Up to 0.50 from 0.45. Two new structural reinforcements landed since 1.0.5: (1) Iran formalized a vessel-vetting government agency for Hormuz transit, codifying the IRGC "safe transit under conditions" posture as policy rather than informal practice - the "open with conditions" framing is now a fee-and-inspection regime, not a gesture; (2) ADNOC shut the 922K bpd Ruwais refinery following May 8 fire damage from the Iranian missile/drone strike on Abu Dhabi - a real supply hit that 1.0.5 missed. Combined with the still-active kinetic environment and Trump Sunday claims of 9 Iranian ships sunk, the durable-Hormuz-reopening leg of the SequencedCondition invalidation walks further away. Not yet at 0.55+ because cash markets are closed (no fresh price confirmation) and Trump still claims the ceasefire holds.'
