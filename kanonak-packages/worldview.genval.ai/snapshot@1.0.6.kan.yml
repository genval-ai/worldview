stagflation-risk:
  type: wv.WorldviewThesis
  label: Stagflation risk and Fed independence stress
  thesisStatement: 'The Fed faces a hard mandate balance with energy-driven inflation tracking elevated, unemployment at 4.3-4.4%, and consumer sentiment at a record low (UMich May preliminary 48.2). One-third of consumers spontaneously cite gas prices, with the national average $4.54/gallon (+44% YoY); UMich year-ahead inflation expectations 4.5%, and the NY Fed April Survey of Consumer Expectations (released May 7) showed median 1y inflation expectations rose 0.2 pp to 3.6% - two independent surveys moving the same direction. April CPI prints Tuesday May 12; consensus + prediction markets track 3.5-3.9% YoY (modal 3.6-3.8%) vs March 3.3%. If the print lands in range with energy contributing, the energy-shock-to-inflation transmission is confirmed. Political pressure on Fed independence intensifies into the May 15 transition - 8-4 dissent on April 29 was the highest since 1992, the Senate Banking 13-11 party-line advance was historically partisan for a Fed Chair nominee, and Trump rate-cut pressure is sustained.'
  confidence: 0.68
  vis.thesisTheme: vis.theme-inflation
  status: wv.active
  confidenceRationale: 'Up to 0.68 from 0.65. NY Fed Survey of Consumer Expectations (April release, dated May 7) showed median 1y inflation expectation rose 0.2 pp to 3.6% - a second independent inflation-expectations release moving the same direction as UMich (4.5% 1y print). Consensus and prediction-market forecasts for Tuesday April CPI sit in the 3.5-3.9% range with modal 3.6-3.8% (Polymarket, Robinhood prediction markets) - well above the 3.3% March headline. The pre-print drift in expectations and forecasts is itself a stagflation signal. Step to 0.68 ahead of the actual print; if Tuesday lands in range with energy contributing, expect another step up next refresh.'
