powell-warsh-transition-risk:
  type: wv.WorldviewThesis
  label: Fed leadership transition policy uncertainty
  thesisStatement: 'Senate cloture vote on Warsh scheduled Monday May 11 at 5:30 PM ET. Republicans hold a 53-seat majority and Sen. Fetterman (D-PA) signaled support, so confirmation is effectively locked in before Powell''s chair-term expiry May 15. The transition window through August FOMC is structurally higher-vol than normal because every Warsh comment will be priced as new information; the 13-11 party-line Banking Committee advance was the first fully partisan Fed-Chair vote in committee history. Warsh confirmation-hearing framing - "won''t be sock puppet" / "room to cut without inflation" - introduces a dovish-tilt risk to the dollar / long-duration cross. Tuesday''s April CPI is the first major data print Warsh will inherit; consensus tracks 3.5-3.9% YoY.'
  confidence: 0.5
  vis.thesisTheme: vis.theme-monetary
  status: wv.active
  confidenceRationale: 'Held at 0.50. No new Sunday Senate news; cloture timing locked Monday 5:30 PM ET. CPI consensus drifting hot (3.5-3.9% range) into Powell-still-chair Tuesday print sets up a tougher inheritance for Warsh - June 16-17 FOMC is his first chair meeting and the inflation framing he inherits is now more elevated than 1.0.5 captured. The post-confirmation risk-premium thesis still depends on Warsh''s June FOMC framing, not on procedural mechanics that are now locked.'
