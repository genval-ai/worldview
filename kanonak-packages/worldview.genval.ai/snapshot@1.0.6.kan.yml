# =============================================================================
# Worldview snapshot - 2026-05-10 12:50 UTC (Sunday morning EDT, 8:50 AM ET)
#
# Patch refresh from 1.0.5 (which was published Saturday late-night EDT).
# Markets fully closed this snapshot (cash + futures); CME e-mini SPX Sunday
# session opens 22:00 UTC (~9 hours from publish). No new price data.
#
# What changed in the ~10 hours since 1.0.5:
#  - Trump posted to Truth Social overnight ("THEY BETTER NOT DO THAT")
#    and again midday Sunday claiming "we have destroyed and sunk 9
#    Iranian Naval Ships, some of them relatively large and important."
#    The "9 ships" framing revises Trump's own count up from the official
#    US Navy figure of 7 small boats captured in 1.0.5.
#  - Trump separately framed the May 7 US strikes on Iranian forces as
#    "just a love tap" while restating that the ceasefire remains in
#    effect. Threat-and-engage posture continues.
#  - Trump shifted the Iran response window from "48 hours" (per US
#    officials May 9, captured in 1.0.5) to "one week" in Fox News
#    framing - extends the diplomatic window through mid-week.
#  - ADNOC shut its Ruwais refinery (922,000 bpd capacity) following
#    the May 8 fire from the Iranian missile/drone strike on Abu
#    Dhabi. A real supply-side hit not captured in 1.0.5; reinforces
#    the persistent-energy thesis.
#  - Iran formally created a government agency to vet and tax vessels
#    seeking Hormuz transit. Codifies the IRGC "open with conditions"
#    posture into structural policy, not informal practice.
#  - UAE formed a national committee to document Iranian attacks for
#    possible legal action against Tehran.
#  - NY Fed Survey of Consumer Expectations (released May 7, post-1.0.5
#    cutoff): median 1y inflation expectation rose 0.2 pp to 3.6%.
#    Reinforces the stagflation case.
#  - Consensus + prediction-market forecasts for Tuesday's April CPI
#    release tracking 3.5-3.9% YoY (modal 3.6-3.8% on Polymarket and
#    Robinhood markets) - well above March's 3.3% headline. If it
#    prints in range, the energy-to-inflation transmission is confirmed.
#
# Confidence moves: persistent-energy 0.45 to 0.50 (ADNOC shutdown +
# vessel-vetting agency formalization); stagflation 0.65 to 0.68 (NY
# Fed SOCE + CPI consensus running hot ahead of Tuesday). All other
# theses hold.
#
# Calendar this week (unchanged): Iran response expected today/Mon
# (extended to "within a week" per Sunday Trump framing); Warsh
# Senate cloture Mon May 11 5:30 PM ET; April CPI Tue May 12 8:30
# AM ET (Powell's last full week as chair, term expires Fri May 15);
# Lebanon-Israel third round Wed-Thu May 14-15 in Washington; NVDA
# Q1 FY2027 earnings Tue May 20 5 PM ET.
#
# Each version of this package is the worldview AS PUBLISHED on a
# specific date. Versions are immutable; new dates produce new
# versions.
# =============================================================================

view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: 2026-05-10T12:50:00Z
  narrative: >
    Sunday-morning Eastern (8:50 AM ET) refresh of the Saturday
    late-night view. Markets are closed - both cash and futures -
    until CME e-mini SPX Sunday session opens at 22:00 UTC. No new
    price data this refresh; the moves are concentrated in weekend
    news developments and an inflation-expectations release that
    arrived after the 1.0.5 cutoff.

    Iran-side news layered on top of the May 7-8 escalation. Trump
    Truth Social posts overnight included a "THEY BETTER NOT DO
    THAT" warning to Iran on retaliation; midday Sunday post claimed
    the US has "destroyed and sunk 9 Iranian Naval Ships, some of
    them relatively large and important" (vs the official US Navy
    figure of 7 small boats in 1.0.5 - Trump's count revises up).
    Trump separately framed the US May 7 strikes as "just a love
    tap" and reaffirmed the ceasefire remains in effect. The Iran
    response window has shifted from the "48-hour" framing US
    officials gave on May 9 to "one week" in Trump's Fox News
    framing - extends the diplomatic clock through mid-week.
    Important update on the Hormuz-transit picture: Iran has
    formally created a government agency tasked with vetting and
    taxing vessels seeking passage. Codifies the IRGC "safe and
    sustainable transit" framing as structural policy rather than
    informal practice. "Open with conditions" is now a fee-and-
    inspection regime, not a gesture.

    ADNOC shutdown is the tangible supply hit from the May 8 UAE
    strike: the 922,000 bpd Ruwais refinery is offline due to fire
    damage from the missile/drone attack. Fujairah Petroleum
    Industries Zone fire injured three Indian citizens. UAE has
    formed a national committee to document Iranian attacks for
    possible legal action - escalates the diplomatic costs of
    further Iranian aggression on Gulf neighbors. The persistent-
    energy thesis steps up modestly to 0.50 to reflect both the
    real supply hit and the codification of Hormuz-transit
    conditionality.

    Macro side. NY Fed April Survey of Consumer Expectations
    (released May 7, after the 1.0.5 cutoff) showed median 1y
    inflation expectation rose 0.2 pp to 3.6%. Stacks alongside
    the UMich May preliminary 4.5% 1y print captured in 1.0.5 -
    two independent inflation-expectations releases moving in the
    same elevated direction. Tuesday's April CPI (8:30 AM ET) is
    the inflection: prediction-market modes at 3.6-3.8% YoY and
    consensus economist forecasts in the 3.5-3.9% range vs the
    March 3.3% headline. If the print lands in range with energy
    contributing, the energy-to-inflation transmission is
    confirmed and the stagflation case strengthens further.
    Stepping stagflation to 0.68 to reflect the SOCE print and
    CPI consensus drift, ahead of the actual release.

    Calendar tightening continues: Warsh Senate cloture Monday
    5:30 PM ET (procedural certainty - 53-seat Republican
    majority + Fetterman D-PA support); CPI Tuesday 8:30 AM ET;
    Lebanon-Israel third round Washington Wednesday-Thursday;
    Powell's chair term expires Friday May 15; NVDA Q1 FY2027
    Tuesday May 20 5 PM ET. Sunday futures open at 22:00 UTC
    will be the first market read on the May 7-8 escalation
    re-weighting and the weekend's Iran developments.
  hasThesis:
    - iran-war-rearmament
    - persistent-energy-shock
    - stagflation-risk
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

