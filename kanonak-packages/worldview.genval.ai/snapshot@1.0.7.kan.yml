# =============================================================================
# Worldview snapshot - 2026-05-11 00:30 UTC (Sunday 5:30 PM PT / 8:30 PM ET)
#
# Patch bump from 1.0.5. The diplomatic-track tell named in 1.0.5 fired
# unfavorably during Sunday. Iran formally submitted its response to the US
# 14-point MOU via Pakistani mediators on May 10 - Tehran framed it
# "realistic and positive"; Trump rejected it "TOTALLY UNACCEPTABLE!" within
# hours and accused Iran of "playing games with the United States, and the
# rest of the World, for 47 years... They will be laughing no longer!"
# Iranian state media simultaneously rejected the US proposal as "amounting
# to surrender," restating Iran's demands as war reparations by the US, full
# Iranian sovereignty over the Strait of Hormuz, an end to sanctions, and
# the release of seized Iranian assets. Trump reiterated bombing threats if
# no deal lands.
#
# The "Iran 48-hour response window" from 1.0.5 has resolved with the deal
# track materially walked back, not forward. The durable-peace leg of every
# AndCondition / SequencedCondition invalidation now sits further from
# firing than it did Saturday night. Confidence shifts capture that
# walk-back: persistent-energy-shock 0.45 -> 0.55 (largest single move),
# iran-war-rearmament 0.75 -> 0.80, stagflation-risk 0.65 -> 0.70,
# gold-debasement-bid 0.85 -> 0.87, equity-melt-up-vs-recession-risk
# 0.75 -> 0.70 (Sunday futures will need to absorb this; sentiment-price
# divergence widens further into Tuesday CPI).
#
# Market data verified via Massive (formerly Polygon) on this refresh after
# the 1.0.5 cycle ran without API access: SPY Friday close 737.62,
# GLD 433.77, AMD 455.19 (large Friday session move from the May 5 AH
# blowout follow-through), Treasury 10Y 4.41% / 30Y 4.97% (May 7 - May 8
# treasury data not yet posted in the upstream dataset, expected 1-day lag).
#
# Macro this week: April CPI prints Tuesday May 12 8:30 AM. Consensus
# headline 3.7-3.8% YoY (vs March 3.3%), core 2.7% YoY. The energy
# passthrough is now expected and locked into positioning. Warsh cloture
# Monday 5:30 PM ET, Senate vote tracking confirmation before Powell's
# chair term expires Friday May 15. Lebanon-Israel third round Wed-Thu in
# Washington. NVDA Q1 FY2027 print May 20.
#
# Each version of this package is the worldview AS PUBLISHED on a specific
# date. Versions are immutable; new dates produce new versions.
# =============================================================================

view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: 2026-05-11T00:30:00Z
  narrative: >
    Sunday-evening reset. The 48-hour response window from 1.0.5 has
    resolved against the diplomatic track: Iran submitted its formal
    response to the US 14-point MOU via Pakistani mediators on May 10,
    framed by Tehran as "realistic and positive." Trump rejected it as
    "TOTALLY UNACCEPTABLE!" within hours and accused Iran of "playing
    games with the United States, and the rest of the World, for 47
    years." Iranian state media simultaneously rejected the US proposal
    as "amounting to surrender" and restated Iran's demands - war
    reparations by the US, full Iranian sovereignty over the Strait of
    Hormuz, an end to sanctions, and the release of seized Iranian
    assets - demands procedurally incompatible with the US naval blockade
    and the one-page MOU structure. Trump reiterated full-scale bombing
    threats if Iran does not "accept an agreement to reopen the strait
    and roll back its nuclear program." The deal track is materially
    walked back, not forward.

    The persistent-energy-shock thesis gets the largest single confidence
    bump on this refresh (0.45 to 0.55). The SequencedCondition
    invalidation requires durable Hormuz reopening followed by WTI
    sustained below $80 for 30 days; Iran's "full Iranian sovereignty
    over the Strait of Hormuz" demand directly contradicts the durable
    reopening leg. Lloyd''s List quantifies Hormuz traffic at just 40
    ships in the week to May 3 (vs ~120 crossings per day pre-war), and
    Iran's newly-created Persian Gulf Strait Authority (PGSA) now
    requires every transiting vessel to file an application form for
    IRGC permission - cementing strait control rather than relinquishing
    it. The Qatar LNG transit signal from 1.0.4 / 1.0.5 reads as a
    one-off exception within an actively-contested environment, not a
    durable reopening.

    The iran-war-rearmament thesis also strengthens (0.75 to 0.80). With
    diplomatic resolution materially further away and ongoing kinetic
    engagement (UAE attack May 4 / May 8, US disabling Iranian tankers,
    US-Iran fire exchanges in the strait), the procurement / replenishment
    case remains intact independent of any deal pathway. The cumulative
    UAE-defense-ministry tally - 438 ballistic missiles, 2,012 drones,
    and 19 cruise missiles fired at UAE targets through April 1 - gives
    a denominator for the munitions-consumption pressure that the
    procurement cycle has to absorb.

    Stagflation risk steps to 0.70 (from 0.65). April CPI Tuesday
    consensus is 3.7-3.8% YoY headline (vs March 3.3%), 2.7% core.
    Multiple forecasters explicitly attribute the lift to gasoline
    passthrough. With the deal track failing, the energy relief that
    would have softened CPI is materially deferred. April NFP soft
    (115K) and AHE +3.6% YoY (vs +3.8% expected) shave the wage-pressure
    leg but the energy + sentiment + Fed-transition stack still
    dominates. UMich May preliminary 48.2 is the consumer-side anchor.

    Equity melt-up confidence comes down to 0.70 (from 0.75). The
    Friday cash close (SPX 7,398.93 / SPY $737.62 verified via Massive)
    sits at an ATH, but Sunday futures open at 22:00 UTC and will be
    the first market window for the Trump rejection. The pe multiple
    above multi-decade norm and the sentiment-vs-price gap leave the
    melt-up structurally fragile to a single Trump tweet about the
    bombing threat. Neither invalidation leg fires from here on what
    we know, so the thesis stays active.

    Gold ticks to 0.87. The AndCondition (durable peace AND Fed
    credibility restored AND deficit declining) requires three hard
    things simultaneously; the durable-peace leg just walked back
    farther. Friday spot held $4,720-$4,740. The structural bid -
    central-bank Q1 record 244 tonnes, JPM/UBS/Citi targets implying
    materially higher levels, 30y stock-bond correlation - is intact.

    Calendar this week unchanged from 1.0.5: Warsh Senate cloture
    Monday May 11 5:30 PM ET (53-seat Republican majority +
    Fetterman support; procedurally near-certain); April CPI
    Tuesday May 12 8:30 AM (3.7-3.8% headline expected, 2.7% core);
    Lebanon-Israel third round Wednesday-Thursday May 14-15 in
    Washington (Karam, Dermer); Powell exits as chair Friday May 15;
    NVDA Q1 FY2027 May 20 5 PM ET. The diplomatic-track failure
    re-frames every macro release this week as printing into a
    no-energy-relief environment rather than the "deal optimism"
    backdrop 1.0.4 assumed.
  hasThesis:
    - iran-war-rearmament
    - persistent-energy-shock
    - stagflation-risk
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

