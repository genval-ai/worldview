indicators:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.0.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.0.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.0.0
          alias: wv
        - package: regimes
          match: ^
          version: 1.0.0
          alias: regimes

# =============================================================================
# Public indicator taxonomy + band-vote regime classifier inputs.
#
# Each Indicator partitions its value range into IndicatorBands; each band
# contributes one or more RegimeVotes when the live reading falls within
# its bounds. Vote totals across active bands normalize to a probability
# distribution over regimes - the classifier output that downstream
# portfolio systems use for fitness lookup and sizing.
#
# This is reference data: the band thresholds and votes encode the
# domain-general claim that VIX > 30 votes Crisis, contango term structure
# votes Quiet, etc. Different publishers may calibrate differently or
# weight differently in their own private classifier; the public taxonomy
# (which indicators exist, how their bands are shaped) is the shared
# vocabulary.
# =============================================================================

# =============================================================================
# 1. INDICATOR SUBCLASS TAXONOMY
# =============================================================================

VolatilityIndicator:
  type: rdfs.Class
  subClassOf: wv.Indicator
  label: Volatility Indicator
  comment: >-
    An indicator measuring market volatility - implied or realized.
    Examples - VIX (30-day implied), realized vol over a rolling
    window, IV percentile rank. Volatility indicators are the strongest
    single regime signal.

TermStructureIndicator:
  type: rdfs.Class
  subClassOf: wv.Indicator
  label: Term Structure Indicator
  comment: >-
    An indicator measuring the shape of the volatility term structure -
    typically a ratio of short-dated to longer-dated VIX (VIX9D/VIX,
    VIX/VIX3M). Contango (front below back) indicates calm; backwardation
    (front above back) indicates stress forming or active.

TrendIndicator:
  type: rdfs.Class
  subClassOf: wv.Indicator
  label: Trend Indicator
  comment: >-
    An indicator measuring directional trend strength - typically price
    relative to a moving average (SPY vs 50-day SMA, 200-day SMA).
    Captures bull vs. bear regime distinction independent of volatility
    level.

MacroIndicator:
  type: rdfs.Class
  subClassOf: wv.Indicator
  label: Macro Indicator
  comment: >-
    An indicator measuring macroeconomic or cross-asset signals - yield
    curve shape, credit spreads, dollar index, commodity ratios. Macro
    indicators identify regime shifts that pure equity-vol indicators
    miss.

CorrelationIndicator:
  type: rdfs.Class
  subClassOf: wv.Indicator
  label: Correlation Indicator
  comment: >-
    An indicator measuring cross-asset correlation - typically rolling
    stock-bond correlation. Correlation regime matters because the
    diversification value of asset mixes depends on it; persistent
    positive stock-bond correlation breaks the traditional 60/40 hedge.

SentimentIndicator:
  type: rdfs.Class
  subClassOf: wv.Indicator
  label: Sentiment Indicator
  comment: >-
    An indicator measuring market sentiment - put/call ratio, AAII
    bull-bear survey, fund flows, new-highs/new-lows. Contrarian signal
    in extreme readings.

# =============================================================================
# 2. INDICATOR BAND + REGIME VOTE CLASSES
# =============================================================================

IndicatorBand:
  type: rdfs.Class
  label: Indicator Band
  comment: >-
    A numeric interval of an indicator's range. When the live reading
    falls within a band, that band's votes are added to the regime
    classifier. Bands are non-overlapping and cover the full value
    range.

RegimeVote:
  type: rdfs.Class
  label: Regime Vote
  comment: >-
    A weighted vote contributed by an indicator band toward a specific
    regime. Vote totals across all active bands normalize to a
    probability distribution over regimes.

# =============================================================================
# 3. PROPERTIES
# =============================================================================

hasBand:
  type: owl.ObjectProperty
  domain: wv.Indicator
  range: IndicatorBand
  label: Has Band
  comment: A threshold band of an indicator's range used by the classifier.

lowerBound:
  type: owl.DatatypeProperty
  domain: IndicatorBand
  range: xsd.decimal
  label: Lower Bound
  comment: Inclusive lower bound of the band. Omit for unbounded-below.

upperBound:
  type: owl.DatatypeProperty
  domain: IndicatorBand
  range: xsd.decimal
  label: Upper Bound
  comment: Exclusive upper bound of the band. Omit for unbounded-above.

contributesVote:
  type: owl.ObjectProperty
  domain: IndicatorBand
  range: RegimeVote
  label: Contributes Vote
  comment: A vote contributed by this band when the live indicator reading falls within its bounds.

votesFor:
  type: owl.ObjectProperty
  domain: RegimeVote
  range: regimes.Regime
  label: Votes For
  comment: The regime that receives this vote when the parent band activates.

voteWeight:
  type: owl.DatatypeProperty
  domain: RegimeVote
  range: xsd.integer
  label: Vote Weight
  comment: >-
    Integer weight of this vote (typically 1-4). Higher weight indicators
    have stronger influence on classification.

# =============================================================================
# 4. INDICATOR INSTANCES
#
# Each indicator partitions its range into bands. When the live reading
# falls within a band, that band's votes are added to the classifier.
# Bands are non-overlapping and ordered low-to-high.
# =============================================================================

vix-level:
  type: VolatilityIndicator
  label: VIX level
  comment: CBOE 30-day implied volatility index. The single strongest regime signal.
  hasBand:
    band-vix-very-low:
      upperBound: 13.0
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 3
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 2
    band-vix-low:
      lowerBound: 13.0
      upperBound: 18.0
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 2
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 2
    band-vix-mid:
      lowerBound: 18.0
      upperBound: 22.0
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 2
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-vix-elevated:
      lowerBound: 22.0
      upperBound: 30.0
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 3
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-vix-crisis:
      lowerBound: 30.0
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 4

vix9d-vix-ratio:
  type: TermStructureIndicator
  label: VIX9D / VIX (front term structure)
  comment: Ratio of 9-day VIX to 30-day VIX. Below 1.0 indicates contango (calm), above 1.0 indicates backwardation (stress forming).
  hasBand:
    band-deep-contango:
      upperBound: 0.92
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 2
    band-mild-contango:
      lowerBound: 0.92
      upperBound: 0.98
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 1
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-flat:
      lowerBound: 0.98
      upperBound: 1.02
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-mild-backwardation:
      lowerBound: 1.02
      upperBound: 1.08
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
    band-deep-backwardation:
      lowerBound: 1.08
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 3

vix-vix3m-ratio:
  type: TermStructureIndicator
  label: VIX / VIX3M (back term structure)
  comment: Ratio of 30-day VIX to 3-month VIX. Long-horizon contango/backwardation signal.
  hasBand:
    band-deep-contango:
      upperBound: 0.88
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 2
    band-mild-contango:
      lowerBound: 0.88
      upperBound: 0.95
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 1
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-flat:
      lowerBound: 0.95
      upperBound: 1.02
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-mild-backwardation:
      lowerBound: 1.02
      upperBound: 1.10
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
    band-deep-backwardation:
      lowerBound: 1.10
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 3

spy-vs-50d-sma:
  type: TrendIndicator
  label: SPY vs 50-day SMA
  comment: Percentage SPY trades above or below its 50-day simple moving average. Short-term trend filter.
  hasBand:
    band-strong-uptrend:
      lowerBound: 5.0
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 2
    band-mild-uptrend:
      lowerBound: 0.0
      upperBound: 5.0
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-flat:
      lowerBound: -2.0
      upperBound: 0.0
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-mild-downtrend:
      lowerBound: -5.0
      upperBound: -2.0
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 1
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-strong-downtrend:
      upperBound: -5.0
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 2

spy-vs-200d-sma:
  type: TrendIndicator
  label: SPY vs 200-day SMA
  comment: Percentage SPY trades above or below its 200-day simple moving average. Long-term trend filter.
  hasBand:
    band-strong-uptrend:
      lowerBound: 10.0
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 2
    band-mild-uptrend:
      lowerBound: 0.0
      upperBound: 10.0
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-flat:
      lowerBound: -5.0
      upperBound: 0.0
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-downtrend:
      upperBound: -5.0
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 1

realized-vol-20d:
  type: VolatilityIndicator
  label: 20-day realized volatility (annualized)
  comment: Trailing 20-day annualized standard deviation of SPY returns. The realized counterpart to VIX - gap between the two is the vol risk premium.
  hasBand:
    band-very-low:
      upperBound: 8.0
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 2
    band-low:
      lowerBound: 8.0
      upperBound: 15.0
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 1
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-elevated:
      lowerBound: 15.0
      upperBound: 25.0
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 2
    band-high:
      lowerBound: 25.0
      upperBound: 35.0
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
    band-very-high:
      lowerBound: 35.0
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 3

# ============================================================================
# Cross-asset macro and correlation indicators - rounds out the regime
# classifier beyond pure equity-vol signals. Yield curve and credit spreads
# are leading recession signals; stock-bond correlation captures the
# diversification regime (60/40 hedge breaks when correlation is positive).
# ============================================================================

yield-curve-10y-2y:
  type: MacroIndicator
  label: 10y-2y Treasury yield spread
  comment: Slope of the Treasury yield curve, measured as 10-year yield minus 2-year yield (in percent). Inversion (negative) is a classic recession leading indicator with ~12-18 month lead time. Steepening from inversion typically marks the recession's arrival.
  hasBand:
    band-deeply-inverted:
      upperBound: -0.5
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 3
    band-inverted:
      lowerBound: -0.5
      upperBound: 0.0
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 1
    band-flat:
      lowerBound: 0.0
      upperBound: 0.5
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 1
    band-normal:
      lowerBound: 0.5
      upperBound: 1.5
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 1
    band-steep:
      lowerBound: 1.5
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 2

credit-spread-hy-oas:
  type: MacroIndicator
  label: High-yield credit OAS
  comment: ICE BofA US High Yield option-adjusted spread, in percent. Tight spreads indicate calm and risk-on; widening signals stress in funding markets and is a leading signal for equity vol expansion. Spreads above 6% historically coincide with recessions.
  hasBand:
    band-very-tight:
      upperBound: 3.0
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 2
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-normal:
      lowerBound: 3.0
      upperBound: 4.5
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-elevated:
      lowerBound: 4.5
      upperBound: 6.0
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
    band-wide:
      lowerBound: 6.0
      upperBound: 8.0
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 2
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 1
    band-very-wide:
      lowerBound: 8.0
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 4

spy-tlt-correlation-60d:
  type: CorrelationIndicator
  label: SPY-TLT 60-day rolling correlation
  comment: Rolling 60-day correlation between SPY and TLT daily returns. The traditional 60/40 stock-bond hedge depends on negative correlation - when correlation goes positive, both legs move together and diversification fails. Persistent positive correlation marks a regime shift driven by inflation or coordinated policy moves.
  hasBand:
    band-strongly-negative:
      upperBound: -0.3
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 1
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-mildly-negative:
      lowerBound: -0.3
      upperBound: 0.0
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-near-zero:
      lowerBound: 0.0
      upperBound: 0.3
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-positive:
      lowerBound: 0.3
      upperBound: 0.6
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-strongly-positive:
      lowerBound: 0.6
      contributesVote:
        v-crisis:
          votesFor: regimes.crisis
          voteWeight: 2
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 1

# ============================================================================
# Sentiment indicators - inherently contrarian. Extreme positioning often
# precedes a turn in the opposite direction. The bands below encode the
# contrarian interpretation - extreme bullish positioning votes for risk-off
# regimes (vol expansion / crisis), extreme bearish positioning votes for
# bull-trending. Use sentiment alongside vol/term-structure/macro signals,
# never alone.
# ============================================================================

put-call-ratio-equity:
  type: SentimentIndicator
  label: CBOE equity put/call ratio (1-day)
  comment: Daily volume ratio of equity puts to equity calls on CBOE. Below 0.6 indicates extreme complacency - call buying dominant - which historically precedes vol expansion. Above 1.3 indicates extreme bearish positioning that often marks a contrarian buying opportunity.
  hasBand:
    band-very-low:
      upperBound: 0.55
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
    band-low:
      lowerBound: 0.55
      upperBound: 0.70
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 1
    band-normal:
      lowerBound: 0.70
      upperBound: 1.0
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-high:
      lowerBound: 1.0
      upperBound: 1.30
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-very-high:
      lowerBound: 1.30
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 2

aaii-bull-bear-spread:
  type: SentimentIndicator
  label: AAII bull-bear spread
  comment: American Association of Individual Investors weekly survey - bullish-percent minus bearish-percent. Extreme positive readings (>+30) indicate retail euphoria that historically precedes vol expansion. Extreme negative readings (<-30) indicate capitulation that often marks contrarian buying opportunities.
  hasBand:
    band-extreme-bearish:
      upperBound: -30.0
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 2
    band-bearish:
      lowerBound: -30.0
      upperBound: -10.0
      contributesVote:
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-neutral:
      lowerBound: -10.0
      upperBound: 10.0
      contributesVote:
        v-choppy:
          votesFor: regimes.choppy-range
          voteWeight: 1
    band-bullish:
      lowerBound: 10.0
      upperBound: 30.0
      contributesVote:
        v-quiet:
          votesFor: regimes.quiet-contango
          voteWeight: 1
        v-bull:
          votesFor: regimes.bull-trending
          voteWeight: 1
    band-extreme-bullish:
      lowerBound: 30.0
      contributesVote:
        v-vol-expansion:
          votesFor: regimes.vol-expansion
          voteWeight: 2
