pages:
  type: Package
  publisher: worldview.genval.ai
  version: 2.1.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: site
          match: ^
          version: 1.0.0
          alias: site
        - package: derivation
          match: ^
          version: 1.0.0
          alias: derivation
        - package: formats
          match: ^
          version: 1.0.0
          alias: formats
        - package: transformations
          match: ^
          version: 3.11.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.2.0
          alias: docast
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv

# =============================================================================
# Publisher curation for worldview.genval.ai — 1.1.0.
#
# Migration from 1.0.0 to the formats.stylesheet derivative pattern:
#
#   - The shared "chrome" CSS that was previously stored as a
#     `site.Asset` (`worldview-chrome-css`) and pulled into every
#     transformation's inline `<style>` via PropertyRead is now a
#     `tx.ExpressionFragment` (`worldview-chrome-fragment`) returning
#     a `docast.RawBlock(text/css)`. Per-class stylesheet
#     transformations consume it via `tx.CallFragment` per the
#     `composable-css-fragments` pattern in
#     kanonak.org/derivation-conventions@1.0.0.
#
#   - `wv.WorldviewSnapshot` now binds (formats.stylesheet, default)
#     in addition to its (formats.html, default) binding, dispatching
#     to `worldview.genval.ai/snapshot-to-html@1.1.0/snapshot-stylesheet`.
#     `kanonak site build` materializes both artifacts per snapshot.
#
#   - Each `site.AggregateView` resource carries a per-instance
#     (formats.stylesheet, default) binding pointing at its package's
#     stylesheet transformation. Per-instance derivations have REPLACE
#     semantics, so this does not pollute other publishers'
#     `site.AggregateView` instances.
#
#   - HTML transformations no longer inline `<style>` blocks; they
#     emit `<link rel="stylesheet" href="...">` referencing the
#     sibling `.css` artifact materialized at the same output path.
#
# Net result: chrome CSS lives in one fragment; per-class CSS lives in
# one transformation per page-class; HTML and CSS each cache
# independently in browser, and the `.css` artifact is discoverable by
# any future Kanonak Browser / Chrome plugin via the same derivation
# walk used for HTML and Markdown.
# =============================================================================

# -----------------------------------------------------------------------------
# Shared chrome fragment — design tokens, body resets, site-nav layout,
# anchor-scroll offset. Identical bytes across every page-class
# stylesheet in this publisher.
#
# The `--kan-*` block at the bottom of `:root` maps the protocol-level
# theming variables documented in
# kanonak.org/universal-derivations@1.7.0 (#any-resource-stylesheet) to
# worldview's existing design tokens, so a Kanonak Browser host that
# rebinds `--kan-link-color` etc. via its outer stylesheet picks up
# worldview's accent palette automatically without the chrome fragment
# having to know about any specific consumer.
# -----------------------------------------------------------------------------

worldview-chrome-fragment:
  type: tx.ExpressionFragment
  tx.body:
    type: tx.BuildAstNode
    tx.astClass: docast.RawBlock
    tx.set:
      - tx.field: docast.mediaType
        tx.bindValue:
          type: tx.UriLiteral
          tx.refTo: docast.text-css
      - tx.field: docast.rawContent
        tx.bindValue:
          type: tx.StringLiteral
          tx.stringLiteral: |
            /* Suppress the CLI's default metadata frontmatter render — we set the page <title> via docast.metadata; we don't want it duplicated as a visible body frontmatter card. */
            dl.metadata{display:none!important}
            /* Design tokens — dark theme palette + theme-icon HSL tuning vars consumed by every typed-visual renderer (thesis icons, condition graphs, mini-timelines, etc.). The hue per token comes from each instance's data; saturation/lightness centralized here so a future light-mode override flips the whole site at once. */
            :root{
              --bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--bg-input:#0c1220;
              --fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;
              --accent:#7dd3fc;--accent-2:#38bdf8;--accent-3:#0ea5e9;
              --strong:#34d399;--moderate:#fbbf24;--weak:#64748b;--danger:#f87171;
              --border:#1e293b;--border-soft:#162033;
              --radius:8px;--radius-sm:4px;
              --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
              --font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;
              --font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif;
              --theme-arc-saturation:60%;
              --theme-arc-lightness:62%;
              --theme-ring-saturation:28%;
              --theme-ring-lightness:26%;
              --theme-fill-saturation:55%;
              --theme-fill-lightness:18%;
              /* Protocol-level theme bridge — see kanonak.org/universal-derivations@1.7.0#any-resource-stylesheet. A Kanonak Browser host can rebind any of these in its outer stylesheet to retheme without overriding worldview's selectors. */
              --kan-link-color:var(--accent);
              --kan-link-hover-color:var(--accent-2);
              --kan-text-color:var(--fg);
              --kan-muted-color:var(--fg-dim);
              --kan-border-color:var(--border);
              --kan-badge-bg:rgba(125,211,252,0.10);
              --kan-badge-fg:var(--accent);
              --kan-table-header-bg:var(--bg-elev)
            }
            /* Reset */
            *{box-sizing:border-box;margin:0;padding:0}
            html,body{background:var(--bg)}
            /* Override the CLI's default light-theme body wrapper (max-width:860px;margin:2rem auto;padding:0 1rem) so our sticky nav can span the full viewport. The article inside has its own max-width centering. */
            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
            /* Links */
            a{color:var(--accent);text-decoration:none;transition:color 120ms}
            a:hover{color:var(--accent-2)}
            /* Site nav — sticky, full-bleed, blurred translucent background */
            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
            /* Anchor-link scroll offset — accounts for the sticky nav so #thesis-X / #any-id lands below the nav with breathing room. Doubles on mobile where the nav wraps to two rows. */
            [id]{scroll-margin-top:80px}
            @media (max-width:600px){[id]{scroll-margin-top:120px}}
            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
            ul.site-nav-links a:hover{color:var(--fg)}
            ul.site-nav-links a.active{color:var(--fg)}
            @media (max-width:600px){nav.site-nav{padding:12px 20px}.site-nav-inner{gap:16px}ul.site-nav-links{gap:16px;margin-left:0;flex-basis:100%}}
            /* Prose paragraph preservation — temporary stand-in for the protocol-level prose property type tracked in kanonak-protocol/typescript#20. Authors put `\n\n` between paragraphs in YAML literal-block scalars; HTML collapses whitespace runs into single spaces by default, so without this rule multi-paragraph prose renders as one wall of text. `pre-line` preserves authored newlines while still letting words wrap. Selectors enumerate every prose class used across this publisher's transformations; new prose-bearing classes should be added here so paragraph rendering stays consistent. */
            .hero-narrative,.thesis-statement,.confidence-rationale,.change-rationale,.lead,.invalidation > p,.prose{white-space:pre-line}
            /* ===== 2.1.0 distributional / source-aware visual primitives ===== */
            /* Beta density curves - filled with theme color at low opacity, stroked at higher */
            .viz-beta-density{display:block;width:100%;height:60px}
            .viz-beta-density .density-fill{fill:hsl(var(--viz-hue,200),65%,55%);fill-opacity:0.18}
            .viz-beta-density .density-stroke{fill:none;stroke:hsl(var(--viz-hue,200),65%,55%);stroke-width:1.5;stroke-opacity:0.9}
            .viz-beta-density .density-mean{stroke:hsl(var(--viz-hue,200),65%,75%);stroke-width:1.6;stroke-dasharray:none}
            .viz-beta-density .density-ci-band{fill:hsl(var(--viz-hue,200),65%,55%);fill-opacity:0.10}
            .viz-beta-density .density-iqr-band{fill:hsl(var(--viz-hue,200),65%,55%);fill-opacity:0.18}
            .viz-beta-density .density-axis{stroke:var(--border);stroke-width:1}
            .viz-beta-density text{fill:var(--fg-faint);font-size:9px;font-family:var(--font-mono);letter-spacing:0.05em}
            /* Fan band charts - for cross-snapshot trajectories */
            .viz-fan-chart{display:block;width:100%}
            .viz-fan-chart .fan-ci95{fill:hsl(var(--viz-hue,200),60%,55%);fill-opacity:0.15}
            .viz-fan-chart .fan-iqr{fill:hsl(var(--viz-hue,200),60%,55%);fill-opacity:0.32}
            .viz-fan-chart .fan-median{fill:none;stroke:hsl(var(--viz-hue,200),65%,62%);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
            .viz-fan-chart .fan-axis{stroke:var(--border);stroke-width:1}
            .viz-fan-chart .fan-grid{stroke:var(--border-soft);stroke-width:1;stroke-dasharray:2 3}
            .viz-fan-chart text{fill:var(--fg-faint);font-size:10px;font-family:var(--font-mono);letter-spacing:0.05em}
            .viz-fan-chart text.fan-thesis-label{fill:var(--fg-dim);font-size:10px}
            /* Source chips - colored by sourceHue */
            .src-chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:10px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;background:hsl(var(--src-hue,200),50%,18%);color:hsl(var(--src-hue,200),60%,80%);border:1px solid hsl(var(--src-hue,200),40%,30%)}
            .src-chip-dot{width:6px;height:6px;border-radius:50%;background:hsl(var(--src-hue,200),65%,55%)}
            /* Bayesian forest plot - evidence as horizontal strips */
            .viz-forest{display:block;width:100%;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;padding:14px 18px;margin:8px 0}
            .viz-forest .forest-strip{cursor:pointer;transition:opacity 120ms}
            .viz-forest .forest-strip:hover{opacity:0.85}
            .viz-forest .forest-strip-bg{fill:var(--bg-elev);fill-opacity:0.5}
            .viz-forest .forest-strip-fill{fill-opacity:0.7}
            .viz-forest .forest-strip-label{fill:var(--fg-dim);font-size:10px;font-family:var(--font-mono)}
            .viz-forest .forest-posterior-bg{fill:var(--bg-elev);fill-opacity:0.6}
            .viz-forest .forest-posterior-curve{fill:hsl(var(--viz-hue,200),65%,55%);fill-opacity:0.35;stroke:hsl(var(--viz-hue,200),65%,68%);stroke-width:1.5}
            .viz-forest .forest-divider{stroke:var(--border);stroke-width:1;stroke-dasharray:2 3}
            .viz-forest text.forest-section-label{fill:var(--fg-faint);font-size:10px;font-family:var(--font-mono);letter-spacing:0.18em;text-transform:uppercase}
            /* Source diversity sunburst */
            .viz-sunburst{display:block;margin:0 auto}
            .viz-sunburst .sunburst-arc{stroke:var(--bg-card);stroke-width:1.5;transition:opacity 120ms}
            .viz-sunburst .sunburst-arc:hover{opacity:0.85}
            .viz-sunburst .sunburst-center{fill:var(--fg);font-family:var(--font-mono);font-weight:700;text-anchor:middle;dominant-baseline:central}
            .viz-sunburst .sunburst-center-sub{fill:var(--fg-faint);font-family:var(--font-mono);font-size:9px;text-anchor:middle;letter-spacing:0.1em}
            /* Source network graph */
            .viz-network{display:block;width:100%;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:8px}
            .viz-network .network-edge{stroke:var(--border);stroke-width:1;stroke-opacity:0.35}
            .viz-network .network-node{stroke:var(--bg-card);stroke-width:2;cursor:pointer;transition:stroke-width 120ms}
            .viz-network .network-node:hover{stroke-width:3.5;stroke:var(--fg)}
            .viz-network .network-halo{fill:none;stroke-width:1.5}
            .viz-network text.network-label{fill:var(--fg-dim);font-family:var(--font-mono);font-size:9px;text-anchor:middle;pointer-events:none}
            /* Trust-reach scatter */
            .viz-scatter{display:block;width:100%;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:8px;padding:18px}
            .viz-scatter .scatter-axis{stroke:var(--border);stroke-width:1}
            .viz-scatter .scatter-grid{stroke:var(--border-soft);stroke-width:1;stroke-dasharray:2 3}
            .viz-scatter .scatter-errorbar{stroke-width:1.5;stroke-opacity:0.55}
            .viz-scatter .scatter-point{stroke:var(--bg-card);stroke-width:1.5;cursor:pointer}
            .viz-scatter text{fill:var(--fg-faint);font-family:var(--font-mono);font-size:10px}
            .viz-scatter text.scatter-axis-label{fill:var(--fg-dim);font-size:11px;text-transform:uppercase;letter-spacing:0.12em}
            /* Condition tree */
            .viz-condition-tree{font-family:var(--font-mono);font-size:12px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;padding:14px 18px;margin:8px 0;line-height:1.6}
            .viz-condition-tree .cond-node{display:block;margin:2px 0}
            .viz-condition-tree .cond-operator{color:var(--accent);font-weight:600;letter-spacing:0.05em}
            .viz-condition-tree .cond-children{margin-left:20px;border-left:1px dashed var(--border-soft);padding-left:14px}
            .viz-condition-tree .cond-prop{color:var(--fg-dim)}
            .viz-condition-tree .cond-val{color:var(--fg)}
            .viz-condition-tree .cond-leaf{color:var(--fg)}
            .viz-condition-tree .cond-status{display:inline-block;padding:1px 6px;border-radius:3px;margin-left:8px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:600}
            .viz-condition-tree .cond-status-satisfied{background:rgba(248,113,113,0.15);color:var(--danger)}
            .viz-condition-tree .cond-status-partial{background:rgba(251,191,36,0.15);color:var(--moderate)}
            .viz-condition-tree .cond-status-unsatisfied{background:rgba(52,211,153,0.15);color:var(--strong)}
            .viz-condition-tree .cond-status-unknown{background:rgba(100,116,139,0.15);color:var(--fg-faint)}
            /* Falsifiability badge */
            .falsif-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg-elev);border:1px solid var(--border-soft);border-radius:14px;font-family:var(--font-mono);font-size:11px;color:var(--fg-dim);letter-spacing:0.04em}
            .falsif-badge .falsif-score{color:var(--fg);font-weight:600}
            /* Effective-n badge */
            .n-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(125,211,252,0.08);border:1px solid rgba(125,211,252,0.2);border-radius:10px;font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:0.04em}
            /* Regime fingerprint - violin row on snapshot cards */
            .viz-fingerprint{display:flex;gap:2px;align-items:flex-end;height:80px;padding:4px}
            .viz-fingerprint .violin-cell{flex:1;height:100%;display:flex;align-items:flex-end;justify-content:center}
            .viz-fingerprint .violin-svg{display:block;width:100%;height:100%}
            /* Theme radar */
            .viz-theme-radar{display:block;margin:0 auto}
            .viz-theme-radar .radar-axis{stroke:var(--border-soft);stroke-width:1}
            .viz-theme-radar .radar-petal{fill-opacity:0.45;stroke-width:1.5}
            .viz-theme-radar text{fill:var(--fg-dim);font-family:var(--font-mono);font-size:10px;text-anchor:middle}
            /* Conviction-vs-evidence scatter */
            .viz-conviction-scatter{display:block;width:100%;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:8px;padding:18px}
            .viz-conviction-scatter .conviction-point{cursor:pointer;stroke:var(--bg-card);stroke-width:1.5;transition:r 120ms}
            .viz-conviction-scatter .conviction-point:hover{r:14}
            .viz-conviction-scatter text{fill:var(--fg-faint);font-family:var(--font-mono);font-size:10px}
            .viz-conviction-scatter .conviction-quadrant-label{fill:var(--fg-faint);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.6}
            /* Source mix heatmap */
            .viz-source-mix{display:block;width:100%}
            .viz-source-mix .mix-cell{stroke:var(--bg);stroke-width:1.5}
            .viz-source-mix text{fill:var(--fg-dim);font-family:var(--font-mono);font-size:10px}
            .viz-source-mix text.mix-label{font-size:9px}
            /* Days-to-decision calendar */
            .viz-calendar{display:block;width:100%}
            .viz-calendar .cal-cell{fill:var(--bg-elev);stroke:var(--bg);stroke-width:1}
            .viz-calendar .cal-event{stroke-width:1.5;cursor:pointer}
            .viz-calendar text{fill:var(--fg-dim);font-family:var(--font-mono);font-size:9px}

# =============================================================================
# worldview-viz-js-fragment - inline visualization library for 2.1.0
#
# Returns a docast.RawBlock(text/html) wrapping a <script> tag with the
# vanilla-JS viz primitives. Consumer transformations include via
# tx.CallFragment to inject the library once per rendered HTML page.
#
# The library is self-bootstrapping: DOMContentLoaded scans for elements
# matching `[data-viz]` and dispatches to the appropriate renderer based
# on the data-viz value (beta-density, fan-chart, forest, sunburst,
# network, scatter, condition-tree, fingerprint, theme-radar, conviction,
# source-mix, calendar). Each renderer reads its parameters from
# data-* attributes or from a sibling <script type="application/json">
# blob and renders the SVG/DOM in place.
# =============================================================================

worldview-viz-js-fragment:
  type: tx.ExpressionFragment
  tx.body:
    type: tx.BuildAstNode
    tx.astClass: docast.RawBlock
    tx.set:
      - tx.field: docast.mediaType
        tx.bindValue:
          type: tx.UriLiteral
          tx.refTo: docast.text-html
      - tx.field: docast.rawContent
        tx.bindValue:
          type: tx.StringLiteral
          tx.stringLiteral: |
            <script>
            (function(){
              // ===== math helpers =====
              function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
              function lgamma(z){
                // Lanczos approximation
                if(z<0.5)return Math.log(Math.PI/Math.sin(Math.PI*z))-lgamma(1-z);
                z-=1;
                var g=7;
                var c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,-176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
                var x=c[0];
                for(var i=1;i<g+2;i++)x+=c[i]/(z+i);
                var t=z+g+0.5;
                return 0.5*Math.log(2*Math.PI)+(z+0.5)*Math.log(t)-t+Math.log(x);
              }
              function lbeta(a,b){return lgamma(a)+lgamma(b)-lgamma(a+b);}
              // ===== Beta(alpha,beta) from mean+stddev when not declared =====
              function abFromMeanStd(mean,sd){
                if(!sd||sd<=0)return null;
                var v=sd*sd;var maxv=mean*(1-mean);
                if(v>=maxv*0.999)v=maxv*0.999;
                var k=mean*(1-mean)/v-1;
                if(k<=0)return null;
                return [mean*k,(1-mean)*k];
              }
              // ===== Beta density (unnormalized; we normalize peak to 1 for viz) =====
              function betaDensity(a,b,nPoints){
                var pts=[];var i;var n=nPoints||60;
                for(i=1;i<n;i++){
                  var x=i/n;
                  var lp=(a-1)*Math.log(x)+(b-1)*Math.log(1-x)-lbeta(a,b);
                  pts.push([x,Math.exp(lp)]);
                }
                var peak=0;for(i=0;i<pts.length;i++)if(pts[i][1]>peak)peak=pts[i][1];
                if(peak>0)for(i=0;i<pts.length;i++)pts[i][1]/=peak;
                return pts;
              }
              function densityPath(pts,xMin,xMax,w,h,baseline){
                if(!pts.length)return '';
                var span=(xMax-xMin)||1;
                var d='M '+((pts[0][0]-xMin)/span*w).toFixed(2)+' '+baseline;
                for(var i=0;i<pts.length;i++){
                  d+=' L '+((pts[i][0]-xMin)/span*w).toFixed(2)+' '+(baseline-pts[i][1]*h).toFixed(2);
                }
                d+=' L '+((pts[pts.length-1][0]-xMin)/span*w).toFixed(2)+' '+baseline+' Z';
                return d;
              }
              function densityStroke(pts,xMin,xMax,w,h,baseline){
                if(!pts.length)return '';
                var span=(xMax-xMin)||1;
                var d='';
                for(var i=0;i<pts.length;i++){
                  d+=(i?' L ':'M ')+((pts[i][0]-xMin)/span*w).toFixed(2)+' '+(baseline-pts[i][1]*h).toFixed(2);
                }
                return d;
              }
              function svgEl(tag,attrs){
                var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
                if(attrs)for(var k in attrs)el.setAttribute(k,attrs[k]);
                return el;
              }
              function htmlEl(tag,attrs,text){
                var el=document.createElement(tag);
                if(attrs)for(var k in attrs)el.setAttribute(k,attrs[k]);
                if(text!==undefined)el.textContent=text;
                return el;
              }
              function readJson(el){
                var slot=el.querySelector(':scope > script[type="application/json"]');
                if(!slot)return null;
                try{return JSON.parse(slot.textContent);}catch(e){return null;}
              }
              // ===== beta-density viz =====
              function renderBetaDensity(el){
                var a=parseFloat(el.dataset.alpha),b=parseFloat(el.dataset.beta);
                var mean=parseFloat(el.dataset.mean),sd=parseFloat(el.dataset.stddev);
                var lo=parseFloat(el.dataset.lower95),hi=parseFloat(el.dataset.upper95);
                var hue=parseFloat(el.dataset.hue);
                var compact=el.dataset.compact==='1';
                if(!isFinite(a)||!isFinite(b)){
                  var ab=abFromMeanStd(mean,sd);
                  if(ab){a=ab[0];b=ab[1];}else{a=mean*20;b=(1-mean)*20;}
                }
                var pts=betaDensity(a,b,80);
                var w=el.clientWidth||320,h=el.clientHeight||60;
                var pad=compact?0:14;var baseline=h-pad;var plotH=baseline-(compact?0:4);
                if(isFinite(hue))el.style.setProperty('--viz-hue',hue);
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,preserveAspectRatio:'none',width:w,height:h});
                // 95% ci band (a darker rect from lo to hi)
                if(isFinite(lo)&&isFinite(hi)){
                  svg.appendChild(svgEl('rect',{x:lo*w,y:0,width:(hi-lo)*w,height:baseline,class:'density-ci-band'}));
                }
                // density fill + stroke
                svg.appendChild(svgEl('path',{d:densityPath(pts,0,1,w,plotH,baseline),class:'density-fill'}));
                svg.appendChild(svgEl('path',{d:densityStroke(pts,0,1,w,plotH,baseline),class:'density-stroke'}));
                // mean tick
                if(isFinite(mean)){
                  svg.appendChild(svgEl('line',{x1:mean*w,y1:baseline-plotH*1.05,x2:mean*w,y2:baseline,class:'density-mean'}));
                }
                // axis
                svg.appendChild(svgEl('line',{x1:0,y1:baseline,x2:w,y2:baseline,class:'density-axis'}));
                if(!compact){
                  // labels under axis
                  var labelMean=svgEl('text',{x:mean*w,y:h-2,'text-anchor':'middle'});
                  labelMean.textContent=mean.toFixed(2);
                  svg.appendChild(labelMean);
                }
                el.appendChild(svg);
              }
              // ===== fan-chart viz =====
              function renderFanChart(el){
                var data=readJson(el);if(!data)return;
                var w=el.clientWidth||640,h=parseInt(el.dataset.height,10)||320;
                var padL=44,padR=20,padT=20,padB=46;
                var plotW=w-padL-padR,plotH=h-padT-padB;
                var snaps=data.snapshots||[];var series=data.series||[];
                if(!snaps.length||!series.length){el.innerHTML='<div style="padding:18px;color:var(--fg-faint);font-family:var(--font-mono);font-size:11px">no trajectory data</div>';return;}
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                // y axis 0..1
                var yToPx=function(y){return padT+plotH*(1-y);};
                var xToPx=function(i){return padL+(snaps.length>1?(i/(snaps.length-1))*plotW:plotW/2);};
                // grid lines at 0, 0.25, 0.5, 0.75, 1
                [0,0.25,0.5,0.75,1].forEach(function(y){
                  svg.appendChild(svgEl('line',{x1:padL,y1:yToPx(y),x2:padL+plotW,y2:yToPx(y),class:'fan-grid'}));
                  var t=svgEl('text',{x:padL-6,y:yToPx(y)+3,'text-anchor':'end'});t.textContent=y.toFixed(2);svg.appendChild(t);
                });
                // x axis ticks - first / last / middle snapshot
                var axisTicks=[0,Math.floor(snaps.length/2),snaps.length-1];
                axisTicks.forEach(function(i){
                  if(i<0||i>=snaps.length)return;
                  var t=svgEl('text',{x:xToPx(i),y:h-padB+16,'text-anchor':'middle'});
                  t.textContent=snaps[i];svg.appendChild(t);
                });
                // axes
                svg.appendChild(svgEl('line',{x1:padL,y1:padT,x2:padL,y2:padT+plotH,class:'fan-axis'}));
                svg.appendChild(svgEl('line',{x1:padL,y1:padT+plotH,x2:padL+plotW,y2:padT+plotH,class:'fan-axis'}));
                // each series gets a g
                series.forEach(function(s){
                  var g=svgEl('g',{class:'fan-series',style:'--viz-hue:'+(s.hue||200)});
                  // build path for ci95 band
                  var loPts=[],hiPts=[],medPts=[],iqrLoPts=[],iqrHiPts=[];
                  for(var i=0;i<s.points.length;i++){
                    var p=s.points[i];if(p==null)continue;
                    var x=xToPx(i);
                    medPts.push([x,yToPx(p.mean)]);
                    if(p.lower95!=null&&p.upper95!=null){
                      loPts.push([x,yToPx(p.lower95)]);
                      hiPts.push([x,yToPx(p.upper95)]);
                    }
                    if(p.stddev!=null){
                      // approx IQR via mean +/- 0.6745 * sd
                      var iqrSpread=0.6745*p.stddev;
                      iqrLoPts.push([x,yToPx(Math.max(0,p.mean-iqrSpread))]);
                      iqrHiPts.push([x,yToPx(Math.min(1,p.mean+iqrSpread))]);
                    }
                  }
                  function bandPath(lo,hi){
                    if(!lo.length||!hi.length)return '';
                    var d='M '+lo[0][0]+' '+lo[0][1];
                    for(var i=1;i<lo.length;i++)d+=' L '+lo[i][0]+' '+lo[i][1];
                    for(var j=hi.length-1;j>=0;j--)d+=' L '+hi[j][0]+' '+hi[j][1];
                    d+=' Z';return d;
                  }
                  if(loPts.length>1)g.appendChild(svgEl('path',{d:bandPath(loPts,hiPts),class:'fan-ci95'}));
                  if(iqrLoPts.length>1)g.appendChild(svgEl('path',{d:bandPath(iqrLoPts,iqrHiPts),class:'fan-iqr'}));
                  // median line
                  if(medPts.length){
                    var md='M '+medPts[0][0]+' '+medPts[0][1];
                    for(var k=1;k<medPts.length;k++)md+=' L '+medPts[k][0]+' '+medPts[k][1];
                    g.appendChild(svgEl('path',{d:md,class:'fan-median'}));
                  }
                  // end label
                  if(medPts.length){
                    var endX=medPts[medPts.length-1][0],endY=medPts[medPts.length-1][1];
                    var lt=svgEl('text',{x:endX+6,y:endY+3,class:'fan-thesis-label',fill:'hsl('+(s.hue||200)+',65%,72%)'});
                    lt.textContent=s.label||s.id;
                    g.appendChild(lt);
                  }
                  svg.appendChild(g);
                });
                el.appendChild(svg);
              }
              // ===== Bayesian forest plot viz =====
              function renderForest(el){
                var data=readJson(el);if(!data)return;
                var w=el.clientWidth||640;
                var rowH=22,headerH=26,gap=4,divH=28,posteriorH=80,padX=14;
                var ev=data.evidence||[];
                var h=headerH+(ev.length*(rowH+gap))+divH+posteriorH+headerH;
                el.innerHTML='';
                el.style.setProperty('--viz-hue',data.hue||200);
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                // header
                var lbl=svgEl('text',{x:padX,y:18,class:'forest-section-label'});lbl.textContent='Evidence contributions';svg.appendChild(lbl);
                var nLbl=svgEl('text',{x:w-padX,y:18,'text-anchor':'end',class:'forest-section-label'});
                nLbl.textContent=(ev.length||'0')+' items';svg.appendChild(nLbl);
                // strips
                var stripX=padX+90,stripW=w-padX*2-90-50;
                ev.forEach(function(e,i){
                  var y=headerH+i*(rowH+gap);
                  // label (truncated source name)
                  var srcLbl=svgEl('text',{x:padX,y:y+rowH/2+3,class:'forest-strip-label'});
                  srcLbl.textContent=(e.label||'').slice(0,20);svg.appendChild(srcLbl);
                  // bg strip
                  svg.appendChild(svgEl('rect',{x:stripX,y:y+4,width:stripW,height:rowH-8,class:'forest-strip-bg',rx:2}));
                  // weighted fill: width = weight * stripW, centered on mean
                  var meanPx=stripX+e.mean*stripW;
                  var widthPx=Math.max(8,(e.weight||0.5)*stripW*0.45);
                  var hue=e.hue||data.hue||200;
                  svg.appendChild(svgEl('rect',{
                    x:Math.max(stripX,meanPx-widthPx/2),y:y+4,
                    width:Math.min(stripW-(meanPx-widthPx/2-stripX),widthPx),
                    height:rowH-8,
                    class:'forest-strip-fill forest-strip',
                    fill:'hsl('+hue+',65%,55%)',
                    rx:2
                  }));
                  // mean tick
                  svg.appendChild(svgEl('line',{x1:meanPx,y1:y+2,x2:meanPx,y2:y+rowH-2,stroke:'hsl('+hue+',60%,80%)','stroke-width':1.5}));
                  // right-side numeric
                  var num=svgEl('text',{x:w-padX,y:y+rowH/2+3,'text-anchor':'end',class:'forest-strip-label'});
                  num.textContent=e.mean.toFixed(2);svg.appendChild(num);
                });
                // divider
                var divY=headerH+ev.length*(rowH+gap)+8;
                svg.appendChild(svgEl('line',{x1:padX,y1:divY,x2:w-padX,y2:divY,class:'forest-divider'}));
                var dLbl=svgEl('text',{x:padX,y:divY+18,class:'forest-section-label'});dLbl.textContent='Posterior';svg.appendChild(dLbl);
                // posterior at bottom
                var postY=divY+divH;
                svg.appendChild(svgEl('rect',{x:stripX,y:postY,width:stripW,height:posteriorH-10,class:'forest-posterior-bg',rx:4}));
                // density
                var a=data.alpha,b=data.beta;
                if(!isFinite(a)||!isFinite(b)){
                  var ab=abFromMeanStd(data.mean,data.stddev);
                  if(ab){a=ab[0];b=ab[1];}else{a=data.mean*20;b=(1-data.mean)*20;}
                }
                var pts=betaDensity(a,b,80);
                var baseY=postY+posteriorH-14;
                var plotH=posteriorH-24;
                svg.appendChild(svgEl('path',{d:densityPath(pts,0,1,stripW,plotH,baseY),class:'forest-posterior-curve',transform:'translate('+stripX+',0)'}));
                // mean tick on posterior
                svg.appendChild(svgEl('line',{x1:stripX+data.mean*stripW,y1:baseY-plotH*1.05,x2:stripX+data.mean*stripW,y2:baseY,stroke:'hsl('+(data.hue||200)+',65%,80%)','stroke-width':1.8}));
                var meanText=svgEl('text',{x:stripX+data.mean*stripW,y:postY-4,'text-anchor':'middle',class:'forest-strip-label'});
                meanText.textContent='μ='+data.mean.toFixed(2)+(data.stddev?' ± '+data.stddev.toFixed(2):'');
                svg.appendChild(meanText);
                el.appendChild(svg);
              }
              // ===== Sunburst (source diversity) =====
              function renderSunburst(el){
                var data=readJson(el);if(!data)return;
                var size=parseInt(el.dataset.size,10)||220;
                var cx=size/2,cy=size/2;var rIn=size*0.30,rOut=size*0.46;
                var total=0;data.slices.forEach(function(s){total+=s.value||0;});
                if(total<=0){el.innerHTML='<div style="padding:18px;color:var(--fg-faint);font-family:var(--font-mono);font-size:11px;text-align:center">no source data</div>';return;}
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+size+' '+size,width:size,height:size,class:'viz-sunburst'});
                var a0=-Math.PI/2;
                data.slices.forEach(function(s){
                  var frac=(s.value||0)/total;var a1=a0+frac*Math.PI*2;
                  var large=frac>0.5?1:0;
                  var x1=cx+rOut*Math.cos(a0),y1=cy+rOut*Math.sin(a0);
                  var x2=cx+rOut*Math.cos(a1),y2=cy+rOut*Math.sin(a1);
                  var x3=cx+rIn*Math.cos(a1),y3=cy+rIn*Math.sin(a1);
                  var x4=cx+rIn*Math.cos(a0),y4=cy+rIn*Math.sin(a0);
                  var d='M '+x1+' '+y1+' A '+rOut+' '+rOut+' 0 '+large+' 1 '+x2+' '+y2+
                        ' L '+x3+' '+y3+' A '+rIn+' '+rIn+' 0 '+large+' 0 '+x4+' '+y4+' Z';
                  var arc=svgEl('path',{d:d,class:'sunburst-arc',fill:'hsl('+(s.hue||200)+',60%,50%)','fill-opacity':0.75});
                  var t=svgEl('title');t.textContent=(s.label||'')+' · '+s.value;arc.appendChild(t);
                  svg.appendChild(arc);
                  a0=a1;
                });
                // center label
                var center=svgEl('text',{x:cx,y:cy-4,class:'sunburst-center','font-size':size*0.16});
                center.textContent=total;svg.appendChild(center);
                var sub=svgEl('text',{x:cx,y:cy+size*0.10,class:'sunburst-center-sub'});
                sub.textContent=data.subLabel||'sources';svg.appendChild(sub);
                el.appendChild(svg);
              }
              // ===== Condition tree =====
              function renderConditionTree(el){
                var data=readJson(el);if(!data)return;
                el.innerHTML='';
                el.appendChild(buildCondNode(data));
              }
              function buildCondNode(node){
                var wrap=htmlEl('div',{class:'cond-node'});
                if(!node)return wrap;
                if(node.kind==='And'||node.kind==='Or'||node.kind==='Not'){
                  var op=htmlEl('span',{class:'cond-operator'},node.kind.toUpperCase());
                  wrap.appendChild(op);
                  var children=htmlEl('div',{class:'cond-children'});
                  (node.operands||[]).forEach(function(c){children.appendChild(buildCondNode(c));});
                  wrap.appendChild(children);
                }else if(node.kind==='Threshold'){
                  var line=htmlEl('div',{class:'cond-leaf'});
                  line.appendChild(htmlEl('span',{class:'cond-prop'},(node.observable||'?')+' '));
                  line.appendChild(htmlEl('span',{class:'cond-operator'},node.comparator||'?'));
                  line.appendChild(htmlEl('span',{class:'cond-val'},' '+(node.threshold!=null?node.threshold:'')));
                  if(node.persistence)line.appendChild(htmlEl('span',{class:'cond-prop'},' for '+node.persistence.duration+' '+node.persistence.unit));
                  if(node.status)line.appendChild(htmlEl('span',{class:'cond-status cond-status-'+node.status},node.status));
                  wrap.appendChild(line);
                }else if(node.kind==='Event'){
                  var le=htmlEl('div',{class:'cond-leaf'});
                  le.appendChild(htmlEl('span',{class:'cond-operator'},'EVENT '));
                  le.appendChild(htmlEl('span',{class:'cond-val'},node.event||'?'));
                  if(node.durability)le.appendChild(htmlEl('span',{class:'cond-prop'},' · '+node.durability));
                  if(node.status)le.appendChild(htmlEl('span',{class:'cond-status cond-status-'+node.status},node.status));
                  wrap.appendChild(le);
                }else if(node.kind==='Sequenced'){
                  wrap.appendChild(htmlEl('div',{class:'cond-leaf'},'SEQUENCED'));
                  var seq=htmlEl('div',{class:'cond-children'});
                  if(node.after){var afterWrap=htmlEl('div',{},'after:');afterWrap.appendChild(buildCondNode(node.after));seq.appendChild(afterWrap);}
                  if(node.then){var thenWrap=htmlEl('div',{},'then:');thenWrap.appendChild(buildCondNode(node.then));seq.appendChild(thenWrap);}
                  wrap.appendChild(seq);
                }else{
                  var raw=htmlEl('div',{class:'cond-leaf'});
                  raw.appendChild(htmlEl('span',{class:'cond-operator'},(node.kind||'NODE')+' '));
                  if(node.summary)raw.appendChild(htmlEl('span',{class:'cond-val'},node.summary));
                  if(node.status)raw.appendChild(htmlEl('span',{class:'cond-status cond-status-'+node.status},node.status));
                  wrap.appendChild(raw);
                }
                return wrap;
              }
              // ===== Network (simple force-directed) =====
              function renderNetwork(el){
                var data=readJson(el);if(!data||!data.nodes||!data.nodes.length)return;
                var w=el.clientWidth||720,h=parseInt(el.dataset.height,10)||500;
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                var nodes=data.nodes.map(function(n,i){
                  return Object.assign({},n,{x:w/2+Math.cos(i*2*Math.PI/data.nodes.length)*Math.min(w,h)*0.3,y:h/2+Math.sin(i*2*Math.PI/data.nodes.length)*Math.min(w,h)*0.3,vx:0,vy:0});
                });
                var idx={};nodes.forEach(function(n,i){idx[n.id]=i;});
                var edges=(data.edges||[]).map(function(e){return {source:idx[e.source],target:idx[e.target],weight:e.weight||1};}).filter(function(e){return e.source!=null&&e.target!=null;});
                // simple force simulation (Fruchterman-Reingold-ish)
                var iters=200;
                var k=Math.sqrt((w*h)/nodes.length)*0.85;
                for(var step=0;step<iters;step++){
                  // repulsion
                  for(var i=0;i<nodes.length;i++){
                    nodes[i].vx=0;nodes[i].vy=0;
                    for(var j=0;j<nodes.length;j++)if(i!==j){
                      var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
                      var dist=Math.max(0.1,Math.sqrt(dx*dx+dy*dy));
                      var f=k*k/dist;
                      nodes[i].vx+=dx/dist*f;nodes[i].vy+=dy/dist*f;
                    }
                  }
                  // attraction
                  edges.forEach(function(e){
                    var s=nodes[e.source],t=nodes[e.target];
                    var dx=t.x-s.x,dy=t.y-s.y;var dist=Math.max(0.1,Math.sqrt(dx*dx+dy*dy));
                    var f=dist*dist/k*Math.min(2,e.weight);
                    s.vx+=dx/dist*f;s.vy+=dy/dist*f;
                    t.vx-=dx/dist*f;t.vy-=dy/dist*f;
                  });
                  // gravity toward center
                  var gx=w/2,gy=h/2;
                  nodes.forEach(function(n){
                    var dx=gx-n.x,dy=gy-n.y;
                    n.vx+=dx*0.02;n.vy+=dy*0.02;
                  });
                  // apply with decay
                  var temp=(1-step/iters)*20+1;
                  nodes.forEach(function(n){
                    var vlen=Math.max(0.001,Math.sqrt(n.vx*n.vx+n.vy*n.vy));
                    n.x+=n.vx/vlen*Math.min(vlen,temp);
                    n.y+=n.vy/vlen*Math.min(vlen,temp);
                    n.x=clamp(n.x,30,w-30);n.y=clamp(n.y,30,h-30);
                  });
                }
                // edges first
                edges.forEach(function(e){
                  var s=nodes[e.source],t=nodes[e.target];
                  svg.appendChild(svgEl('line',{x1:s.x,y1:s.y,x2:t.x,y2:t.y,class:'network-edge','stroke-opacity':Math.min(0.6,0.15+e.weight*0.08)}));
                });
                // halos
                nodes.forEach(function(n){
                  if(n.haloStdDev!=null){
                    var hr=(n.r||10)+8+n.haloStdDev*40;
                    svg.appendChild(svgEl('circle',{cx:n.x,cy:n.y,r:hr,class:'network-halo',stroke:'hsl('+(n.hue||200)+',60%,55%)','stroke-opacity':Math.max(0.05,0.30-n.haloStdDev*1.5)}));
                  }
                });
                // nodes
                nodes.forEach(function(n){
                  var r=n.r||10;
                  var c=svgEl('circle',{cx:n.x,cy:n.y,r:r,class:'network-node',fill:'hsl('+(n.hue||200)+',60%,52%)'});
                  var ti=svgEl('title');ti.textContent=(n.label||n.id)+(n.tooltip?' · '+n.tooltip:'');c.appendChild(ti);
                  svg.appendChild(c);
                  if(n.label){
                    var lt=svgEl('text',{x:n.x,y:n.y+r+12,class:'network-label'});
                    lt.textContent=n.label;svg.appendChild(lt);
                  }
                });
                el.appendChild(svg);
              }
              // ===== Trust-reach scatter =====
              function renderScatter(el){
                var data=readJson(el);if(!data||!data.points)return;
                var w=el.clientWidth||640,h=parseInt(el.dataset.height,10)||360;
                var padL=60,padR=24,padT=24,padB=50;var pw=w-padL-padR,ph=h-padT-padB;
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                var xMin=data.xMin!=null?data.xMin:0,xMax=data.xMax!=null?data.xMax:1;
                var yMin=data.yMin!=null?data.yMin:0,yMax=data.yMax!=null?data.yMax:1;
                var xPx=function(x){return padL+(x-xMin)/(xMax-xMin)*pw;};
                var yPx=function(y){return padT+ph-(y-yMin)/(yMax-yMin)*ph;};
                // grid
                for(var i=0;i<=4;i++){
                  var gx=padL+i*pw/4,gy=padT+i*ph/4;
                  svg.appendChild(svgEl('line',{x1:gx,y1:padT,x2:gx,y2:padT+ph,class:'scatter-grid'}));
                  svg.appendChild(svgEl('line',{x1:padL,y1:gy,x2:padL+pw,y2:gy,class:'scatter-grid'}));
                }
                // axes
                svg.appendChild(svgEl('line',{x1:padL,y1:padT,x2:padL,y2:padT+ph,class:'scatter-axis'}));
                svg.appendChild(svgEl('line',{x1:padL,y1:padT+ph,x2:padL+pw,y2:padT+ph,class:'scatter-axis'}));
                // axis labels
                var xLbl=svgEl('text',{x:padL+pw/2,y:h-8,'text-anchor':'middle',class:'scatter-axis-label'});
                xLbl.textContent=data.xLabel||'x';svg.appendChild(xLbl);
                var yLbl=svgEl('text',{x:14,y:padT+ph/2,'text-anchor':'middle',class:'scatter-axis-label',transform:'rotate(-90 14 '+(padT+ph/2)+')'});
                yLbl.textContent=data.yLabel||'y';svg.appendChild(yLbl);
                // tick numbers
                [xMin,xMin+(xMax-xMin)/2,xMax].forEach(function(v,i){
                  var t=svgEl('text',{x:padL+i*pw/2,y:padT+ph+16,'text-anchor':'middle'});
                  t.textContent=data.xTickFmt==='log10'?'10^'+v.toFixed(1):v.toFixed(2);
                  svg.appendChild(t);
                });
                [yMin,(yMin+yMax)/2,yMax].forEach(function(v,i){
                  var t=svgEl('text',{x:padL-6,y:padT+ph-i*ph/2+3,'text-anchor':'end'});
                  t.textContent=v.toFixed(2);svg.appendChild(t);
                });
                // points with error bars
                data.points.forEach(function(p){
                  var x=xPx(p.x),y=yPx(p.y);
                  var hue=p.hue||200;
                  // y error bar (trust stddev vertical)
                  if(p.ySd){
                    var y1=yPx(p.y-p.ySd),y2=yPx(p.y+p.ySd);
                    svg.appendChild(svgEl('line',{x1:x,y1:y1,x2:x,y2:y2,class:'scatter-errorbar',stroke:'hsl('+hue+',55%,55%)'}));
                  }
                  // x error bar (reach stddev horizontal in log space)
                  if(p.xSd){
                    var x1=xPx(p.x-p.xSd),x2=xPx(p.x+p.xSd);
                    svg.appendChild(svgEl('line',{x1:x1,y1:y,x2:x2,y2:y,class:'scatter-errorbar',stroke:'hsl('+hue+',55%,55%)'}));
                  }
                  // point
                  var c=svgEl('circle',{cx:x,cy:y,r:p.r||6,class:'scatter-point',fill:'hsl('+hue+',60%,55%)'});
                  var ti=svgEl('title');ti.textContent=(p.label||'')+(p.tooltip?' · '+p.tooltip:'');c.appendChild(ti);
                  svg.appendChild(c);
                  if(p.label){
                    var lt=svgEl('text',{x:x+(p.r||6)+4,y:y+3});
                    lt.textContent=p.label;svg.appendChild(lt);
                  }
                });
                el.appendChild(svg);
              }
              // ===== Theme radar =====
              function renderThemeRadar(el){
                var data=readJson(el);if(!data||!data.themes)return;
                var size=parseInt(el.dataset.size,10)||320;var cx=size/2,cy=size/2;
                var rMax=size*0.40;
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+size+' '+size,width:size,height:size});
                var maxValue=0;data.themes.forEach(function(t){if(t.value>maxValue)maxValue=t.value;});
                if(maxValue<=0)maxValue=1;
                // axis rings
                [0.25,0.5,0.75,1].forEach(function(f){
                  svg.appendChild(svgEl('circle',{cx:cx,cy:cy,r:rMax*f,fill:'none',class:'radar-axis'}));
                });
                var n=data.themes.length;
                data.themes.forEach(function(t,i){
                  var ang=-Math.PI/2+i*2*Math.PI/n;
                  var ax=cx+rMax*Math.cos(ang),ay=cy+rMax*Math.sin(ang);
                  svg.appendChild(svgEl('line',{x1:cx,y1:cy,x2:ax,y2:ay,class:'radar-axis'}));
                  // petal as triangle from center
                  var v=(t.value||0)/maxValue;
                  var px=cx+rMax*v*Math.cos(ang),py=cy+rMax*v*Math.sin(ang);
                  var angL=ang-Math.PI/n*0.4,angR=ang+Math.PI/n*0.4;
                  var plx=cx+rMax*v*0.4*Math.cos(angL),ply=cy+rMax*v*0.4*Math.sin(angL);
                  var prx=cx+rMax*v*0.4*Math.cos(angR),pry=cy+rMax*v*0.4*Math.sin(angR);
                  var d='M '+cx+' '+cy+' L '+plx+' '+ply+' L '+px+' '+py+' L '+prx+' '+pry+' Z';
                  svg.appendChild(svgEl('path',{d:d,class:'radar-petal',fill:'hsl('+(t.hue||200)+',60%,55%)',stroke:'hsl('+(t.hue||200)+',65%,68%)'}));
                  // label
                  var lx=cx+(rMax+22)*Math.cos(ang),ly=cy+(rMax+22)*Math.sin(ang);
                  var lt=svgEl('text',{x:lx,y:ly+3});lt.textContent=t.label;svg.appendChild(lt);
                });
                el.appendChild(svg);
              }
              // ===== Conviction-vs-evidence scatter =====
              function renderConviction(el){
                var data=readJson(el);if(!data||!data.theses)return;
                var w=el.clientWidth||640,h=parseInt(el.dataset.height,10)||380;
                var padL=60,padR=30,padT=30,padB=50;var pw=w-padL-padR,ph=h-padT-padB;
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                var maxN=10;data.theses.forEach(function(t){if(t.n>maxN)maxN=t.n;});
                maxN=Math.ceil(maxN*1.15);
                var xPx=function(x){return padL+x*pw;};
                var yPx=function(y){return padT+ph-y/maxN*ph;};
                // grid
                [0,0.25,0.5,0.75,1].forEach(function(x){
                  svg.appendChild(svgEl('line',{x1:xPx(x),y1:padT,x2:xPx(x),y2:padT+ph,class:'scatter-grid'}));
                });
                // axes
                svg.appendChild(svgEl('line',{x1:padL,y1:padT,x2:padL,y2:padT+ph,class:'scatter-axis'}));
                svg.appendChild(svgEl('line',{x1:padL,y1:padT+ph,x2:padL+pw,y2:padT+ph,class:'scatter-axis'}));
                // quadrant labels
                var ql=svgEl('text',{x:padL+pw*0.20,y:padT+18,class:'conviction-quadrant-label'});ql.textContent='speculative + thin';svg.appendChild(ql);
                var qr=svgEl('text',{x:padL+pw*0.78,y:padT+18,class:'conviction-quadrant-label'});qr.textContent='earned conviction';svg.appendChild(qr);
                var qbl=svgEl('text',{x:padL+pw*0.20,y:padT+ph-8,class:'conviction-quadrant-label'});qbl.textContent='watching';svg.appendChild(qbl);
                var qbr=svgEl('text',{x:padL+pw*0.78,y:padT+ph-8,class:'conviction-quadrant-label'});qbr.textContent='honest humility';svg.appendChild(qbr);
                // x ticks
                [0,0.5,1].forEach(function(x){
                  var t=svgEl('text',{x:xPx(x),y:padT+ph+16,'text-anchor':'middle'});t.textContent=x.toFixed(1);svg.appendChild(t);
                });
                // y ticks
                [0,maxN/2,maxN].forEach(function(y){
                  var t=svgEl('text',{x:padL-6,y:yPx(y)+3,'text-anchor':'end'});t.textContent=Math.round(y);svg.appendChild(t);
                });
                // axis labels
                var xL=svgEl('text',{x:padL+pw/2,y:h-8,'text-anchor':'middle',class:'scatter-axis-label'});xL.textContent='Mean confidence (μ)';svg.appendChild(xL);
                var yL=svgEl('text',{x:14,y:padT+ph/2,'text-anchor':'middle',class:'scatter-axis-label',transform:'rotate(-90 14 '+(padT+ph/2)+')'});yL.textContent='Effective n (α+β)';svg.appendChild(yL);
                // points
                data.theses.forEach(function(t){
                  var c=svgEl('circle',{cx:xPx(t.mean),cy:yPx(t.n),r:9,class:'conviction-point',fill:'hsl('+(t.hue||200)+',60%,58%)'});
                  var ti=svgEl('title');ti.textContent=t.label+' · μ='+t.mean.toFixed(2)+' · n='+Math.round(t.n);c.appendChild(ti);
                  svg.appendChild(c);
                  var lt=svgEl('text',{x:xPx(t.mean)+13,y:yPx(t.n)+3,fill:'hsl('+(t.hue||200)+',65%,75%)','font-size':10});
                  lt.textContent=t.label;svg.appendChild(lt);
                });
                el.appendChild(svg);
              }
              // ===== Source-mix heatmap (rows=source subclass, cols=snapshot) =====
              function renderSourceMix(el){
                var data=readJson(el);if(!data||!data.rows||!data.cols)return;
                var w=el.clientWidth||720;var rowH=22;var colW=Math.max(36,(w-160)/data.cols.length);
                var h=20+data.rows.length*rowH+30;
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                var max=0;data.rows.forEach(function(r){r.values.forEach(function(v){if(v>max)max=v;});});
                if(max<=0)max=1;
                data.rows.forEach(function(r,ri){
                  var y=20+ri*rowH;
                  var lbl=svgEl('text',{x:8,y:y+rowH*0.66,'font-size':10,fill:'var(--fg-dim)'});lbl.textContent=r.label;svg.appendChild(lbl);
                  r.values.forEach(function(v,ci){
                    var x=140+ci*colW;
                    var alpha=v/max;
                    svg.appendChild(svgEl('rect',{x:x,y:y+2,width:colW-2,height:rowH-4,class:'mix-cell',fill:'hsl('+(r.hue||200)+',60%,55%)','fill-opacity':alpha}));
                    if(v>0){
                      var tn=svgEl('text',{x:x+colW/2,y:y+rowH*0.66,'text-anchor':'middle','font-size':9,fill:alpha>0.5?'var(--bg)':'var(--fg-dim)'});
                      tn.textContent=v;svg.appendChild(tn);
                    }
                  });
                });
                // column labels at top
                data.cols.forEach(function(c,ci){
                  var x=140+ci*colW+colW/2;
                  var t=svgEl('text',{x:x,y:14,'text-anchor':'middle','font-size':9,fill:'var(--fg-faint)'});t.textContent=c;svg.appendChild(t);
                });
                el.appendChild(svg);
              }
              // ===== Regime fingerprint (violin row per thesis) =====
              // Supports two data shapes: a JSON script blob OR child elements
              // with data-fp-mean etc. attributes (more tx-friendly).
              function renderFingerprint(el){
                var data=readJson(el);
                if(!data){
                  var theses=[];
                  el.querySelectorAll(':scope > [data-fp-mean]').forEach(function(c){
                    theses.push({
                      label:c.dataset.fpLabel||'',
                      mean:parseFloat(c.dataset.fpMean),
                      stddev:parseFloat(c.dataset.fpStddev),
                      alpha:parseFloat(c.dataset.fpAlpha),
                      beta:parseFloat(c.dataset.fpBeta),
                      hue:parseFloat(c.dataset.fpHue)||200,
                      status:c.dataset.fpStatus||'active'
                    });
                  });
                  if(!theses.length)return;
                  data={theses:theses};
                }
                if(!data.theses)return;
                var w=el.clientWidth||320,h=parseInt(el.dataset.height,10)||80;
                var cellW=w/data.theses.length;
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                data.theses.forEach(function(t,i){
                  var cx=i*cellW+cellW/2;
                  var a=t.alpha,b=t.beta;
                  if(!isFinite(a)||!isFinite(b)){var ab=abFromMeanStd(t.mean,t.stddev);if(ab){a=ab[0];b=ab[1];}else{a=t.mean*20;b=(1-t.mean)*20;}}
                  var pts=betaDensity(a,b,40);
                  // map density to width, mean to vertical position
                  var maxW=cellW*0.46;
                  var meanY=h-(t.mean*h*0.95)-h*0.025;
                  var d='M '+cx+' '+h;
                  // left side: rise from base to peak (top), back to base (bottom)
                  pts.forEach(function(p){
                    var y=h-(p[0]*h*0.95)-h*0.025;
                    var widthHere=p[1]*maxW;
                    d+=' L '+(cx-widthHere)+' '+y;
                  });
                  d+=' L '+cx+' '+(h*0.025);
                  for(var j=pts.length-1;j>=0;j--){
                    var p2=pts[j];
                    var y2=h-(p2[0]*h*0.95)-h*0.025;
                    var widthHere2=p2[1]*maxW;
                    d+=' L '+(cx+widthHere2)+' '+y2;
                  }
                  d+=' L '+cx+' '+h+' Z';
                  var op=(t.status==='active'?1:(t.status==='retired'?0.35:0.5));
                  var fill='hsl('+(t.hue||200)+',65%,55%)';
                  svg.appendChild(svgEl('path',{d:d,fill:fill,'fill-opacity':0.55*op,stroke:fill,'stroke-opacity':0.85*op,'stroke-width':1}));
                  // mean tick
                  svg.appendChild(svgEl('line',{x1:cx-maxW*0.6,y1:meanY,x2:cx+maxW*0.6,y2:meanY,stroke:'hsl('+(t.hue||200)+',70%,80%)','stroke-width':1.3,'stroke-opacity':op}));
                  var ti=svgEl('title');ti.textContent=t.label+' · μ='+t.mean.toFixed(2)+(t.stddev?' ± '+t.stddev.toFixed(2):'')+(t.status?' · '+t.status:'');
                  // wrap in g for tooltip support
                  var g=svgEl('g');g.appendChild(ti);svg.appendChild(g);
                });
                el.appendChild(svg);
              }
              // ===== Days-to-decision calendar (linear horizon) =====
              function renderCalendar(el){
                var data=readJson(el);if(!data||!data.events)return;
                var w=el.clientWidth||640,h=parseInt(el.dataset.height,10)||140;
                var pad=24;var pw=w-pad*2;
                var today=Date.now();var spanDays=parseInt(el.dataset.spanDays,10)||90;
                var endT=today+spanDays*86400000;
                el.innerHTML='';
                var svg=svgEl('svg',{viewBox:'0 0 '+w+' '+h,width:'100%',height:h});
                // baseline
                var y0=h-32;
                svg.appendChild(svgEl('line',{x1:pad,y1:y0,x2:w-pad,y2:y0,stroke:'var(--border)','stroke-width':1}));
                // ticks every 30 days
                for(var d=0;d<=spanDays;d+=15){
                  var x=pad+d/spanDays*pw;
                  svg.appendChild(svgEl('line',{x1:x,y1:y0,x2:x,y2:y0+5,stroke:'var(--border)','stroke-width':1}));
                  var dt=new Date(today+d*86400000);
                  var t=svgEl('text',{x:x,y:y0+18,'text-anchor':'middle','font-size':9,fill:'var(--fg-faint)'});
                  t.textContent=(dt.getMonth()+1)+'/'+dt.getDate();svg.appendChild(t);
                }
                // events
                data.events.forEach(function(ev,i){
                  var d=(new Date(ev.date).getTime()-today)/86400000;
                  if(d<0||d>spanDays)return;
                  var x=pad+d/spanDays*pw;
                  var stemH=24+((i%4)*12);
                  svg.appendChild(svgEl('line',{x1:x,y1:y0,x2:x,y2:y0-stemH,stroke:'hsl('+(ev.hue||200)+',60%,55%)','stroke-width':1.5,class:'cal-event'}));
                  svg.appendChild(svgEl('circle',{cx:x,cy:y0-stemH,r:4,fill:'hsl('+(ev.hue||200)+',60%,58%)',stroke:'var(--bg)','stroke-width':1.5}));
                  var t=svgEl('text',{x:x,y:y0-stemH-6,'text-anchor':'middle','font-size':9,fill:'hsl('+(ev.hue||200)+',60%,72%)'});
                  t.textContent=ev.label;svg.appendChild(t);
                });
                el.appendChild(svg);
              }
              // ===== Auto-bootstrap =====
              var RENDERERS={
                'beta-density':renderBetaDensity,
                'fan-chart':renderFanChart,
                'forest':renderForest,
                'sunburst':renderSunburst,
                'condition-tree':renderConditionTree,
                'network':renderNetwork,
                'scatter':renderScatter,
                'theme-radar':renderThemeRadar,
                'conviction':renderConviction,
                'source-mix':renderSourceMix,
                'fingerprint':renderFingerprint,
                'calendar':renderCalendar
              };
              function bootstrap(){
                document.querySelectorAll('[data-viz]').forEach(function(el){
                  var kind=el.dataset.viz;var r=RENDERERS[kind];
                  if(r){try{r(el);}catch(e){if(window.console)console.warn('viz '+kind+' failed',e);}}
                });
              }
              if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bootstrap);
              else bootstrap();
              // expose for debugging
              window.WorldviewViz={betaDensity:betaDensity,abFromMeanStd:abFromMeanStd,renderers:RENDERERS,bootstrap:bootstrap};
            })();
            </script>

# =============================================================================
# DERIVATION BINDINGS ON wv.WorldviewSnapshot
#
# Open-world augmentation: this top-level entry adds derivations to the
# existing `worldview.genval.ai/core@1.0.0/WorldviewSnapshot` class. The
# parser merges by canonical URI, so this binding attaches to the same
# subject the core package declared. Pattern mirrors
# kanonak.org/universal-derivations@1.0.0 augmenting rdfs.Resource.
#
# Two bindings:
#   - (formats.html, default)       → snapshot-to-html-transformation
#   - (formats.stylesheet, default) → snapshot-stylesheet
# =============================================================================

wv.WorldviewSnapshot:
  derivation.derivations:
    - type: derivation.Derivation
      derivation.format: formats.html
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: snapshot-to-html
        tx.version: 2.1.0
        tx.name: snapshot-to-html-transformation
    - type: derivation.Derivation
      derivation.format: formats.stylesheet
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: snapshot-to-html
        tx.version: 2.1.0
        tx.name: snapshot-stylesheet

# =============================================================================
# AGGREGATE VIEWS
#
# Each AggregateView declares one cross-version page produced by a
# SetTransformation aggregating across every published snapshot. After
# `kanonak site build`, those steps collapse to one `kanonak site build`
# invocation that materializes every AggregateView at its outputPath.
#
# scopeSources uses the `publisher/package@*` wildcard form so each view
# automatically picks up new snapshot versions on the next build — no
# workflow edit needed.
#
# Each AggregateView carries a per-instance (formats.stylesheet, default)
# `derivation.derivations` binding pointing at its package's stylesheet
# transformation. The site builder materializes the sibling `.css`
# artifact at `<dirname-of-outputPath>/index.css` so the HTML's
# `<link rel="stylesheet" href="index.css">` resolves path-relative.
# =============================================================================

snapshots-aggregate:
  type: site.AggregateView
  site.outputPath: snapshots/index.html
  site.scopeClass: wv.WorldviewSnapshot
  site.scopeSources:
    - worldview.genval.ai/snapshot@*
  site.transformation:
    type: tx.TransformationReference
    tx.publisher: worldview.genval.ai
    tx.package: landing-page
    tx.version: 2.1.0
    tx.name: landing-page-transformation
  derivation.derivations:
    - type: derivation.Derivation
      derivation.format: formats.stylesheet
      derivation.variant: derivation.default
      derivation.transformation:
        type: tx.TransformationReference
        tx.publisher: worldview.genval.ai
        tx.package: landing-page
        tx.version: 2.1.0
        tx.name: landing-page-stylesheet

