timeline:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
        - package: transformations
          match: ^
          version: 3.2.0
          alias: tx
        - package: document-ast
          match: ^
          version: 1.0.0
          alias: docast
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.0.0
          alias: wv

# =============================================================================
# Cross-version timeline view of WorldviewSnapshot confidence trajectories.
#
# Multi-scope SetTransformation (#9) iterates every WorldviewSnapshot in
# scope and, per snapshot, walks each thesis to emit a structured
# (snapshot, thesis, confidence) data point. Inline JS reads those
# points from the DOM and draws an SVG line chart — one line per
# thesis, X axis = snapshot order (ordinal), Y axis = confidence 0..1.
#
# This is the first non-list aggregate transformation in the publisher;
# the SetTransformation rule embeds rendering data rather than producing
# a list of cards. It demonstrates that aggregate transformations are
# a primitive for ANY cross-input view, not just indexes.
# =============================================================================

timeline-transformation:
  type: tx.SetTransformation

  tx.inputPattern:
    tx.matchesClass: wv.WorldviewSnapshot
    tx.sortBy:
      - tx.byProperty: wv.observedAt
        tx.order: tx.ascending

  tx.artifactName:
    type: tx.StringLiteral
    tx.stringLiteral: index

  tx.outputs:
    - tx.html

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:

      # =========================================================
      # METADATA - HTML <title>
      # =========================================================
      - tx.field: docast.metadata
        tx.bindValue:
          type: tx.BuildAstNode
          tx.astClass: docast.StructuredMap
          tx.set:
            - tx.field: docast.entries
              tx.bindValue:
                type: tx.Concat
                tx.parts:
                  - type: tx.BuildAstNode
                    tx.astClass: docast.StructuredEntry
                    tx.set:
                      - tx.field: docast.key
                        tx.bindValue:
                          type: tx.StringLiteral
                          tx.stringLiteral: title
                      - tx.field: docast.value
                        tx.bindValue:
                          type: tx.BuildAstNode
                          tx.astClass: docast.StringScalar
                          tx.set:
                            - tx.field: docast.stringValue
                              tx.bindValue:
                                type: tx.StringLiteral
                                tx.stringLiteral: 'Timeline · worldview.genval.ai'

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        # =====================================================
                        # STYLE BLOCK
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <style>
                            /* Suppress the CLI's default metadata frontmatter render */
                            dl.metadata{display:none!important}
                            :root{--bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;--accent:#7dd3fc;--accent-2:#38bdf8;--accent-3:#0ea5e9;--strong:#34d399;--moderate:#fbbf24;--danger:#f87171;--border:#1e293b;--border-soft:#162033;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;--font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif}
                            *{box-sizing:border-box;margin:0;padding:0}
                            html,body{background:var(--bg)}
                            /* Override CLI's body wrapper so nav can span full viewport */
                            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
                            a{color:var(--accent);text-decoration:none;transition:color 120ms}
                            a:hover{color:var(--accent-2)}
                            /* SITE NAV */
                            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
                            [id]{scroll-margin-top:80px}
                            @media (max-width:600px){[id]{scroll-margin-top:120px}}
                            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
                            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
                            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
                            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
                            ul.site-nav-links a:hover{color:var(--fg)}
                            ul.site-nav-links a.active{color:var(--fg)}
                            @media (max-width:600px){nav.site-nav{padding:12px 20px}.site-nav-inner{gap:16px}ul.site-nav-links{gap:16px;margin-left:0;flex-basis:100%}}
                            article.timeline{max-width:1400px;margin:0 auto;padding:48px 32px 96px}
                            @media (max-width:760px){article.timeline{padding:32px 20px 64px}}
                            header.intro{padding:0 0 56px;border-bottom:1px solid var(--border);margin-bottom:56px;position:relative}
                            header.intro::before{content:"";position:absolute;top:-12px;left:0;width:48px;height:2px;background:var(--accent)}
                            header.intro .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:24px;display:block}
                            header.intro h1{font-family:var(--font-display);font-size:64px;font-weight:400;letter-spacing:-0.025em;margin-bottom:32px;line-height:1.0;color:var(--fg)}
                            @media (max-width:760px){header.intro h1{font-size:42px}}
                            header.intro .lead{font-size:19px;color:var(--fg-dim);line-height:1.7;font-weight:300}
                            section.chart-section{margin-top:64px}
                            .section-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg-dim);margin-bottom:24px;display:flex;align-items:center;gap:12px}
                            .section-title::after{content:"";flex:1;height:1px;background:var(--border)}
                            .chart-host{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:8px;padding:24px;overflow-x:auto}
                            .chart-host svg{display:block;width:100%;height:auto;min-width:760px}
                            .chart-legend{margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px}
                            .legend-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;font-size:13px;cursor:default;transition:border-color 120ms,opacity 120ms}
                            .legend-item.dimmed{opacity:0.35}
                            .legend-item:hover{border-color:var(--accent-3)}
                            .legend-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0}
                            .legend-label{flex:1;color:var(--fg-dim);line-height:1.4}
                            .legend-current{font-family:var(--font-mono);font-size:12px;color:var(--fg);background:var(--bg-elev);border:1px solid var(--border);padding:2px 8px;border-radius:4px;letter-spacing:0.05em;flex-shrink:0}
                            .legend-current.up{color:var(--strong);border-color:rgba(52,211,153,0.3)}
                            .legend-current.down{color:var(--danger);border-color:rgba(248,113,113,0.3)}
                            .legend-current.flat{color:var(--fg-faint)}
                            .data{display:none}
                            footer.timeline-footer{margin-top:80px;padding-top:32px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);display:flex;justify-content:space-between;letter-spacing:0.08em;text-transform:uppercase;flex-wrap:wrap;gap:16px}
                            footer.timeline-footer a{color:var(--accent)}
                            </style>

                        # =====================================================
                        # SITE NAV
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <nav class="site-nav">
                            <div class="site-nav-inner">
                            <a href="/" class="site-nav-brand">worldview.genval.ai</a>
                            <ul class="site-nav-links">
                            <li><a href="/">Latest</a></li>
                            <li><a href="/snapshots/">Snapshots</a></li>
                            <li><a href="/timeline/" class="active">Timeline</a></li>
                            <li><a href="/changes/">Changes</a></li>
                            <li><a href="/about/">About</a></li>
                            </ul>
                            </div>
                            </nav>

                        # =====================================================
                        # ARTICLE OPEN + HERO + CHART HOST
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <article class="timeline">
                            <header class="intro">
                            <span class="eyebrow">Timeline</span>
                            <h1>Confidence over time</h1>
                            <p class="lead">One line per thesis. The chart compresses every published snapshot version into a single view of how each thesis's confidence has evolved &mdash; gaining conviction, losing it, or holding steady. Hover the legend to isolate a thesis; each dot is a published snapshot version.</p>
                            </header>
                            <section class="chart-section">
                            <h2 class="section-title">Confidence trajectories</h2>
                            <div class="chart-host" id="chart-host"><svg id="confidence-chart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" preserveAspectRatio="xMidYMid meet"></svg></div>
                            <div class="chart-legend" id="chart-legend"></div>
                            </section>
                            <section class="data" aria-hidden="true">

                        # =====================================================
                        # PER-SNAPSHOT DATA EMBEDDING
                        # ForEach over inputs (sorted ascending by observedAt).
                        # Each snapshot wraps a set of thesis-point divs that
                        # the inline script reads to build the chart.
                        # =====================================================
                        - type: tx.ForEach
                          tx.source:
                            type: tx.VarRef
                            tx.varName: inputs
                          tx.loopVar: snapshot
                          tx.emit:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<div class="snapshot-data" data-snapshot-version="'
                              - type: tx.UriVersion
                                tx.uriVersionOf:
                                  type: tx.VarRef
                                  tx.varName: snapshot
                              - type: tx.StringLiteral
                                tx.stringLiteral: '" data-observed-at="'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.VarRef
                                  tx.varName: snapshot
                                tx.readProp: wv.observedAt
                              - type: tx.StringLiteral
                                tx.stringLiteral: '">'

                              # Inner ForEach: each thesis reference on this snapshot
                              - type: tx.ForEach
                                tx.source:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.VarRef
                                    tx.varName: snapshot
                                  tx.readProp: wv.hasThesis
                                tx.loopVar: thesisRef
                                tx.emit:
                                  type: tx.Concat
                                  tx.parts:
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '<div class="thesis-point" data-thesis-name="'
                                    - type: tx.UriName
                                      tx.uriNameOf:
                                        type: tx.VarRef
                                        tx.varName: thesisRef
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '" data-thesis-label="'
                                    - type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.ResolveRef
                                        tx.resolveSource:
                                          type: tx.VarRef
                                          tx.varName: thesisRef
                                      tx.readProp: rdfs.label
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '" data-confidence="'
                                    - type: tx.PropertyRead
                                      tx.readSource:
                                        type: tx.ResolveRef
                                        tx.resolveSource:
                                          type: tx.VarRef
                                          tx.varName: thesisRef
                                      tx.readProp: wv.confidence
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '" data-status="'
                                    - type: tx.UriName
                                      tx.uriNameOf:
                                        type: tx.PropertyRead
                                        tx.readSource:
                                          type: tx.ResolveRef
                                          tx.resolveSource:
                                            type: tx.VarRef
                                            tx.varName: thesisRef
                                        tx.readProp: wv.status
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: '"></div>'

                              - type: tx.StringLiteral
                                tx.stringLiteral: '</div>'

                        # =====================================================
                        # ARTICLE CLOSE + INLINE SCRIPT
                        # The script reads .thesis-point divs, groups them by
                        # data-thesis-name, sorts each series by snapshot order,
                        # and draws an SVG line chart with hover-isolating legend.
                        # =====================================================
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </section>
                            <footer class="timeline-footer">
                            <span><a href="/about/">About this publisher</a></span>
                            <span><a href="https://github.com/genval-ai/worldview">github.com/genval-ai/worldview</a></span>
                            <span>Apache 2.0</span>
                            </footer>
                            </article>
                            <script>
                            (function(){
                              var W=1280, H=600, M={top:30,right:240,bottom:70,left:60};
                              var iW=W-M.left-M.right, iH=H-M.top-M.bottom;
                              var svg=document.getElementById('confidence-chart');
                              if(!svg) return;
                              // Collect snapshots (sorted by observedAt asc) and series
                              var snaps=[];
                              var snapMap=new Map();
                              document.querySelectorAll('.snapshot-data').forEach(function(s){
                                var v=s.dataset.snapshotVersion;
                                var t=new Date(s.dataset.observedAt);
                                if(!snapMap.has(v)){snapMap.set(v,t);snaps.push({version:v,observedAt:t,el:s});}
                              });
                              snaps.sort(function(a,b){return a.observedAt-b.observedAt;});
                              if(!snaps.length) return;
                              var series=new Map();
                              snaps.forEach(function(snap,xi){
                                snap.el.querySelectorAll('.thesis-point').forEach(function(pt){
                                  var name=pt.dataset.thesisName;
                                  var label=pt.dataset.thesisLabel||name;
                                  var conf=parseFloat(pt.dataset.confidence);
                                  var status=pt.dataset.status||'active';
                                  if(isNaN(conf)) return;
                                  if(!series.has(name)) series.set(name,{label:label,points:[]});
                                  // keep latest label seen
                                  series.get(name).label=label;
                                  series.get(name).points.push({x:xi,conf:conf,status:status,version:snap.version,observedAt:snap.observedAt});
                                });
                              });
                              if(!series.size) return;
                              // Sort each series by x
                              series.forEach(function(s){s.points.sort(function(a,b){return a.x-b.x;});});
                              // Color palette - distinct hues per thesis
                              var names=Array.from(series.keys());
                              function colorFor(i){var hue=(i*(360/Math.max(1,names.length))+200)%360;return 'hsl('+hue+', 65%, 65%)';}
                              // Scales
                              function xScale(xi){return M.left + (snaps.length<=1 ? iW/2 : (xi/(snaps.length-1))*iW);}
                              function yScale(c){return M.top + (1-c)*iH;}
                              // Format date as MM-DD
                              function fmtDate(d){var m=String(d.getUTCMonth()+1).padStart(2,'0');var dy=String(d.getUTCDate()).padStart(2,'0');return m+'-'+dy;}
                              // Build SVG
                              var p=[];
                              p.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">');
                              // Y-axis grid + labels (0, 0.25, 0.5, 0.75, 1.0)
                              [0,0.25,0.5,0.75,1].forEach(function(c){
                                var y=yScale(c);
                                p.push('<line x1="'+M.left+'" x2="'+(W-M.right)+'" y1="'+y+'" y2="'+y+'" stroke="rgba(148,163,184,0.12)" stroke-dasharray="2,4"/>');
                                p.push('<text x="'+(M.left-12)+'" y="'+(y+4)+'" fill="#6b7689" font-size="11" font-family="ui-monospace, monospace" text-anchor="end">'+c.toFixed(2)+'</text>');
                              });
                              // Y-axis title
                              p.push('<text x="20" y="'+(M.top+iH/2)+'" fill="#9aa5b8" font-size="10" font-family="ui-monospace, monospace" text-anchor="middle" letter-spacing="2" transform="rotate(-90, 20, '+(M.top+iH/2)+')">CONFIDENCE</text>');
                              // X-axis ticks - one per snapshot
                              snaps.forEach(function(s,i){
                                var x=xScale(i);
                                p.push('<line x1="'+x+'" x2="'+x+'" y1="'+M.top+'" y2="'+(H-M.bottom)+'" stroke="rgba(148,163,184,0.08)" stroke-dasharray="2,4"/>');
                                p.push('<text x="'+x+'" y="'+(H-M.bottom+22)+'" fill="#9aa5b8" font-size="11" font-family="ui-monospace, monospace" text-anchor="middle">v'+s.version+'</text>');
                                p.push('<text x="'+x+'" y="'+(H-M.bottom+38)+'" fill="#6b7689" font-size="9" font-family="ui-monospace, monospace" text-anchor="middle">'+fmtDate(s.observedAt)+'</text>');
                              });
                              // Lines + dots per thesis
                              names.forEach(function(name,i){
                                var s=series.get(name);
                                var color=colorFor(i);
                                if(!s.points.length) return;
                                if(s.points.length>1){
                                  var path=s.points.map(function(pt,idx){return (idx===0?'M':'L')+' '+xScale(pt.x)+' '+yScale(pt.conf);}).join(' ');
                                  p.push('<path class="series-path" data-thesis="'+name+'" d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>');
                                }
                                s.points.forEach(function(pt){
                                  p.push('<circle class="series-dot" data-thesis="'+name+'" cx="'+xScale(pt.x)+'" cy="'+yScale(pt.conf)+'" r="5" fill="'+color+'" stroke="#0a0e1a" stroke-width="2"><title>'+s.label+' · v'+pt.version+': '+(pt.conf*100).toFixed(0)+'%</title></circle>');
                                });
                              });
                              p.push('</svg>');
                              svg.outerHTML=p.join('');
                              // Legend with current value + delta from prior
                              var legend=document.getElementById('chart-legend');
                              if(legend){
                                var lh=[];
                                names.forEach(function(name,i){
                                  var s=series.get(name);
                                  var color=colorFor(i);
                                  var lp=s.points[s.points.length-1];
                                  var delta=null;
                                  if(s.points.length>=2){delta=lp.conf - s.points[s.points.length-2].conf;}
                                  var dCls='flat', dTxt='';
                                  if(delta!==null && Math.abs(delta)>0.005){
                                    dCls = delta>0 ? 'up' : 'down';
                                    dTxt = ' '+(delta>0?'+':'')+(delta*100).toFixed(0)+'pt';
                                  }
                                  lh.push('<div class="legend-item" data-thesis="'+name+'"><span class="legend-swatch" style="background:'+color+'"></span><span class="legend-label">'+s.label+'</span><span class="legend-current '+dCls+'">'+(lp.conf*100).toFixed(0)+'%'+dTxt+'</span></div>');
                                });
                                legend.innerHTML=lh.join('');
                                // Hover-isolate
                                legend.querySelectorAll('.legend-item').forEach(function(item){
                                  item.addEventListener('mouseenter', function(){
                                    var t=item.dataset.thesis;
                                    legend.querySelectorAll('.legend-item').forEach(function(o){if(o.dataset.thesis!==t) o.classList.add('dimmed');});
                                    document.querySelectorAll('.series-path,.series-dot').forEach(function(el){if(el.dataset.thesis!==t) el.style.opacity='0.15';});
                                  });
                                  item.addEventListener('mouseleave', function(){
                                    legend.querySelectorAll('.legend-item').forEach(function(o){o.classList.remove('dimmed');});
                                    document.querySelectorAll('.series-path,.series-dot').forEach(function(el){el.style.opacity='';});
                                  });
                                });
                              }
                            })();
                            </script>
