funds:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  label: Fund data - genesis public version
  comment: >-
    The first public fund data version, ported from the private portfolio
    engine's funds@2.0.2 (derived from alignments 1.0.8 against worldview
    snapshot 2.1.13). Re-typed against the worldview.genval.ai/fund ontology;
    the analysis content is unchanged. Superseded by the next operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: fund
          match: ^
          version: 1.0.0
          alias: fund
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: alignments
          match: '='
          version: 1.0.0
          alias: ca
        - package: securities
          match: ^
          version: 2.1.0
          alias: sec
        - package: snapshots
          match: '='
          version: 2.1.13
          alias: ws
genval-worldview-fund:
  type: fund.Fund
  label: "Genval Worldview Fund (1.0.0 - genesis public version ported from private engine 2.0.2; patch reweight against snapshot 2.1.13 + alignments 1.0.8: three thesis confidences moved (energy 0.72 -> 0.68, equity-melt-up 0.74 -> 0.76, stagflation 0.83 -> 0.82) while alignment strengths and driver loadings held, so energy legs trim (XLE 7.36 -> 7.00%, XOM/CVX -0.21pp each), equity legs lift (SPY/VTI/UVIX), UVIX overtakes NVDA in the middle of the book; same 21 holdings, same driver-union method, gross 100%, net +85% long, ~7.6% short via rates)"
  fundObservedAt: 2026-05-29T19:12:22Z
  fund.derivedFromSnapshot: ws.view
  derivedFromAlignment: ca.view
  weightingMethod: fund.method-driver-union
  grossExposure: 1.00
  netExposure: 0.85
  cashWeight: 0.075
  fundNarrative: |
    **Genval Worldview Fund - patch reweight (2.0.2).** Re-derived from [[ca.view|thesis-alignments 1.0.8]] against [[ws.view|snapshot 2.1.13]] by the same **driver-union** method as 2.0.1 (each contributing thesis's signed conviction is distributed across its macro drivers by its `fac.hasDriverLoading` shares, MAX-combined within each driver, summed across distinct drivers, normalised to 100% gross). Same 21 holdings, same `weightingMethod`.

    **What moved this patch.** The alignment strengths and driver loadings are unchanged from 1.0.7 (alignment 1.0.8 was a prose-only refresh), so the sole moving inputs are three thesis `confidence.estimateMean` shifts captured in [[ws.view|snapshot 2.1.13]]: [[ws.persistent-energy-shock]] 0.72 -> 0.68 (the ~20% monthly oil collapse plus the tentative 60-day US-Iran memorandum), [[ws.equity-melt-up-vs-recession-risk]] 0.74 -> 0.76 (a fourth consecutive record made through the in-line April PCE, with [[ws.ev-vix-thu-close-1561-may28|VIX easing to ~15.61]]), and [[ws.stagflation-risk]] 0.83 -> 0.82 (the PCE landed sticky-but-not-hotter, with the oil collapse a forward-disinflationary offset). [[ws.iran-war-rearmament]], [[ws.gold-debasement-bid]], [[ws.ai-capex-cycle-with-china-tail]] and [[ws.powell-warsh-transition-risk]] held.

    **How the moves flow through the union.** Each affected security's raw conviction scales by its DOMINANT thesis's confidence ratio; no driver-dominance flips occur (energy still leads stagflation in the shared `inflation-debasement` channel, stagflation still leads powell-warsh in `rate-path`, and equity-melt-up still binds [[sec.uvix]]'s `volatility-regime` MAX channel at 0.76 x 0.70 = 0.532 > 0.51 x 0.65 = 0.332). Energy-dominant legs ([[sec.xle]], [[sec.xom]], [[sec.cvx]]) scale x0.944; equity-melt-up legs ([[sec.spy]], [[sec.vti]], [[sec.uvix]]) scale x1.027; stagflation-dominant legs ([[sec.tlt]], [[sec.dbmf]], [[sec.ief]]) scale x0.988; the gross-1.00 budget then renormalises everything by x1.0067.

    **Resulting deltas (4dp).** [[sec.xle]] 7.36% -> **7.00%** (-0.36pp, the largest mover), [[sec.xom]] 4.32% -> **4.11%** and [[sec.cvx]] 4.22% -> **4.01%** (-0.21pp each) on the energy step-down; [[sec.uvix]] 5.49% -> **5.68%** (+0.19pp), [[sec.spy]] 4.44% -> **4.59%** (+0.15pp), [[sec.vti]] 4.08% -> **4.22%** (+0.14pp) on the equity step-up. The unchanged-confidence legs drift up ~0.03-0.05pp on renormalisation. **Rank change:** [[sec.uvix]] (5.68%) overtakes [[sec.nvda]] (5.63%) for the third slot as the equity-melt-up step lifts it past the renormalised AI primary; [[sec.xle]] (7.00%) stays the top weight but [[sec.gld]] (6.97%) nearly closes the gap as energy trims and gold holds.

    **Snapshot caveat.** Snapshot 2.1.13, like 2.1.12, does NOT carry `fac.hasDriverLoading` on its theses (the structural rollout to the snapshot YAML is still pending an explicit minor bump). The driver-union math was replayed using the same implicit loadings encoded in fund 2.0.0/2.0.1's rationales: [[ws.gold-debasement-bid]] + [[ws.stagflation-risk]] sharing `inflation-debasement` and `monetary-credibility`; [[ws.persistent-energy-shock]] + [[ws.stagflation-risk]] sharing `inflation-debasement`; [[ws.stagflation-risk]] + [[ws.powell-warsh-transition-risk]] sharing `rate-path`; [[ws.equity-melt-up-vs-recession-risk]] + [[ws.powell-warsh-transition-risk]] sharing `volatility-regime`. Until the snapshot tags every active thesis with `fac.hasDriverLoading`, this fund's dedup is reproducible only from the operator's working set, not from the published graph alone.

    **Exposure.** Gross 100%, net **+85%** long, ~7.5% cash; the ~7.6% short is the rate-up inverse-expressions [[sec.tlt]] / [[sec.ief]]. Each holding's dominant driver is noted in its rationale.

    **Theme rollup (gross):** AI ~24% (NVDA / AMD / CSCO / INTC / MU), gold ~17% (GLD / IAU / GDX), defense ~16% (LMT / RTX / NOC), energy ~15% (XLE / XOM / CVX), equity beta ~9% (SPY / VTI), vol hedge ~5.7% (UVIX), managed futures ~6% (DBMF / KMLM), rates short ~-7.6% (TLT / IEF). Energy slips below defense this patch on the confidence step-down.

    **Versioning.** A patch (2.0.1 -> 2.0.2) because the thesis set, weighting method, and structural fit are unchanged - three upstream confidences stepped. `weightingMethod` continues to record `method-driver-union`.
  hasHolding:
    - holding-xle
    - holding-gld
    - holding-uvix
    - holding-nvda
    - holding-lmt
    - holding-rtx
    - holding-amd
    - holding-iau
    - holding-noc
    - holding-csco
    - holding-gdx
    - holding-spy
    - holding-tlt
    - holding-vti
    - holding-xom
    - holding-dbmf
