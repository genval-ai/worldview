    [[ws.persistent-energy-shock]] as primary vehicle (0.91) and
    [[ws.stagflation-risk]] as the energy-passthrough leg (0.60). The energy
    confidence step-down (0.72 -> 0.68 on the ~20% monthly oil collapse plus the
    tentative 60-day US-Iran memorandum) scales its dominant raw by x0.944, the
    largest single trim in this patch. Still the top weight under the driver-union
    because `energy-supply` and `geopolitical-conflict` are XLE's own distinct
    drivers that add, while the shared `inflation-debasement` channel MAX's to the
    (still-dominant) energy thesis. Broad energy-sector ETF, the cleanest expression
    of the structural-deficit read.

