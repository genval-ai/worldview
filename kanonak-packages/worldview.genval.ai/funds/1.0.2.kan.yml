funds:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.2
  label: Fund data - driver-union reweight against snapshot 2.2.4 + alignments 1.0.2
  comment: >-
    Patch reweight of the public fund data, re-derived by the driver-union method
    from alignments 1.0.2 against worldview snapshot 2.2.4 (Thursday June 11
    pre-market, integrating the June 8-10 sessions - the war re-escalated to
    direct Iran-Israel exchanges and US strike waves, May CPI printed a
    three-year-high 4.2%, and the tape broke lower with VIX at 22.22). Same seven
    active theses and same method as 1.0.1; still 21 holdings but with turnover
    inherited from the alignment re-rank - AVGO and ORCL enter the AI sleeve,
    CSCO and MU exit. Weights move on the refreshed confidences (energy 0.78 up,
    equity 0.75 down, gold 0.84 down). Superseded by the next operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: fund
          match: ^
          version: 1.0.0
          alias: fund
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: alignments
          match: '='
          version: 1.0.2
          alias: ca
        - package: securities
          match: ^
          version: 2.3.0
          alias: sec
        - package: snapshots
          match: '='
          version: 2.2.4
          alias: ws
genval-worldview-fund:
  type: fund.Fund
  label: "Genval Worldview Fund (1.0.2 - driver-union reweight against snapshot 2.2.4 + alignments 1.0.2; the war re-escalation and the 4.2% May CPI lift the energy legs (energy confidence 0.75 -> 0.78, XLE 7.49% extends its top-weight lead) while gold trims (0.84, GLD 6.66%) and the equity core trims (0.75, SPY 4.35%); the AI sleeve re-ranks on securities 2.3.0 - AVGO 5.10% and ORCL 4.75% enter, CSCO and MU exit; same 21-holding count, gross 100%, net +85% long, ~7.5% short via rates TLT/IEF)"
  fundObservedAt: 2026-06-11T10:52:00Z
  fund.derivedFromSnapshot: ws.view
  derivedFromAlignment: ca.view
  weightingMethod: fund.method-driver-union
  grossExposure: 1.00
  netExposure: 0.85
  cashWeight: 0.075
  fundNarrative: |
    **Genval Worldview Fund - driver-union reweight (1.0.2).** Re-derived from [[ca.view|thesis-alignments 1.0.2]] against [[ws.view|snapshot 2.2.4]] by the **driver-union** method (each contributing thesis's signed conviction `confidence x alignmentStrength x sign(direction)` is distributed across its macro drivers by its normalised `fac.hasDriverLoading` shares, MAX-combined within each shared driver, summed across distinct drivers, then normalised to a 100% gross budget). Seven active theses, 21 holdings, same `weightingMethod`.

    **What moved this window.** Two shocks dominated the June 8-10 sessions: the war re-escalated to direct Iran-Israel exchanges and US strike waves ([[ws.ev-iran-ballistic-missiles-israel-jun8|~30 Iranian ballistic missiles at Israel]], [[ws.ev-centcom-strikes-complete-thu-jun11|a "long grind" consensus repricing]]), and [[ws.ev-may-cpi-print-42-jun10|May CPI printed 4.2% YoY, a three-year high driven by gasoline +40.5% YoY]]. The confidence flow-through: energy 0.75 to 0.78 (its strongest confirmation window), defense 0.87 to 0.88, stagflation 0.85 to 0.86, Warsh 0.51 to 0.53, against gold 0.85 to 0.84 (the haven test failed again) and equity 0.78 to 0.75 (three of four sessions lower, [[ws.ev-vix-wed-close-2222-jun10|VIX 22.22 approaching the vol-expansion leg]]).

    **What drives the top of the book.** [[sec.xle]] (**7.49%**) extends its top-weight lead: it serves [[ws.persistent-energy-shock]] (0.78, rising) and [[ws.stagflation-risk]], and its `energy-supply` / `geopolitical-conflict` drivers are distinct forces that ADD while the shared `inflation-debasement` channel MAX-dedupes. [[sec.gld]] (**6.66%**) trims on the gold confidence step-down: served by [[ws.gold-debasement-bid]] (0.84) and [[ws.stagflation-risk]], with the shared `inflation-debasement` / `monetary-credibility` channels counted once - and notably stagflation's rate-path channel now out-MAXes gold's contribution on that axis. [[sec.uvix]] (**5.59%**) holds third: its `volatility-regime` channel MAX-binds to [[ws.equity-melt-up-vs-recession-risk]] (0.75 x 0.72 = 0.540) over [[ws.powell-warsh-transition-risk]] (0.53 x 0.65 = 0.345), with the realized-vol build making the hedge slot's mechanism the nearer resolution. [[sec.nvda]] (**5.46%**) and the defense sleeve ([[sec.lmt]] **5.34%**, [[sec.rtx]] **5.28%**) follow.

    **The AI sleeve re-ranks.** Securities 2.3.0 gives the two heaviest evidence-carriers instances at last: [[sec.avgo]] enters at **5.10%** (the [[ws.ev-avgo-q2-fy26-blowout-jun3|Q2 blowout - AI semis +143% YoY]] basket slot, alignmentStrength 0.86) and [[sec.orcl]] at **4.75%** (the buyer-side expression - [[ws.ev-orcl-q4-fy26-rpo-638b-jun10|the $638B RPO print, +363% YoY, the largest hyperscaler-capex confirmation of the cycle]], 0.80). CSCO (4.90% in 1.0.1) and MU (3.93%) exit with the alignment re-rank; [[sec.intc]] firms to **4.04%** on [[ws.ev-googl-intc-tpu-order-jun8|Alphabet's 3M+ TPU order at Intel's foundry]]. Net effect: the AI sleeve's gross rises to ~24.6% (from ~22.7%) with better evidence quality per slot.

    **The dedup names.** Five holdings serve more than one thesis and dedupe under the union: [[sec.xle]] and [[sec.gld]] (energy/gold vs stagflation on `inflation-debasement`), [[sec.uvix]] (equity vs Warsh on `volatility-regime`), and the rates short [[sec.tlt]] (**-4.41%**) plus [[sec.dbmf]] (stagflation vs Warsh on `rate-path` / `monetary-credibility`). Each is sized by the DISTINCT macro forces behind it, not by the number of theses naming it; the single-thesis names only move via renormalisation.

    **Exposure.** Gross 100%, net **+85%** long, ~7.5% cash; the ~7.5% short is the rate-up inverse-expressions [[sec.tlt]] (-4.41%) and [[sec.ief]] (-3.11%), whose `rate-path` channel firmed on [[ws.ev-may-cpi-print-42-jun10|the 4.2% CPI]] and [[ws.ev-fedwatch-june-hold-98-jun10|a December hike becoming essentially fully priced]].

    **Theme rollup (gross):** AI ~24.6% (NVDA / AMD / AVGO / ORCL / INTC), energy ~16.4% (XLE / XOM / CVX), gold ~16.0% (GLD / IAU / GDX), defense ~15.6% (LMT / RTX / NOC), equity beta ~8.3% (SPY / VTI), vol hedge ~5.6% (UVIX), managed futures ~6.0% (DBMF / KMLM), rates short ~-7.5% (TLT / IEF). Energy holds above defense; the AI sleeve grows on the re-rank; the equity-beta core trims with its thesis confidence.

    **Versioning.** A patch (1.0.1 -> 1.0.2): the active thesis set (seven) and the weighting method (driver-union) are unchanged; the holdings turnover (AVGO / ORCL in, CSCO / MU out) is inherited from the alignment 1.0.2 re-rank within the same thesis set, not from a thesis change. `weightingMethod` continues to record `method-driver-union`.
  hasHolding:
    - holding-xle
    - holding-gld
    - holding-uvix
    - holding-nvda
    - holding-lmt
    - holding-rtx
    - holding-amd
    - holding-avgo
