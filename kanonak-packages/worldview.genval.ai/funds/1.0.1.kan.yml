funds:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.1
  label: Fund data - driver-union reweight against snapshot 2.2.3 + alignments 1.0.1
  comment: >-
    Patch reweight of the public fund data, re-derived by the driver-union method
    from alignments 1.0.1 against worldview snapshot 2.2.3 (Saturday June 6,
    integrating the full Friday June 5 session). Same 21 holdings and same method
    as 1.0.0; weights move on the refreshed thesis confidences AND - for the first
    time in the public series - on the snapshot's REAL published fac.hasDriverLoading
    rather than the implicit loadings 1.0.0 replayed. Superseded by the next
    operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: fund
          match: ^
          version: 1.0.0
          alias: fund
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: alignments
          match: '='
          version: 1.0.1
          alias: ca
        - package: securities
          match: ^
          version: 2.2.0
          alias: sec
        - package: snapshots
          match: '='
          version: 2.2.3
          alias: ws
genval-worldview-fund:
  type: fund.Fund
  label: "Genval Worldview Fund (1.0.1 - driver-union reweight against snapshot 2.2.3 + alignments 1.0.1; the FIRST public fund computed from the snapshot's real published fac.hasDriverLoading (1.0.0 replayed implicit loadings); refreshed confidences lift the energy legs (energy 0.68 -> 0.75 since the 2.1.13 basis) so XLE 7.44% extends its lead as top weight, GLD 6.83% second; same 21 holdings, same driver-union method, gross 100%, net +85% long, ~7.5% short via rates TLT/IEF)"
  fundObservedAt: 2026-06-06T06:15:21Z
  fund.derivedFromSnapshot: ws.view
  derivedFromAlignment: ca.view
  weightingMethod: fund.method-driver-union
  grossExposure: 1.00
  netExposure: 0.85
  cashWeight: 0.075
  fundNarrative: |
    **Genval Worldview Fund - driver-union reweight (1.0.1).** Re-derived from [[ca.view|thesis-alignments 1.0.1]] against [[ws.view|snapshot 2.2.3]] by the **driver-union** method (each contributing thesis's signed conviction `confidence x alignmentStrength x sign(direction)` is distributed across its macro drivers by its normalised `fac.hasDriverLoading` shares, MAX-combined within each shared driver, summed across distinct drivers, then normalised to a 100% gross budget). Same 21 holdings, same `weightingMethod`.

    **First fund from the published loadings.** This is the first public fund version whose dedup is computed from the snapshot's REAL `fac.hasDriverLoading` tags rather than the implicit loadings 1.0.0 had to replay - [[ws.view|snapshot 2.2.3]] carries explicit driver loadings on every active thesis, so the union is now reproducible from the published graph alone and the 1.0.0 "snapshot caveat" is resolved. The shared-driver structure the loadings encode: [[ws.gold-debasement-bid]] + [[ws.stagflation-risk]] share `inflation-debasement` and `monetary-credibility`; [[ws.persistent-energy-shock]] + [[ws.stagflation-risk]] share `inflation-debasement`; [[ws.stagflation-risk]] + [[ws.powell-warsh-transition-risk]] share `rate-path` and `monetary-credibility`; [[ws.equity-melt-up-vs-recession-risk]] + [[ws.powell-warsh-transition-risk]] share `volatility-regime`.

    **What drives the top of the book.** [[sec.xle]] (**7.44%**) is the top weight: it serves [[ws.persistent-energy-shock]] (the dominant thesis, confidence 0.75) and [[ws.stagflation-risk]], but its `energy-supply` and `geopolitical-conflict` drivers are distinct forces that ADD while only the shared `inflation-debasement` channel MAX-dedupes to the (dominant) energy thesis - and energy confidence has firmed to 0.75, extending XLE's lead. [[sec.gld]] (**6.83%**) is second: served by [[ws.gold-debasement-bid]] (0.85) and [[ws.stagflation-risk]], but both load `inflation-debasement` and `monetary-credibility`, so those channels are counted once (MAX to gold) rather than stacked - the union trims what a naive SUM would double-count. [[sec.uvix]] (**5.67%**) holds the third slot, its `volatility-regime` channel MAX-bound to [[ws.equity-melt-up-vs-recession-risk]] (0.78 x 0.70 = 0.546) over [[ws.powell-warsh-transition-risk]] (0.51 x 0.65 = 0.332), with the two theses' distinct drivers adding on top. [[sec.nvda]] (**5.57%**), [[sec.lmt]] (**5.39%**), and the defense / AI single-thesis names follow, sized by their lone driver bundles.

    **The dedup names.** Five holdings serve more than one thesis and therefore dedupe: [[sec.xle]] and [[sec.gld]] (energy/gold vs stagflation), [[sec.uvix]] and the rates short [[sec.tlt]] (-4.41%) and [[sec.dbmf]] (stagflation vs powell-warsh). Each is sized by the DISTINCT macro forces behind it, not by the number of theses that happen to name it - the single-thesis names ([[sec.lmt]] / [[sec.rtx]] / [[sec.noc]] defense, [[sec.nvda]] / [[sec.amd]] AI, [[sec.xom]] / [[sec.cvx]] energy singles) only move via renormalisation.

    **Exposure.** Gross 100%, net **+85%** long, ~7.5% cash; the ~7.5% short is the rate-up inverse-expressions [[sec.tlt]] (-4.41%) and [[sec.ief]] (-3.13%), whose `rate-path` channel firmed on [[ws.ev-10y-yield-fri-455-jun5|the 10Y move to 4.55%]] and [[ws.ev-fedwatch-hike-by-dec-70pct-jun5|~70% hike-by-December pricing]].

    **Theme rollup (gross):** AI ~22.7% (NVDA / AMD / CSCO / INTC / MU), gold ~16.4% (GLD / IAU / GDX), defense ~15.7% (LMT / RTX / NOC), energy ~16.2% (XLE / XOM / CVX), equity beta ~8.8% (SPY / VTI), vol hedge ~5.7% (UVIX), managed futures ~5.9% (DBMF / KMLM), rates short ~-7.5% (TLT / IEF). Energy edges back above defense this reweight on the firmer energy confidence.

    **Versioning.** A patch (1.0.0 -> 1.0.1): the active thesis set (seven) and the weighting method (driver-union) are unchanged; weights moved on the refreshed thesis confidences in [[ws.view|snapshot 2.2.3]] and on the switch to the snapshot's published driver loadings. `weightingMethod` continues to record `method-driver-union`.
  hasHolding:
    - holding-xle
    - holding-gld
    - holding-uvix
    - holding-nvda
    - holding-lmt
    - holding-rtx
    - holding-amd
    - holding-iau
    - holding-noc
    - holding-csco
    - holding-spy
    - holding-gdx
    - holding-xom
    - holding-tlt
    - holding-cvx
    - holding-vti
    - holding-dbmf
    - holding-intc
    - holding-mu
    - holding-ief
    - holding-kmlm

