  holdingRationale: |
    Top weight (**7.14%**, trimmed from 7.49% in 1.0.2 as [[ws.persistent-energy-shock|energy]] confidence fell 0.78 to 0.68 on the ceasefire and [[ws.ev-wti-below-69-jul1|WTI below $69]]). Serves [[ws.persistent-energy-shock]] as primary vehicle (0.91) and [[ws.stagflation-risk]] as the passthrough leg (0.60); it stays top because `energy-supply` and `geopolitical-conflict` are XLE's own DISTINCT drivers that add, while the shared `inflation-debasement` channel MAX-dedupes against stagflation.
