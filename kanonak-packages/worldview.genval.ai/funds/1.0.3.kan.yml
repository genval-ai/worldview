funds:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.3
  label: Fund data - driver-union reweight against snapshot 2.2.5 + alignments 1.0.3
  comment: >-
    Patch reweight of the public fund data, re-derived by the driver-union method
    from alignments 1.0.3 against worldview snapshot 2.2.5 (Thursday July 2 - the
    Iran-Israel war de-escalated to a June 17 ceasefire MOU and the energy premium
    collapsed (WTI below $69), the Fed turned hawkish at Warsh first FOMC (dot plot
    flipped to a 2026 hike, core PCE 3.4%), equities recovered and VIX collapsed to
    ~16.5. Same seven active theses, same method, same 21 holdings and same book
    composition as 1.0.2 - weights move on the refreshed confidences: energy 0.78 to
    0.68 trims the energy sleeve, gold 0.84 to 0.82 and Warsh 0.53 to 0.48 ease their
    legs, equity 0.75 to 0.77 firms the beta core. No securities bump. Superseded by
    the next operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: fund
          match: ^
          version: 1.0.0
          alias: fund
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: alignments
          match: '='
          version: 1.0.3
          alias: ca
        - package: securities
          match: ^
          version: 2.3.0
          alias: sec
        - package: snapshots
          match: '='
          version: 2.2.5
          alias: ws
genval-worldview-fund:
  type: fund.Fund
  label: "Genval Worldview Fund (1.0.3 - driver-union reweight against snapshot 2.2.5 + alignments 1.0.3; the war de-escalation and ~25% oil collapse trim the energy sleeve (energy confidence 0.78 -> 0.68, XLE 7.14% still top but off its 7.49% lead), gold eases (0.82, GLD 6.70%) and the Warsh legs ease (0.48), while the equity core firms (0.77, SPY 4.59%) and the AI sleeve holds; same 21 holdings, gross 100%, net +84.9% long, ~7.5% short via rates TLT/IEF)"
  fundObservedAt: 2026-07-02T12:58:00Z
  fund.derivedFromSnapshot: ws.view
  derivedFromAlignment: ca.view
  weightingMethod: fund.method-driver-union
  grossExposure: 1.00
  netExposure: 0.8494
  cashWeight: 0.0753
  fundNarrative: |
    **Genval Worldview Fund - driver-union reweight (1.0.3).** Re-derived from [[ca.view|thesis-alignments 1.0.3]] against [[ws.view|snapshot 2.2.5]] by the **driver-union** method (each contributing thesis's signed conviction `confidence x alignmentStrength x sign(direction)` is distributed across its macro drivers by its normalised `fac.hasDriverLoading` shares, MAX-combined within each shared driver, summed across distinct drivers, then normalised to a 100% gross budget). Seven active theses, 21 holdings, same book composition and `weightingMethod` as 1.0.2 - this is a pure reweight.

    **What moved this window.** The June 11 to July 2 window repriced the worldview's two main axes in OPPOSITE directions. The Iran-Israel war de-escalated ([[ws.ev-islamabad-mou-ceasefire-jun17|the June 17 ceasefire MOU]], [[ws.ev-ofac-general-license-x-jun22|OFAC General License X]]) and [[ws.ev-wti-below-69-jul1|WTI collapsed below $69]], while the Fed turned hawkish ([[ws.ev-fomc-jun17-hold-hawkish-dots|the dot-plot flipped to a 2026 hike]], [[ws.ev-may-pce-core-34-jun25|core PCE 3.4%]]) and [[ws.ev-vix-collapse-165-jul1|VIX collapsed to ~16.5]]. Confidence flow-through: [[ws.persistent-energy-shock|energy]] 0.78 to 0.68 (the big move), [[ws.powell-warsh-transition-risk|Warsh]] 0.53 to 0.48, [[ws.gold-debasement-bid|gold]] 0.84 to 0.82, [[ws.equity-melt-up-vs-recession-risk|equity]] 0.75 to 0.77, [[ws.stagflation-risk|stagflation]] 0.86 to 0.85, [[ws.iran-war-rearmament|defense]] 0.88 to 0.87, [[ws.ai-capex-cycle-with-china-tail|ai-capex]] 0.87 held.

    **What drives the top of the book.** [[sec.xle]] (**7.14%**) stays top but trims from 7.49% as energy confidence fell hardest: it serves [[ws.persistent-energy-shock]] (0.68) and [[ws.stagflation-risk]], and its `energy-supply` / `geopolitical-conflict` drivers are distinct forces that ADD while the shared `inflation-debasement` channel MAX-dedupes. [[sec.gld]] (**6.70%**) holds roughly flat on the shallow gold step-down, served by [[ws.gold-debasement-bid]] and [[ws.stagflation-risk]] with the shared `inflation-debasement` / `monetary-credibility` channels counted once. [[sec.nvda]] (**5.62%**) and [[sec.uvix]] (**5.56%**) firm on renormalisation as the energy sleeve shrank; the defense sleeve ([[sec.lmt]] **5.43%**, [[sec.rtx]] **5.37%**) follows.

    **The dedup names.** Five holdings serve more than one thesis and dedupe under the union: [[sec.xle]] and [[sec.gld]] (energy / gold vs stagflation on `inflation-debasement`), [[sec.uvix]] (equity vs Warsh on `volatility-regime`), and the rates short [[sec.tlt]] plus [[sec.dbmf]] (stagflation vs Warsh on `rate-path` / `monetary-credibility`). Each is sized by the DISTINCT macro forces behind it, not by how many theses name it; single-thesis names move only via renormalisation.

    **Exposure.** Gross 100%, net **+84.9%** long, ~7.5% cash; the ~7.5% short is the rate-up inverse-expressions [[sec.tlt]] (-4.37%) and [[sec.ief]] (-3.16%), whose `rate-path` channel firmed on [[ws.ev-fomc-jun17-hold-hawkish-dots|the dot-plot hike]]. The energy sleeve trimmed and the equity-beta core firmed relative to 1.0.2, tracking their confidence moves.

    **Theme rollup (gross):** AI ~25.3% (NVDA / AMD / AVGO / ORCL / INTC), gold ~16.0% (GLD / IAU / GDX), defense ~15.9% (LMT / RTX / NOC), energy ~15.2% (XLE / XOM / CVX, trimmed on the confidence drop), equity beta ~8.8% (SPY / VTI), vol hedge ~5.6% (UVIX), managed futures ~5.8% (DBMF / KMLM), rates short ~-7.5% (TLT / IEF). The AI sleeve is now the largest theme as the energy sleeve trims below gold and defense.

    **Versioning.** A patch (1.0.2 -> 1.0.3): the active thesis set (seven), the book composition (same 21 tickers), and the weighting method (driver-union) are all unchanged; only the weights move, on the refreshed 2.2.5 confidences. No securities bump - every ticker already resolves in 2.3.0.
