funds:
  type: Package
  publisher: worldview.genval.ai
  version: 1.1.1
  label: Fund data - driver-union reweight against snapshot 3.0.1 + alignments 1.1.1
  comment: >-
    Patch reweight of the public fund data, re-derived by the driver-union method
    from alignments 1.1.1 against worldview snapshot 3.0.1 (Thursday July 2 - the Iran
    de-escalation deepened (WTI below $69), May PCE core ticked to 3.4%, Warsh reinforced
    the hawkish regime at Sintra, equities recovered and VIX collapsed to ~16.5). Same
    seven active theses, method, and 21-holding book as 1.1.0 - weights move on the
    refreshed confidences: energy 0.50 to 0.45 crushes the energy sleeve (XLE cedes the
    top weight to GLD, XOM/CVX trim to the low end), the firming hawkish-Warsh regime (0.72
    to 0.76) and stagflation grow the TLT/IEF rate shorts, gold eases (0.85) and equity
    firms (0.78). No securities bump. Superseded by the next operator refresh.
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
    - publisher: worldview.genval.ai
      packages:
        - package: fund
          match: ^
          version: 1.0.0
          alias: fund
        - package: alignment
          match: ^
          version: 1.0.0
          alias: align
        - package: alignments
          match: '='
          version: 1.1.1
          alias: ca
        - package: securities
          match: ^
          version: 2.3.0
          alias: sec
        - package: snapshots
          match: '='
          version: 3.0.1
          alias: ws
genval-worldview-fund:
  type: fund.Fund
  label: "Genval Worldview Fund (1.1.1 - driver-union reweight against snapshot 3.0.1 + alignments 1.1.1; the deepening energy de-escalation (energy confidence 0.50 -> 0.45) crushes the energy sleeve and GLD 7.18% takes the top weight, the firming hawkish-Warsh regime (0.76) and stagflation grow the rate shorts (TLT -4.78%, IEF -4.21%), gold eases (0.85) and the equity core firms (0.78, SPY 4.82%); same 21 holdings, gross 100%, net +82.0% long, ~9% short via rates)"
  fundObservedAt: 2026-07-02T12:58:00Z
  fund.derivedFromSnapshot: ws.view
  derivedFromAlignment: ca.view
  weightingMethod: fund.method-driver-union
  grossExposure: 1.00
  netExposure: 0.8201
  cashWeight: 0.09
  fundNarrative: |
    **Genval Worldview Fund - driver-union reweight (1.1.1).** Re-derived from [[ca.view|thesis-alignments 1.1.1]] against [[ws.view|snapshot 3.0.1]] by the **driver-union** method (each contributing thesis's signed conviction `confidence x alignmentStrength x sign(direction)` distributed across its macro drivers by normalised `fac.hasDriverLoading` shares, MAX-combined within each shared driver, summed across distinct drivers, normalised to a 100% gross budget). Seven active theses ([[ws.hawkish-warsh-regime]] carries the higher-for-longer story; [[ws.powell-warsh-transition-risk]] stays retired), 21 holdings, same book composition and method as 1.1.0 - a pure reweight.

    **What moved this window.** The June 18 to July 2 window continued 3.0.0's two trends. The Iran de-escalation deepened ([[ws.ev-ofac-general-license-x-jun22|OFAC License X]], [[ws.ev-us-iran-halt-hostilities-jun29|halt-hostilities]], [[ws.ev-wti-below-69-jul1|WTI below $69]]) and the hawkish-Warsh regime firmed ([[ws.ev-warsh-sintra-independence-jul1|the Sintra pledge]]). Confidence flow-through: [[ws.persistent-energy-shock|energy]] 0.50 to 0.45, [[ws.gold-debasement-bid|gold]] 0.88 to 0.85, [[ws.hawkish-warsh-regime|hawkish-Warsh]] 0.72 to 0.76, [[ws.equity-melt-up-vs-recession-risk|equity]] 0.76 to 0.78, [[ws.stagflation-risk|stagflation]] 0.88 to 0.87, [[ws.iran-war-rearmament|defense]] 0.84 to 0.83, [[ws.ai-capex-cycle-with-china-tail|ai-capex]] 0.88 held.

    **The top of the book re-ranks.** [[sec.gld]] (**7.18%**) takes the top weight as the energy sleeve trims: served by [[ws.gold-debasement-bid]] and [[ws.stagflation-risk]], the shared `inflation-debasement` / `monetary-credibility` channels counted once. [[sec.xle]] (**6.24%**) cedes the lead - energy's 0.45 confidence is now too low to keep it top, and its dominant channel flips to [[ws.stagflation-risk]]. The AI sleeve ([[sec.nvda]] **5.89%**, [[sec.amd]] **5.63%**, [[sec.avgo]] **5.50%**) and defense ([[sec.lmt]] **5.37%**) fill the upper book.

    **The rate shorts grow; the energy sleeve collapses.** [[sec.tlt]] (**-4.78%**) and [[sec.ief]] (**-4.21%**) deepen as the firming [[ws.hawkish-warsh-regime]] (0.76) joins [[ws.stagflation-risk]] on the `rate-path` short - deduped by MAX, not summed. Meanwhile the pure-energy names [[sec.xom]] (**2.78%**) and [[sec.cvx]] (**2.72%**) fall to the bottom of the long book, sized only by the 0.45-confidence [[ws.persistent-energy-shock]]. [[sec.uvix]] (**3.97%**) also trims - with the transition thesis retired it now draws only from [[ws.equity-melt-up-vs-recession-risk]], and [[ws.ev-vix-collapse-165-jul1|the vol collapse]] eased its strength.

    **The dedup names.** [[sec.gld]] and [[sec.xle]] (gold / energy vs stagflation on `inflation-debasement`), and the rate complex [[sec.tlt]] / [[sec.ief]] / [[sec.dbmf]] (stagflation vs hawkish-Warsh on `rate-path` / `monetary-credibility`) each dedupe under the union - sized by the DISTINCT macro forces behind them, not by how many theses name them.

    **Exposure.** Gross 100%, net **+82.0%** long, ~9% cash; the ~9% short is the rate-up inverse-expressions [[sec.tlt]] and [[sec.ief]], enlarged this refresh by the firming hawkish regime.

    **Theme rollup (gross):** AI ~26.5% (NVDA / AMD / AVGO / ORCL / INTC), gold ~17.2% (GLD / IAU / GDX), defense ~15.7% (LMT / RTX / NOC), energy ~11.7% (XLE / XOM / CVX, crushed on the confidence drop), equity beta ~9.3% (SPY / VTI), managed futures ~6.7% (DBMF / KMLM), vol hedge ~4.0% (UVIX), rates short ~-9.0% (TLT / IEF). Energy falls below defense and gold; the rate shorts and gold grow.

    **Versioning.** A patch (1.1.0 -> 1.1.1): the active thesis set (seven), the book (21 tickers), and the method (driver-union) are unchanged; only weights move on the refreshed 3.0.1 confidences. No securities bump.
  hasHolding:
    - holding-gld
    - holding-xle
    - holding-nvda
    - holding-amd
