  type: fund.Holding
  heldSecurity: sec.gld
  targetWeight: 0.0733
  holdingDirection: align.direction-long
  holdingRole: align.role-primary-vehicle
  servesThesis:
    - ws.stagflation-risk
    - ws.gold-debasement-bid
  holdingRationale: |
    **7.33%** (long, primary vehicle) serving [[ws.stagflation-risk]] and [[ws.gold-debasement-bid]]. Multi-thesis: shared macro drivers are MAX-deduped and distinct drivers summed under the driver-union, so the weight reflects the DISTINCT forces behind GLD, not the count of theses naming it.
