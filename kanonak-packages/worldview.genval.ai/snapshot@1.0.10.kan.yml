view:
  type: wv.WorldviewSnapshot
  label: Macro worldview
  observedAt: 2026-05-13T10:08:18Z
  narrative: >
    Wednesday-morning premarket (~5:08 AM ET, Tuesday cash close + overnight
    in hand). Tuesday absorbed the hot April CPI plus extending oil rally
    plus Iran-deal collapse plus Warsh governor confirmation in a single
    session and emerged with discipline rather than dislocation: SPX final
    -0.16% to 7,400.96 (recovered some of the -0.37% session-hour low),
    Nasdaq Composite -0.71% to 26,088.20, DJI flipped positive +0.11% to
    49,760.56, IWM -1.5% to 282.57 (the +0.33% intraday Russell read in
    the 1.0.9 narrative did NOT hold - small caps closed in line with the
    cap-weighted pullback). VIX 18.38 (+0.7% on day), still well below
    the 25 vol-expansion threshold. SPX did not reclaim Monday's
    7,412.84 ATH despite the intraday recovery, so the melt-up
    "muscle-through" hypothesis stays partially broken.

    Oil EXTENDED the rally: WTI June settled $102.18 (+4.2%, second
    consecutive 3%+ day; baseline 1.0.9 captured the intraday $101.37
    print but the final settle pressed further), Brent July $107.77
    (+3.4%). XLE +2.6% to 57.57 with XOM +3.5% confirms sector internals
    participating, not just front-month futures. The Aramco CEO "~100M
    bbl/week" framing now sits inside a tape that has chosen to price
    structural-impairment rather than the wartime-premium-unwinds
    alternative. Treasuries pressed higher across the curve: 10Y 4.459%
    (+4bp), 30Y 5.023% (+3bp, first sustained close above 5.00% in the
    refresh series). Multiple post-CPI commentaries explicitly raised
    rate-hike-pricing for 2027 against the prior cut-pricing path.

    Iran rhetoric escalated again Tuesday evening. Trump on Air Force One
    en route Beijing said "We're either going to make a deal or they're
    going to be decimated" and "They're defeated militarily, and they'll
    either do the right thing or we'll finish the job" - past Tuesday-
    morning's "garbage" and "1% chance" framing. New US sanctions on
    Iranian nuclear research with possible military applications were
    imposed Tuesday May 12, the first formal policy-level escalation
    since the diplomatic-track rejection. Trump heading to a Trump-Xi
    meeting in Beijing introduces a separate axis with direct AI-capex
    consequences: China discussion is in motion against the binding
    NVDA H20 / AMD MI308 export-control overlay.

    Warsh confirmed Fed Governor 51-45 on Tuesday May 12. Only Fetterman
    crossed - Coons crossed on Monday's cloture procedural vote but
    voted NO on Tuesday's confirmation, narrowing the bipartisan margin
    on substance vs procedure. Senate started the 30-hour countdown for
    the Fed Chair confirmation vote Wednesday May 13. Procedurally on
    track for Powell exit Friday May 15.

    Persistent-energy-shock steps to 0.65 (from 0.62). Two consecutive
    3%+ oil days now confirm the Iran-deal-collapse transmission as
    structural rather than one-day-spike. WTI final settle $102.18 and
    Brent $107.77 plus XLE / XOM sector follow-through validate the
    move beyond futures alone. SequencedCondition durable-reopening
    leg moved no closer to firing; Iran's May 10 Hormuz-sovereignty
    demand remains procedurally incompatible.

    Stagflation-risk steps to 0.77 (from 0.75). 30Y crossed 5.00% to
    5.023% (+3bp) and 10Y to 4.459% (+4bp) - the bond market's direct
    validation of the CPI surprise, with hike-pricing-for-2027
    commentary now explicit. The lift came WITHOUT the Monday-Tuesday
    oil settles in the data (April covers April measurements), so the
    May CPI read in June carries pre-loaded passthrough from $102 WTI.
    Capped well below 0.80 because core PCE remains the formal
    invalidation indicator and the April PCE release is still ahead.

    Equity-melt-up-vs-recession-risk steps to 0.68 (from 0.70). The
    Monday ATHs were not reclaimed Tuesday despite the intraday-low
    recovery - SPX 7,400.96 below 7,412.84. Small caps reversed lower
    (IWM final close -1.5% rather than the intraday +0.33% read);
    Nasdaq Composite kept selling (-0.71% final). The earnings backdrop
    (84% beat, 27.1% growth, 13.4% margins) hasn't broken; only the
    macro overlay has worsened. Neither invalidation leg fires (VIX
    18.38 in mid-zone; SPX>7,300 with VIX>15 both blocked).

    Iran-war-rearmament holds at 0.82. Tuesday's Trump "decimated" /
    "finish the job" escalation plus the new Iranian-nuclear-research
    sanctions ratify but don't extend the thesis. Defense-prime closes
    confirm the equity-side translation: LMT $521.00, RTX $178.89 -
    both above prior-snapshot reference levels. AndCondition
    invalidation still requires BOTH durable peace AND a sustained
    2-quarter DoD outlay decline; neither close.

    Gold-debasement-bid holds at 0.87. Tuesday gold spot pulled back
    to ~$4,695-4,700 on dollar/yield strength from the rate-path shift -
    a textbook hot-CPI / nominal-yield-up day for gold. The cash market
    held up better than spot (GLD only -0.2% to $432.93; GDX +1.7% to
    $97.14 with miners showing characteristic leverage on the day's
    bid). Structural pillars (244t Q1 CB buying, $193B Q1 demand,
    JPM/UBS/Citi targets) intact. AndCondition invalidation (durable
    peace + Fed credibility restored + sustained 6-month deficit
    decline) moved further from firing today, not closer.

    AI-capex-cycle-with-china-tail holds at 0.85. Tuesday chip stocks
    were mixed: NVDA $220.78 (+0.6% Tuesday), AMD $448.29 (-1.5% from
    Monday), MU $766.58 (-2.8% off Monday's fresh ATH). The May 20
    NVDA Q1 FY2027 print remains the binary tell; the Trump-Xi Beijing
    meeting introduces a separate near-term China-policy axis but the
    H20 / MI308 export-control overlay is still the binding constraint
    until renegotiated. Today's chip-sector weakness sits within the
    broad-market macro pullback rather than thesis-specific damage.

    Powell-Warsh transition risk holds at 0.50. Tuesday confirmation
    51-45 with Fetterman the only Democratic crossover sealed Warsh
    onto the Board procedurally. Coons NOT crossing on the substantive
    vote (vs Monday cloture) is a small tightening signal on the
    bipartisan margin, but the substantive policy question doesn't
    open until June 16-17 FOMC. Holding rather than moving because
    the procedural collapse is already priced into 0.50.

    Calendar from here: Wednesday May 13 Warsh chair confirmation
    vote (30-hour countdown started Tuesday evening); Thu-Fri May 14-15
    Lebanon-Israel third round in Washington (Karam, Dermer); Powell
    exits chair Friday May 15; NVDA Q1 FY2027 May 20 5 PM ET. April
    PCE release later this month is the formal stagflation-thesis
    invalidation indicator. June 16-17 FOMC is Warsh's first chair
    meeting under a CPI print that has already invalidated the
    soft-landing path.
  hasThesis:
    - iran-war-rearmament
    - persistent-energy-shock
    - stagflation-risk
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: 'The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered a multi-year defense spending cycle that benefits prime contractors with missile and missile-defense exposure regardless of diplomatic-track outcomes. By Tuesday evening May 12 Trump had escalated past Tuesday-morning''s "garbage" and "1% chance" framing to "We''re either going to make a deal or they''re going to be decimated" and "They''re defeated militarily, and they''ll either do the right thing or we''ll finish the job," with new US sanctions imposed Tuesday on Iranian nuclear research with possible military applications. The procurement / replenishment cycle persists and arguably accelerates. Depleted munitions stockpiles (438 Iranian ballistic missiles, 2,012 drones, 19 cruise missiles fired at UAE through April 1) and Golden Dome ($185B) are committed multi-year programs that survive any near-term deal scenario. Defense primes confirmed the equity-side translation Tuesday: LMT closed $521.00 and RTX $178.89.'
  confidence: 0.82
  vis.thesisTheme: vis.theme-defense
  status: wv.active
  confidenceRationale: 'Held at 0.82. Trump''s Tuesday-evening "decimated" / "finish the job" escalation plus the new Iranian-nuclear-research sanctions ratify but do not extend the thesis - they continue the threat-and-engage simultaneity rather than constituting a fresh kinetic event on the wire. The AndCondition invalidation requires BOTH durable peace AND a sustained 2-quarter DoD outlay decline, neither of which is near firing; further upside needs concrete fresh-conflict events with verifiable munitions-consumption data. FY2026 $1T defense budget plus Golden Dome commitments survive any near-term resolution path - the procurement-cycle case is structurally robust independent of which way the diplomatic track resolves this week. Defense-prime Tuesday closes (LMT $521.00, RTX $178.89) confirm the equity-side translation is intact.'
