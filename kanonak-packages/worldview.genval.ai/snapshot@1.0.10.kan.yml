ai-capex-cycle-with-china-tail:
  type: wv.WorldviewThesis
  label: AI capex sustained but with China decoupling tail risk
  thesisStatement: 'Hyperscaler AI capex continues at elevated pace into 2026 - NVDA Q1 FY2027 (May 20) revenue guide $78B (+77% YoY) explicitly excludes China DC compute revenue, with Huang estimating the unrealized China market at ~$50B "effectively gone with no clear return timeline." AMD Q1 2026 (May 5 AH) materially confirmed the demand side - revenue $10.3B vs $9.88B consensus, Data Center +57% YoY at $5.8B, Q2 guide $11.2B vs $10.3B consensus. Tuesday May 12 chip-sector pulled back from Monday''s rotation peak: NVDA closed $220.78 (+0.6% from Mon, bucking the broader chip weakness), AMD $448.29 (-1.5% from Mon $455.19), MU $766.58 (-2.8% off Monday''s fresh ATH $788.73). QQQ closed $707.24 with a wide intraday range ($710.18 high / $696.64 low). Trump heading to Beijing for a Trump-Xi meeting introduces a separate near-term China-policy axis with direct AI-capex implications - the H20 / MI308 export-control framework is the obvious negotiation surface. The May 20 NVDA print remains the binary tell.'
  confidence: 0.85
  vis.thesisTheme: vis.theme-ai
  status: wv.active
  confidenceRationale: 'Held at 0.85. Tuesday chip-sector weakness (AMD -1.5%, MU -2.8% off ATH) sits within the broad-market macro pullback rather than constituting a thesis-specific break - NVDA bucking +0.6% on day argues the cap-weighted leader is not capitulating. The Trump-Xi Beijing meeting opens a new China-policy axis but cuts both directions: an engagement event is structurally helpful, but the H20 / MI308 export-control overlay is the binding constraint until any framework explicitly relaxes it. Both Huang''s "$50B effectively gone" framing and the 15% revenue-share offset structure are already priced. The May 20 NVDA Q1 FY2027 print remains the binary tell - if NVDA delivers $78B with the +77% YoY trajectory the thesis steps up; if guidance slips it steps down. Until either the Beijing outcome or the May 20 print, today''s tech pullback is not the right venue for a confidence move.'
  supportingEvidence:
    - ev-amd-q1-2026-blowout
