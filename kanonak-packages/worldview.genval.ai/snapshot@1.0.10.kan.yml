powell-warsh-transition-risk:
  type: wv.WorldviewThesis
  label: Fed leadership transition policy uncertainty
  thesisStatement: 'Senate confirmed Kevin Warsh as Federal Reserve Governor 51-45 on Tuesday May 12 2026 - only Fetterman (D-PA) crossed party lines on the substantive vote. Coons (D-DE) crossed on Monday''s cloture procedural vote (49-44) but voted NO on Tuesday''s confirmation, narrowing the bipartisan margin on substance vs procedure. The Senate started the 30-hour countdown for the separate Fed Chair vote (4-year chair term) immediately after the governor confirmation; chair vote expected Wednesday May 13 with full confirmation before Powell''s chair-term expiry Friday May 15. The 13-11 party-line Banking Committee advance plus the 51-45 confirmation now both stand as historically partisan Fed-Chair-track outcomes. Warsh confirmation-hearing framing - "won''t be sock puppet" / "room to cut without inflation" - introduces a dovish-tilt risk to the dollar / long-duration cross, but the April CPI 3.8% headline / 2.8% core print under Powell''s chair sets the inherited inflation backdrop Warsh faces at his first FOMC June 16-17.'
  confidence: 0.5
  vis.thesisTheme: vis.theme-monetary
  status: wv.active
  confidenceRationale: 'Held at 0.50. The Tuesday confirmation 51-45 lands procedurally as expected, with one small substantive note: Coons NOT crossing on the confirmation vote (vs Monday cloture) tightens the bipartisan margin on substance and reinforces the historically-partisan-Fed-Chair pattern. But the procedural binary was already in the 0.50 level; the substantive policy-content question opens at June 16-17 FOMC, not at the chair-term commencement Friday. Post-CPI rate-path commentary explicitly raised the possibility of 2027 hike-pricing - directly against Warsh''s "room to cut without inflation" framing - and the 30Y break above 5.00% adds long-duration pressure into the transition. The chair vote Wednesday is procedurally near-certain; the active question becomes the first set of public statements Warsh makes as chair, none of which arrive in this refresh window.'
