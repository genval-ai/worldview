persistent-energy-shock:
  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: 'Oil prices remain structurally elevated as long as the Strait of Hormuz reopening sequence is incomplete and Iranian retaliation risk is intact. WTI June futures settled $102.18 (+4.2%) on Tuesday May 12, Brent July $107.77 (+3.4%) - the second consecutive day of 3%+ oil moves on Iran-deal collapse plus Hormuz-sovereignty demand plus Trump escalating to "decimated" / "finish the job" language Tuesday evening en route to Beijing. XLE +2.6% to 57.57 and XOM +3.5% confirm sector internals are participating, not just front-month futures. Saudi Aramco CEO Amin Nasser framed the supply impact as "roughly 100 million barrels of supply each week" with market normalization potentially deferred into next year if disruptions persist - the most concrete supply-side quantification of the shipping-flow impairment so far. Iran on May 10 demanded "full Iranian sovereignty over the Strait of Hormuz" as a precondition for any deal - procedurally incompatible with the durable-reopening leg of the SequencedCondition invalidation. May 10 Hormuz transit data: 17 vessels (13 inbound / 4 outbound; 10 AIS-visible, 7 dark / EO-detected only) against pre-war ~120 crossings/day.'
