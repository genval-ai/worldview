gold-debasement-bid:
  type: wv.WorldviewThesis
  label: Gold structural debasement bid
  thesisStatement: 'Gold sits in mid-cycle of a multi-year structural bull market driven by central-bank buying, sovereign de-dollarization, $39T US debt, stock-bond correlation breakdown, and Fed independence concerns. Q1 2026 set records on multiple dimensions - LBMA quarterly average $4,873/oz, central-bank net purchases 244 tonnes (highest Q1 ever, +17% QoQ), aggregate Q1 demand value $193B. Tuesday May 12 spot pulled back to ~$4,695-4,700 from a $4,748 session high after the hot CPI lifted the dollar and pressed yields higher - a textbook rate-up day for gold. The cash ETF complex held up materially better than spot: GLD only -0.2% to $432.93 (Massive verified) and GDX +1.7% to $97.14 with miners closing near session highs after testing $92.85 intraday, showing characteristic leverage on the day''s bid. Major bank targets all imply materially higher levels (JPM $5,055-$6,300, UBS $6,200, Citi $5,000-$7,000); the structural-bull case is unchanged by a single-session dollar-and-yield move.'
  confidence: 0.87
  vis.thesisTheme: vis.theme-gold
  status: wv.active
  confidenceRationale: 'Held at 0.87. Tuesday produced exactly the textbook hot-CPI / nominal-yield-up day for gold spot - spot pulled back to ~$4,695-4,700 on dollar/yield strength while the ETF complex (GLD -0.2%, GDX +1.7%) actually held up better and miners closed near session highs after testing intraday lows. The cash market''s discipline through a hostile mechanical setup (CPI surprise + 30Y above 5.00% + dollar strength) is the bullish read - if gold buyers were going to capitulate on a rate-up day, today was the day. AndCondition invalidation still requires three hard things simultaneously - durable US-Iran peace AND Fed credibility restored AND a sustained 6-month deficit decline - all of which moved further away today, not closer. Trump-Xi Beijing meeting and Wednesday chair vote add reflexive uncertainty into the official-sector-buying side.'
