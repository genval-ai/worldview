# =============================================================================
# snapshot-svg-renderer — wv.WorldviewSnapshot as a regime portrait
#
# Applies the 3-tier semantic-zoom convention. The visual primitive is one
# theme-colored dot per thesis, sized proportionally to that thesis's
# confidence (via SVG font-size em — confidence 0-1 maps directly to em
# multiplier, no math primitive needed), opacity reduced for non-active
# theses. The dot row becomes a snapshot's regime fingerprint — same shape
# across all three tiers, more surrounding context as you zoom in.
# =============================================================================

snapshot-svg-renderer:
  type: tx.InstanceTransformation

  tx.inputPattern:
    tx.matchesClass: wv.WorldviewSnapshot
    tx.requires:
      - wv.hasThesis

  tx.artifactName:
    type: tx.UriName
    tx.uriNameOf:
      type: tx.VarRef
      tx.varName: input

  tx.outputs:
    - tx.svg

  tx.rule:
    type: tx.BuildAstNode
    tx.astClass: docast.Document
    tx.set:
      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.image-svg-xml
                - tx.field: docast.rawContent
