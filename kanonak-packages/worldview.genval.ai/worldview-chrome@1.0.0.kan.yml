                            <li><a href="/">Latest</a></li>
                            <li><a href="/snapshots/">Snapshots</a></li>
                            <li><a href="/timeline/">Timeline</a></li>
                            <li><a href="/changes/">Changes</a></li>
                            <li><a href="/horizon/">Horizon</a></li>
                            <li><a href="/about/">About</a></li>
                            </ul>
                            </div>
                            </nav>
                            <article class="thesis">
                            <header class="hero">
                        - type: tx.StringLiteral
                          tx.stringLiteral: '<div class="hero-visual"><img src="'
                        - type: tx.UriName
                          tx.uriNameOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: '.svg" alt="Thesis card" loading="lazy"/></div>'
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            <div class="hero-meta">
                            <span class="eyebrow">Thesis</span>
                            <span class="thesis-version">snapshot v
                        - type: tx.UriVersion
                          tx.uriVersionOf:
                            type: tx.VarRef
                            tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </span>
                            </div>
                            <h1 class="thesis-label">
                        - type: tx.Fallback
                          tx.primary:
                            type: tx.PropertyRead
                            tx.readSource:
                              type: tx.VarRef
                              tx.varName: input
                            tx.readProp: rdfs.label
                          tx.alternate:
                            type: tx.UriName
                            tx.uriNameOf:
                              type: tx.VarRef
                              tx.varName: input
                        - type: tx.StringLiteral
                          tx.stringLiteral: |-
                            </h1>
                            <div class="status-row">

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: wv.status
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<span class="status-pill status-'
                              - type: tx.UriName
                                tx.uriNameOf:
                                  type: tx.PropertyRead
                                  tx.readSource:
                                    type: tx.VarRef
                                    tx.varName: input
                                  tx.readProp: wv.status
                              - type: tx.StringLiteral
                                tx.stringLiteral: '">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
                                    type: tx.PropertyRead
                                    tx.readSource:
                                      type: tx.VarRef
                                      tx.varName: input
                                    tx.readProp: wv.status
                                tx.readProp: rdfs.label
                              - type: tx.StringLiteral
                                tx.stringLiteral: '</span>'

                        - type: tx.When
                          tx.condition:
                            type: tx.IsSet
                            tx.checkExpr:
                              type: tx.PropertyRead
                              tx.readSource:
                                type: tx.VarRef
                                tx.varName: input
                              tx.readProp: vis.thesisTheme
                          tx.thenBuild:
                            type: tx.Concat
                            tx.parts:
                              - type: tx.StringLiteral
                                tx.stringLiteral: '<span class="theme-chip">'
                              - type: tx.PropertyRead
                                tx.readSource:
                                  type: tx.ResolveRef
                                  tx.resolveSource:
