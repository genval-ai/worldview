                                        tx.readSource:
                                          type: tx.VarRef
                                          tx.varName: input
                                        tx.readProp: rdfs.label
                                      tx.alternate:
                                        type: tx.UriName
                                        tx.uriNameOf:
                                          type: tx.VarRef
                                          tx.varName: input
                                    - type: tx.StringLiteral
                                      tx.stringLiteral: " · worldview.genval.ai"

      - tx.field: docast.children
        tx.bindValue:
          type: tx.Concat
          tx.parts:
            - type: tx.BuildAstNode
              tx.astClass: docast.RawBlock
              tx.set:
                - tx.field: docast.mediaType
                  tx.bindValue:
                    type: tx.UriLiteral
                    tx.refTo: docast.text-html
                - tx.field: docast.rawContent
                  tx.bindValue:
                    type: tx.Join
                    tx.separator: ""
                    tx.source:
                      type: tx.Concat
                      tx.parts:

                        - type: tx.StringLiteral
                          tx.stringLiteral: |
                            <style>
                            dl.metadata{display:none!important}
                            :root{--bg:#0a0e1a;--bg-card:#0f1524;--bg-elev:#1a2233;--fg:#e6eaf2;--fg-dim:#9aa5b8;--fg-faint:#6b7689;--accent:#7dd3fc;--accent-2:#38bdf8;--border:#1e293b;--border-soft:#162033;--strong:#34d399;--moderate:#fbbf24;--weak:#64748b;--danger:#f87171;--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'SF Mono',ui-monospace,Consolas,Menlo,monospace;--font-display:'Iowan Old Style','Palatino Linotype',Palatino,'URW Palladio L',serif}
                            *{box-sizing:border-box;margin:0;padding:0}
                            html,body{background:var(--bg)}
                            body{color:var(--fg)!important;font-family:var(--font-sans)!important;line-height:1.55!important;font-size:15px!important;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;max-width:none!important;margin:0!important;padding:0!important}
                            a{color:var(--accent);text-decoration:none;transition:color 120ms}
                            a:hover{color:var(--accent-2)}
                            nav.site-nav{background:rgba(15,21,36,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 32px;position:sticky;top:0;z-index:10}
                            .site-nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
                            a.site-nav-brand{font-family:var(--font-mono);font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
                            ul.site-nav-links{display:flex;gap:24px;list-style:none;padding:0;margin:0 0 0 auto}
                            ul.site-nav-links a{font-size:11px;color:var(--fg-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
                            ul.site-nav-links a:hover{color:var(--fg)}
                            article.thesis{max-width:880px;margin:0 auto;padding:48px 32px 96px}
                            @media (max-width:760px){article.thesis{padding:32px 20px 64px}}
                            .hero{padding:0 0 32px;border-bottom:1px solid var(--border);position:relative;margin-bottom:32px;padding-right:280px;min-height:170px}
                            .hero::before{content:"";position:absolute;top:-12px;left:0;width:48px;height:2px;background:var(--accent)}
                            .hero-visual{position:absolute;top:8px;right:0;width:260px;height:156px}
                            .hero-visual img{width:100%;height:100%;display:block;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.35)}
                            @media (max-width:780px){.hero{padding-right:0;min-height:0}.hero-visual{position:static;margin:0 auto 24px;width:100%;max-width:400px;height:auto;aspect-ratio:5/3}}
                            .hero-meta{display:flex;align-items:baseline;font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:24px;gap:16px;flex-wrap:wrap}
                            .eyebrow{color:var(--accent)}
                            .thesis-version{font-family:var(--font-mono);color:var(--accent);font-size:11px;letter-spacing:0.05em;background:rgba(125,211,252,0.1);border:1px solid rgba(125,211,252,0.25);padding:2px 8px;border-radius:4px;text-transform:none}
                            .thesis-label{font-family:var(--font-display);font-size:36px;font-weight:400;letter-spacing:-0.02em;line-height:1.15;color:var(--fg);margin-bottom:20px}
                            @media (max-width:760px){.thesis-label{font-size:28px}}
                            .status-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px}
                            .status-pill{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:0.12em;font-weight:600}
                            .status-pill.status-active{background:rgba(52,211,153,0.12);color:var(--strong)}
                            .status-pill.status-retired{background:rgba(100,116,139,0.18);color:var(--fg-dim)}
                            .status-pill.status-invalidated{background:rgba(248,113,113,0.12);color:var(--danger)}
                            .theme-chip{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg-card);color:var(--fg-dim)}
                            .confidence-strip{display:flex;align-items:center;gap:16px;margin-top:8px}
                            .confidence-meter{flex:1;height:10px;background:var(--bg-elev);border-radius:5px;overflow:hidden}
                            .confidence-meter svg{display:block;width:100%;height:100%}
                            .conf-fill{fill:var(--accent)}
                            .confidence-label{font-family:var(--font-mono);font-size:12px;color:var(--fg-dim);min-width:90px;text-align:right;letter-spacing:0.04em}
                            .confidence-label .conf-value{color:var(--fg);font-weight:600}
                            .thesis-statement{font-size:17px;color:var(--fg);line-height:1.7;font-weight:300;margin-bottom:20px}
                            .confidence-rationale{font-size:13px;line-height:1.55;color:var(--fg-dim);margin:8px 0 24px;border-left:2px solid var(--accent);padding-left:14px;font-style:italic}
                            .confidence-rationale .rationale-label{color:var(--fg-faint);font-family:var(--font-mono);text-transform:uppercase;font-size:10px;letter-spacing:0.1em;margin-right:6px;font-style:normal}
                            .section-title{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.18em;color:var(--fg-dim);margin:32px 0 12px;display:flex;align-items:center;gap:12px}
                            .section-title::after{content:"";flex:1;height:1px;background:var(--border)}
                            .invalidation{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:6px;padding:14px 18px;font-family:var(--font-mono);font-size:12px;color:var(--fg-dim)}
                            .invalidation code{color:var(--accent);background:var(--bg-elev);padding:1px 6px;border-radius:3px}
                            .evidence-list{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
                            .evidence-list li{font-family:var(--font-mono);font-size:11px}
                            .evidence-list a{color:var(--fg-dim);background:var(--bg-card);border:1px solid var(--border-soft);padding:6px 10px;border-radius:4px;display:block;letter-spacing:0.02em;word-break:break-all}
                            .evidence-list a:hover{color:var(--accent);border-color:var(--accent-3,var(--accent))}
                            .thesis-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--fg-faint);letter-spacing:0.04em}
                            .thesis-footer p{margin-bottom:6px}
