estimates:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.1.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd

# =============================================================================
# estimates @ 1.0.0 - reusable distributional-estimate primitives
#
# Promotes any belief-laden numeric value (a thesis confidence, a forecast
# value, a trust score, an estimated audience reach) from a single xsd.decimal
# to a typed Estimate hierarchy with explicit uncertainty modeled via
# parametric-distribution subclasses.
#
# Class hierarchy (tagged-by-type tree, parallel to the Condition DSL in
# worldview.genval.ai/core):
#
#   Estimate                     (abstract base)
#   |-- PointEstimate            (no uncertainty stated; escape hatch)
#   `-- DistributionEstimate     (abstract intermediate; carries shared
#                                 mean / stdDev / credible-interval fields)
#       |-- BetaEstimate         (alpha + beta shape; natural for 0..1)
#       |-- NormalEstimate       (mean + stdDev only)
#       |-- LogNormalEstimate    (heavy-tailed non-negative scale)
#       |-- TriangularEstimate   (min / mode / max bounded)
#       `-- UniformEstimate      (flat over an interval)
#
# A property whose range is the abstract DistributionEstimate (or Estimate)
# requires embedded values to declare their concrete subclass via `type:`
# per the protocol's embedded-type-must-narrow-range rule - same authoring
# convention as the Condition DSL. This is the canonical tagged-by-type
# pattern the kanonak.org/transformations-conventions package documents
# under explicit-embedded-type-on-expression-rule.
#
# Example authoring under a confidence property whose range is
# DistributionEstimate:
#
#   confidence:
#     type: est.BetaEstimate
#     estimateMean: 0.82
#     estimateStdDev: 0.04
#     betaAlpha: 33.0
#     betaBeta: 7.2
#
# The `type:` line names the concrete subclass; the inherited base
# properties (estimateMean, estimateStdDev) plus the subclass-specific
# shape parameters (betaAlpha, betaBeta on BetaEstimate; estimateMode on
# TriangularEstimate) author cleanly without a separate "family" enum.
#
# Visualization rationale: a scalar 0..1 confidence drives a single
# rect-width or font-size-em in every renderer. A typed distributional
# Estimate carries enough shape to drive violin densities (BetaEstimate),
# fan-chart bands (lower/upper percentiles), forest-plot priors-and-
# posteriors, and Bayesian-update animations across snapshot versions -
# visualizations that simply cannot be expressed from a point estimate.
# The estimate fields here are the data substrate; the renderers consume
# them via the same 4-tier semantic-zoom convention used elsewhere in the
# publisher.
#
# This package is intentionally independent of worldview.genval.ai/core
# so any publisher (not just worldview) can adopt distributional
# estimates without pulling in the worldview ontology.
# =============================================================================


# =============================================================================
# 1. ESTIMATE BASE
# =============================================================================

Estimate:
  type: rdfs.Class
  label: Estimate
  comment: >
    Abstract base for a numeric value that may or may not carry uncertainty.
    Never instantiated directly - authors instantiate a concrete subclass.
    The hierarchy splits into PointEstimate (no uncertainty stated) and the
    DistributionEstimate family (a parametric distribution chosen by
    subclass). Embedded under a property whose range is Estimate or
    DistributionEstimate, the `type:` line declares the concrete subclass
    per the embedded-type-must-narrow-range rule.


# =============================================================================
# 2. POINT ESTIMATE
# =============================================================================

PointEstimate:
  type: rdfs.Class
  subClassOf: Estimate
  label: Point Estimate
  comment: >
    A single numeric value with no uncertainty stated. Use when the author
    genuinely has no distribution to express (e.g. a directly observed
    price print) or when explicitly disclaiming that the value should be
    interpreted as distributional. Renderers treat a PointEstimate as a
    Dirac at `estimateValue` - a vertical tick rather than a curve.

estimateValue:
  type: owl.DatatypeProperty
  domain: PointEstimate
  range: xsd.decimal
  label: Estimate Value
  comment: The single numeric value. Required on every PointEstimate.


# =============================================================================
# 3. DISTRIBUTION ESTIMATE (abstract intermediate)
# =============================================================================

DistributionEstimate:
  type: rdfs.Class
  subClassOf: Estimate
  label: Distribution Estimate
  comment: >
    Abstract intermediate for any numeric value carrying parametric
    uncertainty. Never instantiated directly - authors instantiate one of
    the concrete distribution-family subclasses (BetaEstimate,
    NormalEstimate, LogNormalEstimate, TriangularEstimate, UniformEstimate).
    Carries the shared properties every distribution exposes: a central
    tendency (estimateMean), a width (estimateStdDev), and optional
    explicit 95% credible interval bounds. Subclass-specific shape
    parameters (alpha+beta on BetaEstimate, mode on TriangularEstimate)
    live on the concrete subclass that uses them.

estimateMean:
  type: owl.DatatypeProperty
  domain: DistributionEstimate
  range: xsd.decimal
  label: Mean
  comment: >
    Central tendency of the distribution. Required. For a 0..1 confidence,
    this is the point a renderer plots as the "headline" value (matching
    the legacy scalar-confidence behaviour for back-compatibility at the
    consumption side).

estimateStdDev:
  type: owl.DatatypeProperty
  domain: DistributionEstimate
  range: xsd.decimal
  label: Standard Deviation
  comment: >
    Standard deviation of the distribution. Optional but strongly
    recommended. Absent stdDev renders the distribution as a point. For a
    BetaEstimate on 0..1, the stdDev is bounded by sqrt(mean * (1-mean))
    (the variance of a Bernoulli with that mean); authors who exceed this
    bound should reconsider whether beta is the right family.

estimateLower95:
  type: owl.DatatypeProperty
  domain: DistributionEstimate
  range: xsd.decimal
  label: Lower 95% Bound
  comment: >
    Lower bound of the 95% credible interval. Optional. When present,
    overrides what the family + moments alone would produce - the explicit
    override matters when the author wants to express asymmetric tails
    that mean-and-stddev cannot capture. When both lower95 and stdDev are
    present and disagree, renderers prefer the explicit bound.

estimateUpper95:
  type: owl.DatatypeProperty
  domain: DistributionEstimate
  range: xsd.decimal
  label: Upper 95% Bound
  comment: Upper bound of the 95% credible interval. Mirror of estimateLower95.


# =============================================================================
# 4. BETA ESTIMATE - 0..1 bounded, two-parameter shape
# =============================================================================

BetaEstimate:
  type: rdfs.Class
  subClassOf: DistributionEstimate
  label: Beta Estimate
  comment: >
    Two-parameter distribution bounded on [0, 1]. Natural for confidence,
    trust scores, fractions, and any other 0..1-bounded belief. The
    Bayesian interpretation (alpha = successes, beta = failures) means
    that authoring beta(alpha, beta) is equivalent to authoring a
    posterior after observing alpha-and-beta independent trials - the
    mass and shape encode both central tendency and evidence weight in
    one object.

betaAlpha:
  type: owl.DatatypeProperty
  domain: BetaEstimate
  range: xsd.decimal
  label: Beta Alpha
  comment: >
    Alpha (shape-1) parameter for a beta distribution. Optional. Pair with
    betaBeta. The Bayesian interpretation - "successes" - makes alpha+beta
    the effective sample size, which renderers can surface as a "weight"
    badge. When both alpha and beta are declared, renderers prefer them
    over mean/stdDev for the density curve.

betaBeta:
  type: owl.DatatypeProperty
  domain: BetaEstimate
  range: xsd.decimal
  label: Beta Beta
  comment: >
    Beta (shape-2) parameter for a beta distribution. Optional. Pair with
    betaAlpha. Interpreted as "failures" in the Bayesian frame; alpha+beta
    is the effective sample size.


# =============================================================================
# 5. NORMAL ESTIMATE - Gaussian on the real line
# =============================================================================

NormalEstimate:
  type: rdfs.Class
  subClassOf: DistributionEstimate
  label: Normal Estimate
  comment: >
    Gaussian distribution on the real line. Default for unbounded
    quantities (price changes, yield levels) where the symmetry assumption
    is acceptable. Parameterised by the base estimateMean and
    estimateStdDev directly - no subclass-specific shape parameters
    needed.


# =============================================================================
# 6. LOG-NORMAL ESTIMATE - heavy-tailed non-negative scale
# =============================================================================

LogNormalEstimate:
  type: rdfs.Class
  subClassOf: DistributionEstimate
  label: Log-Normal Estimate
  comment: >
    Distribution of a quantity whose logarithm is normally distributed.
    Natural for non-negative scale quantities that span orders of
    magnitude - reach estimates (audience sizes), volume measurements,
    holding sizes. Authors specify estimateMean and estimateStdDev in
    the OBSERVED units (actual people, dollars, tonnes); the renderer
    derives the visible mode and percentile bounds from those by
    transforming through log-space internally.


# =============================================================================
# 7. TRIANGULAR ESTIMATE - bounded with mode
# =============================================================================

TriangularEstimate:
  type: rdfs.Class
  subClassOf: DistributionEstimate
  label: Triangular Estimate
  comment: >
    Bounded distribution defined by a minimum, a mode (the most-likely
    value), and a maximum. Natural when the author has clear low/high
    envelopes and a best-guess peak but no formal parameterisation -
    "between X and Y, most likely Z." Use estimateLower95 / estimateUpper95
    (inherited from DistributionEstimate) to express the [min, max]
    envelope and `estimateMode` for the peak.

estimateMode:
  type: owl.DatatypeProperty
  domain: TriangularEstimate
  range: xsd.decimal
  label: Mode
  comment: >
    The most-likely single value of the triangular distribution. This is
    the visual peak of the density - what readers' eyes naturally lock
    onto. Required on TriangularEstimate (without a mode the distribution
    degenerates to a uniform on [min, max]).


# =============================================================================
# 8. UNIFORM ESTIMATE - flat over a bounded interval
# =============================================================================

UniformEstimate:
  type: rdfs.Class
  subClassOf: DistributionEstimate
  label: Uniform Estimate
  comment: >
    Constant density over a bounded interval. Conveys "no preference
    between any value in the range." Used as a deliberate prior when the
    author wants to express maximum uncertainty within a known interval -
    rendered as a flat-topped band rather than a peak. Specify the
    interval via estimateLower95 / estimateUpper95 (which on a uniform
    are the exact endpoints rather than statistical bounds).
