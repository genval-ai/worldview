visual:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.1.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.2.0
          alias: wv

# =============================================================================
# Visual extension to the worldview.genval.ai ontology.
#
# Adds categorical Theme tags and a thesisTheme property on
# wv.WorldviewThesis. Rendering layers (snapshot-to-html, regime
# portrait, etc.) read each thesis's domain to color-code visual
# tokens consistently across the publisher.
#
# The visual primitive everywhere is the same: an arc-fill disc whose
# fill angle = confidence, hue = domain, stroke = status. Compact,
# focus, and snapshot-aggregate visualizations are all parameter
# variants of the same primitive — like a font family rather than a
# clip-art collection. This package owns the shared vocabulary; the
# rendering rules live in the consuming transformations.
# =============================================================================

# -----------------------------------------------------------------------------
# Theme — categorical tag for a Thesis
# -----------------------------------------------------------------------------

Theme:
  type: rdfs.Class
  label: Theme
  comment: >
    A categorical tag indicating which domain of knowledge (defense,
    energy, monetary, etc.) a WorldviewThesis primarily operates in.
    Used by visual rendering layers to color-code theses consistently
    across views — the same iran-war thesis is always defense-red, the
    same ai-capex thesis is always ai-green, regardless of where it
    is rendered. Each Thesis has exactly one primary Theme; cross-
    domain claims should pick the dominant domain or be split into
    multiple theses.

themeHue:
  type: owl.DatatypeProperty
  domain: Theme
  range: xsd.integer
  label: Hue
  comment: >
    HSL hue (0-360) used as the base color for visual representations
    of theses tagged with this domain. Saturation and lightness are
    fixed by the rendering layer (typically 60% / 60% on the dark
    theme) so all domain hues read at consistent visual weight.

# -----------------------------------------------------------------------------
# thesisTheme — extends wv.WorldviewThesis
# -----------------------------------------------------------------------------

thesisTheme:
  type: owl.ObjectProperty
  domain: wv.WorldviewThesis
  range: Theme
  label: Thesis Theme
  comment: >
    Categorical domain of the thesis. Drives color-coding in the
    snapshot view, snapshots index, timeline, changes log, and the
    regime portrait. Optional but strongly recommended — a thesis
    without a declared domain renders in a neutral gray, which loses
    the cross-thesis visual grouping.

# -----------------------------------------------------------------------------
# Named Theme instances — the publisher's working palette
# -----------------------------------------------------------------------------

theme-defense:
  type: Theme
  label: Defense
  comment: >
    Defense / military / national security claims. Procurement
    cycles, rearmament theses, missile-defense capex, defense-prime
    backlogs.
  themeHue: 0

theme-energy:
  type: Theme
  label: Energy
  comment: >
    Energy commodities — oil, gas, refining, transit. Supply-shock
    theses, Strait-of-Hormuz risk, OPEC dynamics.
  themeHue: 32

theme-inflation:
  type: Theme
  label: Inflation
  comment: >
    Inflation, stagflation, price-level claims. Distinct from monetary
    in that the focus is the price-level dynamic, not the institutional
    response.
  themeHue: 14

theme-gold:
  type: Theme
  label: Gold / safe haven
  comment: >
    Gold and safe-haven asset claims. Distinct from monetary and
    inflation because the driver is debasement / store-of-value /
    central-bank-buying rather than rate setting or CPI.
  themeHue: 48

theme-ai:
  type: Theme
  label: AI / tech capex
  comment: >
    Artificial intelligence infrastructure, semiconductor capex,
    hyperscaler spend, the AI capex cycle and its tail risks.
  themeHue: 160

theme-equity:
  type: Theme
  label: Equity markets
  comment: >
    Equity indices, valuation, melt-up / melt-down dynamics, broad
    market regime claims.
  themeHue: 261

theme-monetary:
  type: Theme
  label: Monetary policy
  comment: >
    Central bank policy, Federal Reserve dynamics, rate trajectories,
    Fed independence, leadership transitions. The institutional side
    of the price level.
  themeHue: 199

theme-geopolitical:
  type: Theme
  label: Geopolitical
  comment: >
    War, peace, regime change, election outcomes, geopolitical regime
    claims when the primary lens is geopolitics rather than a specific
    economic transmission.
  themeHue: 173
