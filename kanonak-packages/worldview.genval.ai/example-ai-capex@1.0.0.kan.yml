example-ai-capex:
  type: Package
  publisher: worldview.genval.ai
  version: 1.0.0
  imports:
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 1.0.0
          alias: wv
        - package: finance
          match: ^
          version: 1.0.0
          alias: fin

# =============================================================================
# Example worldview snapshot - AI capex thesis, pre-AMD-Q1 print.
#
# Demonstrates the worldview.genval.ai ontology end-to-end: a Snapshot
# with one Thesis, structured invalidationCondition, three typed Evidence
# instances. Used as a regression test for the snapshot-to-html
# transformation. Anyone reading this package gets a concrete worked
# example of how to author a worldview against the public ontology.
#
# Companion - see example-ai-capex@1.0.1 for the snapshot AFTER the
# AMD Q1 print, demonstrating confidence shift and evidence accumulation.
# =============================================================================

snapshot:
  type: wv.WorldviewSnapshot
  observedAt: 2026-05-04T20:00:00Z
  narrative: |
    AI capex thesis pre-Q1 earnings. AMD Q1 2026 prints May 5 after-hours.
    The thesis itself names AMD's Data Center segment revenue as the
    near-term tell - whether it beats or misses consensus $5.4B is the
    binary that moves confidence materially. NVIDIA China revenue remains
    structurally zero per the August 2025 export-control deal. Confidence
    sits at 0.5 - working hypothesis pending the print.
  hasThesis:
    - ai-capex-cycle-with-china-tail

ai-capex-cycle-with-china-tail:
  type: wv.WorldviewThesis
  label: AI capex sustained but with China decoupling tail risk
  thesisStatement: 'Hyperscaler AI capex continues at high pace into 2026, with AMD Data Center growth as the near-term tell. The China decoupling tail risk is real but partially monetized via the US-government 15% revenue-share deal on H20 / MI308 sales. AMD Q1 2026 (printing May 5 after-hours) is the immediate inflection - DC revenue above $5.4B confirms the strong-state thesis; below softens.'
  confidence: 0.5
  status: wv.active
  supportingEvidence:
    - ev-amd-q4-data-center-record
    - ev-nvda-china-revenue-zero
    - ev-amd-q1-consensus
  invalidationCondition:
    type: wv.OrCondition
    operands:
      - type: wv.AndCondition
        operands:
          - type: wv.ThresholdCondition
            observable: fin.ind-spy-close
            comparator: wv.lt
            threshold: 700
            persistence:
              wv.duration: 5
              wv.windowUnit: wv.trading-days
          - type: wv.EventCondition
            event: fin.evt-us-china-export-controls-extended
      - type: wv.EventCondition
        event: fin.evt-us-china-export-controls-extended
        durability: wv.durable

# --- Evidence ---

ev-amd-q4-data-center-record:
  type: fin.CorporateEvidence
  evidenceStatement: AMD Q4 2025 data center segment revenue hit a record $5.38B, up 39% year-over-year.
  evidenceStrength: wv.evidence-strong
  fin.aboutSecurity: fin.amd
  fin.corporateMetric: fin.segment-revenue
  fin.reportingPeriod: fin.q4-2025

ev-nvda-china-revenue-zero:
  type: fin.CorporateEvidence
  evidenceStatement: NVIDIA China AI accelerator market share is now 0% per CEO Jensen Huang. Revenue collapsed from $19.67B (FY2025) to effectively zero following expanded US export controls.
  evidenceStrength: wv.evidence-strong
  fin.aboutSecurity: fin.nvda
  fin.corporateMetric: fin.geographic-revenue
  fin.reportingPeriod: fin.fy-2026

ev-amd-q1-consensus:
  type: fin.AnalystEvidence
  evidenceStatement: AMD Q1 2026 consensus pre-print - revenue $9.88B, EPS $1.29. Data Center segment consensus $5.4B is the bar that determines whether the AI-capex thesis confirms or softens.
  evidenceStrength: wv.evidence-strong
  fin.analystInstitution: fin.bloomberg-consensus
  fin.forecastTarget: fin.amd
  fin.forecastValue: 9.88
  fin.forecastHorizon: fin.horizon-q1-print
