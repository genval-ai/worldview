ev-iran-missiles-kuwait-bahrain-jun3:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    At dawn Wednesday June 3 Iran fired ballistic missiles and drones at US bases in Kuwait
    and Bahrain and at a vessel near the Strait of Hormuz. The attack killed one person and
    caused significant damage to Kuwait International Airport (the Terminal 1 passenger
    building), which suspended flights. The US military said it "successfully defeated" the
    attacks - two missiles fired at Kuwait fell short or broke apart en route and three at
    Bahrain were intercepted - and carried out self-defense strikes on Iran's Qeshm Island
    after a US missile disabled a Botswana-flagged tanker heading to an Iranian port. A
    direct kinetic escalation to attacks on Gulf states while the memorandum sits unsigned.
  evidenceStrength: wv.evidence-strong
  evidenceObservedAt: 2026-06-03T06:00:00Z
  citation: https://www.aljazeera.com/news/liveblog/2026/6/3/iran-war-live-us-strikes-irans-qeshm-says-tehran-attacks-kuwait-bahrain
  citationSource: src.aljazeera
  wv.geopoliticalEventDate: 2026-06-03

