ai-capex-cycle-with-china-tail:
  type: wv.WorldviewThesis
  label: AI capex sustained but with China decoupling tail risk
  thesisStatement: >-
    Hyperscaler AI capex continues at elevated pace into 2026. AMD Q1 2026
    (May 5 AH) materially confirmed the demand side - revenue $10.3B vs
    $9.88B consensus, Data Center +57% YoY at $5.8B, Q2 guide $11.2B vs
    $10.3B consensus, Lisa Su quoted "tens of billions" by 2027. NVDA Q1
    FY2027 (May 20 5 PM ET) is the next binary tell - consensus $78.8B
    revenue (+77% YoY) / $1.77 EPS; Q2 guide near $86B is what the
    after-hours reaction rides on; options price an 8-10% implied move;
    prediction-market beat probability is ~97% priced in - the asymmetry
    is unfavorable on the upside, and NVDA has closed lower on 4 of its
    last 5 earnings reports despite beating revenue 3-4% for six straight
    quarters. Huang estimates the unrealized China market at ~$50B
    "effectively gone with no clear return timeline". The May 14 H200
    export approval to ~10 Chinese firms (Alibaba, Tencent, ByteDance,
    JD.com plus Lenovo and Foxconn) holds through the weekend into Monday
    and through Tuesday morning - the Trump-Xi summit concluded with no
    AI-policy reversal or extended-export-control reinstatement. Friday
    May 15 delivered broad chip profit-taking on the oil shock / rate-up
    backdrop: NVDA 225.32 (-4.42%), AMD 424.10 (-5.69%), INTC -8% to ~$108
    (after a YTD +214% run), MU -6.6%. CSCO printed a divergent +13.4% to
    118.21 confirming the Wed-AH Q3 print (FY26 AI orders raised to $9B
    from $5B, HSBC upgrade to Buy with $137 PT). Monday close NVDA $222.32
    (-1.33%), AMD $420.99 (-0.73%), QQQ $705.88;
    [[ev-nvda-tuesday-close-22061-may19|Tuesday close NVDA 220.61
    (-0.77%)]], [[ev-amd-tuesday-close-41405-may19|AMD 414.05 (-1.65%)]]
    on pre-earnings positioning, with
    Wednesday pre-market NQ futures +0.8% recovering ahead of the
    after-close print. The
    PHLX Semiconductor Index sits ~32% above its 50-day moving average
    after a +143% trailing year - a consolidation setup. The Rubin
    architecture H2 2026 ramp is the positive overhang investors are
    watching for. Update May 20: NVDA reported Q1 FY2027 after the close and
    the [[ev-nvda-q1-fy27-ah-muted-guide-may20|initial after-hours reaction
    was muted on lower-than-expected guidance]] - the Q2 guide, the
    operative variable, did not clear the priced-for-perfection bar; the
    demand side nonetheless stayed firm intraday with [[sec.amd|AMD]] 447.58
    (+8.10%) on memory-supply tightness and a broad AI rally. Update May 21:
    the full figures correct the 2.1.6 "soft guide" read -
    [[ev-nvda-q1-fy27-full-figures-may21|NVDA reported record revenue of $81.6B (+85% YoY) and adjusted EPS $1.87 (+140% YoY) with current-quarter guidance of $91B]], above the ~$86B Street whisper, plus a
    [[ev-nvda-dividend-buyback-may21|25x dividend increase and a new $80B buyback]]; the stock still
    [[ev-nvda-fails-to-soar-may21|fell ~1% after-hours]] on a 45x P/E and a
    $5.3T cap. The named tell printed bullish for a capex-sustained thesis;
    the soft tape is a valuation/positioning reaction, not a demand signal.
    Update May 22: no new capex signal landed -
    [[ev-nvda-thu-close-21951-may21|NVDA closed Thursday at 219.51 (-1.77%)]],
    the beat-and-raise shrugged off into the cash close, while
    [[ev-amd-thu-close-44959-may21|AMD held at 449.59 (+0.45%)]] on the
    memory-supply tailwind; the China export-control tail is unchanged.
    Update May 25: the AI tape split into the Friday close with no new demand
    signal - [[ev-nvda-fri-close-21533-may22|NVDA faded to 215.33 (-1.90%)]]
    continuing the post-earnings drift, while
    [[ev-amd-fri-close-46751-may22|AMD ripped to 467.51 (+3.98%)]] on the
    memory-supply tailwind - positioning and valuation, not demand. The China
    export-control tail is unchanged over the quiet holiday weekend. Update May
    26: no new AI demand or capex signal landed over the holiday or into the
    Tuesday pre-market; the beat-and-raise and the China export-control tail are
    unchanged. Update May 27: the first cash close brought no new demand or capex
    signal - [[ev-amd-tuesday-close-50389-may26|AMD ripped +7.78% to 503.89]] on the
    memory-supply tailwind while [[ev-nvda-tuesday-close-21486-may26|NVDA closed flat
    at 214.86 (-0.22%)]] - positioning, not demand - and the China export-control
    tail is unchanged. Update May 28: the Wednesday cash close brought no new AI
    demand or capex signal - chips faded with
    [[ev-nvda-wed-close-21260-may27|NVDA 212.60 (-1.05%)]] and
    [[ev-amd-wed-close-49554-may27|AMD 495.54 (-1.66%)]] giving back part of
    Tuesday's rip - positioning rather than demand, with the China export-control
    tail unchanged. Update May 29: chips led the Thursday record day -
    [[ev-nvda-thu-close-21425-may28|NVDA 214.25 (+0.78%)]] and
    [[ev-amd-thu-close-51809-may28|AMD 518.09 (+4.55%)]] - positioning into the broad
    melt-up rather than a new demand signal, the beat-and-raise and the China
    export-control tail unchanged. Update June 1: BOTH legs of the thesis strengthened.
    Demand: [[ev-dell-ai-server-blowout-may29|Dell reported AI-optimized server revenue
    of $16.1B (+757% YoY) with a $51.3B AI-server backlog and guided to $60B in FY2027
    AI-server sales - total revenue +88% YoY, the fastest in eight years and the
    strongest third-party hyperscaler-capex confirmation of the cycle]], and
    [[ev-nvda-computex-rtx-spark-vera-jun1|Jensen Huang's Computex 2026 / GTC Taipei
    keynote unveiled the Arm-based RTX Spark PC superchip, the Vera CPU, and a
    Microsoft Windows-AI-PC co-engineering partnership, lifting NVDA +4.13% to ~$219.87
    Monday intraday]]. China tail: [[ev-us-closes-china-chip-loophole-may31|the
    Commerce Department closed the loophole that had allowed NVDA / AMD advanced AI
    chips to reach Chinese firms operating outside China - license requirements now
    attach to China-headquartered entities regardless of location, exposing the >20% of
    NVDA FY2026 compute revenue that flowed through intermediaries]], a concrete
    tightening that moves the export-controls-extended invalidation leg closer. Friday
    itself was profit-taking ([[ev-nvda-fri-close-21114-may29|NVDA 211.14 (-1.45%)]],
    [[ev-amd-fri-close-51610-may29|AMD 516.10 (-0.38%)]]) ahead of the Monday Computex
    pop; [[ev-sp-record-narrow-breadth-may29|the SOXX semiconductor index gained ~24%
    in May]]. Broadcom's June 3 print is the next capex tell. Update June 2: the demand
    side delivered four independent confirmations in 24 hours.
    [[ev-nvda-mon-close-22436-jun1|The Monday cash session converted the Computex pop -
    NVDA +6.26% to 224.36 (Massive-verified), the largest single-day NVDA gain of the
    sequence]]; [[ev-hpe-q2-record-ai-jun2|HPE reported a record Q2 on AI-infrastructure
    enterprise demand, raised its FY outlook, pulled its long-term financial targets
    forward two years, and is up ~23% Tuesday pre-market]];
    [[ev-huang-marvell-trillion-jun2|Jensen Huang called Marvell "the next
    trillion-dollar company" Tuesday morning (the stock exploded ~20%) and said NVDA has
    supply to support "very, very robust growth"]]; and
    [[ev-son-ai-50x-dotcom-jun1|SoftBank's Masayoshi Son called AI "50X bigger" than the
    dot-com boom, framing corrections as buying opportunities]]. No new China-tail
    development landed in the window - the Commerce loophole closure stands as-is.
    [[ev-amd-mon-close-51013-jun1|AMD faded -1.16% to 510.13]] on profit-taking after its
    May run. Broadcom reports tomorrow (June 3) after the close: guidance points to $22B
    revenue with AI semiconductor revenue expected near $10.7B (+140% YoY) - the next
    binary tell, with custom-silicon read-through for the hyperscaler capex picture.
    Update June 3: the demand side got its most direct confirmation yet - from the buyer
    side, not the supplier side.
    [[ev-alphabet-equity-raise-8475b-jun2|Alphabet priced an upsized $84.75B equity
    raise ($30B underwritten offerings, a $40B at-the-market program, and a $10B
    Berkshire Hathaway private placement at ~$350/share) - its first stock offering in 20
    years - explicitly to fund over $180B of 2026 AI-compute capex (double 2025), with
    more planned for 2027]]. Every prior confirmation was supplier revenue; this is the
    hyperscaler capex itself, pre-announced and equity-funded. The supplier tape
    extended: [[ev-mrvl-tue-close-29079-jun2|Marvell closed +32.5% at 290.79 (record Q1
    revenue $2.42B, >$10B-by-FY2029 custom-chip outlook)]],
    [[ev-amd-tue-close-52154-jun2|AMD +2.24% to 521.54]],
    [[ev-nvda-tue-close-22282-jun2|NVDA touched an all-time intraday high of 232.28
    before fading to 222.82 (-0.69%)]], while
    [[ev-hpe-tue-close-5615-jun2|HPE pared its +23% open to a ~+9.5% close at 56.15]] - a
    reflexivity caution inside the euphoria. No new China-tail development landed.
    [[ev-avgo-tue-close-48157-jun2|Broadcom closed at 481.57]] ahead of its Wednesday
    after-close print - the next binary tell. Update June 4: the binary tell fired - and
    split. Fundamentally [[ev-avgo-q2-fy26-blowout-jun3|Broadcom posted a Q2 blowout:
    revenue $22.2B (+48% YoY), AI semiconductor revenue $10.8B (+143% YoY, above its own
    guide), EPS $2.44 beat, Q3 guided to $29.4B with AI semis to grow over 200% YoY, FY2026
    AI reaffirmed at ~$56B and FY2027 reiterated above $100B]] - the strongest demand-side
    confirmation yet. But [[ev-avgo-reflexive-selloff-jun4|the stock rose ~2.6% after-hours
    then reversed to roughly -15% pre-market because CEO Hock Tan did not RAISE the FY2027
    number, sparking a sector-wide chip rout (CrowdStrike -11%)]]; the supplier tape was
    mixed Wednesday ([[ev-amd-wed-close-54252-jun3|AMD +4.0%]],
    [[ev-nvda-wed-close-21475-jun3|NVDA -3.6%]], [[ev-mrvl-wed-close-30165-jun3|Marvell
    +3.7% but fading from +11% intraday]]) and rolled over into
    [[ev-thu-premarket-chip-rout-jun4|Thursday's pre-market rout]]. The demand leg
    strengthened while positioning grew fragile.
