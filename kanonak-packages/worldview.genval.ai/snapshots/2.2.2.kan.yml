  evidenceStatement: >-
    The US Senate voted 50-47 Tuesday May 19 to advance Sen. Tim Kaine's
    War Powers Resolution directing the President to remove US Armed
    Forces from hostilities against Iran absent a declaration of war or
    a specific AUMF. Four Republicans crossed - Bill Cassidy (his first
    "yes" after a Trump-endorsed-opponent primary loss), Rand Paul, Lisa
    Murkowski, Susan Collins - in a rebuke to Trump. It is a procedural
    advance, not law: a final Senate vote, House passage, and an
    all-but-certain Trump veto stand between it and effect.
