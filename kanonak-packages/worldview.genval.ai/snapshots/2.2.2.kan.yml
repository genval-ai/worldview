gold-debasement-bid:
  type: wv.WorldviewThesis
  label: Gold structural debasement bid
  thesisStatement: >-
    Gold sits in mid-cycle of a multi-year structural bull market driven
    by central-bank buying, sovereign de-dollarization, $39T US debt,
    stock-bond correlation breakdown, and Fed independence concerns.
    Q1 2026 set records on multiple dimensions - LBMA quarterly average
    $4,873/oz, central-bank net purchases 244 tonnes (highest Q1 ever,
    +17% QoQ), aggregate Q1 demand value $193B, bar-and-coin demand 474
    tonnes (+42% YoY, second-highest quarterly figure on record). After
    the Monday US cash recovery (GLD 418.43 +0.27%, spot back into the
    $4,565-$4,570 band), Tuesday morning spot is range-bound $4,531-$4,570 -
    Asian-session $4,531 low recovering through the European session on
    dollar weakness driven by the Iran-rejection-but-no-strike framing.
    Physical demand strong - Shanghai-London spot differentials remain
    positive. But the
    [[ev-10y-yield-tuesday-close-462-may19|10Y rose to a 4.62% Tuesday
    close]] (intraday high 4.67%) - the operative tactical headwind
    reasserting - and gold pulled back below the band: spot ~$4,486.86,
    [[sec.gld|GLD]] 411.50 (-1.66%), [[sec.gdx|GDX]] 83.78 (-3.86%);
    Wednesday pre-market spot steadied near $4,498.90
    (-0.27%). The structural-bull supports are intact -
    JPM $5,055-$6,300, UBS $6,200, Citi $5,000-$7,000 targets; 2026 CB
    projection at 755 tonnes; 95% CB survey response confirming
    gold-reserve intentions. AndCondition invalidation still requires
    three hard things simultaneously - durable US-Iran peace AND Fed
    credibility restored AND sustained 6-month deficit decline - the
    [[ev-senate-war-powers-resolution-5047-may19|Senate's war-powers
    advance]] moves further away from the first leg, but the day's action
    is a tactical price pullback, not a structural break. Update May 20: the
    pullback reversed - [[sec.gld|GLD]] 417.40 (+1.43%), [[sec.gdx|GDX]]
    86.36 (+3.08%) - as [[ev-treasury-yields-eased-wed-may20|yields eased]],
    the Tuesday tactical headwind flipping to a tailwind; the
    [[ev-iran-talks-final-stages-may20|Iran talks entering final stages]]
    are a small structural offset toward the durable-peace invalidation leg.
    Update May 21: two tactical forces offset -
    [[ev-treasury-yields-rebound-thu-may21|Treasury yields rebounded]]
    (headwind) while [[ev-iran-deal-optimism-fading-may21|US-Iran deal
    optimism faded]] (safe-haven tailwind) - leaving the structural-bull
    read intact. Update May 22: the two tactical forces offset again with
    signs flipped - [[ev-yields-ease-friday-may22|yields eased Friday]]
    (tailwind) while the [[ev-iran-draft-ceasefire-leaked-may22|leaked draft
    ceasefire revived peace optimism]] (safe-haven headwind) - and Thursday
    closed flat ([[ev-gld-thu-close-41699-may21|GLD 416.99]],
    [[ev-gdx-thu-close-8599-may21|GDX 85.99]]). Update May 25: gold gave back
    a little into the Friday close - [[ev-gld-fri-close-41382-may22|GLD 413.82 (-0.76%)]],
    [[ev-gdx-fri-close-8502-may22|GDX 85.02 (-1.13%)]] - as the revived peace
    optimism outweighed the easing-yield tailwind on the day; a tactical
    pullback, with the structural-bull supports unchanged over a quiet
    holiday weekend. Update May 26: gold firmed over the holiday -
    [[ev-gold-spot-monday-4563-may25|spot advanced 1.18% to $4,562.69 Monday]]
    on dollar softness and a safe-haven bid amid the
    [[ev-us-self-defense-strikes-iran-may25|fresh US strikes on Iran]], with
    [[ev-10y-yield-tuesday-am-451-may26|the 10Y easing to ~4.51%]] a tailwind -
    recovering the Friday give-back on unchanged structural supports. Update May 27:
    gold gave Monday's pop back on the first cash session -
    [[ev-gold-spot-tuesday-4490-may26|spot fell 1.74% to $4,489.65 Tuesday]] on
    risk-on / deal optimism - though [[ev-gld-tuesday-close-41400-may26|GLD closed
    net flat at 414.00]] and [[ev-gdx-tuesday-close-8850-may26|GDX ran +4.09% to
    88.50]] with [[ev-10y-yield-wed-am-448-may27|the 10Y easing to ~4.48%]] a
    tailwind; a tactical pullback on unchanged structural supports. Update May 28:
    the Wednesday cash close brought a sharper selloff -
    [[ev-gold-spot-wed-4439-may27|spot gold fell ~1.67% to $4,438.98]] on risk-on
    flows and dollar firmness as Iran-deal optimism overweighed the easing 10Y -
    with [[ev-gld-wed-close-40849-may27|GLD 408.49 (-1.33%)]] and
    [[ev-gdx-wed-close-8544-may27|GDX 85.44 (-3.46%)]] confirming the tactical
    pullback. Structural supports (244t Q1 central-bank buying, JPM/UBS/Citi
    targets, 755t 2026 projection) are unchanged. Update May 29: bullion rebounded on
    the otherwise risk-on day - [[ev-gold-spot-thu-4470-may28|spot recovered to
    ~$4,470]], [[ev-gld-thu-close-41277-may28|GLD 412.77 (+1.05%)]],
    [[ev-gdx-thu-close-8718-may28|GDX 87.18 (+2.04%)]] - with
    [[ev-10y-yield-thu-446-may28|the 10Y easing to 4.46%]] a tailwind; the in-line April
    PCE and the ~20% monthly oil collapse point to easier forward inflation while the
    structural debasement supports are unchanged, and the AndCondition invalidation
    triplet is no closer. Update June 1: the rebound extended into the Friday close -
    [[ev-gld-fri-close-41712-may29|GLD 417.12 (+1.05%)]] and
    [[ev-gdx-fri-close-8949-may29|GDX 89.49 (+2.65%)]], the miners leading for a second
    consecutive day - and the weekend
    [[ev-us-hellfire-fifth-ship-talks-stalled-may31|stall of the US-Iran talks plus
    continuing blockade enforcement]] restores the safe-haven tailwind that the
    peace-MoU optimism had been eroding; the structural supports and the AndCondition
    invalidation triplet (which requires durable peace as its FIRST leg, now further
    away) are unchanged. Update June 2: the two-day rebound broke on the risk-on record
    session - [[ev-gold-spot-mon-4455-jun1|spot gold fell ~1.9% Monday to ~$4,455]],
    [[ev-gld-mon-close-41126-jun1|GLD 411.26 (-1.40%)]],
    [[ev-gdx-mon-close-8668-jun1|GDX 86.68 (-3.14%)]] (the miners giving back their
    Friday leadership) - as the equity records and
    [[ev-trump-hezbollah-truce-rapid-pace-jun1|Trump's peace framing]] outweighed
    [[ev-iran-stops-negotiations-jun1|the Iran-talks collapse]] on the day, with
    [[ev-10y-yield-mon-447-jun1|the 10Y rising to ~4.47%]] an added headwind. Tuesday
    spot is [[ev-gold-spot-tue-4514-jun2|recovering to ~$4,514 (+$54)]]. The structural
    supports (244t Q1 central-bank buying, JPM/UBS/Citi targets, 755t 2026 projection)
    are unchanged, and the talks collapse moves the durable-peace leg of the
    AndCondition further away. Update June 3: the recovery completed into the Tuesday
    close - [[ev-gold-spot-tue-close-4530-jun2|spot gold closed ~$4,530 (+1.7%)]],
    [[ev-gdx-tue-close-8805-jun2|GDX +1.58% to 88.05]] (the miners reclaiming
    leadership), [[ev-gld-tue-close-41195-jun2|GLD +0.17% to 411.95]] - recovering the
    full Monday risk-on give-back, with [[ev-10y-yield-tue-443-jun2|the 10Y easing to
    ~4.43%]] a tailwind. The diplomatic reversal
    ([[ev-us-iran-mou-pending-trump-edits-jun2|the memorandum pending Trump's
    signature]]) is a small move TOWARD the durable-peace leg of the AndCondition
    triplet, but the other two legs (Fed credibility restored; six months of deficit
    decline) remain untouched, and the structural supports are unchanged. Update June 4:
    gold took a tactical hit on the broad risk-off day -
    [[ev-gold-spot-wed-close-4457-jun3|spot fell ~1.6% to ~$4,457]],
    [[ev-gdx-wed-close-8500-jun3|GDX -3.5%]], [[ev-gld-wed-close-40787-jun3|GLD -1.0%]] -
    failing to catch a safe-haven bid despite [[ev-iran-missiles-kuwait-bahrain-jun3|the
    Iranian strikes on Kuwait and Bahrain]], a single down session that trips none of the
    AndCondition triplet; the structural debasement supports are unchanged.
  confidence:
    estimateMean: 0.85
    estimateStdDev: 0.05
    estimateLower95: 0.75
    estimateUpper95: 0.92
    betaAlpha: 52.0
    betaBeta: 9.2
  vis.thesisTheme: vis.theme-gold
  fac.hasDriverLoading:
    - fac.loadingDriver: drv.inflation-debasement
      fac.loadingStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
      fac.loadingRationale: >-
        The structural bid is a debasement trade - $39T US debt, de-dollarization,
        central-bank reserve diversification - so [[drv.inflation-debasement]] is the
        dominant driver.
    - fac.loadingDriver: drv.monetary-credibility
      fac.loadingStrength:
        estimateMean: 0.65
        estimateStdDev: 0.08
      fac.loadingRationale: >-
        Fed-independence concerns and the stock-bond correlation breakdown are a
        co-pillar - gold is the asset that benefits when trust in the institution erodes,
        making [[drv.monetary-credibility]] a strong secondary driver.
    - fac.loadingDriver: drv.geopolitical-conflict
      fac.loadingStrength:
        estimateMean: 0.40
        estimateStdDev: 0.10
      fac.loadingRationale: >-
        The war supplies a tactical safe-haven bid layered on the structural trade - real
        but secondary, as the Monday session (gold falling DESPITE the Iran escalation)
        demonstrates.
  hz.thesisHorizon:
    type: est.TriangularEstimate
    estimateMean: 15.67
    estimateMode: 15.0
    estimateLower95: 8.0
    estimateUpper95: 24.0
  status: wv.active
  confidenceRationale: >-
