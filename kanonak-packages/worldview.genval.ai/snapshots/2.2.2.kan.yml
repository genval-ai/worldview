ev-iran-14-point-substance-may18:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    The substance of Iran's 14-point peace proposal became public Monday
    May 18 via NPR / Al Jazeera reporting. Key points: 30-day end of war
    (vs the US-proposed 2-month ceasefire), guarantees against future US
    military aggression, withdrawal of US forces from Iran's periphery,
    end of naval blockade, release of frozen Iranian assets, payment of
    reparations, lifting of sanctions, end of fighting in Lebanon, new
    Strait of Hormuz mechanism. Tehran's framing: end the war and
    resolve the shipping standoff first, defer nuclear-program talks.
    Trump publicly characterized the proposal as "not acceptable" and
    said strikes could resume if Iran "does something bad" - the
    cancel-Tuesday-strikes move is procedurally compatible with
    rejecting the proposal substance while pulling back the kinetic
    near-term tail.
  evidenceStrength: wv.evidence-strong
  evidenceObservedAt: 2026-05-18T14:00:00Z
  citation: https://www.aljazeera.com/news/2026/5/3/whats-irans-14-point-proposal-to-end-the-war-and-will-trump-accept-it
  citationSource: src.aljazeera
  wv.geopoliticalEventDate: 2026-05-18

ev-uae-barakah-response-restrained-may18:
