ev-us-iran-mou-pending-trump-edits-jun2:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    The US-Iran memorandum of understanding - a 60-day ceasefire extension, reopening
    and de-mining of the Strait of Hormuz, lifting of the US naval blockade, sanctions
    waivers for Iranian oil sales, and a framework for nuclear negotiations - is
    tentatively agreed at the negotiator level and pending President Trump's approval as
    of Tuesday June 2. Trump personally edited the draft with "somewhat significant
    changes" on the Strait of Hormuz terms and the removal of Iran's highly-enriched
    uranium stockpile; Tehran has not yet responded to the edited version. Vice
    President Vance says the two sides are "very close" but "not there yet" and that
    whether Trump signs is "still TBD." Trump ended a White House Situation Room meeting
    without announcing a final decision. The June 1 negotiation collapse has effectively
    un-collapsed, but the memorandum remains unsigned by either side.
  evidenceStrength: wv.evidence-strong
  evidenceObservedAt: 2026-06-02T22:00:00Z
  citation: https://www.cbsnews.com/live-updates/iran-war-us-trump-vance-ceasefire-strait-of-hormuz-deal-close/
