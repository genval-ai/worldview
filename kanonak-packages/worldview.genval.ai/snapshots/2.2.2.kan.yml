view:
  type: wv.WorldviewSnapshot
  label: 'Macro worldview (2.2.2 - Thursday June 4 open refresh - Iranian missile strikes on Kuwait and Bahrain at dawn Wednesday June 3 break the seven-session record streak (SPY -0.70% to 754.24, S&P 500 -0.74% to 7,553.68, Dow -1.21%, VIX back to 16.52); Broadcom posts a Q2 blowout (AI semis +143% to $10.8B, revenue +48% to $22.2B) but does not raise FY2027 guidance and reverses to roughly -15% pre-market, leading a Thursday chip rout; ISM Services May prices paid 71.3%, highest since August 2022; WTI holds above $95 as the US-Iran memorandum stays unsigned and Tehran reports no progress; gold slips to ~$4,457; May jobs report Friday)'
  observedAt: 2026-06-04T13:52:46Z
  narrative: |
    2.2.2 refresh, ~26.5 hours after [[v221.view|2.2.1]] - the window runs from the Wednesday June 3 ~7:22 AM ET pre-market moment through the Thursday June 4 ~9:52 AM ET open, spanning the full Wednesday cash session, Broadcom's after-close earnings, and the Thursday pre-market tape. The bump is a PATCH: no thesis added, retired, or invalidated, and no regime reframing - an evidence refresh with three small steps and four holds. Net confidence moves: [[stagflation-risk]] +0.01 ([[ev-ism-services-prices-paid-713-may-jun3|ISM Services May prices paid 71.3%, the highest since August 2022]]), [[persistent-energy-shock]] +0.01 ([[ev-iran-missiles-kuwait-bahrain-jun3|Iranian missile strikes on Kuwait and Bahrain]] with [[ev-wti-wed-close-9568-jun3|WTI above $95]] as the deal track stalls again), and [[equity-melt-up-vs-recession-risk]] -0.01 (the seven-session record streak broke), with holds on [[iran-war-rearmament]], [[gold-debasement-bid]], [[ai-capex-cycle-with-china-tail]], and [[powell-warsh-transition-risk]].

    **The seven-record streak breaks on a fresh kinetic escalation.** [[equity-melt-up-vs-recession-risk]] steps 0.81 to 0.80. At dawn Wednesday [[ev-iran-missiles-kuwait-bahrain-jun3|Iran fired ballistic missiles and drones at US bases in Kuwait and Bahrain, killing one person and damaging Kuwait International Airport; the US said it "successfully defeated" the attacks and struck Iran's Qeshm Island in response]], and the cash session sold off, ending the record run: [[ev-spy-wed-close-75424-jun3|SPY -0.70% to 754.24 (Massive-verified)]], [[ev-triple-index-pullback-wed-jun3|the S&P 500 -0.74% to 7,553.68, the Nasdaq Composite -0.89% to 26,853.98, and the Dow -1.21% to 50,687.07]], with [[ev-vix-wed-close-1652-jun3|VIX back up to 16.52 (+2.86%)]] - moving AWAY from the <15-for-5-days melt-up-confirmation leg, not toward it. The step down is only -0.01 because the recession side did not fire either: [[ev-amd-wed-close-54252-jun3|AMD still closed +4.0%]] and the macro data stayed firm. The Thursday tape extended the risk-off - [[ev-thu-premarket-chip-rout-jun4|a Broadcom-led chip rout has S&P and Nasdaq futures lower pre-market while the Dow holds up on rotation]].

    **Broadcom's number is a blowout; the tape sells it anyway.** [[ai-capex-cycle-with-china-tail]] holds at 0.88 - the cleanest illustration yet of the thesis's own China-and-positioning tail. Fundamentally the after-close print was the demand-side confirmation the 2.2.1 narrative was waiting for: [[ev-avgo-q2-fy26-blowout-jun3|Broadcom Q2 FY2026 revenue $22.2B (+48% YoY), AI semiconductor revenue $10.8B (+143% YoY, above its own guide), non-GAAP EPS $2.44 (beat), Q3 guided to $29.4B (+84%) with AI semis to grow over 200% YoY, FY2026 AI reaffirmed at ~$56B and FY2027 reiterated above $100B]]. But the price reaction was the opposite: the stock rose ~2.6% after-hours, then [[ev-avgo-reflexive-selloff-jun4|reversed to roughly -15% pre-market Thursday because CEO Hock Tan did NOT raise the FY2027 AI number on the call, sparking a sector-wide chip selloff (CrowdStrike -11% alongside)]]. The demand leg got STRONGER while the positioning got more fragile - a great print can no longer lift the tape. The +0.01 the fundamentals would justify is offset almost exactly by the reflexivity warning the reaction delivers, so the thesis holds.

    **The energy premium re-arms with actual missiles; oil holds above $95.** [[persistent-energy-shock]] steps 0.74 to 0.75. The diplomatic reversal reversed again - [[ev-araghchi-no-progress-hormuz-jun3|Foreign Minister Araghchi said there was "no progress" on negotiations and Tehran disputed any US role in a Hormuz mechanism]], the memorandum still unsigned - while the kinetic side escalated to direct strikes on Gulf states. [[ev-wti-wed-close-9568-jun3|WTI rose a third straight session to above $95]] and the complex held its bid ([[ev-xom-wed-close-15253-jun3|XOM +2.0%]], [[ev-cvx-wed-close-18971-jun3|CVX +1.1%]], [[ev-xle-wed-close-5871-jun3|XLE +1.3%]]); [[ev-thu-premarket-chip-rout-jun4|oil eased only modestly Thursday pre-market to ~$95.17]]. WTI ~$95 sits far above the <$80-for-30-days leg and the Hormuz reopening clock still has not started.

    **Defense stabilizes; gold takes a tactical hit.** [[iran-war-rearmament]] holds at 0.87: the missile strikes reinforce the multi-year-conflict premise while the defense tape only drifted ([[ev-lmt-wed-close-51203-jun3|LMT -0.3%]], [[ev-rtx-wed-close-17255-jun3|RTX -1.0%]], [[ev-noc-wed-close-52606-jun3|NOC -2.0%]]); the backlog / Golden Dome / $1.5T FY2027-budget structural case and the durable-peace-plus-declining-outlays invalidation are untouched. [[gold-debasement-bid]] holds at 0.85: gold FELL on the risk-off day - [[ev-gold-spot-wed-close-4457-jun3|spot ~$4,457 (-1.6%, Massive C:XAUUSD)]], [[ev-gdx-wed-close-8500-jun3|GDX -3.5%]], [[ev-gld-wed-close-40787-jun3|GLD -1.0%]] - a single down session that trips none of the AndCondition invalidation triplet; the central-bank-buying and debasement structural supports stand, so the noise does not move the mean.

    **Inflation breadth firms; the Fed window stays quiet.** [[stagflation-risk]] steps 0.83 to 0.84 on [[ev-ism-services-prices-paid-713-may-jun3|the ISM Services May prices-paid index at 71.3%, its highest since August 2022, with all 18 industries reporting higher prices and petroleum newly on the up-list]] - following the [[ev-ism-prices-paid-821-may-jun1|82.1 manufacturing prices-paid reading]], a two-survey corroboration of sticky and broadening input costs while growth holds (Services PMI 54.5, the 23rd straight month of expansion). [[ev-wti-wed-close-9568-jun3|Crude above $95]] keeps the passthrough tailwind live. [[powell-warsh-transition-risk]] holds at 0.51 - another window with no Warsh-as-chair policy substance; the June 16-17 FOMC remains the first substantive test of the room-to-cut-versus-higher-for-longer contradiction.

    **Catalyst calendar from here.** [[ev-may-jobs-report-friday-jun5|The May jobs report Friday June 5 (consensus ~85k, the unemployment leg of the stagflation invalidation)]]. Whether the Broadcom-led chip rout deepens into a genuine de-rating or gets bought. Whether Trump signs the Iran memorandum and Tehran accepts his edits - and whether the Gulf-state strikes harden into a wider regional phase. The June 16-17 first-Warsh-as-chair FOMC.
  hasThesis:
    - stagflation-risk
    - persistent-energy-shock
    - iran-war-rearmament
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

stagflation-risk:
  type: wv.WorldviewThesis
  label: Stagflation risk and Fed independence stress
  thesisStatement: >-
    April CPI on May 12 fired the energy-passthrough binary tell directly:
    headline 3.8% YoY (highest since May 2023), core 2.8% YoY. April PPI on
    May 13 ran hotter than CPI - headline +1.4% m/m / +6.0% YoY, core +1.0%
    m/m / +5.2% YoY (highest in three years). April import prices on May 14
    added +1.9% m/m / +4.2% YoY (largest YoY since October 2022) with
    imported fuel +16.3% m/m. Friday May 15 delivered the sharpest
    single-session rate-path repricing of the cycle: oil +4.5% (WTI to $106,
    weekly +11%), the 10Y to 4.59% (up ~13bps in one day, fresh ~1-year high,
    biggest weekly yield jump since April 2025), and CME FedWatch
    hike-by-December odds to ~56% from ~36% Thursday and ~16% a week
    earlier - a 20pp single-day move. Monday May 18 cash session closed 10Y
    at 4.601% (vs 4.59% Friday) on the strike-cancellation tactical pullback;
    Tuesday May 19 closed 10Y at 4.62% (intraday high 4.67%, "Treasurys take
    off"), the rate-path repricing reasserting after the Friday spike.
    Global yields still at multi-year highs
    (German bund 15-year high, JGB 10Y 29-year high). Calendar: April 29
    FOMC minutes Wednesday May 20 2 PM ET, Walmart Q1 FY2027 Thursday May
    21 pre-open with tariff-passthrough lens, April PCE the formal
    invalidation indicator on May 28. Update May 20: the April 29 FOMC
    minutes released Wednesday read hawkish - officials debating hikes on
    persistent above-target inflation - and FedWatch hike-by-December odds
    rose to ~63%, fresh corroboration of the higher-for-longer read even as
    Wednesday's risk-on session eased yields intraday. Update May 21:
    Walmart's Q1 FY2027 print delivered a direct tariff-passthrough signal -
    the [[ev-walmart-cfo-tariff-price-warning-may21|CFO warned higher retail
    prices may hit shelves in coming months]] - and
    [[ev-treasury-yields-rebound-thu-may21|Treasury yields rebounded]]
    Thursday, reversing Wednesday's intraday easing. Update May 22: a
    tactical disinflation pulse - [[ev-yields-ease-friday-may22|the 10Y eased
    back toward ~4.57% Friday]], [[ev-oil-eases-sub100-may22|crude slipped
    back below $100]], and December-hike odds came off their post-minutes
    peak on the revived US-Iran peace optimism - though no new CPI / PPI /
    PCE print landed and April PCE on May 28 remains the formal invalidation
    indicator. Update May 25: a quiet Memorial Day weekend added no new
    inflation print, and weekend energy coverage reinforced structurally
    elevated oil ([[ev-weekend-no-ceasefire-oil-elevated-may24|Brent ~85%
    higher YTD with analyst calls for crude to stay high into 2027]]) - a
    passthrough tailwind that roughly offsets the Friday
    tactical-disinflation pulse, leaving the higher-for-longer read intact
    ahead of the May 28 PCE. Update May 26: a pre-market read after the
    Memorial Day holiday added no new inflation print -
    [[ev-10y-yield-tuesday-am-451-may26|the 10Y eased to ~4.51%]] extending the
    Friday disinflation pulse, while the [[ev-us-self-defense-strikes-iran-may25|fresh
    US strikes on Iran]] kept a passthrough-risk offset in place - leaving the
    higher-for-longer read intact into the May 28 PCE. Update May 27: the first
    post-holiday cash close added no new inflation print -
    [[ev-10y-yield-wed-am-448-may27|the 10Y eased further to ~4.48% Wednesday]], its
    lowest in nearly two weeks, while [[ev-fedwatch-hike-by-dec-70pct-may26|CME
    FedWatch hike-by-December odds firmed to ~70%]] (with ~80% odds of a June/July
    hold) kept the higher-for-longer read intact ahead of the May 28 PCE. Update May
    28: the Wednesday cash close added no new inflation print - the 10Y held near
    the ~4.48% morning level into the close, the higher-for-longer core intact - and
    crude [[ev-wti-wed-close-8868-may27|tumbled ~5.5% to $88.68]] on
    [[ev-rubio-iran-every-chance-may27|Rubio's "every chance to succeed"]] framing, a
    fresh disinflation tactical pulse; the
    [[ev-april-pce-consensus-38-33-may28|April PCE print at 8:30 AM ET]] (consensus
    3.8% headline / 3.3% core) is the operative tell nine minutes after observedAt.
    Update May 29: the print landed in line - [[ev-april-pce-print-actual-38-33-may28|headline
    3.8% / core 3.3% YoY, both matching consensus, with the monthly pace softening to +0.4% /
    +0.2% m/m]] - confirming sticky above-target core without an upside surprise, and
    [[ev-10y-yield-thu-446-may28|the 10Y eased to 4.46%]] as energy pared its rebound and the
    interim Iran deal limited the inflation outlook; the core 3.3% remains far from the
    <2.5%-for-3-months invalidation leg. Update June 1: no new inflation print landed
    over the Friday-to-Monday window - the higher-for-longer 3.3% core stands - while
    [[ev-equity-futures-rise-monday-jun1|markets firmed June-hold pricing to ~99.4%]]
    and the weekend stall of the US-Iran memorandum
    ([[ev-us-hellfire-fifth-ship-talks-stalled-may31|talks formally stalled, blockade
    enforcement continuing]]) keeps the energy-passthrough risk two-sided; the rate-path
    question defers entirely to the June 16-17 FOMC. Update June 2: fresh
    inflation-persistence corroboration on three fronts -
    [[ev-ism-prices-paid-821-may-jun1|ISM May prices paid printed 82.1, the second-highest
    reading since April 2022, with 66.3% of manufacturers reporting higher prices]]
    alongside [[ev-ism-pmi-54-may-jun1|a 54.0 headline PMI, the fastest factory expansion
    since May 2022]] - growth holding up while prices refuse to yield;
    [[ev-jolts-april-76m-jun2|April JOLTS openings rose to 7.6M]] (labor demand still
    solid); and the energy-passthrough risk violently re-armed as
    [[ev-iran-stops-negotiations-jun1|Iran stopped negotiations and vowed to completely
    block the Strait of Hormuz]] and [[ev-wti-mon-spike-92-jun1|WTI spiked 6%+ above $92]]
    before [[ev-trump-hezbollah-truce-rapid-pace-jun1|Trump's truce-and-rapid-pace
    intervention]] pared the move. [[ev-10y-yield-mon-447-jun1|The 10Y rose to ~4.47%
    Monday]] on the escalation; [[ev-fedwatch-june-hold-984-jun2|June-hold pricing stands
    at ~98.4%]], deferring the rate-path question to the June 16-17 FOMC. Update June 3: a
    quiet inflation window - no new print landed - while
    [[ev-10y-yield-tue-443-jun2|the 10Y eased to ~4.43% Tuesday]], its lowest in roughly
    three weeks, and the energy-passthrough risk stayed two-sided as
    [[ev-us-iran-mou-pending-trump-edits-jun2|the US-Iran memorandum sits pending Trump's
    signature with Tehran yet to respond to his edits]] while
    [[ev-oil-firms-tue-close-jun2|WTI held above $93]]. The ISM Services PMI (prices-paid
    lens) lands Wednesday 10 AM ET and the May jobs report Friday - the next inflation
    reads ahead of the June 16-17 FOMC. Update June 4: the ISM Services print landed hot -
    [[ev-ism-services-prices-paid-713-may-jun3|the May prices-paid index rose to 71.3%, its
    highest since August 2022, with all 18 industries reporting higher prices and petroleum
    newly added to the up-list]], a second prices survey (after the 82.1 manufacturing
    reading) confirming sticky and broadening input costs while growth holds (Services PMI
    54.5). [[ev-wti-wed-close-9568-jun3|Crude held above $95]] after
    [[ev-iran-missiles-kuwait-bahrain-jun3|Iranian missile strikes on Kuwait and Bahrain]]
    kept the energy-passthrough tail live, with [[ev-araghchi-no-progress-hormuz-jun3|Tehran
    reporting "no progress" on the deal]]; the [[ev-may-jobs-report-friday-jun5|May jobs
    report Friday]] is the unemployment leg.
  confidence:
    estimateMean: 0.84
    estimateStdDev: 0.04
    estimateLower95: 0.76
    estimateUpper95: 0.90
    betaAlpha: 46.0
    betaBeta: 8.8
  vis.thesisTheme: vis.theme-inflation
  fac.hasDriverLoading:
    - fac.loadingDriver: drv.inflation-debasement
      fac.loadingStrength:
        estimateMean: 0.85
        estimateStdDev: 0.05
      fac.loadingRationale: >-
        The core of the thesis is persistent above-target inflation (CPI 3.8%, core PCE
        3.3%, ISM prices paid 82.1), so [[drv.inflation-debasement]] is the dominant
        driver.
    - fac.loadingDriver: drv.rate-path
      fac.loadingStrength:
        estimateMean: 0.80
        estimateStdDev: 0.05
      fac.loadingRationale: >-
        The higher-for-longer rate-path repricing (10Y ~4.5%, ~70% hike-by-December
        pricing) is the co-equal pillar - the thesis is as much about what inflation
        forces the Fed to do as about inflation itself.
    - fac.loadingDriver: drv.monetary-credibility
      fac.loadingStrength:
        estimateMean: 0.45
        estimateStdDev: 0.10
      fac.loadingRationale: >-
        Fed-independence stress (the Warsh transition, political pressure on policy) is a
        real but secondary channel - it amplifies the inflation risk rather than defining
        the thesis.
  hz.thesisHorizon:
    type: est.TriangularEstimate
    estimateMean: 10.33
    estimateMode: 9.0
    estimateLower95: 4.0
    estimateUpper95: 18.0
  status: wv.active
  confidenceRationale: >-
    Stepped 0.83 to 0.84 (from 2.2.1) on fresh inflation-breadth corroboration:
    [[ev-ism-services-prices-paid-713-may-jun3|the ISM Services May prices-paid index at
    71.3%, its highest since August 2022, with all 18 industries reporting higher prices
    and petroleum newly on the up-list]] is a second prices survey confirming the
    [[ev-ism-prices-paid-821-may-jun1|82.1 manufacturing reading]] - sticky and broadening
    input costs while growth holds (Services PMI 54.5). [[ev-wti-wed-close-9568-jun3|Crude
    above $95]] after [[ev-iran-missiles-kuwait-bahrain-jun3|the Iranian strikes on Kuwait
    and Bahrain]] keeps the passthrough tailwind live. The +0.01 is deliberately small: no
    new CPI/PCE print landed, and the [[ev-may-jobs-report-friday-jun5|May jobs report
    Friday]] is the next hard read. Width held at 0.04. Beta(46, 8.8) ~55 effective
    observations. The horizon is anchored on the monthly PCE cadence: the
    <2.5%-for-3-months invalidation leg needs at least a quarter to even begin scoring.
