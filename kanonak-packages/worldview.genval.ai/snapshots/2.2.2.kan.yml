ev-warsh-first-remarks-reform-may22:
  type: wv.OfficialStatementEvidence
  evidenceStatement: >-
    In his first remarks as Federal Reserve Chair at the May 22 White House
    swearing-in, Kevin Warsh pledged to lead "a reform-oriented Federal Reserve,
    learning from past successes and mistakes, both escaping static frameworks
    and models and upholding clear standards of integrity," cited Greenspan as a
    model for the role, and said the Fed's mandate of price stability and maximum
    employment, pursued "with wisdom and clarity, independence and resolve," can
    deliver lower inflation and stronger growth. Reform-flavored but anodyne on
    near-term policy - not a rate-path tell.
  evidenceStrength: wv.evidence-strong
  evidenceObservedAt: 2026-05-22T15:00:00Z
