ev-weekend-no-ceasefire-oil-elevated-may24:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    The leaked Friday "final draft" US-Iran ceasefire was NOT formally
    announced over the May 23-25 holiday weekend - the "within hours" claim
    did not materialize, leaving the durable-peace leg of every war-linked
    invalidation condition unmet. Weekend energy coverage instead emphasized
    structurally elevated crude, with Brent reported roughly 85% higher
    year-to-date and analysts arguing oil stays high into 2027, and no
    durable Strait of Hormuz reopening.
  evidenceStrength: wv.evidence-moderate
  evidenceObservedAt: 2026-05-24T00:00:00Z
  citation: https://www.fool.com/investing/2026/05/23/brent-crude-up-85-since-january-oxy-xom-cvx/
  citationSource: src.motley-fool
  wv.geopoliticalEventDate: 2026-05-24

