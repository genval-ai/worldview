  confidenceRationale: >-
    Held at 0.88 ± 0.04 (from 2.2.1) - the cleanest illustration yet of the thesis's own
    positioning tail. [[ev-avgo-q2-fy26-blowout-jun3|Broadcom's Q2 print was an unambiguous
    demand-side blowout - AI semis +143% to $10.8B above guide, FY2026 AI reaffirmed at
    ~$56B, FY2027 reiterated above $100B]], which on its own argues for a step up. But the
    price reaction was the opposite: [[ev-avgo-reflexive-selloff-jun4|the stock reversed an
    after-hours gain to roughly -15% pre-market because Tan did not RAISE FY2027, sparking a
    chip-sector rout]] - a great print can no longer lift the tape. The +0.01 the
    fundamentals justify is offset almost exactly by the reflexivity warning the reaction
    delivers, so the mean holds. No new China-tail development landed. Width held at 0.04.
    Beta(82, 11.2) ~93 effective observations. The horizon is quarterly: the thesis is
    re-tested every earnings cycle, and the export-control invalidation could fire at any
    policy moment.
