equity-melt-up-vs-recession-risk:
  type: wv.WorldviewThesis
  label: Equity melt-up versus building recession risk
  thesisStatement: >-
    The Monday cash session held up FAR better than the Monday-morning
    bearish framing implied. SPY closed 738.65 (-0.07% from Friday's
    739.17), QQQ 705.88, Dow -0.34%, Nasdaq Composite -0.07%, VIX
    actually FELL to 18.43. The Tuesday cash session then closed lower for
    a THIRD consecutive day: [[ev-spx-tuesday-close-7354-may19|SPX
    7,353.61 (-0.67%)]], [[ev-nasdaq-tuesday-close-25871-may19|Nasdaq
    Composite 25,870.71 (-0.84%)]], [[ev-spy-tuesday-close-73373-may19|SPY
    733.73]], QQQ 701.53; [[ev-vix-tuesday-close-1806-may19|VIX closed
    18.06 (+1.35%)]] - a volatility bid, reversing the morning's softening
    read. [[ev-spx-futures-wed-am-may20|Wednesday pre-market futures have
    since recovered]] (ES +0.4%, NQ +0.8%, Dow +75 pts) ahead of the
    binary cluster, integrating the down days rather than cascading. The Friday tape (SPX 7,408.50 -1.24%, NVDA -4.4%, AMD
    -5.7%, INTC -8%) has not been re-tested. CME FedWatch hike-by-December
    holds the ~56% level. Q1 2026 earnings season closed at 84% beat rate,
    27.7% blended EPS growth, blended net margin 13.4% (highest since
    FactSet began tracking in 2009). The invalidation grammar requires
    either a vol-expansion break (VIX > 25 with SPY breaking 50d MA for 5
    trading days) or unimpeded melt-up confirmation (SPX > 7,300 with VIX
    < 15 for 5 trading days) - VIX at 18.06 sits squarely in the mid-zone
    (SPX 7,353 is above 7,300, but VIX is far from the <15 the
    melt-up-confirmation leg needs), neither has fired. Three binary
    tells land in the next ~30 hours Wed
    May 20 - Thu May 21: FOMC minutes (2 PM ET Wed), NVDA Q1 FY2027 (5 PM
    ET Wed), Walmart Q1 FY2027 (pre-open Thu, tariff-passthrough lens).
    Update May 20: the session rallied broadly -
