ev-us-self-defense-strikes-iran-may25:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    US Central Command conducted "self-defense" strikes Monday May 25 in
    southern Iran near Bandar Abbas, hitting Iranian boats attempting to lay
    mines in the Strait of Hormuz and missile launch sites, in response to
    Iranian attacks on US Navy destroyers that had transited the strait.
    CENTCOM said it was "using restraint during the ongoing ceasefire" and
    there was no announced change to the April 8 truce - a kinetic
    re-engagement that reaffirms both the energy premium and the multi-year
    defense procurement tail.
  evidenceStrength: wv.evidence-strong
  evidenceObservedAt: 2026-05-25T20:00:00Z
  citation: https://www.cnbc.com/2026/05/26/us-conducts-self-defense-strikes-in-iran-as-trump-seeks-peace-deal.html
  citationSource: src.cnbc
  wv.geopoliticalEventDate: 2026-05-25

ev-iran-60day-ceasefire-framework-may25:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    A senior US administration official said May 25 that the US and Iran had
    developed a framework extending their ceasefire 60 days while the two sides
    reach a final deal to end the war, with the Strait of Hormuz to be de-mined
    and reopened in the interim. More concrete than the leaked Friday draft, the
    de-mining-and-reopening commitment is the first explicit move toward the
    durable-Hormuz-reopening leg of the energy-thesis invalidation, but it is
    unimplemented and the same-day US strikes underline its fragility.
  evidenceStrength: wv.evidence-moderate
  evidenceObservedAt: 2026-05-25T18:00:00Z
  citation: https://www.cnbc.com/2026/05/23/us-iran-war-talks.html
  citationSource: src.cnbc
  wv.geopoliticalEventDate: 2026-05-25

ev-trump-great-deal-or-battlefront-may25:
  type: wv.OfficialStatementEvidence
  evidenceStatement: >-
    President Trump said Monday May 25 that talks with Iran were "proceeding
    nicely" but warned it would only be "a Great Deal for all or, no Deal at
    all," threatening to take things "Back to the Battlefront and shooting, but
    bigger and stronger than ever before" - an explicit kinetic-option
