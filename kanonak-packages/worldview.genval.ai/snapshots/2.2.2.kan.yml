iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: >-
    The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered
    a multi-year defense spending cycle that benefits prime contractors
    with missile and missile-defense exposure regardless of diplomatic-track
    outcomes. Defense primes rallied materially on the Monday May 18 cash
    session in confirmation of the procurement-cycle reading - LMT closed
    528.31 (+2.38%), RTX 175.95 (+2.78%), NOC 550.00 (+1.72%). The Monday
    evening Axios reporting flipped the diplomatic-track signal: the White
    House formally REJECTED Iran's 14-point proposal as "insufficient",
    citing inadequate commitments to halting uranium enrichment; a senior
    US official told Axios the "next conversation is through bombs"; Trump
    is expected to meet his top national security advisers Tuesday May 19
    to discuss "breaking the ceasefire with Iran." This is structurally
    bullish for the multi-year procurement-cycle tail - the rejection is
    public, on-the-record, and explicit about kinetic-option re-engagement.
    Sunday Barakah drone strike on the UAE nuclear plant remains
    unattributed (Iran has not claimed responsibility; UAE Defense
    Ministry confirms 3 drones from Saudi border, 2 intercepted; UAE
    formal statement did not name Iran). Iran's 14-point proposal
    substance remains public: 30-day war end, US-forces withdrawal,
    naval-blockade end, asset unfreezing, reparations, sanctions lift,
    end-of-fighting in Lebanon, new Hormuz mechanism. Depleted munitions
    stockpiles (438 Iranian ballistic missiles, 2,012 drones, 19 cruise
    missiles fired at UAE through April 1) and Golden Dome ($185B) are
    committed multi-year programs that survive any near-term deal
    scenario. Tuesday-morning defense complex repricing on the
    rejection news is the operative test of the procurement-cycle
    structural read. That test came in muted, not bullish -
    [[sec.lmt|LMT]] 526.63 (-0.32%), [[sec.rtx|RTX]] 174.49 (-0.83%),
    [[sec.noc|NOC]] 556.34 (+1.15%) - and the legislative track tilted
    toward de-escalation: the Senate advanced Kaine's
    [[ev-senate-war-powers-resolution-5047-may19|war-powers resolution
    50-47]] (Cassidy, Paul, Murkowski, Collins crossing) directing US
    withdrawal from Iran hostilities, and Trump
    [[ev-trump-hour-away-strike-postponed-may19|postponed an "an hour
    away" Tuesday strike]] after Gulf-leader appeals. The resolution is
    veto-bound and the multi-year backlog (LMT $194B, RTX $271B) is
    unchanged. Update May 20: the de-escalation continued -
    [[ev-iran-talks-final-stages-may20|talks entered final stages]] and
    [[ev-hormuz-ships-transiting-may20|ships began transiting Hormuz]] - and
    the defense complex softened ([[sec.lmt|LMT]] 522.59 -0.77%,
    [[sec.noc|NOC]] 552.17 -0.75%, [[sec.rtx|RTX]] 174.85 flat), but the
    procurement backlog is robust to a deal still short of implementation.
    Update May 21: the de-escalation tilt partly reversed -
    [[ev-iran-deal-optimism-fading-may21|optimism over a US-Iran agreement
    faded]] and [[ev-oil-reclaims-100-may21|crude reclaimed $100]] - firming
    the multi-year procurement-cycle tail. Update May 22: the diplomatic
    tilt swung back toward de-escalation as a
    [[ev-iran-draft-ceasefire-leaked-may22|leaked "final draft" US-Iran
    ceasefire revived peace optimism]] and [[ev-oil-eases-sub100-may22|crude
    eased back below $100]]; the draft is unconfirmed and unimplemented, and
    Thursday defense closes were essentially flat
    ([[ev-lmt-thu-close-52279-may21|LMT 522.79]],
    [[ev-rtx-thu-close-17598-may21|RTX 175.98]],
    [[ev-noc-thu-close-55158-may21|NOC 551.58]]) - the procurement bid
    steady. Update May 25: the leaked draft did NOT convert to a formal
    announcement over the May 23-25 holiday weekend
    ([[ev-weekend-no-ceasefire-oil-elevated-may24|the "within hours" claim
    failed to materialize]]), and the procurement bid firmed into the Friday
    close ([[ev-lmt-fri-close-53324-may22|LMT 533.24 +2.0%]],
    [[ev-rtx-fri-close-17701-may22|RTX 177.01 +0.59%]],
    [[ev-noc-fri-close-55558-may22|NOC 555.58 +0.73%]]) with
    [[ev-lmt-alabama-capacity-may22|Lockheed expanding defense manufacturing
    capacity in Alabama]] - the multi-year backlog (LMT $194B, RTX $271B) and
    Golden Dome ($185B) unchanged. Update May 26: over the holiday the US
    conducted [[ev-us-self-defense-strikes-iran-may25|fresh "self-defense"
    strikes on Iranian missile launch sites and mine-laying boats near Hormuz]]
    and [[ev-trump-great-deal-or-battlefront-may25|Trump warned he would go
    "Back to the Battlefront ... bigger and stronger than ever before"]] absent
    a "Great Deal" - a kinetic re-engagement and on-the-record battlefront
    threat that firm the multi-year procurement tail - even as a
    [[ev-iran-60day-ceasefire-framework-may25|60-day ceasefire framework]]
    emerged; the framework is unimplemented and the multi-year backlog (LMT
    $194B, RTX $271B) plus Golden Dome ($185B) are unchanged. Update May 27: the
    strikes drew an [[ev-iran-vows-retaliation-strikes-may26|Iranian retaliation vow
    and ceasefire-violation accusations]] and
    [[ev-trump-defense-budget-15t-2027-may26|President Trump floated raising the
    FY2027 defense budget from $1T to $1.5T]] - a fresh procurement-cycle support -
    though the Tuesday defense tape was muted
    ([[ev-lmt-tuesday-close-53290-may26|LMT 532.90 flat]],
    [[ev-rtx-tuesday-close-17897-may26|RTX 178.97 +1.11%]],
    [[ev-noc-tuesday-close-55680-may26|NOC 556.80 +0.22%]]) and the Doha framework is
    a de-escalation pull, leaving the multi-year backlog (LMT $194B, RTX $271B) and
    Golden Dome ($185B) unchanged. Update May 28: the Wednesday cash close brought
    a modest defense pullback - [[ev-lmt-wed-close-53114-may27|LMT 531.14 (-0.33%)]],
    [[ev-rtx-wed-close-17659-may27|RTX 176.59 (-1.33%)]],
    [[ev-noc-wed-close-55134-may27|NOC 551.34 (-0.98%)]] - profit-taking on
    deal-optimism flows rather than a new structural signal, with the
    [[ev-may28-oil-bounce-reciprocal-strikes-may28|fresh US-Iran reciprocal strikes
    pre-market Thursday]] keeping the kinetic re-engagement live; the multi-year
    backlog (LMT $194B, RTX $271B) plus Golden Dome ($185B) plus the $1.5T FY2027
    budget proposal are unchanged. Update May 29: the Thursday cash close FIRMED the
    defense tape despite the peace-MoU optimism - [[ev-lmt-thu-close-53733-may28|LMT
    537.33 (+1.17%)]], [[ev-rtx-thu-close-17896-may28|RTX 178.96 (+1.34%)]],
    [[ev-noc-thu-close-55929-may28|NOC 559.29 (+1.44%)]] - the procurement bid holding
    on the $1.5T budget even as US and Iranian negotiators
    [[ev-us-iran-60day-mou-tentative-may28|reached a tentative 60-day memorandum to
    extend the ceasefire]]; the MoU is unsigned and invalidation still requires durable
    peace IMPLEMENTED plus two quarters of declining DoD outlays - the opposite of a
    rising topline. Update June 1: the de-escalation pull collapsed - the memorandum
    [[ev-us-hellfire-fifth-ship-talks-stalled-may31|stalled on uranium-enrichment terms
    while the US disabled a fifth blockade-running ship with a Hellfire missile]] (the
    blockade enforcement is itself LMT-manufactured ordnance expenditure) and the
    weekend brought [[ev-us-self-defense-strikes-weekend-jun1|fresh US self-defense
    strikes against Iran]]. The Friday defense tape was mixed
    ([[ev-lmt-fri-close-53045-may29|LMT 530.45 (-1.28%)]],
    [[ev-rtx-fri-close-17966-may29|RTX 179.66 (+0.39%)]],
    [[ev-noc-fri-close-56368-may29|NOC 563.68 (+0.78%)]]) - profit-taking against the
    procurement bid - while the multi-year backlog (LMT $194B, RTX $271B), Golden Dome
    ($185B), and the $1.5T FY2027 budget proposal are unchanged. Update June 2: the
    diplomatic-track signal flipped twice in 24 hours.
    [[ev-iran-stops-negotiations-jun1|Iran formally stopped negotiations and vowed to
    completely block the Strait of Hormuz]] - structurally confirming, the kinetic tail
    stays live - then
    [[ev-trump-hezbollah-truce-rapid-pace-jun1|Trump intervened claiming an
    Israel-Hezbollah truce and an Iran deal "within the next week"]], and the defense
    tape sold off HARD on the peace framing:
    [[ev-lmt-mon-close-51650-jun1|LMT 516.50 (-2.63%)]],
    [[ev-rtx-mon-close-17441-jun1|RTX 174.41 (-2.92%)]],
    [[ev-noc-mon-close-53922-jun1|NOC 539.22 (-4.34%)]] - the sharpest single-day defense
    selloff of the sequence. [[ev-israel-hezbollah-clash-overnight-jun2|Overnight
    Israel-Hezbollah clashes continued despite the truce announcement]] and Tuesday
    [[ev-trump-couldnt-care-less-jun2|Trump said he "couldn't care less" whether the Iran
    talks collapse]]. The structural read is unchanged: the backlog (LMT $194B, RTX
    $271B), Golden Dome ($185B), and the $1.5T FY2027 budget proposal all stand, and
    invalidation still requires durable peace IMPLEMENTED plus two quarters of declining
    DoD outlays. Update June 3: after Monday's sharpest-of-sequence selloff, the Tuesday
    defense tape stabilized rather than cascaded -
    [[ev-lmt-tue-close-51343-jun2|LMT 513.43 (-0.59%)]],
    [[ev-rtx-tue-close-17426-jun2|RTX 174.26 (-0.09%)]],
    [[ev-noc-tue-close-53659-jun2|NOC 536.59 (-0.49%)]] - even as the de-escalation pull
    strengthened: [[ev-us-iran-mou-pending-trump-edits-jun2|the US-Iran memorandum is now
    pending Trump's signature]] and
    [[ev-israel-lebanon-talks-hezbollah-full-ceasefire-jun2|US-hosted Israel-Lebanon talks
    opened with Hezbollah signaling readiness for a full ceasefire, though clashes
    continued through the partial truce]]. The
    [[ev-ghalibaf-missiles-not-talks-jun2|Ghalibaf "missiles, not talks" framing]] keeps
    the kinetic tail live. The structural read is untouched: the backlog (LMT $194B, RTX
    $271B), Golden Dome ($185B), and the $1.5T FY2027 budget proposal all stand - a
    pending memorandum is neither durable peace implemented nor declining outlays. Update
    June 4: the conflict escalated to direct strikes on Gulf states -
    [[ev-iran-missiles-kuwait-bahrain-jun3|Iran fired ballistic missiles and drones at US
    bases in Kuwait and Bahrain, damaging Kuwait International Airport; the US struck Iran's
    Qeshm Island in response]] - while [[ev-araghchi-no-progress-hormuz-jun3|Tehran reported
