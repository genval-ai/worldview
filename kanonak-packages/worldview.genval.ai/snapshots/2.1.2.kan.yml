    repricing (10Y to 4.61-4.63%, global yields at multi-year highs) plus
    the WTI/Brent follow-through reinforce the energy-passthrough framing
    but are already implicit in the structure - the macro mean is what
    drives this thesis and that has not moved. Beta(33, 7.2) parameterization
    continues to encode ~40 effective independent observations. April PCE
