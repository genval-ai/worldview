view:
  type: wv.WorldviewSnapshot
  label: Macro worldview (2.1.2 - Monday-morning weekend-integration follow-through)
  observedAt: 2026-05-18T13:42:56Z
  narrative: |
    Monday-morning 2.1.2 refresh, ~20.5 hours after [[v211.view|2.1.1]] -
    the window covers Sunday-afternoon through Monday cash-open
    (US cash opened ~13 minutes before this observedAt). CME e-mini
    futures opened Sun 22:00 UTC and traded the weekend headlines
    overnight; Asian session re-priced gold and oil; Monday
    pre-market integrated the Sunday Barakah-nuclear-plant attack
    and Trump's "clock is ticking" framing.

    **Three step-change developments materially advance the energy
    and Iran theses; one fourth presses the equity-melt-up leg
    further into recession-risk territory.**

    - **Drone strike on the Barakah nuclear power plant (UAE).**
      Sunday May 17, three drones approached the UAE's sole nuclear
      power plant from its western Saudi-Arabian border. One hit an
      electrical generator outside the secured perimeter, sparking
      a fire; the other two were intercepted. No casualties, no
      radiological release - but the UAE nuclear regulator and
      foreign ministry called it "an unprovoked terrorist attack"
      and "dangerous escalation", with UAE officials blaming Iran
      or an Iran-aligned actor. This is a regime-changing geopolitical
      event in shape: the kinetic phase of the US-Iran war has reached
      nuclear infrastructure for the first time. Direct support for
      [[iran-war-rearmament]] (procurement-cycle demand confirmation)
      AND structural escalation pressure for [[persistent-energy-shock]]
      (Gulf energy / civil-nuclear infrastructure is now in play).
    - **Trump escalatory rhetoric.** Sunday-evening through Monday-
      morning Trump posted on Truth Social "For Iran, the Clock is
      Ticking, and they better get moving, FAST, or there won't be
      anything left of them" plus "Time is of the essence". Trump
      also told Axios that if Iran doesn't improve its offer "they
      are going to get hit much harder". This is a material walk-up
      from Friday's "20-year nuclear suspension" framing on Air
      Force One. Reinforces [[iran-war-rearmament]] demand-side and
      tightens the [[persistent-energy-shock]] tail.
    - **Iran 14-point proposal.** Monday May 18, Tehran delivered a
      14-point peace proposal to US officials via Pakistani mediators.
      Partial offsetting de-escalation gesture, but the substance is
      not yet public and Trump's framing is "still not good enough".
      Narrative-only - no thesis-level confidence move on its own
      until the substance lands.
    - **Oil follow-through and bond rout continuation.** WTI to
      $107.98 Monday morning (+2.43% on top of Friday's +4.5%), Brent
      through $110 to $111.42 (+1.98%) - direct tactical confirmation
      of the [[persistent-energy-shock]] structural-supply reading.
      Global bond rout continues: 10Y to 4.61-4.63% (was 4.59% Friday);
      Japan 10Y at 29-year high, UK gilt at 18-year high, German bund
      at 15-year high. Sharpens the [[powell-warsh-transition-risk]]
      contradiction and reinforces the [[stagflation-risk]] inflation-
      passthrough framing without itself moving the macro mean.

    **Equity melt-up walks back further.** SPY pre-market -0.19% to
    $737.74; S&P 500 futures -0.58%; Polymarket pricing only 6%
    probability of an "Up" open. The weekend escalation (Hormuz toll
    formalization at 2.1.1 + Kharg directive at 2.1.1 + Barakah attack
    + Trump escalation now) cumulatively presses the recession-risk
    leg through to the Monday cash open. Moves [[equity-melt-up-vs-recession-risk]] confidence to 0.66 ± 0.08 (from 0.70 ± 0.08) -
    width held; the Wed-Thu binary tells (FOMC minutes, NVDA, Walmart)
    are still the post-print rerating window.

    **Gold tactical down on yields, structural supports intact.**
    Spot to ~$4,540 Asian session Monday (1.5-month low), -0.22% to
    -0.3% on the rate-up backdrop. The structural-bull supports (LBMA
    Q1 record, 244t CB Q1 buying, JPM/UBS/Citi targets, 95% CB survey)
    remain wholly intact - the Friday-and-now rate move is the operative
    tactical headwind. Moves [[gold-debasement-bid]] to 0.84 ± 0.05
    (from 0.85 ± 0.05) - within band, signaling the headwind but
    not breaking the structural read.

    **NVDA pre-market positive into Wednesday.** Up 0.70% to $226.89
    pre-market on holding-the-H200-framework optimism and pre-earnings
    positioning. [[ai-capex-cycle-with-china-tail]] held at 0.86 ± 0.04;
    Wed May 20 5 PM ET print remains the binary move.

    **Two theses held.** [[stagflation-risk]] at Beta(33, 7.2),
    0.82 ± 0.04 - no new CPI / PPI / PCE / wage data; bond-market
    repricing is already in the structure. [[ai-capex-cycle-with-china-tail]] at Beta(64, 10.4), 0.86 ± 0.04 - Wed print is the next
    operative move. [[powell-warsh-transition-risk]] nudges 0.50 → 0.52
    on the rate-path repricing tightening the contradiction with
    Warsh's "room to cut" framing; no Warsh-as-chair public statement
    yet (first Monday in office), substantive question remains gated
    by the June 16-17 FOMC.

    **Catalyst calendar from here** (carried forward, unchanged).
    Wed May 20 2 PM ET April 29 FOMC minutes. Wed May 20 5 PM ET NVDA
    Q1 FY2027. Thu May 21 pre-open Walmart Q1 FY2027. Thu May 28 8:30
    AM ET April PCE - formal stagflation-thesis invalidation indicator.
    June 16-17 first Warsh-as-chair FOMC under the inherited inflation
    backdrop.
  hasThesis:
