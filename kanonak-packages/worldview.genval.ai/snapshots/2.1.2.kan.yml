equity-melt-up-vs-recession-risk:
  type: wv.WorldviewThesis
  label: Equity melt-up versus building recession risk
  thesisStatement: >-
    S&P 500 closed 7,408.50 on Friday May 15 (-1.24%) - retreating below
    7,500 from Thursday's 7,501.24 record. Nasdaq Composite -1.54% to
    26,225.14 from Thursday's 26,635.22 record; SPY 739.17 (-1.20%);
    VIX surged ~10% to ~19, still inside the 15-20 mid-zone and well
    below the 25 vol-expansion threshold. The named tell from the 1.0.13
    step-up - muscle-through across three consecutive hot inflation
    prints - was tested by the Friday oil shock (WTI +4.5%, weekly +11%)
    plus tech wreck (NVDA -4.4%, AMD -5.7%, Intel -8%, Micron -6.6%) plus
    10Y to 4.59% (fresh ~1-year high) and did not hold past the next
    session. The recession-risk leg pressed harder over the weekend and
    Monday morning: Sunday Barakah nuclear-plant attack, Trump "clock is
    ticking" Truth Social escalation, WTI to $107.98 (+2.43% Monday) /
    Brent through $110, 10Y to 4.61-4.63%, and S&P 500 futures down
    -0.58% with SPY pre-market -0.19% to $737.74. Polymarket pricing only
    6% probability of an "Up" open Monday. CME FedWatch hike-by-December
    holds the Friday ~56% level with futures continuing to price zero
    2026 cuts. CSCO printed a divergent +13.4% on its Q3 catalyst - a
    partial offset on the AI-spend side. Q1 2026 earnings season closed at
    84% beat rate, 27.7% blended EPS growth (latest FactSet refresh),
    blended net margin 13.4% (highest since FactSet began tracking in
    2009). Invalidation requires either a vol-expansion break (VIX > 25
    with SPY breaking 50d MA for 5 trading days) or unimpeded melt-up
    confirmation (SPX > 7,300 with VIX < 15 for 5 trading days) - neither
    side has fired, but the weekend + Monday cumulatively walks back the
    melt-up confirmation side. Three binary tells land in the next 56
    hours Wed May 20 - Thu May 21: FOMC minutes, NVDA Q1 FY2027, Walmart
    Q1 FY2027.
