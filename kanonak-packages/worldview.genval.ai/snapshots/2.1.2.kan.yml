iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: >-
    The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered
    a multi-year defense spending cycle that benefits prime contractors
    with missile and missile-defense exposure regardless of diplomatic-track
    outcomes. The Trump-Xi summit concluded Friday May 15 without any
    concrete Iran de-escalation deliverable; the NYT reported May 15 that
    the US and Israel are intensifying preparations for renewed strikes
    on Iran, with operational options including commando extraction of
    nuclear material and seizure of Kharg Island. Saturday May 16 the
    Trump administration directly instructed the UAE to seize Kharg
    Island - crossing from "preparations intensifying" to active asks of
    regional partners. Sunday May 17 brought the most concrete kinetic
    escalation of the post-ceasefire period: a drone strike near the UAE's
    Barakah nuclear power plant. Three drones came across UAE's western
    Saudi-Arabian border; one hit an electrical generator outside the
    plant's secured perimeter and started a fire; no casualties or
    radiological release. UAE blames Iran or an Iran-aligned actor. Monday
    May 18 Trump posted on Truth Social "the Clock is Ticking" and "Time
    is of the essence" for Iran, separately telling Axios that without a
    better offer "they are going to get hit much harder". Iran's
    counter-move is a 14-point peace proposal delivered via Pakistani
    mediators - substance not yet public. Depleted munitions stockpiles
    (438 Iranian ballistic missiles, 2,012 drones, 19 cruise missiles
    fired at UAE through April 1) and Golden Dome ($185B) are committed
    multi-year programs that survive any near-term deal scenario. Defense
    primes were mixed on the Friday chip-led tape rotation (LMT 516.01
    -0.85%, RTX 171.18 -2.56%, NOC 540.69 -1.45%) and pre-market Monday
    is muted ahead of US cash open - daily rotation does not bend the
    multi-year procurement cycle.
  confidence:
    type: est.BetaEstimate
    estimateMean: 0.87
    estimateStdDev: 0.04
    estimateLower95: 0.78
    estimateUpper95: 0.94
    betaAlpha: 29.0
    betaBeta: 4.3
  vis.thesisTheme: vis.theme-defense
  status: wv.active
  confidenceRationale: >-
    Moved from 2.1.1 0.83 ± 0.05 to 0.87 ± 0.04 - mean step of +0.04
    on the Sunday Barakah nuclear-plant attack (the first strike on
    civilian-nuclear infrastructure in the post-ceasefire period) and
    Trump's Monday escalatory framing ("won't be anything left of
    them", "hit much harder"). Band tightens (0.05 -> 0.04) because
    the procurement-cycle structural argument now has both Friday's
    rhetorical escalation (NYT strike-prep) AND Sunday's kinetic
    escalation (Barakah hit) AND Monday's verbal escalation (clock
    is ticking) reinforcing one another. Beta(29, 4.3) encodes ~33
    effective observations - up from ~30 reflecting three weekend-
    plus-Monday additions. The 14-point Iran proposal is a partial
    offsetting move but the cycle-replenishment argument does not
    require kinetic continuation; it requires multi-year procurement
    momentum, which remains intact.
