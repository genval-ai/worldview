persistent-energy-shock:
  type: wv.WorldviewThesis
  label: Persistent energy premium
  thesisStatement: >-
    Oil prices remain structurally elevated as long as the Strait of Hormuz
    reopening sequence is incomplete and Iranian retaliation risk is intact.
    The IEA May 2026 Oil Market Report forecasts a 1.78 mb/d 2026 supply
    deficit (sharp reversal from prior expected surplus), with world supply
    falling 3.9 mb/d in 2026 on assumed gradual Hormuz resumption from June;
    output from Hormuz-affected Gulf countries is 14.4 mb/d below pre-war
    levels and the agency warns the market stays severely undersupplied
    through Q3 2026 even if Middle East fighting ends by early June. UBS
    separately expects global inventories to approach all-time lows by
    end-May. Friday May 15 delivered direct market repricing (WTI $106
    +4.5% / weekly +11%, Brent $106.89, XLE 59.44, XOM 157.92, CVX 191.10);
    Saturday May 16 added structural formalization via Iran's new Persian
    Gulf Strait Authority and tolling mechanism (US "Freedom Project"
    vessels excluded). Monday May 18 morning extended the move: WTI to
    $107.98 (+2.43%) and Brent through $110 to $111.42 (+1.98%), with the
    IEA warning that "rapidly shrinking buffers amid continued disruptions
    may herald future price spikes ahead". The Sunday drone strike on the
    UAE's Barakah nuclear power plant adds civil-nuclear infrastructure
    to the Gulf-target surface for the first time - an institutional
    escalation that procedurally reinforces the chokepoint regime even as
    Iran delivers a 14-point peace proposal Monday. Trump's Friday Air
    Force One 20-year nuclear-suspension framing and possible Chinese-
    buyer sanction relief remain in play as offsetting diplomatic signals
    but face an Iran institutionalizing the chokepoint AND a Gulf-target
    set now extending to civil nuclear.
  confidence:
    type: est.BetaEstimate
    estimateMean: 0.75
    estimateStdDev: 0.05
    estimateLower95: 0.65
    estimateUpper95: 0.85
    betaAlpha: 21.0
    betaBeta: 7.0
  vis.thesisTheme: vis.theme-energy
  status: wv.active
  confidenceRationale: >-
    Moved from 2.1.1 0.71 ± 0.06 to 0.75 ± 0.05 - mean step of +0.04
