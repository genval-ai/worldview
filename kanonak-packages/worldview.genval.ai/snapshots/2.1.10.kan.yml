  wv.effectiveDate: 2026-05-18

ev-bessent-russia-waiver-g7-may18:
  type: wv.OfficialStatementEvidence
  evidenceStatement: >-
    Speaking from Paris during a G7 finance ministers meeting on Monday
    May 18, Treasury Secretary Scott Bessent announced another 30-day
    extension of the sanctions waiver allowing purchases of Russian
    seaborne oil to aid "energy-vulnerable" countries hit by the Iran
    war, while urging allies to strengthen enforcement of sanctions on
    Tehran. Mixed messaging on the sanctions diplomatic track -
    softening on Russia, hardening on Iran enforcement, while reports
    of a separate Iran oil-sanctions waiver during negotiation period
    crossed the wire.
  evidenceStrength: wv.evidence-strong
  evidenceObservedAt: 2026-05-18T15:00:00Z
