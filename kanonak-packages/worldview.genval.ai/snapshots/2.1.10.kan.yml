view:
  type: wv.WorldviewSnapshot
  label: Macro worldview (2.1.10 - Tuesday May 26 pre-market refresh after the Memorial Day holiday - fresh US self-defense strikes on Iranian mine-laying boats and missile sites near Hormuz test the ceasefire while a 60-day framework to de-mine and reopen the Strait emerges, risk-on futures lead the cash reopen, oil splits Brent-up / WTI-down, gold firms, the 10Y eases to ~4.51%, and Warsh's reform-oriented first remarks surface)
  observedAt: 2026-05-26T10:57:20Z
  narrative: |
    2.1.10 refresh, ~18 hours after [[v219.view|2.1.9]] - the window runs from
    the Monday May 25 Memorial Day timestamp through ~6:57 AM ET Tuesday May 26,
    pre-market and ahead of the post-holiday cash reopen. There is no new cash
    close to integrate (a holiday Massive /prev still returns the Friday May 22
    session), so this is a pre-session read built on overnight developments,
    Tuesday index futures, and Monday spot moves. Net arc: the holiday was not
    quiet - the US conducted fresh kinetic strikes on Iran even as a more
    concrete 60-day ceasefire framework emerged; the two war-linked theses step
    marginally up on the kinetic re-engagement, equities lead risk-on into the
    reopen, oil splits Brent-up / WTI-down, gold firms, the 10Y eases, and
    Warsh's first remarks as chair finally landed.

    **Fresh US strikes test the ceasefire.**
    [[ev-us-self-defense-strikes-iran-may25|CENTCOM conducted "self-defense" strikes Monday May 25 near Bandar Abbas]] - hitting Iranian boats attempting to lay mines in the Strait of Hormuz plus missile launch sites, after Iranian attacks on US Navy destroyers transiting the strait - while insisting it was "using restraint during the ongoing ceasefire" with no announced change to the April 8 truce. President Trump said talks were "proceeding nicely" but
    [[ev-trump-great-deal-or-battlefront-may25|warned it would be "a Great Deal for all or, no Deal at all," threatening to go "Back to the Battlefront ... bigger and stronger than ever before"]]. [[iran-war-rearmament]] steps 0.86 to 0.87: the kinetic re-engagement and the on-the-record battlefront threat firm the multi-year procurement tail, while invalidation still requires durable peace IMPLEMENTED plus two quarters of declining DoD outlays - active strikes are the opposite.

    **A 60-day framework, but unimplemented.**
    [[ev-iran-60day-ceasefire-framework-may25|A framework extending the ceasefire 60 days toward a final deal - with the Strait of Hormuz to be de-mined and reopened]] is more concrete than the 2.1.9 leaked draft, and the de-mining/reopening commitment is the first explicit move toward the durable-Hormuz-reopening leg of the [[persistent-energy-shock]] invalidation SequencedCondition. But it is unimplemented and the same-day strikes underline its fragility, so the energy thesis holds at 0.72 +/- 0.06: [[ev-brent-tuesday-am-9881-may26|Brent firmed +2.78% to $98.81]] on the strikes while [[ev-wti-tuesday-am-9233-may26|WTI fell 4.42% to $92.33]] on deal optimism - the structural-vs-tactical split the band captures, with the IEA summer "red zone" read intact.

    **Risk-on into the reopen.** [[equity-melt-up-vs-recession-risk]] steps 0.71
    to 0.72: [[ev-spx-futures-tuesday-am-may26|S&P 500 futures ran +0.78%, Nasdaq-100 +1.14%, and Dow futures +371 points]] into the post-holiday cash reopen on deal optimism, extending the Friday Dow-record rebound. These are futures, not a close, and neither invalidation leg moved - no vol-expansion break, and VIX (plan-restricted on the feed) is nowhere near the <15 melt-up-confirmation leg - with breadth still concentrated in mega-cap AI.

    **Gold firms; rates ease; AI quiet.** [[gold-debasement-bid]] holds at 0.85
    +/- 0.05: [[ev-gold-spot-monday-4563-may25|spot gold advanced 1.18% to $4,562.69 Monday]] on dollar softness and a safe-haven bid amid the strikes, recovering the Friday give-back with structural-bull supports unchanged. [[stagflation-risk]] holds at 0.83 +/- 0.04: [[ev-10y-yield-tuesday-am-451-may26|the 10Y eased to ~4.51%]], extending the Friday tactical-disinflation pulse, but no new CPI / PPI / PCE landed and the strikes are a passthrough-risk offset - [[ev-april-pce-release-may28|April PCE on May 28]] remains the formal invalidation indicator. [[ai-capex-cycle-with-china-tail]] holds at 0.86 +/- 0.04 with no new demand or capex signal over the holiday and the China export-control tail unchanged.

    **Warsh's first remarks landed.** [[powell-warsh-transition-risk]] holds at
    0.51 with the band tightening to 0.09:
    [[ev-warsh-first-remarks-reform-may22|in his first remarks as chair Warsh pledged a "reform-oriented Federal Reserve ... escaping static frameworks and models," cited Greenspan as a model, and stressed the dual mandate pursued with "independence and resolve"]] - reform-flavored but anodyne on near-term policy, resolving the "what will he say" uncertainty without resolving the contradiction between his "room to cut" framing and the inherited higher-for-longer backdrop. The first substantive policy test is the June 16-17 FOMC.

    **Catalyst calendar from here.** Tuesday May 26 cash close - the first
    post-holiday session; whether the 60-day framework is signed or the strikes
    escalate; whether the Strait de-mining begins. Thu May 28 8:30 AM ET April
    PCE - the formal stagflation-thesis invalidation indicator. June 16-17 first
    Warsh-as-chair FOMC.
  hasThesis:
    - stagflation-risk
    - persistent-energy-shock
    - iran-war-rearmament
    - gold-debasement-bid
    - ai-capex-cycle-with-china-tail
    - equity-melt-up-vs-recession-risk
    - powell-warsh-transition-risk

stagflation-risk:
  type: wv.WorldviewThesis
  label: Stagflation risk and Fed independence stress
  thesisStatement: >-
    April CPI on May 12 fired the energy-passthrough binary tell directly:
    headline 3.8% YoY (highest since May 2023), core 2.8% YoY. April PPI on
    May 13 ran hotter than CPI - headline +1.4% m/m / +6.0% YoY, core +1.0%
    m/m / +5.2% YoY (highest in three years). April import prices on May 14
    added +1.9% m/m / +4.2% YoY (largest YoY since October 2022) with
    imported fuel +16.3% m/m. Friday May 15 delivered the sharpest
    single-session rate-path repricing of the cycle: oil +4.5% (WTI to $106,
    weekly +11%), the 10Y to 4.59% (up ~13bps in one day, fresh ~1-year high,
    biggest weekly yield jump since April 2025), and CME FedWatch
    hike-by-December odds to ~56% from ~36% Thursday and ~16% a week
    earlier - a 20pp single-day move. Monday May 18 cash session closed 10Y
    at 4.601% (vs 4.59% Friday) on the strike-cancellation tactical pullback;
    Tuesday May 19 closed 10Y at 4.62% (intraday high 4.67%, "Treasurys take
    off"), the rate-path repricing reasserting after the Friday spike.
    Global yields still at multi-year highs
    (German bund 15-year high, JGB 10Y 29-year high). Calendar: April 29
    FOMC minutes Wednesday May 20 2 PM ET, Walmart Q1 FY2027 Thursday May
    21 pre-open with tariff-passthrough lens, April PCE the formal
    invalidation indicator on May 28. Update May 20: the April 29 FOMC
    minutes released Wednesday read hawkish - officials debating hikes on
    persistent above-target inflation - and FedWatch hike-by-December odds
    rose to ~63%, fresh corroboration of the higher-for-longer read even as
    Wednesday's risk-on session eased yields intraday. Update May 21:
    Walmart's Q1 FY2027 print delivered a direct tariff-passthrough signal -
    the [[ev-walmart-cfo-tariff-price-warning-may21|CFO warned higher retail
    prices may hit shelves in coming months]] - and
    [[ev-treasury-yields-rebound-thu-may21|Treasury yields rebounded]]
    Thursday, reversing Wednesday's intraday easing. Update May 22: a
    tactical disinflation pulse - [[ev-yields-ease-friday-may22|the 10Y eased
    back toward ~4.57% Friday]], [[ev-oil-eases-sub100-may22|crude slipped
    back below $100]], and December-hike odds came off their post-minutes
    peak on the revived US-Iran peace optimism - though no new CPI / PPI /
    PCE print landed and April PCE on May 28 remains the formal invalidation
    indicator. Update May 25: a quiet Memorial Day weekend added no new
    inflation print, and weekend energy coverage reinforced structurally
    elevated oil ([[ev-weekend-no-ceasefire-oil-elevated-may24|Brent ~85%
    higher YTD with analyst calls for crude to stay high into 2027]]) - a
    passthrough tailwind that roughly offsets the Friday
    tactical-disinflation pulse, leaving the higher-for-longer read intact
    ahead of the May 28 PCE. Update May 26: a pre-market read after the
    Memorial Day holiday added no new inflation print -
    [[ev-10y-yield-tuesday-am-451-may26|the 10Y eased to ~4.51%]] extending the
    Friday disinflation pulse, while the [[ev-us-self-defense-strikes-iran-may25|fresh
    US strikes on Iran]] kept a passthrough-risk offset in place - leaving the
    higher-for-longer read intact into the May 28 PCE.
  confidence:
    estimateMean: 0.83
    estimateStdDev: 0.04
    estimateLower95: 0.75
    estimateUpper95: 0.89
    betaAlpha: 38.0
    betaBeta: 7.58
  vis.thesisTheme: vis.theme-inflation
  status: wv.active
  confidenceRationale: >-
    Held at 0.83 ± 0.04 (from 2.1.9). A pre-market read after the Memorial Day
    holiday added no new CPI / PPI / PCE / wage print, so the
    tactical-disinflation pulse ([[ev-10y-yield-tuesday-am-451-may26|the 10Y
    easing to ~4.51%]]) and the passthrough-risk offset from the
    [[ev-us-self-defense-strikes-iran-may25|fresh US strikes on Iran]] roughly
