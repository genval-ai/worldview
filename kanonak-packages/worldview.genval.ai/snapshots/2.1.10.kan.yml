gold-debasement-bid:
  type: wv.WorldviewThesis
  label: Gold structural debasement bid
  thesisStatement: >-
    Gold sits in mid-cycle of a multi-year structural bull market driven
    by central-bank buying, sovereign de-dollarization, $39T US debt,
    stock-bond correlation breakdown, and Fed independence concerns.
    Q1 2026 set records on multiple dimensions - LBMA quarterly average
    $4,873/oz, central-bank net purchases 244 tonnes (highest Q1 ever,
    +17% QoQ), aggregate Q1 demand value $193B, bar-and-coin demand 474
    tonnes (+42% YoY, second-highest quarterly figure on record). After
    the Monday US cash recovery (GLD 418.43 +0.27%, spot back into the
    $4,565-$4,570 band), Tuesday morning spot is range-bound $4,531-$4,570 -
    Asian-session $4,531 low recovering through the European session on
    dollar weakness driven by the Iran-rejection-but-no-strike framing.
    Physical demand strong - Shanghai-London spot differentials remain
    positive. But the
    [[ev-10y-yield-tuesday-close-462-may19|10Y rose to a 4.62% Tuesday
    close]] (intraday high 4.67%) - the operative tactical headwind
    reasserting - and gold pulled back below the band: spot ~$4,486.86,
    [[sec.gld|GLD]] 411.50 (-1.66%), [[sec.gdx|GDX]] 83.78 (-3.86%);
    Wednesday pre-market spot steadied near $4,498.90
    (-0.27%). The structural-bull supports are intact -
    JPM $5,055-$6,300, UBS $6,200, Citi $5,000-$7,000 targets; 2026 CB
    projection at 755 tonnes; 95% CB survey response confirming
    gold-reserve intentions. AndCondition invalidation still requires
    three hard things simultaneously - durable US-Iran peace AND Fed
    credibility restored AND sustained 6-month deficit decline - the
    [[ev-senate-war-powers-resolution-5047-may19|Senate's war-powers
    advance]] moves further away from the first leg, but the day's action
    is a tactical price pullback, not a structural break. Update May 20: the
    pullback reversed - [[sec.gld|GLD]] 417.40 (+1.43%), [[sec.gdx|GDX]]
    86.36 (+3.08%) - as [[ev-treasury-yields-eased-wed-may20|yields eased]],
    the Tuesday tactical headwind flipping to a tailwind; the
    [[ev-iran-talks-final-stages-may20|Iran talks entering final stages]]
    are a small structural offset toward the durable-peace invalidation leg.
    Update May 21: two tactical forces offset -
    [[ev-treasury-yields-rebound-thu-may21|Treasury yields rebounded]]
    (headwind) while [[ev-iran-deal-optimism-fading-may21|US-Iran deal
    optimism faded]] (safe-haven tailwind) - leaving the structural-bull
    read intact. Update May 22: the two tactical forces offset again with
    signs flipped - [[ev-yields-ease-friday-may22|yields eased Friday]]
    (tailwind) while the [[ev-iran-draft-ceasefire-leaked-may22|leaked draft
    ceasefire revived peace optimism]] (safe-haven headwind) - and Thursday
    closed flat ([[ev-gld-thu-close-41699-may21|GLD 416.99]],
    [[ev-gdx-thu-close-8599-may21|GDX 85.99]]). Update May 25: gold gave back
    a little into the Friday close - [[ev-gld-fri-close-41382-may22|GLD 413.82 (-0.76%)]],
    [[ev-gdx-fri-close-8502-may22|GDX 85.02 (-1.13%)]] - as the revived peace
    optimism outweighed the easing-yield tailwind on the day; a tactical
    pullback, with the structural-bull supports unchanged over a quiet
    holiday weekend. Update May 26: gold firmed over the holiday -
    [[ev-gold-spot-monday-4563-may25|spot advanced 1.18% to $4,562.69 Monday]]
    on dollar softness and a safe-haven bid amid the
    [[ev-us-self-defense-strikes-iran-may25|fresh US strikes on Iran]], with
    [[ev-10y-yield-tuesday-am-451-may26|the 10Y easing to ~4.51%]] a tailwind -
    recovering the Friday give-back on unchanged structural supports.
