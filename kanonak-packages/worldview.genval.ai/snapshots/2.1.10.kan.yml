iran-war-rearmament:
  type: wv.WorldviewThesis
  label: Iran war rearmament cycle
  thesisStatement: >-
    The US-Iran war that began Feb 28 2026 (Operation Epic Fury) triggered
    a multi-year defense spending cycle that benefits prime contractors
    with missile and missile-defense exposure regardless of diplomatic-track
    outcomes. Defense primes rallied materially on the Monday May 18 cash
    session in confirmation of the procurement-cycle reading - LMT closed
    528.31 (+2.38%), RTX 175.95 (+2.78%), NOC 550.00 (+1.72%). The Monday
    evening Axios reporting flipped the diplomatic-track signal: the White
    House formally REJECTED Iran's 14-point proposal as "insufficient",
    citing inadequate commitments to halting uranium enrichment; a senior
    US official told Axios the "next conversation is through bombs"; Trump
    is expected to meet his top national security advisers Tuesday May 19
    to discuss "breaking the ceasefire with Iran." This is structurally
    bullish for the multi-year procurement-cycle tail - the rejection is
    public, on-the-record, and explicit about kinetic-option re-engagement.
    Sunday Barakah drone strike on the UAE nuclear plant remains
    unattributed (Iran has not claimed responsibility; UAE Defense
    Ministry confirms 3 drones from Saudi border, 2 intercepted; UAE
    formal statement did not name Iran). Iran's 14-point proposal
    substance remains public: 30-day war end, US-forces withdrawal,
    naval-blockade end, asset unfreezing, reparations, sanctions lift,
    end-of-fighting in Lebanon, new Hormuz mechanism. Depleted munitions
    stockpiles (438 Iranian ballistic missiles, 2,012 drones, 19 cruise
