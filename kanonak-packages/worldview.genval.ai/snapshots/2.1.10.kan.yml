    UAE's sole nuclear power plant (Barakah, Al Dhafra region, Abu
    Dhabi). Three drones approached from UAE's western Saudi-Arabian
    border; one hit an electrical generator outside the secured
    perimeter, the other two were intercepted. No casualties; no
    radiological release; plant's nuclear regulator confirmed all
    units operating as normal. UAE called the attack "unprovoked
    terrorist attack" and "dangerous escalation", blaming Iran or
    an Iran-aligned actor. First strike on civil-nuclear infrastructure
    in the post-ceasefire period - extends the Gulf-target surface
    materially.
