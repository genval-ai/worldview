    formal invalidation indicator and the
    [[ev-walmart-cfo-tariff-price-warning-may21|Walmart tariff-passthrough
    warning]] still stands. Beta(38, 7.58) ~46 effective observations, alpha
    nudged up for another observation window. Width held at 0.04. April PCE is
    the next primary move, then the June 16-17 first-Warsh-as-chair FOMC.
