ev-trump-cancels-tuesday-strikes-may18:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    Trump said Monday May 18 that he had called off attacks on Iran
    scheduled for Tuesday at the request of US Gulf Arab allies. Trump
    framed the cancellation as response to leaders of Qatar, Saudi
    Arabia, and the UAE telling him "serious negotiations are underway
    with Iran that will result in a deal acceptable to the U.S." -
    a material walk-back of the Monday-morning "clock is ticking"
    rhetoric and a tactical floor under the diplomatic track.
  evidenceStrength: wv.evidence-strong
  evidenceObservedAt: 2026-05-18T22:00:00Z
  citation: https://www.cnbc.com/2026/05/18/oil-today-brent-wti-iran-trump-hormuz-iea-supply-crude-.html
  citationSource: src.cnbc
  wv.geopoliticalEventDate: 2026-05-18

ev-us-oil-sanctions-waiver-text-may18:
  type: wv.PolicyEvidence
  evidenceStatement: >-
    Iran's semi-official Tasnim news agency reported Monday May 18 that
    the US has accepted in a new negotiation text to waive Iran oil
    sanctions during the negotiation period. The US has not confirmed
    or denied the report. Combined with Trump cancelling Tuesday strikes,
    this is a meaningful softening of the near-term tactical posture on
    the Iran diplomatic track - though Treasury Secretary Bessent
    simultaneously urged G7 to strengthen Iran sanctions enforcement
    from Paris, the mixed messaging reads net dovish on the operative
    sanctions question.
  evidenceStrength: wv.evidence-moderate
  evidenceObservedAt: 2026-05-18T18:00:00Z
