  wv.geopoliticalEventDate: 2026-05-25

ev-iran-60day-ceasefire-framework-may25:
  type: wv.GeopoliticalEvidence
  evidenceStatement: >-
    A senior US administration official said May 25 that the US and Iran had
    developed a framework extending their ceasefire 60 days while the two sides
    reach a final deal to end the war, with the Strait of Hormuz to be de-mined
    and reopened in the interim. More concrete than the leaked Friday draft, the
    de-mining-and-reopening commitment is the first explicit move toward the
    durable-Hormuz-reopening leg of the energy-thesis invalidation, but it is
    unimplemented and the same-day US strikes underline its fragility.
  evidenceStrength: wv.evidence-moderate
  evidenceObservedAt: 2026-05-25T18:00:00Z
  citation: https://www.cnbc.com/2026/05/23/us-iran-war-talks.html
  citationSource: src.cnbc
  wv.geopoliticalEventDate: 2026-05-25

