powell-warsh-transition-risk:
  type: wv.WorldviewThesis
  label: Fed leadership transition policy uncertainty
  thesisStatement: >-
    Powell completed his Fed chair-term exit Friday May 15 2026 with
    conciliatory final remarks: advised Warsh to "stay out of elected
    politics" and pledged to keep a low profile as a governor through
    his Board term to 2028. Senate had confirmed Warsh as Federal Reserve
    Chair 54-45 on Wednesday May 13 - the narrowest modern-era margin
    since the current approval process was put in place in 1977;
    Fetterman (D-PA) was the only Democratic crossover. Warsh's formal
    swearing-in ceremony is scheduled for Friday May 22 2026 at the
    White House - confirmed by the May 15 Fed Reserve announcement of
    Powell as chair pro tempore until Warsh is sworn in. The 13-11
    party-line Banking Committee advance, the prior 51-45 governor
    confirmation, and the 54-45 chair confirmation all stand as
    historically partisan Fed-Chair-track outcomes. Warsh
    confirmation-hearing framing - "won''t be sock puppet" and "room to
    cut without inflation" - introduces a dovish-tilt risk. Friday May
    15 delivered the sharpest rate-path repricing of the cycle: 10Y to
    4.59%, CME FedWatch hike-by-December to ~56% from ~36% Thursday.
    Monday May 18 intraday extended to 4.61-4.63% before pulling back
    to a 4.601% close on the strike-cancellation flow;
    [[ev-10y-yield-tuesday-close-462-may19|Tuesday May 19 closed 10Y at
    4.62%]] (intraday high 4.67%), the rate-path repricing
    reasserting. Global yields (German bund 15-year
    high, JGB 10Y 29-year high) remain elevated. The contradiction
    between Warsh's "room to cut" framing and the inherited backdrop
    (CPI 3.8%, PPI +6.0% YoY, imports +4.2% YoY, 10Y 4.62%) remains in
    place, but the substantive transition question still opens later:
    first Warsh-as-chair public statements come after the Friday May 22
    White House ceremony, and the first Warsh-as-chair FOMC is June
    16-17. Update May 20: the
    [[ev-fomc-minutes-hawkish-rate-hike-may20|hawkish April 29 minutes]]
    (officials debating hikes; [[ev-fedwatch-hike-by-dec-63pct-may20|hike-by-December
    ~63%]]) sharpen the contradiction with Warsh's "room to cut" framing,
    but the substantive transition still opens only after the Friday May 22
    swearing-in. Update May 22:
    [[ev-warsh-sworn-in-wh-may22|Warsh took the oath as Fed chair Friday in a
    White House ceremony with President Trump participating]] - the first
    White House Fed-chair swearing-in since Greenspan in 1987, a venue choice
    that underscores the Fed-independence-stress lens. The named catalyst has
    now resolved, but no Warsh-as-chair policy substance has landed - first
    public remarks and the June 16-17 FOMC remain the operative tells. Update
    May 25: no Warsh-as-chair policy substance landed over the holiday
    weekend - weekend commentary that markets tend to "test" new Fed chairs
    is color, not a tell - leaving the contradiction between Warsh's "room to
    cut" framing and the inherited higher-for-longer backdrop unresolved
    ahead of his first public remarks and the June 16-17 FOMC. Update May 26:
    Warsh's first remarks as chair surfaced -
    [[ev-warsh-first-remarks-reform-may22|he pledged a "reform-oriented Federal
    Reserve ... escaping static frameworks and models," cited Greenspan as a
    model, and stressed the dual mandate pursued with "independence and
    resolve"]] - reform-flavored but anodyne on near-term policy, resolving the
    what-will-he-say uncertainty (band tightens to 0.09) without resolving the
    room-to-cut-versus-higher-for-longer contradiction; the June 16-17 FOMC is
    the first substantive policy test.
  confidence:
    estimateMean: 0.51
    estimateStdDev: 0.09
    estimateLower95: 0.33
    estimateUpper95: 0.69
    betaAlpha: 13.5
    betaBeta: 12.97
  vis.thesisTheme: vis.theme-monetary
  status: wv.active
  confidenceRationale: >-
    Mean held at 0.51; band tightened from ± 0.10 to ± 0.09 (from 2.1.9). The
    named "first public remarks" tell landed:
    [[ev-warsh-first-remarks-reform-may22|Warsh pledged a "reform-oriented
    Federal Reserve" "escaping static frameworks and models," cited Greenspan as
    a model, and stressed the dual mandate with "independence and resolve"]] -
    reform-flavored but anodyne on near-term policy, which resolves the
    what-will-he-say uncertainty (hence the tighter band) without resolving the
    contradiction between his "room to cut" framing and the inherited
    higher-for-longer backdrop ([[ev-10y-yield-tuesday-am-451-may26|the 10Y at
    ~4.51%]] notwithstanding). The first substantive policy test is the June
    16-17 FOMC. Beta(13.5, 12.97) ~26 effective observations, both shape
    parameters nudged up as the first-remarks uncertainty resolved.
  supportingEvidence:
    - ev-powell-exit-warsh-nominated-may15
