visual:
  type: Package
  publisher: worldview.genval.ai
  version: 2.0.0
  imports:
    - publisher: kanonak.org
      packages:
        - package: core-rdf
          match: ^
          version: 1.1.0
          alias: rdfs
        - package: core-owl
          match: ^
          version: 2.1.0
          alias: owl
        - package: core-xsd
          match: ^
          version: 1.0.0
          alias: xsd
    - publisher: worldview.genval.ai
      packages:
        - package: core
          match: ^
          version: 2.0.0
          alias: wv
        - package: sources
          match: ^
          version: 1.0.0
          alias: src

# =============================================================================
# Visual extension to the worldview.genval.ai ontology - 2.0.0.
#
# 2.0.0 adds the source-side of the same visual primitive that existed in
# 1.0.0 for theses: a per-source hue analogous to themeHue, plus seeded
# hue values for each of the sources@1.0.0 instances. Source-network
# graphs, trust-weighted evidence cards, and per-source trajectory chips
# all key off `sourceHue` for consistent coloring across the publisher.
#
# Hue assignments cluster by SourceType so a glance at a source-network
# graph reveals the typological mix:
#
#   tier-1-wire             warm reds / oranges  (0-30 deg)
#   major-newspaper         cool blues           (200-240 deg)
#   business-press          greens               (130-170 deg)
#   official-release        purples              (260-300 deg)
#   intergovernmental       cyan-blue            (180-200 deg)
#   industry-body           golds / yellows      (40-65 deg)
#   aggregator              neutral cool         (210-220 deg)
#
# Iconic brand colors override the cluster default where the publisher is
# strongly identified (FT salmon, World Gold Council gold).
#
# Bumps core import to 2.0.0 (no behavioral dependency on the breaking
# change - Theme and thesisTheme work the same against confidence-as-
# Estimate as against scalar confidence; the renderer reads themeHue, not
# confidence).
# =============================================================================


# -----------------------------------------------------------------------------
# Theme - categorical tag for a Thesis (unchanged from 1.0.0)
# -----------------------------------------------------------------------------

Theme:
  type: rdfs.Class
  label: Theme
  comment: >
    A categorical tag indicating which domain of knowledge (defense,
    energy, monetary, etc.) a WorldviewThesis primarily operates in.
    Used by visual rendering layers to color-code theses consistently
    across views - the same iran-war thesis is always defense-red, the
    same ai-capex thesis is always ai-green, regardless of where it
    is rendered. Each Thesis has exactly one primary Theme; cross-
    domain claims should pick the dominant domain or be split into
    multiple theses.

themeHue:
  type: owl.DatatypeProperty
  domain: Theme
  range: xsd.integer
  label: Theme Hue
  comment: >
    HSL hue (0-360) used as the base color for visual representations
    of theses tagged with this domain. Saturation and lightness are
    fixed by the rendering layer (typically 60% / 60% on the dark
    theme) so all domain hues read at consistent visual weight.

thesisTheme:
  type: owl.ObjectProperty
  domain: wv.WorldviewThesis
  range: Theme
  label: Thesis Theme
  comment: >
    Categorical domain of the thesis. Drives color-coding in the
    snapshot view, snapshots index, timeline, changes log, and the
    regime portrait. Optional but strongly recommended - a thesis
    without a declared domain renders in a neutral gray, which loses
    the cross-thesis visual grouping.

# -----------------------------------------------------------------------------
# Named Theme instances - the publisher's working palette (unchanged)
# -----------------------------------------------------------------------------

theme-defense:
  type: Theme
  label: Defense
  comment: >
    Defense / military / national security claims. Procurement
    cycles, rearmament theses, missile-defense capex, defense-prime
    backlogs.
  themeHue: 0

theme-energy:
  type: Theme
  label: Energy
  comment: >
    Energy commodities - oil, gas, refining, transit. Supply-shock
    theses, Strait-of-Hormuz risk, OPEC dynamics.
  themeHue: 32

theme-inflation:
  type: Theme
  label: Inflation
  comment: >
    Inflation, stagflation, price-level claims. Distinct from monetary
    in that the focus is the price-level dynamic, not the institutional
    response.
  themeHue: 14

theme-gold:
  type: Theme
  label: Gold / safe haven
  comment: >
    Gold and safe-haven asset claims. Distinct from monetary and
    inflation because the driver is debasement / store-of-value /
    central-bank-buying rather than rate setting or CPI.
  themeHue: 48

theme-ai:
  type: Theme
  label: AI / tech capex
  comment: >
    Artificial intelligence infrastructure, semiconductor capex,
    hyperscaler spend, the AI capex cycle and its tail risks.
  themeHue: 160

theme-equity:
  type: Theme
  label: Equity markets
  comment: >
    Equity indices, valuation, melt-up / melt-down dynamics, broad
    market regime claims.
  themeHue: 261

theme-monetary:
  type: Theme
  label: Monetary policy
  comment: >
    Central bank policy, Federal Reserve dynamics, rate trajectories,
    Fed independence, leadership transitions. The institutional side
    of the price level.
  themeHue: 199

theme-geopolitical:
  type: Theme
  label: Geopolitical
  comment: >
    War, peace, regime change, election outcomes, geopolitical regime
    claims when the primary lens is geopolitics rather than a specific
    economic transmission.
  themeHue: 173


# =============================================================================
# SOURCE VISUAL - hue per source instance for consistent coloring.
#
# `sourceHue` is the source-side analog of `themeHue`. Renderers consume it
# via `hsl(<sourceHue>, 60%, 55%)` for node fill in source-network graphs,
# trust-weighted evidence-card accents, and per-source chip backgrounds.
# Augments each seeded src.Source instance via open-world merge - the same
# pattern pages.kan.yml uses to augment wv.WorldviewSnapshot with derivations.
# =============================================================================

sourceHue:
  type: owl.DatatypeProperty
  domain: src.Source
  range: xsd.integer
  label: Source Hue
  comment: >
    HSL hue (0-360) used as the base color for visual representations of
    this publisher. Mirror of themeHue for sources. Renderers consume via
    `hsl(<sourceHue>, 60%, 55%)`. Hues cluster by SourceType so a glance
    at a source-network graph reveals the typological mix while keeping
    iconic publishers (FT salmon, Gold Council gold) brand-faithful.

# --- Tier-1 wires (warm reds/oranges 0-30) ---

src.reuters:
  sourceHue: 18

src.bloomberg:
  sourceHue: 28

src.ap:
  sourceHue: 4

src.afp:
  sourceHue: 12

# --- Major newspapers (cool blues 200-240, with FT salmon override) ---

src.wsj:
  sourceHue: 218

src.ft:
  sourceHue: 8

src.nyt:
  sourceHue: 228

src.the-economist:
  sourceHue: 0

# --- Business press (greens 130-170) ---

src.cnbc:
  sourceHue: 138

src.marketwatch:
  sourceHue: 152

src.yahoo-finance:
  sourceHue: 215

src.barrons:
  sourceHue: 130

# --- Official US releases (purples 260-300) ---

src.fed-press:
  sourceHue: 272

src.treasury-press:
  sourceHue: 286

src.white-house-press:
  sourceHue: 264

src.bls-press:
  sourceHue: 296

src.bea-press:
  sourceHue: 280

# --- Intergovernmental + industry bodies ---

src.iea:
  sourceHue: 188

src.opec-secretariat:
  sourceHue: 96

src.world-gold-council:
  sourceHue: 45

src.imf:
  sourceHue: 196
